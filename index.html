<body>
<div id="root"></div>
<script type="text/babel">
/* ═══════════════════════════════════════════════════════════════
   FANTASY ROSTER ADVISOR  — Dynasty Edition
   ───────────────────────────────────────────────────────────────
   HOW TO EDIT:
   • Open in any text editor → change values below → refresh browser
   • Or use the in-app ⚙ Settings panel (no code needed)
   ═══════════════════════════════════════════════════════════════ */

const { useState, useMemo, useRef, useCallback } = React;

/* ── LEAGUE CONFIG ─────────────────────────────────────────────
   Change these to match your league settings.
   ─────────────────────────────────────────────────────────────*/
const DEFAULT_LEAGUE = {
  name:          "Dynasty Field of Dreams S4",
  platform:      "Fantrax",
  scoring:       "H2H Points · Median (14 teams)",
  maxStarts:     10,         // max pitching starts per week
  maxSaves:      10,         // max saves per week
  totalFaab:     200,        // $200 season FAAB budget (Fantrax rules)
  remainingFaab: 200,        // ← update this each week as you spend
  activeSlots:   { C:1, "1B":1, "2B":1, "3B":1, SS:1, INF:1, OF:4, UT:2, SP:5, RP:1, P:3 },
  // Roster limits: 21 active / 28 reserve / 15 IR / 29 minors (min 10) / 50 total
  // Season: Mar 25 – Sep 27, 2026 · Playoffs: Period 25 (Sep 21–27)
  // FAAB bids processed: Sun, Mon, Wed at midnight EDT · Min bid $1
  // Trade deadline: Sep 27, 2026 · Lineup locks: Weekly every Monday
};

/* ── PERFORMANCE BENCHMARKS (avg pts/game) ─────────────────────
   Below 55% of these = flagged as underperforming.
   Raise numbers to be stricter; lower to be more lenient.
   ─────────────────────────────────────────────────────────────*/
const BENCHMARKS = {
  hitter:  { C:2.0, "1B":2.5, "2B":2.5, "3B":2.5, SS:2.5, OF:2.5, INF:2.5, UT:2.0 },
  pitcher: { SP:8.0, RP:3.5, P:8.0 },
};

/* ── DYNASTY AGE TIERS ─────────────────────────────────────────
   Used to compute long-term dynasty value for any player.
   ─────────────────────────────────────────────────────────────*/
const DYNASTY_AGE = [
  { max: 22, label: "Elite Prospect",  stars: 5, score: 50, color: "text-emerald-600",  badge: "bg-emerald-100 text-emerald-800" },
  { max: 25, label: "Prime Upside",    stars: 4, score: 38, color: "text-blue-600",     badge: "bg-blue-100 text-blue-800"      },
  { max: 27, label: "Peak Years",      stars: 3, score: 25, color: "text-indigo-600",   badge: "bg-indigo-100 text-indigo-800"  },
  { max: 30, label: "Declining Asset", stars: 2, score: 12, color: "text-yellow-600",   badge: "bg-yellow-100 text-yellow-800"  },
  { max: 99, label: "Rental/Win-Now",  stars: 1, score: 4,  color: "text-red-500",      badge: "bg-red-100 text-red-700"        },
];

const MIN_GP_HITTER  = 5;
const MIN_GP_PITCHER = 2;

/* ═══════════════════════════════════════════════════════════════
   CSV PARSING  (Fantrax "Team Roster" export)
   ═══════════════════════════════════════════════════════════════ */
function parseCSVLine(line) {
  const out = []; let cur = ""; let inQ = false;
  for (const ch of line) {
    if (ch === '"') inQ = !inQ;
    else if (ch === ',' && !inQ) { out.push(cur.trim()); cur = ""; }
    else cur += ch;
  }
  out.push(cur.trim());
  return out;
}
function col(cols, headers, key) {
  const i = headers.indexOf(key);
  return i >= 0 ? (cols[i] || "").replace(/"/g, "").trim() : "";
}

function parseFantraxCSV(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  const hitters = [], pitchers = [];
  let section = null, hHdr = null, pHdr = null;

  for (const line of lines) {
    const cols  = parseCSVLine(line);
    const clean = cols.map(c => c.replace(/"/g, "").trim());

    // Section header — "Hitting" or "Pitching" appears in any cell
    if (clean.some(c => c === "Hitting"))  { section = "hitting";  continue; }
    if (clean.some(c => c === "Pitching")) { section = "pitching"; continue; }

    // Column header row — first non-empty cell is "ID", or row has both "Player" and "Team"
    const firstVal = clean.find(c => c) || "";
    if (firstVal === "ID" || (clean.includes("Player") && clean.includes("Team"))) {
      if (section === "hitting")        hHdr = clean;
      else if (section === "pitching")  pHdr = clean;
      else                              { hHdr = clean; pHdr = clean; }
      continue;
    }

    if (!section || !clean[0]) continue;
    const hdr = section === "hitting" ? hHdr : pHdr;
    if (!hdr) continue;

    // col() — exact match by column name
    const g = k => col(cols, hdr, k);

    const base = {
      id:         clean[0],
      name:       g("Player"),
      team:       g("Team"),
      pos:        g("Pos"),
      eligible:   g("Eligible"),
      status:     g("Status"),
      age:        parseInt(g("Age"))                                    || 0,
      fpTotal:    parseFloat(g("Fantasy Points"))                       || 0,
      fpAvg:      parseFloat(g("Average Fantasy Points per Game"))      || 0,
      gp:         parseInt(g("GP"))                                     || 0,
      isProspect: false,
    };
    if (!base.name) continue;

    if (section === "hitting" && hHdr) {
      hitters.push({ ...base, type:"hitter",
        hr:  parseInt(g("HR"))  || 0,
        sb:  parseInt(g("SB"))  || 0,
        rbi: parseInt(g("RBI")) || 0,
        r:   parseInt(g("R"))   || 0,
        bb:  parseInt(g("BB"))  || 0,
        so:  parseInt(g("SO"))  || 0,
        h:   parseInt(g("H"))   || 0,
        ab:  parseInt(g("AB"))  || 0,
      });
    } else if (section === "pitching" && pHdr) {
      pitchers.push({ ...base, type:"pitcher",
        ip:  parseFloat(g("IP"))  || 0,
        era: parseFloat(g("ERA")) || 0,
        k:   parseInt(g("K"))     || 0,
        w:   parseInt(g("W"))     || 0,
        sv:  parseInt(g("SV"))    || 0,
        hld: parseInt(g("HLD"))   || 0,
        qs:  parseInt(g("QS"))    || 0,
      });
    }
  }

  return { hitters, pitchers, all:[...hitters,...pitchers] };
}

/* ── FANTRAX "Players → Free Agents" CSV parser ───────────────
   Different format from the roster export:
   • Flat list — no Hitting/Pitching section headers
   • Columns: ID, Player, Team, Position, RkOv, Status, Age,
              FPts, FP/G, Ros, +/-
   • Position is comma-separated eligible list ("2B,3B,SS,INF,OF")
   • Status can contain HTML snippets ("W <small>(Sat)</small>")
   • Minor leaguers appear as team = "(N/A)"
   • No per-stat columns (HR, SB, IP, etc.) — defaults 0
   ─────────────────────────────────────────────────────────────*/
function parseFantraxFACSV(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  if (lines.length < 2) return [];

  const headerCols = parseCSVLine(lines[0]).map(h => h.replace(/"/g, "").trim());
  const g = (rowCols, key) => col(rowCols, headerCols, key);

  const HITTER_POS = ["C","1B","2B","3B","SS","OF"];
  const players = [];

  for (let i = 1; i < lines.length; i++) {
    const rowCols = parseCSVLine(lines[i]);
    const name = g(rowCols, "Player");
    if (!name) continue;

    // Strip any inline HTML from Status (e.g. "W <small>(Sat)</small>")
    const rawStatus = g(rowCols, "Status").replace(/<[^>]+>/g, "").trim();

    const posStr  = g(rowCols, "Position") || g(rowCols, "Pos") || "";
    const posList = posStr.split(",").map(s => s.trim()).filter(Boolean);

    const isPitcher = posList.some(p => ["SP","RP","P"].includes(p));
    const primaryPos = isPitcher
      ? (posList.find(p => p === "SP") || posList.find(p => p === "RP") || "SP")
      : (HITTER_POS.find(hp => posList.includes(hp)) || posList[0] || "OF");

    const age      = parseInt(g(rowCols, "Age"))   || 0;
    const fpTotal  = parseFloat(g(rowCols, "FPts")) || 0;
    const fpAvg    = parseFloat(g(rowCols, "FP/G")) || 0;
    const gp       = (fpAvg > 0 && fpTotal > 0) ? Math.max(1, Math.round(fpTotal / fpAvg)) : 0;
    const rawId    = (g(rowCols, "ID") || name).replace(/\*/g, "").trim();
    const team     = g(rowCols, "Team") || "?";

    // Minor leaguers: Fantrax shows team as "(N/A)" for unsigned/MiLB players
    const isMinors   = team === "(N/A)" || rawStatus === "Min";
    const isProspect = isMinors || (age > 0 && age <= 23);

    players.push({
      id:         rawId || name,
      name,
      team:       isMinors ? "MiLB" : team,
      pos:        primaryPos,
      eligible:   posStr,
      status:     "FA",
      age, isProspect, isMinors,
      fpTotal, fpAvg, gp,
      type:       isPitcher ? "pitcher" : "hitter",
      // Detailed stats not in this export — leave at 0
      hr:0, sb:0, rbi:0, r:0, bb:0, so:0, h:0, ab:0,
      ip:0, era:0, k:0, w:0, sv:0, hld:0, qs:0,
    });
  }

  return players;
}

/* ═══════════════════════════════════════════════════════════════
   DYNASTY SCORING
   ═══════════════════════════════════════════════════════════════ */
function ageTier(age) {
  return DYNASTY_AGE.find(t => age <= t.max) || DYNASTY_AGE[DYNASTY_AGE.length-1];
}

function dynastyScore(player) {
  const tier    = ageTier(player.age || 25);
  const agePts  = tier.score;

  const bmkMap  = player.type === "hitter" ? BENCHMARKS.hitter : BENCHMARKS.pitcher;
  const bmk     = bmkMap[player.pos] || (player.type==="hitter" ? 2.5 : 8.0);
  const prodPts = Math.min(35, (player.fpAvg / bmk) * 20);

  const prosPts = player.isProspect ? 15 : 0;
  const savePts = (player.type === "pitcher" && player.sv > 0) ? 5 : 0;

  return Math.min(100, Math.round(agePts + prodPts + prosPts + savePts));
}

/* ── Dynasty Score Tooltip ──────────────────────────────────────
   Wrap any dynasty score number with this to get a rich hover/click
   popover that explains exactly how the score is built.
   Usage:  <DynScoreTooltip player={p} score={ds} />
   ─────────────────────────────────────────────────────────────── */
function dynastyBreakdown(player) {
  var tier     = ageTier(player.age || 25);
  var agePts   = tier.score;
  var bmkMap   = player.type === "hitter" ? BENCHMARKS.hitter : BENCHMARKS.pitcher;
  var bmk      = bmkMap[player.pos] || (player.type === "hitter" ? 2.5 : 8.0);
  var prodPts  = Math.min(35, Math.round((player.fpAvg / bmk) * 20));
  var prosPts  = player.isProspect ? 15 : 0;
  var savePts  = (player.type === "pitcher" && (player.sv || 0) > 0) ? 5 : 0;
  var total    = Math.min(100, agePts + prodPts + prosPts + savePts);
  return { tier: tier, agePts: agePts, prodPts: prodPts, prosPts: prosPts, savePts: savePts, total: total, bmk: bmk };
}

function DynScoreTooltip({ player, score }) {
  var [open, setOpen] = useState(false);
  var [above, setAbove] = useState(false);
  var triggerRef = useRef(null);
  var bd = dynastyBreakdown(player);
  var tier = bd.tier;

  var rating = score >= 75 ? { label: "Elite Keeper", color: "text-emerald-700", bg: "bg-emerald-50 border-emerald-200" }
             : score >= 55 ? { label: "Strong Asset",  color: "text-blue-700",    bg: "bg-blue-50 border-blue-200"     }
             : score >= 38 ? { label: "Solid Hold",    color: "text-indigo-700",  bg: "bg-indigo-50 border-indigo-200" }
             : score >= 22 ? { label: "Fringe Keeper", color: "text-yellow-700",  bg: "bg-yellow-50 border-yellow-200" }
             :               { label: "Win-Now Only",  color: "text-red-600",     bg: "bg-red-50 border-red-200"       };

  var barColor = score >= 70 ? "bg-emerald-500" : score >= 45 ? "bg-indigo-400" : score >= 25 ? "bg-yellow-400" : "bg-red-400";

  function handleOpen() {
    if (triggerRef.current) {
      var rect = triggerRef.current.getBoundingClientRect();
      // tooltip is ~420px tall; show above only if there's enough room
      setAbove(rect.top > 440);
    }
    setOpen(true);
  }

  // Position: above when there's room, below when near the top
  var popoverPos = above
    ? { bottom: "calc(100% + 8px)", top: "auto" }
    : { top: "calc(100% + 8px)",    bottom: "auto" };

  return (
    <span className="relative inline-flex items-center gap-1">
      <button
        ref={triggerRef}
        onClick={function(e) { e.stopPropagation(); open ? setOpen(false) : handleOpen(); }}
        onMouseEnter={handleOpen}
        onMouseLeave={function() { setOpen(false); }}
        className="inline-flex items-center gap-1 cursor-pointer select-none"
        title="Hover for dynasty score breakdown"
      >
        <span className={"font-bold " + rating.color}>{score}</span>
        <span className="text-gray-300 text-xs">/100</span>
        <span className="text-gray-400 text-xs">ⓘ</span>
      </button>

      {open && (
        <div
          className={"absolute z-50 left-1/2 w-72 rounded-xl border shadow-xl p-4 text-left " + rating.bg}
          style={{transform: "translateX(-50%)", ...popoverPos}}
          onMouseEnter={function() { setOpen(true); }}
          onMouseLeave={function() { setOpen(false); }}
        >
          {/* Header */}
          <div className="flex items-center justify-between mb-3">
            <div>
              <div className="font-black text-gray-900 text-sm">Dynasty Score</div>
              <div className={"text-xs font-semibold mt-0.5 " + rating.color}>{rating.label}</div>
            </div>
            <div className="text-right">
              <div className={"text-3xl font-black " + rating.color}>{score}</div>
              <div className="text-xs text-gray-400">out of 100</div>
            </div>
          </div>

          {/* Score bar */}
          <div className="h-2 bg-gray-200 rounded-full overflow-hidden mb-4">
            <div className={"h-full rounded-full transition-all " + barColor} style={{width: score + "%"}}></div>
          </div>

          {/* What it means */}
          <p className="text-xs text-gray-600 mb-3 leading-snug">
            A <strong>0–100 composite</strong> of long-term keeper value — higher means a better dynasty asset to hold, acquire, or prioritize in trades.
          </p>

          {/* Breakdown rows */}
          <div className="space-y-2 mb-3">
            <div className="text-xs font-bold text-gray-500 uppercase tracking-wide">How it's calculated</div>

            <div className="flex items-center justify-between text-xs">
              <div>
                <span className="font-semibold text-gray-800">Age Value</span>
                <span className={"ml-1.5 px-1.5 py-0.5 rounded-full text-xs font-semibold " + tier.badge}>{tier.label}</span>
              </div>
              <span className={"font-bold " + (bd.agePts >= 38 ? "text-emerald-600" : bd.agePts >= 25 ? "text-blue-600" : bd.agePts >= 12 ? "text-yellow-600" : "text-red-500")}>{bd.agePts}/50</span>
            </div>
            <div className="text-xs text-gray-400 -mt-1 pl-0 leading-snug">
              Age {player.age || "?"} · {bd.agePts >= 38 ? "Maximum upside window ahead" : bd.agePts >= 25 ? "Still in prime years" : bd.agePts >= 12 ? "Approaching decline phase" : "Limited dynasty runway"}
            </div>

            <div className="flex items-center justify-between text-xs pt-1">
              <div>
                <span className="font-semibold text-gray-800">Production</span>
                <span className="text-gray-400 ml-1">({(player.fpAvg || 0).toFixed(1)} pts/gm vs {bd.bmk.toFixed(1)} benchmark)</span>
              </div>
              <span className={"font-bold " + (bd.prodPts >= 25 ? "text-emerald-600" : bd.prodPts >= 12 ? "text-blue-600" : "text-gray-500")}>{bd.prodPts}/35</span>
            </div>

            {bd.prosPts > 0 && (
              <div className="flex items-center justify-between text-xs pt-1">
                <span className="font-semibold text-blue-700">📦 Prospect Bonus</span>
                <span className="font-bold text-blue-600">+{bd.prosPts}</span>
              </div>
            )}

            {bd.savePts > 0 && (
              <div className="flex items-center justify-between text-xs pt-1">
                <span className="font-semibold text-indigo-700">💾 Closer Bonus</span>
                <span className="font-bold text-indigo-600">+{bd.savePts}</span>
              </div>
            )}
          </div>

          {/* Tier guide */}
          <div className="border-t border-gray-200 pt-3">
            <div className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5">Score guide</div>
            <div className="space-y-0.5 text-xs">
              {[
                ["75–100", "Elite Keeper",  "bg-emerald-400"],
                ["55–74",  "Strong Asset",  "bg-blue-400"],
                ["38–54",  "Solid Hold",    "bg-indigo-400"],
                ["22–37",  "Fringe Keeper", "bg-yellow-400"],
                ["0–21",   "Win-Now Only",  "bg-red-400"],
              ].map(function(row) {
                var active = (row[0] === "75–100" && score >= 75) ||
                             (row[0] === "55–74"  && score >= 55 && score < 75) ||
                             (row[0] === "38–54"  && score >= 38 && score < 55) ||
                             (row[0] === "22–37"  && score >= 22 && score < 38) ||
                             (row[0] === "0–21"   && score < 22);
                return (
                  <div key={row[0]} className={"flex items-center gap-2 rounded px-1.5 py-0.5 " + (active ? "bg-white/60 font-bold" : "")}>
                    <div className={"w-2 h-2 rounded-full shrink-0 " + row[2]}></div>
                    <span className="text-gray-500 w-12">{row[0]}</span>
                    <span className={"flex-1 " + (active ? "text-gray-900" : "text-gray-500")}>{row[1]}</span>
                    {active && <span className="text-gray-400 text-xs">← you</span>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </span>
  );
}

function Stars({ n, max = 5 }) {
  return (
    <span className="text-sm">
      {Array.from({length: max}).map((_,i) =>
        <span key={i} className={i < n ? "star-full" : "star-empty"}>★</span>
      )}
    </span>
  );
}

/* ═══════════════════════════════════════════════════════════════
   TEAM NEEDS ANALYSIS
   ═══════════════════════════════════════════════════════════════ */
function eligibleFor(player, slotPos) {
  const elig = player.eligible ? player.eligible.split(",").map(s=>s.trim()) : [player.pos];
  if (slotPos==="INF") return elig.some(e=>["1B","2B","3B","SS","C"].includes(e));
  if (slotPos==="UT")  return player.type==="hitter";
  if (slotPos==="P")   return player.type==="pitcher";
  return elig.includes(slotPos) || player.pos===slotPos;
}
function canFillSlot(candidate, activePlayer) {
  return candidate.type===activePlayer.type && eligibleFor(candidate, activePlayer.pos);
}

function analyzeNeeds(roster) {
  if (!roster) return { positionNeeds: [], categoryNeeds: [] };
  const { all, hitters, pitchers } = roster;
  const active = all.filter(p => p.status === "Act");
  const activeH = active.filter(p => p.type === "hitter");
  const activeP = active.filter(p => p.type === "pitcher");
  const needs = [];

  // Position needs
  const hPositions = ["C","1B","2B","3B","SS","OF"];
  for (const pos of hPositions) {
    const slot = activeH.filter(p => eligibleFor(p, pos));
    const avgAtPos = slot.length > 0 ? slot.reduce((t,p)=>t+p.fpAvg,0)/slot.length : 0;
    const bmk = BENCHMARKS.hitter[pos] || 2.5;
    if (avgAtPos < bmk * 0.7 || slot.length === 0) {
      needs.push({ pos, type:"hitter", label: pos, avgAtPos, bmk,
        severity: avgAtPos < bmk * 0.45 || slot.length===0 ? "critical" : "moderate",
        note: slot.length===0 ? "No eligible player" : `${avgAtPos.toFixed(1)}/gm avg`,
      });
    }
  }

  // Saves need
  const hasSaves = activeP.some(p => p.pos==="RP" && p.sv > 0);
  if (!hasSaves) needs.push({ pos:"RP", type:"pitcher", label:"Saves (RP)", avgAtPos:0, bmk:BENCHMARKS.pitcher.RP, severity:"critical", note:"No active closer" });

  // SP depth need
  const activeSPs = activeP.filter(p => p.pos==="SP" || p.pos==="P");
  const avgSP = activeSPs.length>0 ? activeSPs.reduce((t,p)=>t+p.fpAvg,0)/activeSPs.length : 0;
  if (avgSP < BENCHMARKS.pitcher.SP * 0.7) {
    needs.push({ pos:"SP", type:"pitcher", label:"Starting Pitching", avgAtPos:avgSP, bmk:BENCHMARKS.pitcher.SP, severity: avgSP < BENCHMARKS.pitcher.SP*0.45 ? "critical":"moderate", note:`${avgSP.toFixed(1)}/gm avg` });
  }

  // Category analysis (from actual stat rates)
  const catNeeds = [];
  const totalGP = activeH.reduce((t,p)=>t+p.gp,0)||1;
  const hrPer = activeH.reduce((t,p)=>t+p.hr,0)/totalGP;
  const sbPer = activeH.reduce((t,p)=>t+p.sb,0)/totalGP;
  const rbiPer= activeH.reduce((t,p)=>t+p.rbi,0)/totalGP;
  const bbPer = activeH.reduce((t,p)=>t+p.bb,0)/totalGP;

  if (hrPer  < 0.25) catNeeds.push({ cat:"HR Power",   rate:`${hrPer.toFixed(2)}/gm`,  severity:"high",   icon:"💥" });
  if (sbPer  < 0.15) catNeeds.push({ cat:"Speed/SB",   rate:`${sbPer.toFixed(2)}/gm`,  severity:"medium", icon:"⚡" });
  if (rbiPer < 0.50) catNeeds.push({ cat:"RBI",        rate:`${rbiPer.toFixed(2)}/gm`, severity:"medium", icon:"🏠" });
  if (bbPer  < 0.25) catNeeds.push({ cat:"BB / OBP",   rate:`${bbPer.toFixed(2)}/gm`,  severity:"low",    icon:"👁" });

  const ipTotal   = activeP.reduce((t,p)=>t+p.ip,0)||1;
  const kPer9     = (activeP.reduce((t,p)=>t+p.k,0)/ipTotal)*9;
  const totalSV   = activeP.reduce((t,p)=>t+p.sv,0);
  const totalQS   = activeP.reduce((t,p)=>t+p.qs,0);
  const totalStart= activeP.filter(p=>p.pos==="SP").reduce((t,p)=>t+p.gp,0)||1;

  if (kPer9    < 7.5) catNeeds.push({ cat:"Strikeouts", rate:`${kPer9.toFixed(1)} K/9`,      severity:"medium", icon:"🔥" });
  if (totalSV  < 2)   catNeeds.push({ cat:"Saves",      rate:`${totalSV} total`,              severity:"high",   icon:"🔒" });
  if (totalQS/totalStart < 0.35) catNeeds.push({ cat:"Quality Starts", rate:`${totalQS} QS`,  severity:"medium", icon:"🎯" });

  return { positionNeeds: needs, categoryNeeds: catNeeds };
}

/* ═══════════════════════════════════════════════════════════════
   FA FIT SCORING
   ═══════════════════════════════════════════════════════════════ */
function faFitScore(fa, posNeeds, catNeeds, active) {
  let score = 0;
  const breakdown = [];

  // 1. Position need fit (max 40)
  const filledNeeds = posNeeds.filter(n => n.type === fa.type && eligibleFor(fa, n.pos));
  if (filledNeeds.length > 0) {
    const topNeed = filledNeeds.sort((a,b) => a.avgAtPos - b.avgAtPos)[0];
    const pts = topNeed.severity === "critical" ? 40 : 22;
    score += pts;
    breakdown.push({ label:`Fills ${topNeed.label} need`, pts, positive:true });
  } else {
    breakdown.push({ label:"No position need filled", pts:0, positive:false });
  }

  // 2. Production vs active roster (max 20)
  const peers = active.filter(ap => ap.type===fa.type && canFillSlot(fa, ap)).sort((a,b)=>a.fpAvg-b.fpAvg);
  const worst = peers[0];
  if (worst && fa.fpAvg > worst.fpAvg) {
    const gain = Math.min(20, Math.round((fa.fpAvg - worst.fpAvg) * 3));
    score += gain;
    breakdown.push({ label:`Upgrades ${worst.name} (${worst.fpAvg.toFixed(1)} → ${fa.fpAvg.toFixed(1)})`, pts:gain, positive:true });
  } else if (worst) {
    breakdown.push({ label:`Worse than ${worst.name} (${worst.fpAvg.toFixed(1)}/gm active)`, pts:0, positive:false });
  }

  // 3. Dynasty age value (max 25)
  const tier = ageTier(fa.age || 25);
  const agePts = Math.round((tier.score / 50) * 25);
  score += agePts;
  breakdown.push({ label:`Age ${fa.age || "?"}: ${tier.label}`, pts: agePts, positive: agePts >= 12 });

  // 4. Prospect bonus (max 15)
  if (fa.isProspect) {
    score += 15;
    breakdown.push({ label:"Prospect — long-term dynasty asset", pts:15, positive:true });
  }

  // 5. Category need bonus (max 10)
  let catMatch = false;
  if (fa.type === "hitter") {
    if (fa.hr > 0 && catNeeds.some(c=>c.cat==="HR Power"))  { score += 5; catMatch = true; }
    if (fa.sb > 0 && catNeeds.some(c=>c.cat==="Speed/SB"))  { score += 5; catMatch = true; }
  } else {
    if (fa.sv > 0 && catNeeds.some(c=>c.cat==="Saves"))     { score += 10; catMatch = true; }
    if (fa.qs > 0 && catNeeds.some(c=>c.cat==="Quality Starts")) { score += 5; catMatch = true; }
    if (fa.k  > 0 && catNeeds.some(c=>c.cat==="Strikeouts")) { score += 3; catMatch = true; }
  }
  if (catMatch) breakdown.push({ label:"Fills a category weakness", pts:5, positive:true });

  return { score: Math.min(100, Math.round(score)), breakdown };
}

function faVerdict(fitScore, dynastyScore) {
  const combined = fitScore * 0.65 + dynastyScore * 0.35;
  if (combined >= 68) return { label:"Strong Add",        color:"bg-green-600 text-white",   emoji:"✅" };
  if (combined >= 48) return { label:"Consider",          color:"bg-blue-600 text-white",    emoji:"🔵" };
  if (combined >= 30) return { label:"Dynasty Stash",     color:"bg-indigo-500 text-white",  emoji:"📦" };
  return                     { label:"Pass",              color:"bg-gray-400 text-white",    emoji:"❌" };
}

function suggestedBid(fitScore, dynastyVal, remainingFaab) {
  let pct;
  if (fitScore >= 75)      pct = 0.22;
  else if (fitScore >= 55) pct = 0.13;
  else if (fitScore >= 35) pct = 0.06;
  else                     pct = 0.02;
  // Dynasty upside multiplier
  if (dynastyVal >= 80)      pct *= 1.4;
  else if (dynastyVal >= 60) pct *= 1.2;
  return Math.max(1, Math.round(remainingFaab * pct));
}

/* ═══════════════════════════════════════════════════════════════
   SUGGESTION ENGINE (roster)
   ═══════════════════════════════════════════════════════════════ */
function generateSuggestions(hitters, pitchers) {
  const all = [...hitters,...pitchers];
  const active=all.filter(p=>p.status==="Act"), reserve=all.filter(p=>p.status==="Res"), ir=all.filter(p=>p.status==="IR");
  const sugs = [];
  const order = { critical:0, high:1, medium:2, low:3 };

  for (const ap of active) {
    if (ap.gp===0) continue;
    const bmkMap=ap.type==="hitter"?BENCHMARKS.hitter:BENCHMARKS.pitcher;
    const bmk=bmkMap[ap.pos]||(ap.type==="hitter"?2.5:8.0);
    const minGP=ap.type==="hitter"?MIN_GP_HITTER:MIN_GP_PITCHER;
    if (ap.fpAvg < bmk*0.55 && ap.gp>=minGP) {
      const upgrades=reserve.filter(r=>r.type===ap.type&&r.gp>=(ap.type==="hitter"?3:2)&&r.fpAvg>ap.fpAvg&&canFillSlot(r,ap)).sort((a,b)=>b.fpAvg-a.fpAvg);
      const priority=ap.fpAvg<bmk*0.33?"critical":"high";
      if (upgrades.length>0) {
        sugs.push({ id:`swap-${ap.id}`, priority, category:"swap", headline:`Bench ${ap.name} → Activate ${upgrades[0].name}`, rationale:`${ap.name} averaging ${ap.fpAvg.toFixed(2)}/gm (${ap.gp} GP) — far below the ${bmk} benchmark. ${upgrades[0].name} is sitting on your bench averaging ${upgrades[0].fpAvg.toFixed(2)}/gm.`, bench:ap, activate:upgrades[0] });
      } else {
        sugs.push({ id:`flag-${ap.id}`, priority:"medium", category:"waiver", headline:`${ap.name} underperforming — check waiver wire`, rationale:`${ap.name} averaging ${ap.fpAvg.toFixed(2)}/gm (${ap.gp} GP) with no bench upgrade available. Use the FA Analyzer tab to find a replacement.`, bench:ap, activate:null });
      }
    }
  }
  for (const rp of reserve) {
    if (rp.gp<3||rp.fpAvg===0) continue;
    const already=sugs.some(s=>s.activate?.id===rp.id);
    if (already) continue;
    const peers=active.filter(ap=>canFillSlot(rp,ap)&&ap.gp>=3);
    const worst=peers.sort((a,b)=>a.fpAvg-b.fpAvg)[0];
    if (worst && rp.fpAvg>worst.fpAvg*1.5) {
      sugs.push({ id:`upgrade-${rp.id}`, priority:"medium", category:"swap", headline:`${rp.name} outperforming ${worst.name} — swap them`, rationale:`${rp.name} (bench ${rp.fpAvg.toFixed(2)}/gm) > ${worst.name} (active ${worst.fpAvg.toFixed(2)}/gm). Both fit the ${worst.pos} slot.`, bench:worst, activate:rp });
    }
  }
  for (const ap of active) {
    if (ap.gp===0) sugs.push({ id:`nogp-${ap.id}`, priority:"medium", category:"monitor", headline:`${ap.name} active but has 0 GP — verify status`, rationale:`${ap.name} (${ap.team}, ${ap.pos}) is on your active roster but hasn't logged a game yet. Confirm they're in their team's lineup before Monday's lock.`, bench:null, activate:ap });
  }
  if (!active.some(p=>p.type==="pitcher"&&p.pos==="RP")) {
    sugs.push({ id:"no-saves", priority:"high", category:"waiver", headline:"No active closer — use FA Analyzer to find one", rationale:"Saves are worth +6 pts each. Check the FA Analyzer tab to evaluate available closers.", bench:null, activate:null });
  }
  for (const p of ir) sugs.push({ id:`ir-${p.id}`, priority:"low", category:"monitor", headline:`Plan ahead: ${p.name} is on IL/IR`, rationale:`${p.name} (${p.team}, ${p.pos}) on injured reserve. When their MLB team activates them, clear a spot in advance.`, bench:null, activate:p });
  for (const rp of reserve) {
    if (rp.gp===0&&rp.fpTotal===0&&rp.type==="pitcher") sugs.push({ id:`zerores-${rp.id}`, priority:"low", category:"monitor", headline:`${rp.name} (reserve) has 0 IP — confirm active`, rationale:`${rp.name} (${rp.team}) hasn't pitched yet. Verify their MLB roster status.`, bench:null, activate:rp });
  }
  return sugs.sort((a,b)=>order[a.priority]-order[b.priority]);
}

   UI HELPERS
   ═══════════════════════════════════════════════════════════════ */
const PRIORITY_CARD  = { critical:"border-l-4 border-red-500 bg-red-50", high:"border-l-4 border-orange-400 bg-orange-50", medium:"border-l-4 border-yellow-400 bg-yellow-50", low:"border-l-4 border-gray-300 bg-gray-50" };
const PRIORITY_BADGE = { critical:"bg-red-500 text-white", high:"bg-orange-400 text-white", medium:"bg-yellow-400 text-gray-800", low:"bg-gray-200 text-gray-600" };
const CAT_ICON = { swap:"🔄", waiver:"📋", monitor:"👁" };

function posColor(pos) {
  if (["SP","RP","P"].includes(pos)) return "bg-indigo-100 text-indigo-800";
  if (pos==="C")  return "bg-purple-100 text-purple-800";
  if (pos==="OF") return "bg-emerald-100 text-emerald-800";
  return "bg-amber-100 text-amber-800";
}

function AvgBar({ avg, pos, type }) {
  const bmk   = type==="hitter"?(BENCHMARKS.hitter[pos]||2.5):(BENCHMARKS.pitcher[pos]||8.0);
  const pct   = Math.min(100,(avg/(bmk*1.5))*100);
  const color = avg>=bmk?"bg-green-500":avg>=bmk*0.6?"bg-yellow-400":"bg-red-500";
  const txt   = avg>=bmk?"text-green-700":avg>=bmk*0.6?"text-yellow-700":"text-red-600";
  return (
    <div className="flex items-center gap-2">
      <span className={`text-xs font-bold w-8 ${txt}`}>{avg>0?avg.toFixed(1):"—"}</span>
      <div className="w-12 h-1.5 bg-gray-200 rounded-full overflow-hidden">
        <div className={`h-full rounded-full ${color}`} style={{width:`${pct}%`}}/>
      </div>
    </div>
  );
}

function FaabBar({ remaining, total }) {
  const pct = total>0 ? Math.min(100,(remaining/total)*100) : 0;
  const color = pct>50?"bg-green-500":pct>20?"bg-yellow-400":"bg-red-500";
  return (
    <div>
      <div className="flex justify-between text-xs mb-1">
        <span className="text-slate-300">FAAB Remaining</span>
        <span className="text-white font-bold">${remaining.toLocaleString()} / ${total.toLocaleString()}</span>
      </div>
      <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
        <div className={`h-full rounded-full ${color}`} style={{width:`${pct}%`}}/>
      </div>
    </div>
  );
}

                        <td className="px-3 py-2.5 text-gray-400 max-w-32 truncate">{p.eligible}</td>
                        <td className="px-3 py-2.5 text-center text-gray-600">{p.age||"—"}</td>
                        <td className="px-3 py-2.5 text-center"><DynScoreTooltip player={p} score={ds} /></td>
                        <td className="px-3 py-2.5"><AvgBar avg={p.fpAvg} pos={p.pos} type={p.type}/></td>
                        <td className="px-3 py-2.5 font-semibold text-gray-700">{p.fpTotal>0?p.fpTotal.toFixed(1):"—"}</td>
                        <td className="px-3 py-2.5 text-gray-500">{p.gp||"—"}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   FA ANALYZER TAB
   ═══════════════════════════════════════════════════════════════ */
const EMPTY_FA = { name:"", team:"", pos:"OF", age:"", isProspect:false,
  fpAvg:"", gp:"", hr:"", sb:"", rbi:"", ip:"", era:"", k:"", sv:"", qs:"" };

/* ── MLB STATS API HELPERS ─────────────────────────────────────
   Uses the free, public MLB Stats API (statsapi.mlb.com).
   sportId 1 = MLB majors, 11 = Triple-A, 12 = Double-A.
   ─────────────────────────────────────────────────────────────*/
const MLB_API = "https://statsapi.mlb.com/api/v1";
const CURRENT_SEASON = new Date().getFullYear();

function mapPos(abbr, gamesStarted, gamesPlayed) {
  if (!abbr) return "OF";
  const a = abbr.toUpperCase();
  if (["LF","CF","RF"].includes(a)) return "OF";
  if (["C","1B","2B","3B","SS","OF"].includes(a)) return a;
  if (a === "SP") return "SP";
  if (a === "RP") return "RP";
  if (a === "P")  return (gamesStarted||0) / Math.max(gamesPlayed||1, 1) >= 0.45 ? "SP" : "RP";
  return "OF";
}

function parseIP(ipStr) {
  const [inn, outs] = String(ipStr||"0").split(".").map(Number);
  return (inn||0) + (outs||0) / 3;
}

function calcHitterFP(st) {
  const singles = (st.hits||0) - (st.doubles||0) - (st.triples||0) - (st.homeRuns||0);
  return singles + (st.doubles||0)*2 + (st.triples||0)*3 + (st.homeRuns||0)*4
    + (st.rbi||0) + (st.runs||0) + (st.baseOnBalls||0)
    + (st.stolenBases||0)*2 + (st.caughtStealing||0)*-1
    + (st.strikeOuts||0)*-0.5 + (st.hitByPitch||0);
}

function calcPitcherFP(st) {
  const ip = parseIP(st.inningsPitched);
  return ip*1.25 + (st.wins||0)*2 + (st.losses||0)*-1 + (st.earnedRuns||0)*-1
    + (st.strikeOuts||0) + (st.saves||0)*6 + (st.holds||0)*2
    + (st.qualityStarts||0)*6 + (st.shutouts||0)*3;
}

async function fetchMLBDirectory() {
  const yr = CURRENT_SEASON;

  // All levels we want to cover — from MLB down to Low-A
  const LEVELS = [
    { id: 1,  label: "MLB",    isMinors: false },
    { id: 11, label: "AAA",    isMinors: true  },
    { id: 12, label: "AA",     isMinors: true  },
    { id: 13, label: "High-A", isMinors: true  },
    { id: 14, label: "Low-A",  isMinors: true  },
  ];

  // Step 1 — roster lists for every level (catches ALL players, even those with 0 games)
  const rosterFetches = LEVELS.map(level =>
    fetch(`${MLB_API}/sports/${level.id}/players?season=${yr}`)
      .then(r => r.ok ? r.json() : { people: [] })
      .catch(() => ({ people: [] }))
      .then(data => ({ ...level, people: data.people || [] }))
  );

  // Step 2 — season stats for MLB + AAA (adds fantasy point calculations)
  const statsUrls = [
    `${MLB_API}/stats?stats=season&season=${yr}&group=hitting&sportId=1&playerPool=ALL&limit=2000`,
    `${MLB_API}/stats?stats=season&season=${yr}&group=pitching&sportId=1&playerPool=ALL&limit=2000`,
    `${MLB_API}/stats?stats=season&season=${yr}&group=hitting&sportId=11&playerPool=ALL&limit=2000`,
    `${MLB_API}/stats?stats=season&season=${yr}&group=pitching&sportId=11&playerPool=ALL&limit=2000`,
  ];
  const statTypes = ["hitter", "pitcher", "hitter", "pitcher"];

  const allResults = await Promise.all([
    Promise.all(rosterFetches),
    ...statsUrls.map(u =>
      fetch(u).then(r => r.ok ? r.json() : null).catch(() => null)
    ),
  ]);

  const rosterData = allResults[0];       // array of { id, label, isMinors, people[] }
  const statsSets  = allResults.slice(1); // 4 stats API responses

  // Build a stats lookup keyed by MLB player ID
  // Stores best available data per player (prefer hitter if both exist)
  const statsMap = {};
  for (let i = 0; i < statsSets.length; i++) {
    const type   = statTypes[i];
    const splits = statsSets[i]?.stats?.[0]?.splits || [];
    for (const s of splits) {
      const pid = s.player?.id;
      if (!pid) continue;
      // Don't overwrite an existing hitter entry with a pitcher one
      if (statsMap[pid] && statsMap[pid].type === "hitter" && type === "pitcher") continue;
      statsMap[pid] = {
        type,
        stat:  s.stat || {},
        gp:    s.stat?.gamesPlayed  || 0,
        gs:    s.stat?.gamesStarted || 0,
        posAbbr: s.position?.abbreviation || "",
        team:  s.team?.abbreviation || "?",
      };
    }
  }

  // Build the full player list from roster data, enriched with stats where available
  const players = [];
  const seen    = new Set();   // de-dupe by MLB player ID

  for (const level of rosterData) {
    for (const p of level.people) {
      const pid = p.id;
      if (!pid || seen.has(pid)) continue;
      seen.add(pid);

      const info     = statsMap[pid];
      const posAbbr  = info?.posAbbr || p.primaryPosition?.abbreviation || "";
      const gp       = info?.gp || 0;
      const gs       = info?.gs || 0;
      const st       = info?.stat || {};

      // Determine player type from position
      const pitcherPos = ["P","SP","RP"];
      const isPitcher  = pitcherPos.includes(posAbbr) ||
                         p.primaryPosition?.type === "Pitcher";
      const type = info ? info.type : (isPitcher ? "pitcher" : "hitter");
      const pos  = type === "hitter"
        ? mapPos(posAbbr, 0, gp)
        : mapPos(posAbbr, gs, gp);

      const age      = p.currentAge || 0;
      const teamAbbr = info?.team || p.currentTeam?.abbreviation || "?";

      const fp    = gp > 0
        ? (type === "hitter" ? calcHitterFP(st) : calcPitcherFP(st))
        : 0;
      const fpAvg = gp > 0 ? Math.round((fp / gp) * 100) / 100 : 0;

      players.push({
        id:        `mlb-${pid}-${type}`,
        mlbId:     pid,
        name:      p.fullName || "Unknown",
        team:      teamAbbr,
        pos, type, age,
        isProspect: level.isMinors || age <= 23,
        isMinors:   level.isMinors,
        levelLabel: level.label,   // "MLB", "AAA", "AA", "High-A", "Low-A"
        gp, fpAvg, fpTotal: fp,
        status: "FA",
        eligible: pos,
        hr:  st.homeRuns    || 0,
        sb:  st.stolenBases || 0,
        rbi: st.rbi         || 0,
        r:   st.runs        || 0,
        bb:  st.baseOnBalls || 0,
        so:  st.strikeOuts  || 0,
        h:   st.hits        || 0,
        ab:  st.atBats      || 0,
        ip:  parseIP(st.inningsPitched),
        era: parseFloat(st.era) || 0,
        k:   st.strikeOuts  || 0,
        w:   st.wins        || 0,
        sv:  st.saves       || 0,
        hld: st.holds       || 0,
        qs:  st.qualityStarts || 0,
      });
    }
  }

  // Sort: players with stats first (by fpAvg), then alphabetically for 0-game players
  return players.sort((a, b) => {
    if (b.fpAvg !== a.fpAvg) return b.fpAvg - a.fpAvg;
    return a.name.localeCompare(b.name);
  });
}

// Transaction type metadata
var TX_META = {
  "IL":  { label: "Placed on IL",          emoji: "🚑", severity: "critical",  color: "bg-red-50 border-red-200",    text: "text-red-800"    },
  "RH":  { label: "Reinstated from IL",    emoji: "✅", severity: "positive",  color: "bg-green-50 border-green-200", text: "text-green-800"  },
  "RL":  { label: "Recalled",              emoji: "⬆️", severity: "info",      color: "bg-blue-50 border-blue-200",   text: "text-blue-800"   },
  "OU":  { label: "Optioned to Minors",    emoji: "⬇️", severity: "warning",   color: "bg-yellow-50 border-yellow-200","text": "text-yellow-800"},
  "DFA": { label: "Designated for Assign.",emoji: "📋", severity: "warning",   color: "bg-orange-50 border-orange-200","text":"text-orange-800"},
  "SA":  { label: "Selected to Roster",    emoji: "🆙", severity: "info",      color: "bg-blue-50 border-blue-200",   text: "text-blue-800"   },
  "TR":  { label: "Traded",               emoji: "🔄", severity: "info",      color: "bg-purple-50 border-purple-200",text:"text-purple-800" },
  "RE":  { label: "Released",             emoji: "📤", severity: "warning",   color: "bg-orange-50 border-orange-200","text":"text-orange-800"},
  "SE":  { label: "Signed",              emoji: "📝", severity: "info",      color: "bg-blue-50 border-blue-200",   text: "text-blue-800"   },
  "SB":  { label: "Bereavement/Paternity",emoji: "🏠", severity: "warning",   color: "bg-yellow-50 border-yellow-200","text":"text-yellow-800"},
  "RB":  { label: "Reinstated (Bereav.)", emoji: "✅", severity: "positive",  color: "bg-green-50 border-green-200", text: "text-green-800"  },
  "news":{ label: "News",                emoji: "📰", severity: "info",      color: "bg-gray-50 border-gray-200",   text: "text-gray-700"   },
};

function getTxMeta(code) {
  return TX_META[code] || { label: code || "Update", emoji: "📋", severity: "info", color: "bg-gray-50 border-gray-200", text: "text-gray-700" };
}

function getTxAction(typeCode, playerPos) {
  if (typeCode === "IL")  return "Find a " + (playerPos || "position") + " replacement in FA";
  if (typeCode === "RH")  return "Activate from IL to your active roster";
  if (typeCode === "DFA") return "Player may be available as FA soon — check waivers";
  if (typeCode === "RL")  return "Prospect called up — consider stash or add";
  if (typeCode === "TR")  return "Team change — verify fantasy eligibility & role";
  return null;
}

function fmtNewsDate(d) {
  if (!d) return "";
  try {
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  } catch(e) { return ""; }
}

// RSS-to-JSON proxy (free, no key needed, handles CORS for any RSS feed)
var RSS2JSON = "https://api.rss2json.com/v1/api.json?rss_url=";

// Fantasy-relevant RSS feeds — each filtered to your roster players
var RSS_SOURCES = [
  { name: "Rotowire",        url: "https://www.rotowire.com/baseball/rss-player-news.php",  fantasy: true  },
  { name: "MLB.com",         url: "https://www.mlb.com/feeds/news/rss.xml",                 fantasy: false },
  { name: "CBS Sports",      url: "https://www.cbssports.com/rss/headlines/mlb/",           fantasy: false },
  { name: "Yahoo Sports",    url: "https://sports.yahoo.com/mlb/rss.xml",                  fantasy: false },
  { name: "Bleacher Report", url: "https://bleacherreport.com/mlb.rss",                    fantasy: false },
  { name: "NBC Sports",      url: "https://mlb.nbcsports.com/feed/",                       fantasy: false },
  { name: "FanGraphs",       url: "https://blogs.fangraphs.com/feed/",                     fantasy: true  },
];

// Verified MLB reporters & insiders on X — fetched via Nitter RSS proxy
// Only blue-check / verified accounts with real MLB news authority
var X_ACCOUNTS = [
  { handle: "Ken_Rosenthal",  label: "Ken Rosenthal"  },  // The Athletic
  { handle: "JonHeyman",      label: "Jon Heyman"      },  // NY Post / MLB insider
  { handle: "JeffPassan",     label: "Jeff Passan"     },  // ESPN MLB
  { handle: "BNightengale",   label: "Bob Nightengale" },  // USA Today
  { handle: "Feinsand",       label: "Mark Feinsand"   },  // MLB.com
  { handle: "BaseballAmerica",label: "Baseball America" }, // Prospects
  { handle: "MLBRumors",      label: "MLB Trade Rumors" }, // Aggregator
];
// Nitter is an open-source X frontend that exposes public RSS for verified accounts.
// Routed through rss2json for CORS. Falls back silently if the instance is unreachable.
var NITTER_BASE = "https://nitter.privacydev.net/";

var INJURY_REGEX = /injur|injured|il |i\.l\.|disabled list|strain|sprain|surgery|rehab|day-to-day|d-t-d|dtd|hamstring|oblique|concussion|fracture|soreness|inflammation|elbow|shoulder|wrist|back pain|placed on/i;
var RETURN_REGEX  = /reinstated|activated|returns from|cleared|off the il|off il/i;
var CALL_UP_REGEX = /recalled|called up|promoted|selected/i;

async function fetchPlayerNews(rosterPlayers) {
  var now   = new Date();
  var start = new Date(now.getTime() - 21 * 24 * 60 * 60 * 1000);

  function pad(n) { return String(n).padStart(2, "0"); }
  function isoDate(d) { return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate()); }

  // Build name→player lookup (lowercase keys)
  var rosterMap = {};
  for (var i = 0; i < rosterPlayers.length; i++) {
    rosterMap[rosterPlayers[i].name.toLowerCase()] = rosterPlayers[i];
  }
  var rNames = Object.keys(rosterMap);

  var newsItems = [];
  var seenKeys  = {};

  function addItem(item) {
    if (!item || !item.playerName) return;
    var key = item.playerName + "|" + item.source + "|" + item.headline.slice(0, 40);
    if (seenKeys[key]) return;
    seenKeys[key] = true;
    newsItems.push(item);
  }

  function findPlayer(text) {
    var t = text.toLowerCase();
    for (var r = 0; r < rNames.length; r++) {
      if (t.indexOf(rNames[r]) >= 0) return rosterMap[rNames[r]];
    }
    return null;
  }

  function classifyText(text) {
    if (INJURY_REGEX.test(text))  return { typeCode: "IL",   severity: "critical" };
    if (RETURN_REGEX.test(text))  return { typeCode: "RH",   severity: "positive" };
    if (CALL_UP_REGEX.test(text)) return { typeCode: "RL",   severity: "info"     };
    return                               { typeCode: "news", severity: "info"     };
  }

  // ── 1. MLB Official Transactions (authoritative) ──────────────
  try {
    var txUrl  = MLB_API + "/transactions?startDate=" + isoDate(start) + "&endDate=" + isoDate(now) + "&sportId=1&limit=500";
    var txResp = await fetch(txUrl);
    if (txResp.ok) {
      var txList = (await txResp.json()).transactions || [];
      for (var t = 0; t < txList.length; t++) {
        var tx    = txList[t];
        var pName = tx.player && tx.player.fullName ? tx.player.fullName : null;
        if (!pName) continue;
        var rp = rosterMap[pName.toLowerCase()];
        if (!rp) continue;
        var typeCode = tx.typeCode || tx.typeCd || "?";
        var txDate   = tx.effectiveDate ? new Date(tx.effectiveDate) : (tx.date ? new Date(tx.date) : now);
        var meta     = getTxMeta(typeCode);
        addItem({
          id: "tx-" + (tx.id || Math.random()),
          date: txDate, playerName: pName, playerPos: rp.pos || "",
          typeCode: typeCode, source: "MLB Official",
          headline: meta.label + ": " + pName,
          detail:   tx.description || tx.notes || meta.label + " transaction",
          severity: meta.severity,
          action:   getTxAction(typeCode, rp.pos),
        });
      }
    }
  } catch(e) {}

  // ── 2. ESPN Direct API ────────────────────────────────────────
  try {
    var espnResp = await fetch("https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/news?limit=100");
    if (espnResp.ok) {
      var articles = (await espnResp.json()).articles || [];
      for (var a = 0; a < articles.length; a++) {
        var art  = articles[a];
        var hl   = art.headline || "";
        var desc = art.description || "";
        var rp2  = findPlayer(hl + " " + desc);
        if (!rp2) continue;
        var pubDate = art.published ? new Date(art.published) : now;
        if (now - pubDate > 21 * 24 * 60 * 60 * 1000) continue;
        var cls = classifyText(hl + " " + desc);
        var espnLink = (art.links && art.links.web && art.links.web.href) ? art.links.web.href : (art.url || null);
        addItem({
          id: "espn-" + (art.dataSourceIdentifier || Math.random()),
          date: pubDate, playerName: rp2.name, playerPos: rp2.pos || "",
          typeCode: cls.typeCode, source: "ESPN",
          headline: hl, detail: desc, link: espnLink,
          severity: cls.severity,
          action: cls.typeCode !== "news" ? getTxAction(cls.typeCode, rp2.pos) : null,
        });
      }
    }
  } catch(e) {}

  // ── 3. RSS Sources via rss2json ───────────────────────────────
  var rssPromises = RSS_SOURCES.map(function(src) {
    return fetch(RSS2JSON + encodeURIComponent(src.url) + "&count=100")
      .then(function(r) { return r.ok ? r.json() : { items: [] }; })
      .catch(function()  { return { items: [] }; })
      .then(function(data) { return { src: src, items: data.items || [] }; });
  });

  var rssResults = await Promise.all(rssPromises);

  for (var ri = 0; ri < rssResults.length; ri++) {
    var src   = rssResults[ri].src;
    var items = rssResults[ri].items;
    for (var ii = 0; ii < items.length; ii++) {
      var item    = items[ii];
      var title   = item.title || "";
      var content = item.description || item.content || "";
      var rp3     = findPlayer(title + " " + content);
      if (!rp3) continue;

      var itemDate = item.pubDate ? new Date(item.pubDate) : now;
      if (isNaN(itemDate.getTime())) itemDate = now;
      if (now - itemDate > 21 * 24 * 60 * 60 * 1000) continue;

      // Strip HTML tags from content for display
      var cleanContent = content.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim().slice(0, 300);
      var cls2 = classifyText(title + " " + content);

      addItem({
        id: src.name.toLowerCase() + "-" + (item.guid || item.link || Math.random()),
        date: itemDate, playerName: rp3.name, playerPos: rp3.pos || "",
        typeCode: cls2.typeCode, source: src.name,
        headline: title.replace(/<[^>]+>/g, "").trim(),
        detail:   cleanContent,
        link:     item.link || null,
        severity: cls2.severity,
        action:   cls2.typeCode !== "news" ? getTxAction(cls2.typeCode, rp3.pos) : null,
      });
    }
  }

  // ── 4. X (Twitter) — verified MLB reporters via Nitter RSS ──────
  var xPromises = X_ACCOUNTS.map(function(acct) {
    var nitterUrl = NITTER_BASE + acct.handle + "/rss";
    return fetch(RSS2JSON + encodeURIComponent(nitterUrl) + "&count=50")
      .then(function(r) { return r.ok ? r.json() : { items: [] }; })
      .catch(function()  { return { items: [] }; })
      .then(function(data) { return { acct: acct, items: data.items || [] }; });
  });

  var xResults = await Promise.all(xPromises);

  for (var xi = 0; xi < xResults.length; xi++) {
    var xAcct  = xResults[xi].acct;
    var xItems = xResults[xi].items;
    for (var xii = 0; xii < xItems.length; xii++) {
      var xItem    = xItems[xii];
      var xTitle   = (xItem.title || "").replace(/<[^>]+>/g, "").trim();
      var xContent = (xItem.description || xItem.content || "").replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim();
      var xRp      = findPlayer(xTitle + " " + xContent);
      if (!xRp) continue;
      var xDate = xItem.pubDate ? new Date(xItem.pubDate) : now;
      if (isNaN(xDate.getTime())) xDate = now;
      if (now - xDate > 21 * 24 * 60 * 60 * 1000) continue;
      var xCls = classifyText(xTitle + " " + xContent);
      var xLink = xItem.link ? xItem.link.replace(NITTER_BASE, "https://x.com/") : null;
      addItem({
        id: "x-" + xAcct.handle + "-" + (xItem.guid || xItem.link || Math.random()),
        date: xDate, playerName: xRp.name, playerPos: xRp.pos || "",
        typeCode: xCls.typeCode, source: "𝕏 " + xAcct.label,
        headline: xTitle.slice(0, 200),
        detail:   xContent.slice(0, 300),
        link:     xLink,
        severity: xCls.severity,
        action:   xCls.typeCode !== "news" ? getTxAction(xCls.typeCode, xRp.pos) : null,
      });
    }
  }

  // Sort: critical first, then by date descending
  newsItems.sort(function(a, b) {
    var order = { critical: 0, warning: 1, positive: 2, info: 3 };
    var sa = order[a.severity] !== undefined ? order[a.severity] : 9;
    var sb = order[b.severity] !== undefined ? order[b.severity] : 9;
    if (sa !== sb) return sa - sb;
    return b.date - a.date;
  });

  return newsItems;
}

function sourceColor(source) {
  if (source === "Rotowire")        return "bg-emerald-100 text-emerald-800";
  if (source === "ESPN")            return "bg-red-100 text-red-700";
  if (source === "MLB Official")    return "bg-blue-100 text-blue-800";
  if (source === "CBS Sports")      return "bg-yellow-100 text-yellow-800";
  if (source === "Yahoo Sports")    return "bg-purple-100 text-purple-800";
  if (source === "Bleacher Report") return "bg-orange-100 text-orange-800";
  if (source === "NBC Sports")      return "bg-sky-100 text-sky-800";
  if (source === "FanGraphs")       return "bg-teal-100 text-teal-800";
  if (source.indexOf("𝕏") >= 0) return "bg-gray-900 text-white";
  return "bg-gray-100 text-gray-700";
}

/* ── Highlight player name inside a text string ────────────────*/
function HighlightedText({ text, name }) {
  if (!text || !name) return <span>{text}</span>;
  var escapedName = name.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  var parts = text.split(new RegExp("(" + escapedName + ")", "gi"));
  return (
    <span>
      {parts.map(function(part, i) {
        var isMatch = part.toLowerCase() === name.toLowerCase();
        return isMatch
          ? <mark key={i} className="bg-yellow-200 text-yellow-900 font-bold rounded px-0.5 not-italic">{part}</mark>
          : <span key={i}>{part}</span>;
      })}
    </span>
  );
}

/* ── News Card (top-level, Babel-safe) ─────────────────────────*/
function NewsCard({ item }) {
  var meta = getTxMeta(item.typeCode);
  var dateStr = fmtNewsDate(item.date);
  var hasLink = item.link && item.link.length > 0;
  return (
    <div className={"rounded-xl border p-4 " + meta.color}>
      <div className="flex items-start gap-2.5">
        <span className="text-lg shrink-0 mt-0.5">{meta.emoji}</span>
        <div className="min-w-0 flex-1">
          <div className="flex items-center gap-2 flex-wrap mb-1">
            <span className={"text-xs font-bold px-1.5 py-0.5 rounded-full " + posColor(item.playerPos || "OF")}>{item.playerPos || "—"}</span>
            <span className={"font-bold text-sm " + meta.text}>{item.playerName}</span>
            <span className={"text-xs px-2 py-0.5 rounded-full font-semibold border " + meta.color + " " + meta.text}>{meta.label}</span>
            <span className={"text-xs px-2 py-0.5 rounded-full font-semibold " + sourceColor(item.source)}>{item.source}</span>
            <span className="text-xs text-gray-400 ml-auto">{dateStr}</span>
          </div>

          {/* Headline — clickable if link exists */}
          {hasLink ? (
            <a
              href={item.link}
              target="_blank"
              rel="noopener noreferrer"
              className={"text-xs font-semibold leading-snug hover:underline flex items-start gap-1 group " + meta.text}
            >
              <span className="flex-1"><HighlightedText text={item.headline} name={item.playerName}/></span>
              <span className="text-gray-400 group-hover:text-blue-500 shrink-0 mt-0.5" title="Open article">↗</span>
            </a>
          ) : (
            <p className="text-xs font-semibold text-gray-700 leading-snug">
              <HighlightedText text={item.headline} name={item.playerName}/>
            </p>
          )}

          {/* Description with player name highlighted */}
          {item.detail && item.detail !== item.headline && (
            <p className="text-xs text-gray-500 mt-1 leading-snug">
              <HighlightedText text={item.detail} name={item.playerName}/>
            </p>
          )}

          {item.action && (
            <p className={"text-xs font-semibold mt-2 " + meta.text}>→ {item.action}</p>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── Full News Tab ─────────────────────────────────────────────*/
function NewsTab({ roster, news, newsLoading, newsLoaded, newsError, onRefresh }) {
  const [filter, setFilter] = useState("all");

  var filtered = news;
  if (filter === "injuries") {
    filtered = news.filter(function(n) { return n.severity === "critical" || n.typeCode === "IL" || n.typeCode === "SB"; });
  } else if (filter === "transactions") {
    filtered = news.filter(function(n) { return n.typeCode !== "news" && n.source === "MLB Official"; });
  }

  var criticalCount = news.filter(function(n) { return n.severity === "critical"; }).length;

  if (!roster) {
    return (
      <div className="flex flex-col items-center justify-center py-24 text-center">
        <div className="text-5xl mb-4">📰</div>
        <h3 className="font-bold text-gray-700 text-lg mb-2">No roster loaded</h3>
        <p className="text-gray-400 text-sm max-w-xs">Upload your Fantrax roster CSV first — then we'll pull live news and injury updates for all your players.</p>
      </div>
    );
  }

  return (
    <div className="space-y-5">
      {/* Header card */}
      <div className="bg-white rounded-xl shadow p-5">
        <div className="flex items-center justify-between flex-wrap gap-3">
          <div>
            <h3 className="font-bold text-gray-800">Player News Feed</h3>
            <p className="text-xs text-gray-400 mt-0.5">Live updates from ESPN, 𝕏 insiders, Rotowire, MLB Official, CBS Sports, Yahoo Sports, Bleacher Report, NBC Sports & FanGraphs — filtered to your {roster.all.length} roster players.</p>
          </div>
          <div className="flex items-center gap-3">
            {criticalCount > 0 && (
              <span className="bg-red-100 text-red-700 text-xs font-bold px-3 py-1.5 rounded-full border border-red-200">
                🚑 {criticalCount} injury alert{criticalCount !== 1 ? "s" : ""}
              </span>
            )}
            <button
              onClick={onRefresh}
              disabled={newsLoading}
              className={"text-sm font-semibold px-4 py-2 rounded-lg transition-colors " + (newsLoading ? "bg-gray-200 text-gray-400 cursor-not-allowed" : "bg-blue-600 hover:bg-blue-700 text-white")}
            >
              {newsLoading ? "Loading..." : newsLoaded ? "Refresh" : "Load News"}
            </button>
          </div>
        </div>
        {newsError && <p className="text-xs text-red-500 mt-2">{newsError}</p>}
      </div>

      {/* Filter pills */}
      {newsLoaded && news.length > 0 && (
        <div className="flex gap-2 flex-wrap">
          {[["all","All"],["injuries","Injuries"],["transactions","Transactions"]].map(function(pair) {
            return (
              <button
                key={pair[0]}
                onClick={function() { setFilter(pair[0]); }}
                className={"text-xs font-semibold px-3 py-1.5 rounded-full border transition-colors " + (filter === pair[0] ? "bg-blue-600 text-white border-blue-600" : "bg-white text-gray-600 border-gray-200 hover:border-gray-400")}
              >
                {pair[1]}
              </button>
            );
          })}
        </div>
      )}

      {/* News items */}
      {!newsLoaded && !newsLoading && (
        <div className="bg-white rounded-xl shadow p-8 text-center">
          <div className="text-4xl mb-3">📡</div>
          <p className="text-gray-500 text-sm font-medium">Click "Load News" to fetch live updates for your roster</p>
          <p className="text-gray-400 text-xs mt-1">Pulls from ESPN, 𝕏 insiders (Rosenthal, Heyman, Passan & more), MLB Official, Rotowire & 6 other sources</p>
        </div>
      )}

      {newsLoading && (
        <div className="bg-white rounded-xl shadow p-8 text-center">
          <div className="text-gray-400 text-sm animate-pulse">Checking ESPN, 𝕏 verified reporters, Rotowire, CBS Sports & more for your {roster.all.length} players...</div>
        </div>
      )}

      {newsLoaded && filtered.length === 0 && (
        <div className="bg-white rounded-xl shadow p-8 text-center">
          <div className="text-3xl mb-2">✅</div>
          <p className="text-gray-500 text-sm font-medium">No {filter !== "all" ? filter + " " : ""}news in the last 21 days</p>
          <p className="text-gray-400 text-xs mt-1">All quiet — check back after the next game day.</p>
        </div>
      )}

      {newsLoaded && filtered.length > 0 && (
        <div className="space-y-3">
          {filtered.map(function(item) {
            return <NewsCard key={item.id} item={item} />;
          })}
        </div>
      )}
    </div>
  );
}

/* ── PLAYER SEARCH DROPDOWN ────────────────────────────────────*/
function PlayerSearch({ dir, ownedNames, onSelect, onEvaluate }) {
  const [query,  setQuery]  = useState("");
  const [open,   setOpen]   = useState(false);

  const results = useMemo(() => {
    if (!dir?.length || query.length < 2) return [];
    const q = query.toLowerCase();
    return dir
      .filter(p => p.name.toLowerCase().includes(q) && !(ownedNames||new Set()).has(p.name))
      .slice(0, 18);
  }, [query, dir, ownedNames]);

  const handleEvaluate = (p) => {
    onEvaluate({
      id: `fa-${Date.now()}-${p.mlbId}`,
      name: p.name, team: p.team, pos: p.pos,
      eligible: p.pos, type: p.type,
      age: p.age, isProspect: !!p.isProspect,
      status: "FA", gp: p.gp,
      fpAvg: p.fpAvg, fpTotal: p.fpTotal,
      hr: p.hr||0, sb: p.sb||0, rbi: p.rbi||0,
      r: p.r||0, bb: p.bb||0, so: p.so||0, h: p.h||0, ab: p.ab||0,
      ip: p.ip||0, era: p.era||0, k: p.k||0, sv: p.sv||0, hld: p.hld||0, qs: p.qs||0,
    });
    setQuery(""); setOpen(false);
  };

  return (
    <div className="relative">
      <input
        className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400"
        placeholder={dir?.length ? "Search player name — click ＋ Evaluate to analyze instantly…" : "Load player directory first ↑"}
        value={query}
        onChange={e => { setQuery(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        onBlur={() => setTimeout(() => setOpen(false), 200)}
      />
      {open && results.length > 0 && (
        <div className="absolute z-50 left-0 right-0 bg-white border border-gray-200 rounded-xl shadow-xl mt-1 max-h-80 overflow-y-auto">
          {results.map(p => (
            <div key={p.id} className="flex items-center border-b border-gray-100 last:border-0 hover:bg-gray-50 transition-colors">
              {/* Player info — click to fill form */}
              <button
                type="button"
                onMouseDown={() => { onSelect(p); setQuery(p.name); setOpen(false); }}
                className="flex-1 text-left px-4 py-2.5 flex items-center gap-3 min-w-0">
                <div className="min-w-0 flex-1">
                  <span className="font-semibold text-sm text-gray-900">{p.name}</span>
                  <span className="text-xs text-gray-400 ml-2">{p.team} · {p.pos}</span>
                  {p.isMinors && <span className="ml-1.5 text-xs bg-purple-100 text-purple-700 font-semibold px-1.5 py-0.5 rounded-full">AAA</span>}
                  {!p.isMinors && p.isProspect && <span className="ml-1.5 text-xs bg-emerald-100 text-emerald-700 font-semibold px-1.5 py-0.5 rounded-full">Prospect</span>}
                  <div className="text-xs text-gray-400 mt-0.5">
                    {p.type==="hitter"
                      ? `${p.fpAvg.toFixed(2)} pts/gm · ${p.gp} GP · ${p.hr} HR · ${p.sb} SB · ${p.rbi} RBI`
                      : `${p.fpAvg.toFixed(2)} pts/gm · ${p.gp} GP · ${p.ip?.toFixed ? p.ip.toFixed(1) : p.ip} IP · ${p.k} K · ${p.sv} SV`}
                  </div>
                </div>
              </button>
              {/* One-click evaluate button */}
              <button
                type="button"
                onMouseDown={() => handleEvaluate(p)}
                className="shrink-0 mr-3 bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold px-3 py-1.5 rounded-lg transition-colors whitespace-nowrap">
                + Evaluate
              </button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── FA ENTRY FORM ─────────────────────────────────────────────*/
function FaForm({ onAdd, mlbDir, ownedNames }) {
  const [f, setF] = useState({...EMPTY_FA});
  const [err, setErr] = useState(null);
  const set = (k,v) => setF(p=>({...p,[k]:v}));
  const isPitcher = ["SP","RP"].includes(f.pos);

  // Auto-fill form from a selected MLB directory player
  const selectPlayer = (p) => {
    setF({
      name: p.name, team: p.team !== "?" ? p.team : "", pos: p.pos,
      age:  p.age > 0 ? String(p.age) : "",
      gp:   String(p.gp  || ""),
      fpAvg:String(p.fpAvg != null ? p.fpAvg.toFixed(2) : ""),
      isProspect: !!p.isProspect,
      hr:  String(p.hr  || 0),
      sb:  String(p.sb  || 0),
      rbi: String(p.rbi || 0),
      ip:  String(p.ip  ? p.ip.toFixed(1) : ""),
      era: String(p.era || ""),
      k:   String(p.k   || 0),
      sv:  String(p.sv  || 0),
      qs:  String(p.qs  || 0),
    });
    setErr(null);
  };

  const handleAdd = () => {
    if (!f.name.trim()) { setErr("Player name is required."); return; }
    if (!f.age || isNaN(parseInt(f.age))) { setErr("Age couldn't be loaded automatically for this player — please type it in the Age field above."); return; }
    const fp = parseFloat(f.fpAvg)||0;
    onAdd({
      id: `fa-${Date.now()}`, name:f.name.trim(), team:f.team.trim()||"?", pos:f.pos,
      eligible: f.pos, type: isPitcher?"pitcher":"hitter",
      age: parseInt(f.age)||25, isProspect:f.isProspect, status:"FA",
      fpAvg:fp, fpTotal:fp*(parseInt(f.gp)||0), gp:parseInt(f.gp)||0,
      hr:parseInt(f.hr)||0, sb:parseInt(f.sb)||0, rbi:parseInt(f.rbi)||0,
      ip:parseFloat(f.ip)||0, era:parseFloat(f.era)||0,
      k:parseInt(f.k)||0, sv:parseInt(f.sv)||0, qs:parseInt(f.qs)||0,
    });
    setF({...EMPTY_FA}); setErr(null);
  };

  return (
    <div className="bg-white rounded-xl shadow p-5">
      <h3 className="font-bold text-gray-800 mb-1">Add Free Agent / Waiver Target</h3>
      <p className="text-xs text-gray-400 mb-4">
        {mlbDir?.length
          ? `🟢 Live directory loaded — ${mlbDir.length.toLocaleString()} players (MLB · AAA · AA · High-A · Low-A). Search below or fill manually.`
          : "Load the live directory above to auto-fill stats, or enter manually."}
      </p>

      {err && <div className="bg-red-50 border border-red-200 text-red-700 text-xs rounded-lg px-3 py-2 mb-3">{err}</div>}

      {/* Player search (replaces plain name input when directory loaded) */}
      <div className="mb-3">
        <label className="text-xs text-gray-500 block mb-1">Player Name *</label>
        {mlbDir?.length
          ? <PlayerSearch dir={mlbDir} ownedNames={ownedNames} onSelect={selectPlayer} onEvaluate={onAdd}/>
          : <input className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" placeholder="e.g. Jackson Holliday" value={f.name} onChange={e=>set("name",e.target.value)}/>
        }
        {/* After auto-fill, show the selected name as read-only badge */}
        {mlbDir?.length && f.name && (
          <div className="flex items-center gap-2 mt-1.5">
            <span className="text-xs text-gray-700 font-medium bg-gray-100 px-2 py-1 rounded-lg">{f.name} {f.team && `· ${f.team}`} {f.pos && `· ${f.pos}`}</span>
            <button onClick={()=>setF({...EMPTY_FA})} className="text-xs text-gray-400 hover:text-red-500">✕ clear</button>
          </div>
        )}
      </div>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
        {!mlbDir?.length && (
          <>
            <div><label className="text-xs text-gray-500 block mb-1">Team</label>
              <input className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" placeholder="BAL" value={f.team} onChange={e=>set("team",e.target.value)}/></div>
            <div><label className="text-xs text-gray-500 block mb-1">Position</label>
              <select className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" value={f.pos} onChange={e=>set("pos",e.target.value)}>
                {["C","1B","2B","3B","SS","OF","SP","RP"].map(p=><option key={p}>{p}</option>)}
              </select></div>
          </>
        )}
        {mlbDir?.length && (
          <div><label className="text-xs text-gray-500 block mb-1">Position (override)</label>
            <select className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" value={f.pos} onChange={e=>set("pos",e.target.value)}>
              {["C","1B","2B","3B","SS","OF","SP","RP"].map(p=><option key={p}>{p}</option>)}
            </select></div>
        )}
        <div><label className={`text-xs block mb-1 ${mlbDir?.length && !f.age && f.name ? "text-orange-500 font-semibold" : "text-gray-500"}`}>
          Age {mlbDir?.length && f.name && !f.age ? "⚠ enter manually" : mlbDir?.length ? "(auto-filled)" : ""}
        </label>
          <input type="number" min="18" max="45" className={`w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400 ${mlbDir?.length && !f.age && f.name ? "border-orange-300 bg-orange-50" : ""}`} placeholder="Enter age" value={f.age} onChange={e=>set("age",e.target.value)}/></div>
        <div><label className="text-xs text-gray-500 block mb-1">GP {mlbDir?.length && "(auto-filled)"}</label>
          <input type="number" min="0" className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" placeholder="10" value={f.gp} onChange={e=>set("gp",e.target.value)}/></div>
        <div><label className="text-xs text-gray-500 block mb-1">Avg Pts/gm {mlbDir?.length && "(auto-filled)"}</label>
          <input type="number" step="0.01" className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" placeholder="3.50" value={f.fpAvg} onChange={e=>set("fpAvg",e.target.value)}/></div>
        <div className="flex items-end pb-1">
          <label className="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" checked={f.isProspect} onChange={e=>set("isProspect",e.target.checked)} className="w-4 h-4 accent-blue-600"/>
            <span className="text-xs text-gray-600">Prospect / Minor Leaguer</span>
          </label>
        </div>
      </div>

      {/* Hitter stats */}
      {!isPitcher && (
        <div className="grid grid-cols-3 md:grid-cols-6 gap-3 mb-4">
          {[["hr","HR"],["sb","SB"],["rbi","RBI"]].map(([k,l])=>(
            <div key={k}><label className="text-xs text-gray-500 block mb-1">{l}{mlbDir?.length?" (auto)":""}</label>
              <input type="number" min="0" className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" placeholder="0" value={f[k]} onChange={e=>set(k,e.target.value)}/></div>
          ))}
        </div>
      )}

      {/* Pitcher stats */}
      {isPitcher && (
        <div className="grid grid-cols-3 md:grid-cols-5 gap-3 mb-4">
          {[["ip","IP"],["era","ERA"],["k","K"],["sv","SV"],["qs","QS"]].map(([k,l])=>(
            <div key={k}><label className="text-xs text-gray-500 block mb-1">{l}{mlbDir?.length?" (auto)":""}</label>
              <input type="number" min="0" step={k==="era"||k==="ip"?"0.1":"1"} className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" placeholder="0" value={f[k]} onChange={e=>set(k,e.target.value)}/></div>
          ))}
        </div>
      )}

      <button onClick={handleAdd} className="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-6 py-2 rounded-lg transition-colors">
        + Evaluate Player
      </button>
    </div>
  );
}

function FaCard({ fa, roster, posNeeds, catNeeds, remainingFaab, onRemove }) {
  const [open, setOpen] = useState(true);
  const active = roster ? roster.all.filter(p=>p.status==="Act") : [];
  const { score: fitScore, breakdown } = faFitScore(fa, posNeeds, catNeeds, active);
  const ds      = dynastyScore(fa);
  const verdict = faVerdict(fitScore, ds);
  const bid     = suggestedBid(fitScore, ds, remainingFaab);
  const tier    = ageTier(fa.age||25);

  const scoreBar = (score) => {
    const color = score>=70?"bg-green-500":score>=45?"bg-blue-500":score>=25?"bg-yellow-400":"bg-gray-300";
    return <div className="flex items-center gap-2"><div className="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden"><div className={`h-full rounded-full ${color}`} style={{width:`${score}%`}}/></div><span className="text-xs font-bold w-6">{score}</span></div>;
  };

  return (
    <div className="bg-white rounded-xl shadow border border-gray-100 overflow-hidden">
      <div className="flex items-center justify-between px-5 py-4 cursor-pointer" onClick={()=>setOpen(o=>!o)}>
        <div className="flex items-center gap-3 flex-wrap">
          <span className={`font-bold px-1.5 py-0.5 rounded-full text-xs ${posColor(fa.pos)}`}>{fa.pos}</span>
          <div>
            <span className="font-bold text-gray-900">{fa.name}</span>
            <span className="text-gray-400 text-xs ml-2">{fa.team} · Age {fa.age}</span>
            {fa.isProspect && <span className="ml-2 text-xs bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded-full font-semibold">Prospect</span>}
          </div>
          <span className={`text-xs font-bold px-3 py-1 rounded-full ${verdict.color}`}>{verdict.emoji} {verdict.label}</span>
        </div>
        <div className="flex items-center gap-3">
          <button onClick={e=>{e.stopPropagation();onRemove(fa.id);}} className="text-gray-300 hover:text-red-400 text-sm px-2">✕</button>
          <span className="text-gray-400 text-xs">{open?"▲":"▼"}</span>
        </div>
      </div>

      {open && (
        <div className="px-5 pb-5 border-t border-gray-50">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-5 mt-4">

            {/* Scores */}
            <div className="space-y-3">
              {!roster && <div className="text-xs text-amber-600 bg-amber-50 border border-amber-200 rounded-lg px-3 py-1.5">⚠ Import your roster CSV for a personalized fit score</div>}
              <div>
                <div className="flex justify-between text-xs mb-1"><span className="text-gray-500 font-medium">Team Fit Score</span><span className="font-bold text-gray-700">{fitScore}/100</span></div>
                {scoreBar(fitScore)}
              </div>
              <div>
                <div className="flex justify-between text-xs mb-1"><span className="text-gray-500 font-medium">Dynasty Value</span><DynScoreTooltip player={fa} score={ds} /></div>
                {scoreBar(ds)}
              </div>
              <div className="bg-slate-50 rounded-lg p-3 text-center mt-2">
                <div className="text-xs text-gray-500 mb-0.5">Suggested FAAB Bid</div>
                <div className="text-2xl font-black text-slate-800">${bid.toLocaleString()}</div>
                <div className="text-xs text-gray-400">of ${remainingFaab.toLocaleString()} remaining</div>
              </div>
            </div>

            {/* Fit breakdown */}
            <div>
              <div className="text-xs font-bold text-gray-600 uppercase tracking-wide mb-2">Fit Analysis</div>
              <div className="space-y-1.5">
                {breakdown.map((b,i)=>(
                  <div key={i} className="flex items-start gap-2 text-xs">
                    <span className={b.positive?"text-green-500":"text-red-400"}>{b.positive?"✓":"✗"}</span>
                    <span className="text-gray-600 flex-1">{b.label}</span>
                    {b.pts>0&&<span className="text-green-600 font-bold">+{b.pts}</span>}
                  </div>
                ))}
              </div>
            </div>

            {/* Player stats */}
            <div>
              <div className="text-xs font-bold text-gray-600 uppercase tracking-wide mb-2">Player Stats</div>
              <div className="space-y-1 text-xs text-gray-600">
                <div className="flex items-center gap-1.5"><Stars n={tier.stars}/><span className={tier.color}>{tier.label}</span></div>
                <div>Avg/gm: <strong className={`${fa.fpAvg>3?"text-green-600":fa.fpAvg>1.5?"text-yellow-600":"text-red-500"}`}>{fa.fpAvg.toFixed(1)}</strong></div>
                <div>Games played: {fa.gp}</div>
                {fa.type==="hitter"&&<>
                  {fa.hr>0&&<div>HR: {fa.hr}</div>}
                  {fa.sb>0&&<div>SB: {fa.sb}</div>}
                  {fa.rbi>0&&<div>RBI: {fa.rbi}</div>}
                </>}
                {fa.type==="pitcher"&&<>
                  {fa.ip>0&&<div>IP: {fa.ip} · ERA: {fa.era.toFixed(2)}</div>}
                  <div>K: {fa.k} {fa.sv>0?`· SV: ${fa.sv}`:""} {fa.qs>0?`· QS: ${fa.qs}`:""}</div>
                </>}
                {fa.isProspect&&<div className="text-blue-600 font-semibold">📦 Dynasty stash — long-term value</div>}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── FA RESULTS (scored + filtered list) ───────────────────────*/
/* ── FA TARGET PICKER (shown after CSV import) ─────────────────
   Shows curated picks from the import pool with selectable cards.
   User clicks "+ Evaluate" to add players to the full analysis.
   ─────────────────────────────────────────────────────────────*/
function ImportTargetPicker({ pool, roster, positionNeeds, categoryNeeds, remaining, addedIds, onAdd, onClear }) {
  const [showBrowse, setShowBrowse] = useState(false);
  const [typeFilter, setTypeFilter] = useState("all");
  const [posFilter,  setPosFilter]  = useState("all");
  const [search,     setSearch]     = useState("");

  // Dynasty longevity label for a player
  function dynastyWindow(age) {
    if (!age || age === 0) return "Age unknown";
    if (age <= 22) return "10+ yr dynasty window";
    if (age <= 25) return "7–8 yr dynasty window";
    if (age <= 27) return "4–5 yr peak window";
    if (age <= 30) return "2–3 yr contributor";
    return "Win-now only";
  }

  // Smart groupings from the pool
  const winNow = pool
    .filter(p => !p.isMinors && p._fitScore >= 20 && (p.gp > 0 || p.fpAvg > 0))
    .slice(0, 4);

  const dynastyTargets = pool
    .filter(p => p.isMinors || p.isProspect || (p.age > 0 && p.age <= 24))
    .sort((a, b) => b._dynastyScore - a._dynastyScore)
    .slice(0, 4);

  const needFills = positionNeeds
    .filter(n => n.severity === "critical")
    .map(need => ({
      need,
      player: pool
        .filter(p => p.type === need.type && eligibleFor(p, need.pos) && !p.isMinors)
        .sort((a, b) => b._fitScore - a._fitScore)[0],
    }))
    .filter(x => x.player)
    .slice(0, 3);

  // Browse-all filtered list
  const browseList = useMemo(() => {
    let list = pool;
    if (typeFilter === "hitters")  list = list.filter(p => p.type === "hitter");
    if (typeFilter === "pitchers") list = list.filter(p => p.type === "pitcher");
    if (posFilter !== "all")       list = list.filter(p => eligibleFor(p, posFilter));
    if (search.length >= 2)        list = list.filter(p => p.name.toLowerCase().includes(search.toLowerCase()));
    return list.slice(0, 35);
  }, [pool, typeFilter, posFilter, search]);

  // Compact selectable player card
  function PickCard({ fa, reason }) {
    const isAdded  = addedIds.has(fa.id);
    const verdict  = faVerdict(fa._fitScore, fa._dynastyScore);
    const tier     = ageTier(fa.age || 25);
    const statsLine = fa.type === "hitter"
      ? [fa.fpAvg.toFixed(1)+" pts/gm", fa.gp+" GP",
         fa.hr  ? fa.hr+" HR"  : "",
         fa.sb  ? fa.sb+" SB"  : "",
         fa.rbi ? fa.rbi+" RBI": ""].filter(Boolean).join(" · ")
      : [fa.fpAvg.toFixed(1)+" pts/gm", fa.gp+" GP",
         fa.ip  ? (typeof fa.ip === "number" ? fa.ip.toFixed(1) : fa.ip)+" IP" : "",
         fa.k   ? fa.k+" K"   : "",
         fa.sv  ? fa.sv+" SV" : "",
         fa.qs  ? fa.qs+" QS" : ""].filter(Boolean).join(" · ");

    return (
      <div className={`rounded-xl border p-3.5 transition-all ${isAdded ? "border-green-300 bg-green-50" : "border-gray-100 bg-white shadow-sm hover:shadow-md"}`}>
        {/* Name row */}
        <div className="flex items-start justify-between gap-2 mb-2">
          <div className="min-w-0 flex-1">
            <div className="flex items-center gap-1.5 flex-wrap mb-0.5">
              <span className={`text-xs font-bold px-1.5 py-0.5 rounded-full shrink-0 ${posColor(fa.pos)}`}>{fa.pos}</span>
              <span className="font-bold text-gray-900 text-sm">{fa.name}</span>
              <span className="text-gray-400 text-xs">{fa.team}</span>
              {fa.isMinors && <span className="text-xs bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded-full font-semibold">AAA</span>}
