/* ═══════════════════════════════════════════════════════════════
   CSV PARSING  (Fantrax "Team Roster" export)
   ═══════════════════════════════════════════════════════════════ */
function parseCSVLine(line) {
  const out = []; let cur = ""; let inQ = false;
  for (const ch of line) {
    if (ch === '"') inQ = !inQ;
    else if (ch === ',' && !inQ) { out.push(cur.trim()); cur = ""; }
    else cur += ch;
  }
  out.push(cur.trim());
  return out;
}
function col(cols, headers, key) {
  const i = headers.indexOf(key);
  return i >= 0 ? (cols[i] || "").replace(/"/g, "").trim() : "";
}

function parseFantraxCSV(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  const hitters = [], pitchers = [];
  let section = null, hHdr = null, pHdr = null;

  for (const line of lines) {
    const cols  = parseCSVLine(line);
    const clean = cols.map(c => c.replace(/"/g, "").trim());

    // Section header — "Hitting" or "Pitching" appears in any cell
    if (clean.some(c => c === "Hitting"))  { section = "hitting";  continue; }
    if (clean.some(c => c === "Pitching")) { section = "pitching"; continue; }

    // Column header row — first non-empty cell is "ID", or row has both "Player" and "Team"
    const firstVal = clean.find(c => c) || "";
    if (firstVal === "ID" || (clean.includes("Player") && clean.includes("Team"))) {
      if (section === "hitting")        hHdr = clean;
      else if (section === "pitching")  pHdr = clean;
      else                              { hHdr = clean; pHdr = clean; }
      continue;
    }

    if (!section || !clean[0]) continue;
    const hdr = section === "hitting" ? hHdr : pHdr;
    if (!hdr) continue;

    // col() — exact match by column name
    const g = k => col(cols, hdr, k);

    const base = {
      id:         clean[0],
      name:       g("Player"),
      team:       g("Team"),
      pos:        g("Pos"),
      eligible:   g("Eligible"),
      status:     g("Status"),
      age:        parseInt(g("Age"))                                    || 0,
      fpTotal:    parseFloat(g("Fantasy Points"))                       || 0,
      fpAvg:      parseFloat(g("Average Fantasy Points per Game"))      || 0,
      gp:         parseInt(g("GP"))                                     || 0,
      isProspect: false,
    };
    if (!base.name) continue;

    if (section === "hitting" && hHdr) {
      hitters.push({ ...base, type:"hitter",
        hr:  parseInt(g("HR"))  || 0,
        sb:  parseInt(g("SB"))  || 0,
        rbi: parseInt(g("RBI")) || 0,
        r:   parseInt(g("R"))   || 0,
        bb:  parseInt(g("BB"))  || 0,
        so:  parseInt(g("SO"))  || 0,
        h:   parseInt(g("H"))   || 0,
        ab:  parseInt(g("AB"))  || 0,
      });
    } else if (section === "pitching" && pHdr) {
      pitchers.push({ ...base, type:"pitcher",
        ip:  parseFloat(g("IP"))  || 0,
        era: parseFloat(g("ERA")) || 0,
        k:   parseInt(g("K"))     || 0,
        w:   parseInt(g("W"))     || 0,
        sv:  parseInt(g("SV"))    || 0,
        hld: parseInt(g("HLD"))   || 0,
        qs:  parseInt(g("QS"))    || 0,
      });
    }
  }

  return { hitters, pitchers, all:[...hitters,...pitchers] };
}

/* ── FANTRAX "Players → Free Agents" CSV parser ───────────────
   Different format from the roster export:
   • Flat list — no Hitting/Pitching section headers
   • Columns: ID, Player, Team, Position, RkOv, Status, Age,
              FPts, FP/G, Ros, +/-
   • Position is comma-separated eligible list ("2B,3B,SS,INF,OF")
   • Status can contain HTML snippets ("W <small>(Sat)</small>")
   • Minor leaguers appear as team = "(N/A)"
   • No per-stat columns (HR, SB, IP, etc.) — defaults 0
   ─────────────────────────────────────────────────────────────*/
function parseFantraxFACSV(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  if (lines.length < 2) return [];

  const headerCols = parseCSVLine(lines[0]).map(h => h.replace(/"/g, "").trim());
  const g = (rowCols, key) => col(rowCols, headerCols, key);

  const HITTER_POS = ["C","1B","2B","3B","SS","OF"];
  const players = [];

  for (let i = 1; i < lines.length; i++) {
    const rowCols = parseCSVLine(lines[i]);
    const name = g(rowCols, "Player");
    if (!name) continue;

    // Strip any inline HTML from Status (e.g. "W <small>(Sat)</small>")
    const rawStatus = g(rowCols, "Status").replace(/<[^>]+>/g, "").trim();

    const posStr  = g(rowCols, "Position") || g(rowCols, "Pos") || "";
    const posList = posStr.split(",").map(s => s.trim()).filter(Boolean);

    const isPitcher = posList.some(p => ["SP","RP","P"].includes(p));
    const primaryPos = isPitcher
      ? (posList.find(p => p === "SP") || posList.find(p => p === "RP") || "SP")
      : (HITTER_POS.find(hp => posList.includes(hp)) || posList[0] || "OF");

    const age      = parseInt(g(rowCols, "Age"))   || 0;
    const fpTotal  = parseFloat(g(rowCols, "FPts")) || 0;
    const fpAvg    = parseFloat(g(rowCols, "FP/G")) || 0;
    const gp       = (fpAvg > 0 && fpTotal > 0) ? Math.max(1, Math.round(fpTotal / fpAvg)) : 0;
    const rawId    = (g(rowCols, "ID") || name).replace(/\*/g, "").trim();
    const team     = g(rowCols, "Team") || "?";

    // Minor leaguers: Fantrax shows team as "(N/A)" for unsigned/MiLB players
    const isMinors   = team === "(N/A)" || rawStatus === "Min";
    const isProspect = isMinors || (age > 0 && age <= 23);

    players.push({
      id:         rawId || name,
      name,
      team:       isMinors ? "MiLB" : team,
      pos:        primaryPos,
      eligible:   posStr,
      status:     "FA",
      age, isProspect, isMinors,
      fpTotal, fpAvg, gp,
      type:       isPitcher ? "pitcher" : "hitter",
      // Detailed stats not in this export — leave at 0
      hr:0, sb:0, rbi:0, r:0, bb:0, so:0, h:0, ab:0,
      ip:0, era:0, k:0, w:0, sv:0, hld:0, qs:0,
    });
  }

  return players;
}

// Sanitize external URLs — only allow http/https to prevent javascript: injection
function safeHref(url) {
  if (!url || typeof url !== "string") return null;
  var trimmed = url.trim();
  if (/^https?:\/\//i.test(trimmed)) return trimmed;
  return null; // reject everything else (javascript:, data:, vbscript:, etc.)
}

   • Apple       — Firebase OAuthProvider('apple.com')

   • Email/Pwd   — Firebase EmailAuthProvider (built-in)

   NOT supported (no public OAuth API):

   • CBS Sports    — No standard OAuth

   ═══════════════════════════════════════════════════════════════ */
function LoginScreen() {
  var [mode,  setMode]  = React.useState("signin"); // "signin" | "signup" | "reset"
  var [email, setEmail] = React.useState("");
  var [pass,  setPass]  = React.useState("");
  var [pass2, setPass2] = React.useState("");
  var [busy,  setBusy]  = React.useState(false);
  var [busyProvider, setBusyProvider] = React.useState(null); // "google" | "yahoo" | "apple"
  var [err,   setErr]   = React.useState(null);
  var [msg,   setMsg]   = React.useState(null);
  var [showEmail, setShowEmail] = React.useState(false);

  function clearState() { setErr(null); setMsg(null); setPass(""); setPass2(""); }
  function switchMode(m) { clearState(); setMode(m); setShowEmail(true); }

  /* ── Generic popup sign-in helper ── */
  function signInWithPopup(provider, providerKey) {
    setBusyProvider(providerKey); setErr(null);
    _auth.signInWithPopup(provider).catch(function(e) {
      var msg2 = e.code === "auth/popup-closed-by-user"   ? "Sign-in popup was closed. Please try again."
               : e.code === "auth/popup-blocked"          ? "Popup was blocked by your browser. Allow popups and try again."
               : e.code === "auth/account-exists-with-different-credential"
                 ? "An account already exists with this email using a different sign-in method."
               : e.message || "Sign-in failed. Please try again.";
      setErr(msg2); setBusyProvider(null);
    });
  }

  /* ── Google ── */
  function signInWithGoogle() {
    signInWithPopup(new firebase.auth.GoogleAuthProvider(), "google");
  }

  /* ── Yahoo Fantasy ──
     Requires Yahoo provider enabled in Firebase Console.
     Users who play on Yahoo Fantasy use this to keep one password. */
  function signInWithYahoo() {
    var provider = new firebase.auth.OAuthProvider('yahoo.com');
    provider.addScope('openid');
    provider.addScope('profile');
    provider.addScope('email');
    signInWithPopup(provider, "yahoo");
  }

  /* ── Apple ──
     Requires Apple provider enabled in Firebase Console. */
  function signInWithApple() {
    var provider = new firebase.auth.OAuthProvider('apple.com');
    provider.addScope('email');
    provider.addScope('name');
    signInWithPopup(provider, "apple");
  }

  /* ── Email sign-in ── */
  function signInWithEmail(ev) {
    ev.preventDefault();
    if (!email || !pass) { setErr("Please enter your email and password."); return; }
    setBusy(true); setErr(null);
    _auth.signInWithEmailAndPassword(email, pass).catch(function(e) {
      var msg2 = e.code === "auth/user-not-found"       ? "No account found with that email. Create one below."
               : e.code === "auth/wrong-password"       ? "Incorrect password. Try again or reset it below."
               : e.code === "auth/invalid-email"        ? "Please enter a valid email address."
               : e.code === "auth/invalid-credential"   ? "Email or password is incorrect."
               : e.message || "Sign-in failed.";
      setErr(msg2); setBusy(false);
    });
  }

  /* ── Create account ── */
  function createAccount(ev) {
    ev.preventDefault();
    if (!email || !pass) { setErr("Please fill in all fields."); return; }
    if (pass.length < 6) { setErr("Password must be at least 6 characters."); return; }
    if (pass !== pass2)  { setErr("Passwords don't match."); return; }
    setBusy(true); setErr(null);
    _auth.createUserWithEmailAndPassword(email, pass).catch(function(e) {
      var msg2 = e.code === "auth/email-already-in-use" ? "An account with that email already exists. Sign in instead."
               : e.code === "auth/invalid-email"        ? "Please enter a valid email address."
               : e.code === "auth/weak-password"        ? "Password is too weak — try at least 8 characters."
               : e.message || "Could not create account.";
      setErr(msg2); setBusy(false);
    });
  }

  /* ── Password reset ── */
  function sendReset(ev) {
    ev.preventDefault();
    if (!email) { setErr("Enter your email address above first."); return; }
    setBusy(true); setErr(null);
    _auth.sendPasswordResetEmail(email).then(function() {
      setMsg("Reset email sent! Check your inbox (and spam folder).");
      setBusy(false);
    }).catch(function(e) {
      setErr(e.code === "auth/user-not-found" ? "No account found with that email." : e.message || "Could not send reset email.");
      setBusy(false);
    });
  }

      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>

function AppWithAuth() {
  var [user,        setUser]        = React.useState(null);
  var [authChecked, setAuthChecked] = React.useState(false);

  React.useEffect(function() {
    return _auth.onAuthStateChanged(function(u) {

  }, []);

  if (!authChecked) return <LoadingScreen/>;
  if (!user)        return <LoginScreen/>;

function ageTier(age) {
  return DYNASTY_AGE.find(t => age <= t.max) || DYNASTY_AGE[DYNASTY_AGE.length-1];
}

function dynastyWindow(age) {
  if (!age || age === 0) return "Age unknown";
  if (age <= 22) return "10+ yr dynasty window";
  if (age <= 25) return "7–8 yr dynasty window";
  if (age <= 27) return "4–5 yr peak window";
  if (age <= 30) return "2–3 yr contributor";
  return "Win-now only";
}

function dynastyScore(player) {
  const tier    = ageTier(player.age || 25);
  const agePts  = tier.score;

  const bmkMap  = player.type === "hitter" ? BENCHMARKS.hitter : BENCHMARKS.pitcher;
  const bmk     = bmkMap[player.pos] || (player.type==="hitter" ? 2.5 : 8.0);
  const prodPts = Math.min(35, (player.fpAvg / bmk) * 20);

  const prosPts = player.isProspect ? 15 : 0;
  const savePts = (player.type === "pitcher" && player.sv > 0) ? 5 : 0;

  return Math.min(100, Math.round(agePts + prodPts + prosPts + savePts));
}

/* ── Dynasty Score Tooltip ──────────────────────────────────────
   Wrap any dynasty score number with this to get a rich hover/click
   popover that explains exactly how the score is built.
   Usage:  <DynScoreTooltip player={p} score={ds} />
   ─────────────────────────────────────────────────────────────── */
function dynastyBreakdown(player) {
  var tier     = ageTier(player.age || 25);
  var agePts   = tier.score;
  var bmkMap   = player.type === "hitter" ? BENCHMARKS.hitter : BENCHMARKS.pitcher;
  var bmk      = bmkMap[player.pos] || (player.type === "hitter" ? 2.5 : 8.0);
  var prodPts  = Math.min(35, Math.round((player.fpAvg / bmk) * 20));
  var prosPts  = player.isProspect ? 15 : 0;
  var savePts  = (player.type === "pitcher" && (player.sv || 0) > 0) ? 5 : 0;
  var total    = Math.min(100, agePts + prodPts + prosPts + savePts);
  return { tier: tier, agePts: agePts, prodPts: prodPts, prosPts: prosPts, savePts: savePts, total: total, bmk: bmk };
}

/* ═══════════════════════════════════════════════════════════════
   TEAM NEEDS ANALYSIS
   ═══════════════════════════════════════════════════════════════ */
function eligibleFor(player, slotPos) {
  const elig = player.eligible ? player.eligible.split(",").map(s=>s.trim()) : [player.pos];
  if (slotPos==="INF") return elig.some(e=>["1B","2B","3B","SS","C"].includes(e));
  if (slotPos==="UT")  return player.type==="hitter";
  if (slotPos==="P")   return player.type==="pitcher";
  return elig.includes(slotPos) || player.pos===slotPos;
}
function canFillSlot(candidate, activePlayer) {
  return candidate.type===activePlayer.type && eligibleFor(candidate, activePlayer.pos);
}

function analyzeNeeds(roster) {
  if (!roster) return { positionNeeds: [], categoryNeeds: [] };
  const { all, hitters, pitchers } = roster;
  const active = all.filter(p => p.status === "Act");
  const activeH = active.filter(p => p.type === "hitter");
  const activeP = active.filter(p => p.type === "pitcher");
  const needs = [];

  // Position needs
  const hPositions = ["C","1B","2B","3B","SS","OF"];
  for (const pos of hPositions) {
    const slot = activeH.filter(p => eligibleFor(p, pos));
    const avgAtPos = slot.length > 0 ? slot.reduce((t,p)=>t+p.fpAvg,0)/slot.length : 0;
    const bmk = BENCHMARKS.hitter[pos] || 2.5;
    if (avgAtPos < bmk * 0.7 || slot.length === 0) {
      needs.push({ pos, type:"hitter", label: pos, avgAtPos, bmk,
        severity: avgAtPos < bmk * 0.45 || slot.length===0 ? "critical" : "moderate",
        note: slot.length===0 ? "No eligible player" : `${avgAtPos.toFixed(1)}/gm avg`,
      });
    }
  }

  // Saves need
  const hasSaves = activeP.some(p => p.pos==="RP" && p.sv > 0);
  if (!hasSaves) needs.push({ pos:"RP", type:"pitcher", label:"Saves (RP)", avgAtPos:0, bmk:BENCHMARKS.pitcher.RP, severity:"critical", note:"No active closer" });

  // SP depth need
  const activeSPs = activeP.filter(p => p.pos==="SP" || p.pos==="P");
  const avgSP = activeSPs.length>0 ? activeSPs.reduce((t,p)=>t+p.fpAvg,0)/activeSPs.length : 0;
  if (avgSP < BENCHMARKS.pitcher.SP * 0.7) {
    needs.push({ pos:"SP", type:"pitcher", label:"Starting Pitching", avgAtPos:avgSP, bmk:BENCHMARKS.pitcher.SP, severity: avgSP < BENCHMARKS.pitcher.SP*0.45 ? "critical":"moderate", note:`${avgSP.toFixed(1)}/gm avg` });
  }

  // Category analysis (from actual stat rates)
  const catNeeds = [];
  const totalGP = activeH.reduce((t,p)=>t+p.gp,0)||1;
  const hrPer = activeH.reduce((t,p)=>t+p.hr,0)/totalGP;
  const sbPer = activeH.reduce((t,p)=>t+p.sb,0)/totalGP;
  const rbiPer= activeH.reduce((t,p)=>t+p.rbi,0)/totalGP;
  const bbPer = activeH.reduce((t,p)=>t+p.bb,0)/totalGP;

  if (hrPer  < 0.25) catNeeds.push({ cat:"HR Power",   rate:`${hrPer.toFixed(2)}/gm`,  severity:"high",   icon:"💥" });
  if (sbPer  < 0.15) catNeeds.push({ cat:"Speed/SB",   rate:`${sbPer.toFixed(2)}/gm`,  severity:"medium", icon:"⚡" });
  if (rbiPer < 0.50) catNeeds.push({ cat:"RBI",        rate:`${rbiPer.toFixed(2)}/gm`, severity:"medium", icon:"🏠" });
  if (bbPer  < 0.25) catNeeds.push({ cat:"BB / OBP",   rate:`${bbPer.toFixed(2)}/gm`,  severity:"low",    icon:"👁" });

  const ipTotal   = activeP.reduce((t,p)=>t+p.ip,0)||1;
  const kPer9     = (activeP.reduce((t,p)=>t+p.k,0)/ipTotal)*9;
  const totalSV   = activeP.reduce((t,p)=>t+p.sv,0);
  const totalQS   = activeP.reduce((t,p)=>t+p.qs,0);
  const totalStart= activeP.filter(p=>p.pos==="SP").reduce((t,p)=>t+p.gp,0)||1;

  if (kPer9    < 7.5) catNeeds.push({ cat:"Strikeouts", rate:`${kPer9.toFixed(1)} K/9`,      severity:"medium", icon:"🔥" });
  if (totalSV  < 2)   catNeeds.push({ cat:"Saves",      rate:`${totalSV} total`,              severity:"high",   icon:"🔒" });
  if (totalQS/totalStart < 0.35) catNeeds.push({ cat:"Quality Starts", rate:`${totalQS} QS`,  severity:"medium", icon:"🎯" });

  return { positionNeeds: needs, categoryNeeds: catNeeds };
}

/* ═══════════════════════════════════════════════════════════════
   FA FIT SCORING
   ═══════════════════════════════════════════════════════════════ */
function faFitScore(fa, posNeeds, catNeeds, active, scoringFormat) {
  var fmt = scoringFormat || "h2h_points";
  var catLeague = isCatFormat(fmt);
  let score = 0;
  const breakdown = [];

  // 1. Position need fit (max 40) — same across all formats
  const filledNeeds = posNeeds.filter(n => n.type === fa.type && eligibleFor(fa, n.pos));
  if (filledNeeds.length > 0) {
    const topNeed = filledNeeds.sort((a,b) => a.avgAtPos - b.avgAtPos)[0];
    const pts = topNeed.severity === "critical" ? 40 : 22;
    score += pts;
    breakdown.push({ label:`Fills ${topNeed.label} need`, pts, positive:true });
  } else {
    breakdown.push({ label:"No position need filled", pts:0, positive:false });
  }

  // 2. Production vs active roster
  // Points leagues: production is king (max 28)
  // Category leagues: raw FP/G matters less (max 14)
  var prodMax = catLeague ? 14 : 28;
  const peers = active.filter(ap => ap.type===fa.type && canFillSlot(fa, ap)).sort((a,b)=>a.fpAvg-b.fpAvg);
  const worst = peers[0];
  if (worst && fa.fpAvg > worst.fpAvg) {
    const gain = Math.min(prodMax, Math.round((fa.fpAvg - worst.fpAvg) * 3));
    score += gain;
    breakdown.push({ label:`Upgrades ${worst.name} (${worst.fpAvg.toFixed(1)} → ${fa.fpAvg.toFixed(1)})`, pts:gain, positive:true });
  } else if (worst) {
    breakdown.push({ label:`Worse than ${worst.name} (${worst.fpAvg.toFixed(1)}/gm active)`, pts:0, positive:false });
  }

  // 3. Dynasty age value (max 25) — same across all formats
  const tier = ageTier(fa.age || 25);
  const agePts = Math.round((tier.score / 50) * 25);
  score += agePts;
  breakdown.push({ label:`Age ${fa.age || "?"}: ${tier.label}`, pts: agePts, positive: agePts >= 12 });

  // 4. Prospect bonus (max 15) — same across all formats
  if (fa.isProspect) {
    score += 15;
    breakdown.push({ label:"Prospect — long-term dynasty asset", pts:15, positive:true });
  }

  // 5. Category need bonus
  // Category leagues (h2h_cats, roto): categories are the whole game (max 20)
  // Points leagues: minor bonus for category depth (max 8)
  var catHrSb   = catLeague ? 10 : 4;
  var catSv     = catLeague ? 20 : 8;
  var catQs     = catLeague ? 10 : 4;
  var catK      = catLeague ?  6 : 3;
  let catMatch = false;
  let catPtsAdded = 0;
  if (fa.type === "hitter") {
    if (fa.hr > 0 && catNeeds.some(c=>c.cat==="HR Power"))  { score += catHrSb; catPtsAdded += catHrSb; catMatch = true; }
    if (fa.sb > 0 && catNeeds.some(c=>c.cat==="Speed/SB"))  { score += catHrSb; catPtsAdded += catHrSb; catMatch = true; }
  } else {
    if (fa.sv > 0 && catNeeds.some(c=>c.cat==="Saves"))     { score += catSv;   catPtsAdded += catSv;   catMatch = true; }
    if (fa.qs > 0 && catNeeds.some(c=>c.cat==="Quality Starts")) { score += catQs; catPtsAdded += catQs; catMatch = true; }
    if (fa.k  > 0 && catNeeds.some(c=>c.cat==="Strikeouts")) { score += catK;   catPtsAdded += catK;    catMatch = true; }
  }
  if (catMatch) {
    var catLabel = catLeague
      ? "Fills a category weakness (" + (fmt === "roto" ? "critical in roto" : "key in cat league") + ")"
      : "Fills a category weakness";
    breakdown.push({ label: catLabel, pts: catPtsAdded, positive: true });
  }

  return { score: Math.min(100, Math.round(score)), breakdown };
}

function faVerdict(fitScore, dynastyScore) {
  const combined = fitScore * 0.65 + dynastyScore * 0.35;
  if (combined >= 68) return { label:"Strong Add",        color:"bg-green-600 text-white",   emoji:"✅" };
  if (combined >= 48) return { label:"Consider",          color:"bg-blue-600 text-white",    emoji:"🔵" };
  if (combined >= 30) return { label:"Dynasty Stash",     color:"bg-indigo-500 text-white",  emoji:"📦" };
  return                     { label:"Pass",              color:"bg-gray-400 text-white",    emoji:"❌" };
}

function suggestedBid(fitScore, dynastyVal, remainingFaab) {
  let pct;
  if (fitScore >= 75)      pct = 0.22;
  else if (fitScore >= 55) pct = 0.13;
  else if (fitScore >= 35) pct = 0.06;
  else                     pct = 0.02;
  // Dynasty upside multiplier
  if (dynastyVal >= 80)      pct *= 1.4;
  else if (dynastyVal >= 60) pct *= 1.2;
  return Math.max(1, Math.round(remainingFaab * pct));
}

/* ═══════════════════════════════════════════════════════════════
   DROP PRIORITY — how "droppable" is a roster player?
   Higher score = safer to drop.
   ═══════════════════════════════════════════════════════════════ */
function dropPriority(player, rosterAll, positionNeeds) {
  var score = 100 - dynastyScore(player); // low dynasty value = more droppable
  var bmkMap = player.type === "hitter" ? BENCHMARKS.hitter : BENCHMARKS.pitcher;
  var bmk = bmkMap[player.pos] || (player.type === "hitter" ? 2.5 : 8.0);
  if (player.fpAvg < bmk * 0.7)  score += 20;
  if (player.fpAvg < bmk * 0.4)  score += 20;
  if (player.status === "IR")    score += 30;
  if (player.status === "Res")   score += 10;
  // Penalise if they're the only player who fills this slot
  var sameSlot = rosterAll.filter(function(p) { return p.id !== player.id && canFillSlot(p, player); });
  if (sameSlot.length === 0) score -= 30;
  // Penalise if they fill a critical position need and nobody else does
  var critFilled = positionNeeds.filter(function(n) {
    return n.severity === "critical" && n.type === player.type && eligibleFor(player, n.pos);
  });
  if (critFilled.length > 0) score -= 20;
  return score;
}

/* ═══════════════════════════════════════════════════════════════
   RECOMMENDED MOVES — top drop+claim pairs from imported FA pool
   ═══════════════════════════════════════════════════════════════ */
function recommendMoves(importPool, roster, positionNeeds, categoryNeeds, remaining, scoringFormat) {
  if (!importPool || importPool.length === 0 || !roster) return [];
  var rosterAll = roster.all;
  var active = rosterAll.filter(function(p) { return p.status === "Act"; });

  // Only FAs worth adding
  var candidates = importPool.filter(function(fa) {
    return fa._verdict === "Strong Add" || fa._verdict === "Consider";
  }).slice(0, 15);

  var moves = [];
  var usedDropIds = {};

  for (var ci = 0; ci < candidates.length; ci++) {
    if (moves.length >= 5) break;
    var fa = candidates[ci];

    // Find same-type roster players not already earmarked
    var droppable = rosterAll.filter(function(p) {
      return !usedDropIds[p.id] && p.type === fa.type;
    });
    if (droppable.length === 0) continue;

    // Sort by drop priority descending (most droppable first)
    droppable.sort(function(a, b) {
      return dropPriority(b, rosterAll, positionNeeds) - dropPriority(a, rosterAll, positionNeeds);
    });

    var drop = droppable[0];
    var fitResult = faFitScore(fa, positionNeeds, categoryNeeds, active, scoringFormat);
    var ds = dynastyScore(fa);
    var bid = suggestedBid(fitResult.score, ds, remaining);

    moves.push({ fa: fa, drop: drop, bid: bid, fitScore: fitResult.score, dsScore: ds, verdict: fa._verdict });
    usedDropIds[drop.id] = true;
  }
  return moves;
}

/* ═══════════════════════════════════════════════════════════════
   FIND BEST FA REPLACEMENTS for a specific player being dropped
   Returns top 5 FAs scored for short-term + long-term value.
   ═══════════════════════════════════════════════════════════════ */
function findReplacementsForDrop(dropPlayer, importPool, positionNeeds, categoryNeeds, rosterAll, remaining, scoringFormat) {
  if (!dropPlayer || !importPool || importPool.length === 0) return [];
  var active = rosterAll.filter(function(p) { return p.status === "Act" && p.id !== dropPlayer.id; });
  var baseFpAvg = Math.max(0.1, dropPlayer.fpAvg);

  var scored = importPool.map(function(fa) {
    var fitResult = faFitScore(fa, positionNeeds, categoryNeeds, active, scoringFormat);
    var ds = dynastyScore(fa);
    var bid = suggestedBid(fitResult.score, ds, remaining);
    // Short-term: weighted toward current production vs the player being dropped
    var shortTerm = Math.min(100, Math.round((fa.fpAvg / baseFpAvg) * 40 + fitResult.score * 0.6));
    // Long-term: dynasty score is the primary driver
    var longTerm = ds;
    var combined = fitResult.score * 0.55 + ds * 0.45;
    return Object.assign({}, fa, {
      _repFitScore: fitResult.score,
      _repDs: ds,
      _repBid: bid,
      _shortTerm: Math.min(100, shortTerm),
      _longTerm: longTerm,
      _combined: combined
    });
  }).sort(function(a, b) { return b._combined - a._combined; });

  return scored.slice(0, 5);
}

/* ═══════════════════════════════════════════════════════════════
   PLATFORM INTEGRATION — shared utilities
   ═══════════════════════════════════════════════════════════════ */

/* ── Fuzzy-match a player name to our MLB Stats API directory ── */
function matchToMlbDir(name, team, type, mlbDir) {
  if (!mlbDir || mlbDir.length === 0 || !name) return null;
  var n = name.toLowerCase().trim();
  // 1. Exact name match
  for (var i = 0; i < mlbDir.length; i++) {
    if (mlbDir[i].name.toLowerCase().trim() === n) return mlbDir[i];
  }
  // 2. Same team + last-name match
  var parts = n.split(" ");
  var last = parts[parts.length - 1];
  if (team && team.length >= 2 && last.length >= 4) {
    var teamHits = mlbDir.filter(function(p) { return p.team === team && p.name.toLowerCase().endsWith(last); });
    if (teamHits.length === 1) return teamHits[0];
  }
  // 3. Type-restricted last-name match (longer names only to avoid false positives)
  if (type && last.length >= 5) {
    var typeHits = mlbDir.filter(function(p) { return p.type === type && p.name.toLowerCase().endsWith(last); });
    if (typeHits.length === 1) return typeHits[0];
  }
  return null;
}

/* ── Build a roster entry from raw platform data ── */
function makePlatformEntry(raw, mlbDir, overrideId, overrideStatus) {
  var name    = (raw.name || "Unknown").trim();
  var pos     = raw.pos || "UTIL";
  var team    = raw.team || "";
  var status  = overrideStatus || raw.status || "Act";
  var eligible = raw.eligible || pos;
  var posArr  = eligible.split(",").map(function(s) { return s.trim(); });
  var type    = raw.type || (["OF","LF","CF","RF","1B","2B","3B","SS","C","DH","UTL","UTIL"].some(function(p) { return posArr.includes(p); }) ? "hitter" : "pitcher");

  var match = matchToMlbDir(name, team, type, mlbDir);
  if (match) {
    return Object.assign({}, match, { id: overrideId || match.id, status: status, eligible: eligible || match.eligible });
  }
  return {
    id:        overrideId || ("ext-" + name.replace(/\W+/g, "-").toLowerCase()),
    name:      name, team: team || "—", pos: pos, eligible: eligible,
    type:      type, status: status,
    fpAvg:0, fpTotal:0, gp:0, age: raw.age || 25,
    isProspect:false, isMinors:false,
    hr:0, sb:0, rbi:0, r:0, h:0, k:0, sv:0, qs:0, era:0, whip:0, ip:0, w:0,
  };
}

/* ── Compute FA pool: MLB dir players NOT on any roster ── */
function computeFaPool(allRosteredNames, mlbDir, positionNeeds, categoryNeeds, active, scoringFormat) {
  var rosteredSet = {};
  allRosteredNames.forEach(function(n) {
    if (n) rosteredSet[n.toLowerCase().trim()] = true;
  });
  var ts = Date.now();
  var pool = mlbDir.filter(function(p) {
    return !rosteredSet[p.name.toLowerCase().trim()];
  }).map(function(p) {
    var fa = Object.assign({}, p, { id: "fa-" + p.id + "-" + ts, fromImport: true });
    var fit = faFitScore(fa, positionNeeds, categoryNeeds, active, scoringFormat);
    var ds  = dynastyScore(fa);
    var vd  = faVerdict(fit.score, ds);
    return Object.assign({}, fa, { _fitScore: fit.score, _dynastyScore: ds, _verdict: vd.label, _combined: fit.score * 0.65 + ds * 0.35 });
  }).sort(function(a, b) { return b._combined - a._combined; });
  return pool;
}

/* ══ Sleeper API ═══════════════════════════════════════════════ */
var _sleeperCache = {};
function sleeperFetch(path) {
  if (_sleeperCache[path]) return Promise.resolve(_sleeperCache[path]);
  return fetch("https://api.sleeper.app/v1" + path)
    .then(function(r) { if (!r.ok) throw new Error("Sleeper API " + r.status); return r.json(); })
    .then(function(d) { _sleeperCache[path] = d; return d; });
}
function sleeperGetUser(username) { return sleeperFetch("/user/" + encodeURIComponent(username)); }
function sleeperGetLeagues(userId) {
  return sleeperFetch("/user/" + userId + "/leagues/baseball/" + CURRENT_SEASON)
    .catch(function() { return sleeperFetch("/user/" + userId + "/leagues/mlb/" + CURRENT_SEASON); })
    .then(function(r) { return Array.isArray(r) ? r : []; });
}
function sleeperGetRosters(leagueId) { return sleeperFetch("/league/" + leagueId + "/rosters"); }
function sleeperGetUsers(leagueId)   { return sleeperFetch("/league/" + leagueId + "/users"); }
function sleeperGetPlayers()         { return sleeperFetch("/players/mlb"); }

/* ══ ESPN API ══════════════════════════════════════════════════ */
var ESPN_BASE = "https://fantasy.espn.com/apis/v3/games/flb/seasons/" + CURRENT_SEASON + "/segments/0/leagues/";
var ESPN_POS = { 1:"C",2:"1B",3:"2B",4:"3B",5:"SS",6:"LF",7:"CF",8:"RF",9:"DH",10:"SP",11:"RP",12:"P" };
function espnPosFromId(id) { return ESPN_POS[id] || "UTIL"; }
function espnTypeFromId(id) { return (id === 10 || id === 11 || id === 12) ? "pitcher" : "hitter"; }
function espnFetch(leagueId, views, s2, swid) {
  var url = ESPN_BASE + leagueId + "?" + views.map(function(v){ return "view=" + v; }).join("&");
  var opts = { method: "GET" };
  if (s2 || swid) {
    opts.headers = {};
    if (s2)   opts.headers["X-ESPN-S2"] = s2;
    if (swid) opts.headers["X-ESPN-SWID"] = swid;
  }
  return fetch(url, opts).then(function(r) {
    if (!r.ok) throw new Error("ESPN " + r.status + (r.status === 401 || r.status === 403 ? " — private league" : ""));
    return r.json();
  });
}

/* ═══════════════════════════════════════════════════════════════
   SUGGESTION ENGINE (roster)
   ═══════════════════════════════════════════════════════════════ */
function generateSuggestions(hitters, pitchers, league) {
  var scoringFormat = (league && league.scoringFormat) || "h2h_points";
  var catLeague = isCatFormat(scoringFormat);
  var fmtLabel = catLeague ? (scoringFormat === "roto" ? "roto" : "category league") : "points league";
  const all = [...hitters,...pitchers];
  const active=all.filter(p=>p.status==="Act"), reserve=all.filter(p=>p.status==="Res"), ir=all.filter(p=>p.status==="IR");
  const sugs = [];
  const order = { critical:0, high:1, medium:2, low:3 };

  for (const ap of active) {
    if (ap.gp===0) continue;
    const bmkMap=ap.type==="hitter"?BENCHMARKS.hitter:BENCHMARKS.pitcher;
    const bmk=bmkMap[ap.pos]||(ap.type==="hitter"?2.5:8.0);
    const minGP=ap.type==="hitter"?MIN_GP_HITTER:MIN_GP_PITCHER;
    if (ap.fpAvg < bmk*0.55 && ap.gp>=minGP) {
      const upgrades=reserve.filter(r=>r.type===ap.type&&r.gp>=(ap.type==="hitter"?3:2)&&r.fpAvg>ap.fpAvg&&canFillSlot(r,ap)).sort((a,b)=>b.fpAvg-a.fpAvg);
      const priority=ap.fpAvg<bmk*0.33?"critical":"high";
      var fmtNote = catLeague
        ? " In a " + fmtLabel + ", multi-category production is key — a dead spot hurts across the board."
        : " Every FP/gm of production matters in a " + fmtLabel + ".";
      if (upgrades.length>0) {
        sugs.push({ id:`swap-${ap.id}`, priority, category:"swap", headline:`Bench ${ap.name} → Activate ${upgrades[0].name}`, rationale:`${ap.name} averaging ${ap.fpAvg.toFixed(2)}/gm (${ap.gp} GP) — far below the ${bmk} benchmark. ${upgrades[0].name} is sitting on your bench averaging ${upgrades[0].fpAvg.toFixed(2)}/gm.${fmtNote}`, bench:ap, activate:upgrades[0] });
      } else {
        sugs.push({ id:`flag-${ap.id}`, priority:"medium", category:"waiver", headline:`${ap.name} underperforming — check waiver wire`, rationale:`${ap.name} averaging ${ap.fpAvg.toFixed(2)}/gm (${ap.gp} GP) with no bench upgrade available.${fmtNote} Use the FA Analyzer tab to find a replacement.`, bench:ap, activate:null });
      }
    }
  }
  for (const rp of reserve) {
    if (rp.gp<3||rp.fpAvg===0) continue;
    const already=sugs.some(s=>s.activate?.id===rp.id);
    if (already) continue;
    const peers=active.filter(ap=>canFillSlot(rp,ap)&&ap.gp>=3);
    const worst=peers.sort((a,b)=>a.fpAvg-b.fpAvg)[0];
    if (worst && rp.fpAvg>worst.fpAvg*1.5) {
      sugs.push({ id:`upgrade-${rp.id}`, priority:"medium", category:"swap", headline:`${rp.name} outperforming ${worst.name} — swap them`, rationale:`${rp.name} (bench ${rp.fpAvg.toFixed(2)}/gm) > ${worst.name} (active ${worst.fpAvg.toFixed(2)}/gm). Both fit the ${worst.pos} slot.`, bench:worst, activate:rp });
    }
  }
  for (const ap of active) {
    if (ap.gp===0) sugs.push({ id:`nogp-${ap.id}`, priority:"medium", category:"monitor", headline:`${ap.name} active but has 0 GP — verify status`, rationale:`${ap.name} (${ap.team}, ${ap.pos}) is on your active roster but hasn't logged a game yet. Confirm they're in their team's lineup before Monday's lock.`, bench:null, activate:ap });
  }
  if (!active.some(p=>p.type==="pitcher"&&p.pos==="RP")) {
    var savesNote = catLeague
      ? "Saves are a full category — missing a closer is a guaranteed 0 in that column every week."
      : "Saves are worth +6 pts each. Check the FA Analyzer tab to evaluate available closers.";
    sugs.push({ id:"no-saves", priority:"high", category:"waiver", headline:"No active closer — use FA Analyzer to find one", rationale:savesNote, bench:null, activate:null });
  }
  for (const p of ir) sugs.push({ id:`ir-${p.id}`, priority:"low", category:"monitor", headline:`Plan ahead: ${p.name} is on IL/IR`, rationale:`${p.name} (${p.team}, ${p.pos}) on injured reserve. When their MLB team activates them, clear a spot in advance.`, bench:null, activate:p });
  for (const rp of reserve) {
    if (rp.gp===0&&rp.fpTotal===0&&rp.type==="pitcher") sugs.push({ id:`zerores-${rp.id}`, priority:"low", category:"monitor", headline:`${rp.name} (reserve) has 0 IP — confirm active`, rationale:`${rp.name} (${rp.team}) hasn't pitched yet. Verify their MLB roster status.`, bench:null, activate:rp });
  }
  return sugs.sort((a,b)=>order[a.priority]-order[b.priority]);
}

/* ═══════════════════════════════════════════════════════════════
   NEWS + DIFFERENTIALS ENGINE
   ═══════════════════════════════════════════════════════════════ */

// Return news items that mention a specific roster player (by last name / full name)
function newsForPlayer(player, newsArr) {
  if (!newsArr || !newsArr.length || !player) return [];
  var nl = player.name.toLowerCase();
  var last = nl.split(" ").slice(-1)[0];
  return newsArr.filter(function(n) {
    var hl = (n.headline || "").toLowerCase();
    var desc = (n.description || "").toLowerCase();
    var pn = (n.playerName || "").toLowerCase();
    return pn === nl ||
           hl.includes(nl) ||
           (last.length >= 5 && (hl.includes(last) || desc.includes(last)));
  });
}

// Return news items relevant to any player on the roster (injuries + transactions)
function rosterNewsAlerts(roster, newsArr) {
  if (!roster || !newsArr || !newsArr.length) return [];
  var rosterNames = new Set(roster.all.map(function(p) { return p.name.toLowerCase(); }));
  var rosterLasts = roster.all
    .filter(function(p) { return p.name.split(" ").slice(-1)[0].length >= 5; })
    .map(function(p) { return p.name.split(" ").slice(-1)[0].toLowerCase(); });

  return newsArr.filter(function(n) {
    var hl  = (n.headline || "").toLowerCase();
    var pn  = (n.playerName || "").toLowerCase();
    if (pn && rosterNames.has(pn)) return true;
    for (var i = 0; i < rosterLasts.length; i++) {
      if (hl.includes(rosterLasts[i])) return true;
    }
    return false;
  }).slice(0, 8);
}

// Classify a single news item into a signal type
function newsSignalType(n) {
  var hl = (n.headline || "").toLowerCase();
  var desc = (n.description || "").toLowerCase();
  var text = hl + " " + desc;
  if (/recalled|call[- ]?up|called up|promoted|promotion/.test(text)) return "callup";
  if (/activated|returns? from|off the il|cleared to|reinstated/.test(text)) return "return";
  if (/closer|saves role|closing|9th inning|save opportunit/.test(text)) return "role";
  if (/hot streak|walk.off|multi.homer|cycle|grand slam|no.hitter|perfect game/.test(text)) return "hot";
  if (/injur|placed on|day.to.day|il|disabled list|hurt|fracture|strain|sprain|surgery/.test(text)) return "injury";
  if (/suspend|suspension/.test(text)) return "suspend";
  if (/trade|traded|acquired|signed|designated for assignment|dfa/.test(text)) return "transaction";
  return "general";
}

// Player-scoped signal classifier — looks only at sentences mentioning the specific player
// so multi-player headlines don't bleed signal across players (e.g. "Lindor exits" doesn't
// tag a Vientos hit as an injury).
function newsSignalTypeForPlayer(n, playerName) {
  if (!playerName) return newsSignalType(n);
  var nl   = playerName.toLowerCase();
  var last = nl.split(" ").slice(-1)[0];
  var allText = (n.headline || "") + ". " + (n.description || "");
  // split on sentence boundaries
  var sentences = allText.split(/[.!?]+/).filter(function(s) { return s.trim().length > 0; });
  // keep only sentences that reference this player
  var playerSentences = sentences.filter(function(s) {
    var sl = s.toLowerCase();
    return sl.includes(nl) || (last.length >= 5 && sl.includes(last));
  });
  if (playerSentences.length > 0) {
    // classify against only the player's sentences
    return newsSignalType({ headline: playerSentences.join(". "), description: "" });
  }
  // fallback: classify the whole item
  return newsSignalType(n);
}

// Generate differentials — always produces content from roster data, news is a bonus layer
function generateDifferentials(roster, newsArr, mlbDir, league) {
  if (!roster) return [];
  var scoringFormat = (league && league.scoringFormat) || "h2h_points";
  var catLeague = isCatFormat(scoringFormat);
  var fmtLabel = catLeague ? (scoringFormat === "roto" ? "roto" : "cat league") : "points league";
  var diffs = [];
  var all = roster.all;
  var news = newsArr || [];

  // Helper: find any non-injury news for a player
  function positiveNews(p) {
    return newsForPlayer(p, news).filter(function(n) {
      var sig = newsSignalTypeForPlayer(n, p.name);
      return sig !== "injury" && sig !== "suspend";
    });
  }

  // ── 1. Bench Bombs: top reserve players by dynasty score (no age/score gate) ──
  var reserve = all
    .filter(function(p) { return p.status === "Res"; })
    .sort(function(a, b) { return dynastyScore(b) - dynastyScore(a); })
    .slice(0, 3);

  reserve.forEach(function(p) {
    var ds = dynastyScore(p);
    var pn = positiveNews(p);
    var upside = ds >= 70 ? "Extreme" : ds >= 50 ? "High" : "Moderate";
    var risk   = pn.length ? "Medium" : "High";
    diffs.push({
      id: "bench-" + p.id,
      type: "bench_bomb",
      player: p,
      label: "Bench Bomb",
      emoji: "💣",
      riskColor: "bg-amber-100 border-amber-300 text-amber-900",
      badgeColor: "bg-amber-500 text-white",
      rationale: pn.length
        ? p.name + " (Dynasty Score " + ds + ", Age " + (p.age || "?") + ") has fresh news and is sitting on your bench. This is a high-upside activation candidate right now." + (catLeague ? " In a " + fmtLabel + ", their multi-category upside makes the activation even more compelling." : "")
        : p.name + " (Dynasty Score " + ds + ", Age " + (p.age || "?") + ") is your highest-value bench player." + (catLeague ? " In a " + fmtLabel + ", their ceiling across multiple categories could swing a matchup." : " If matchups line up, activating them could win you the week."),
      news: pn.slice(0, 1),
      upside: upside,
      risk: risk,
    });
  });

  // ── 2. IL Return Plays: ALL players on IR — no news/fpAvg gate ──
  var irPlayers = all.filter(function(p) { return p.status === "IR"; });
  irPlayers.slice(0, 3).forEach(function(p) {
    var ds = dynastyScore(p);
    var pn = positiveNews(p);
    var fpStr = p.fpAvg > 0 ? p.fpAvg.toFixed(1) + " FP/G before IL" : "on your roster for a reason";
    diffs.push({
      id: "return-" + p.id,
      type: "il_return",
      player: p,
      label: "IL Return Play",
      emoji: "🔄",
      riskColor: "bg-blue-50 border-blue-300 text-blue-900",
      badgeColor: "bg-blue-500 text-white",
      rationale: pn.length
        ? p.name + " has news — a return may be imminent. Clear bench space now so you're not scrambling when they're activated."
        : p.name + " (" + fpStr + ") is on IL. Monitor their timeline — getting them back healthy could be the difference-maker in a close week.",
      news: pn.slice(0, 1),
      upside: p.fpAvg >= 8 ? "Extreme" : "High",
      risk: "Medium",
    });
  });

  // ── 3. Prospect Watch: top minors players by dynasty score (always shown) ──
  var minors = all
    .filter(function(p) { return p.status === "Min"; })
    .sort(function(a, b) { return dynastyScore(b) - dynastyScore(a); })
    .slice(0, 2);

  minors.forEach(function(p) {
    var ds = dynastyScore(p);
    var pn = positiveNews(p);
    var isCallup = pn.some(function(n) { return newsSignalTypeForPlayer(n, p.name) === "callup"; });
    diffs.push({
      id: "prospect-" + p.id,
      type: "prospect_watch",
      player: p,
      label: isCallup ? "Prospect Call-Up 🚀" : "Prospect Watch",
      emoji: isCallup ? "🚀" : "💎",
      riskColor: "bg-purple-50 border-purple-300 text-purple-900",
      badgeColor: "bg-purple-600 text-white",
      rationale: isCallup
        ? p.name + " has call-up news! Clear a spot on your active roster immediately — you don't want to be caught with them in minors when they arrive."
        : p.name + " (Dynasty Score " + ds + ") is your highest-value minors player. Watch for promotion news — when it comes you want to react before the waiver window closes.",
      news: pn.slice(0, 1),
      upside: ds >= 65 ? "Extreme" : "High",
      risk: isCallup ? "Low" : "Medium",
    });
  });

  // ── 4. News-driven signals: role upgrades or positive news for any roster player ──
  var newsSeen = new Set();
  news.forEach(function(n) {
    var sig = newsSignalTypeForPlayer(n, n.playerName || null);
    if (sig === "injury" || sig === "suspend" || sig === "general") return;
    var pn2 = (n.playerName || "").toLowerCase();
    if (newsSeen.has(pn2)) return;
    var match = all.find(function(p) {
      var nl = p.name.toLowerCase();
      var last = nl.split(" ").slice(-1)[0];
      return nl === pn2 || (last.length >= 5 && (n.headline || "").toLowerCase().includes(last));
    });
    if (!match || newsSeen.has(match.id)) return;
    newsSeen.add(match.id);
    var label = sig === "callup" ? "Called Up" : sig === "return" ? "IL Return" : sig === "role" ? "Role Change" : sig === "hot" ? "Hot Streak" : "Transaction";
    var emoji  = sig === "callup" ? "🚀" : sig === "return" ? "🔄" : sig === "role" ? "⬆️" : sig === "hot" ? "🔥" : "🔁";
    var rc     = sig === "role" ? "bg-emerald-50 border-emerald-300 text-emerald-900" : "bg-orange-50 border-orange-300 text-orange-900";
    var bc     = sig === "role" ? "bg-emerald-600 text-white" : "bg-orange-500 text-white";
    diffs.push({
      id: "news-" + match.id,
      type: sig,
      player: match,
      label: label,
      emoji: emoji,
      riskColor: rc,
      badgeColor: bc,
      rationale: n.headline + " — Act on this signal before the rest of the league does.",
      news: [n],
      upside: "High",
      risk: sig === "hot" ? "Low" : "Medium",
    });
  });

  return diffs.slice(0, 7);
}

/* ═══════════════════════════════════════════════════════════════
   UI HELPERS
   ═══════════════════════════════════════════════════════════════ */
const PRIORITY_CARD  = { critical:"border-l-4 border-red-500 bg-red-50", high:"border-l-4 border-orange-400 bg-orange-50", medium:"border-l-4 border-yellow-400 bg-yellow-50", low:"border-l-4 border-gray-300 bg-gray-50" };
const PRIORITY_BADGE = { critical:"bg-red-500 text-white", high:"bg-orange-400 text-white", medium:"bg-yellow-400 text-gray-800", low:"bg-gray-200 text-gray-600" };
const CAT_ICON = { swap:"🔄", waiver:"📋", monitor:"👁" };

function posColor(pos) {
  if (["SP","RP","P"].includes(pos)) return "bg-indigo-100 text-indigo-800";
  if (pos==="C")  return "bg-purple-100 text-purple-800";
  if (pos==="OF") return "bg-emerald-100 text-emerald-800";
  return "bg-amber-100 text-amber-800";
}

function AvgBar({ avg, pos, type }) {
  const bmk   = type==="hitter"?(BENCHMARKS.hitter[pos]||2.5):(BENCHMARKS.pitcher[pos]||8.0);
  const pct   = Math.min(100,(avg/(bmk*1.5))*100);
  const color = avg>=bmk?"bg-green-500":avg>=bmk*0.6?"bg-yellow-400":"bg-red-500";
  const txt   = avg>=bmk?"text-green-700":avg>=bmk*0.6?"text-yellow-700":"text-red-600";
  return (
    <div className="flex items-center gap-2">
      <span className={`text-xs font-bold w-8 ${txt}`}>{avg>0?avg.toFixed(1):"—"}</span>
      <div className="w-12 h-1.5 bg-gray-200 rounded-full overflow-hidden">
        <div className={`h-full rounded-full ${color}`} style={{width:`${pct}%`}}/>
      </div>
    </div>
  );
}

function FaabBar({ remaining, total }) {
  const pct = total>0 ? Math.min(100,(remaining/total)*100) : 0;
  const color = pct>50?"bg-green-500":pct>20?"bg-yellow-400":"bg-red-500";
  return (
    <div>
      <div className="flex justify-between text-xs mb-1">
        <span className="text-slate-300">FAAB Remaining</span>
        <span className="text-white font-bold">${remaining.toLocaleString()} / ${total.toLocaleString()}</span>
      </div>
      <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
        <div className={`h-full rounded-full ${color}`} style={{width:`${pct}%`}}/>
      </div>
    </div>
  );
}

/* ── Shared status display ── */
function ConnectStatus({ status }) {
  if (!status) return null;
  if (status.type === "loading") return (
    <div className="flex items-center gap-2 text-sm text-blue-600 bg-blue-50 rounded-lg px-3 py-2.5 border border-blue-100">
      <span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⏳</span>
      {status.msg}
    </div>
  );
  if (status.type === "error") return (
    <div className="text-sm text-red-600 bg-red-50 rounded-lg px-3 py-2.5 border border-red-100">⚠ {status.msg}</div>
  );
  if (status.type === "success") return (
    <div className="text-sm text-green-700 bg-green-50 rounded-lg px-3 py-2.5 border border-green-100">{status.msg}</div>
  );
  return null;
}

/* ── Step indicator ── */
function ConnectSteps({ steps, current }) {
  return (
    <div className="flex items-center gap-1 text-xs mb-4">
      {steps.map(function(s, i) {
        var done   = current > i + 1;
        var active = current === i + 1;
        return (
          <React.Fragment key={s}>
            {i > 0 && <div className="flex-1 h-px bg-gray-200"/>}
            <span className={"font-semibold px-2 py-0.5 rounded-full whitespace-nowrap " +
              (done ? "bg-green-100 text-green-700" : active ? "bg-blue-600 text-white" : "bg-gray-100 text-gray-400")}>
              {done ? "✓ " : ""}{s}
            </span>
          </React.Fragment>
        );
      })}
    </div>
  );
}

/* ── Sleeper panel ─────────────────────────────────────────── */
function SleeperConnectPanel({ league, mlbDir, onRosterSynced, onFasSynced, onLeagueSaved }) {
  var [step,     setStep]     = useState(league.sleeperLeagueId && league.sleeperTeamId ? 3 : 1);
  var [username, setUsername] = useState(league.sleeperUsername || "");
  var [userId,   setUserId]   = useState(null);
  var [leagues,  setLeagues]  = useState([]);
  var [selLgId,  setSelLgId]  = useState(league.sleeperLeagueId || "");
  var [teams,    setTeams]    = useState([]);
  var [selTeamId,setSelTeamId]= useState(league.sleeperTeamId || null);
  var [status,   setStatus]   = useState(null);

  function findUser() {
    if (!username.trim()) return;
    setStatus({ type:"loading", msg:"Looking up Sleeper account…" });
    sleeperGetUser(username.trim())
      .then(function(u) {
        if (!u || !u.user_id) throw new Error("Username not found on Sleeper.");
        setUserId(u.user_id);
        setStatus({ type:"loading", msg:"Loading your baseball leagues…" });
        return sleeperGetLeagues(u.user_id);
      })
      .then(function(lgs) {
        if (!lgs || lgs.length === 0) throw new Error("No baseball leagues found for " + CURRENT_SEASON + ". Check your username or try after the season opens.");
        setLeagues(lgs); setStatus(null); setStep(2);
      })
      .catch(function(e) { setStatus({ type:"error", msg: e.message || "Could not find Sleeper user." }); });
  }

  function pickLeague(lgId) {
    setSelLgId(lgId);
    setStatus({ type:"loading", msg:"Loading teams…" });
    Promise.all([sleeperGetRosters(lgId), sleeperGetUsers(lgId)])
      .then(function(res) {
        var rosters = res[0]; var users = res[1];
        var uMap = {};
        (users || []).forEach(function(u) { uMap[u.user_id] = u.display_name || u.username || ("Team " + u.user_id); });
        setTeams((rosters || []).map(function(r) {
          return { rosterId: r.roster_id, ownerId: r.owner_id, name: uMap[r.owner_id] || ("Team " + r.roster_id) };
        }));
        setStatus(null); setStep(3);
      })
      .catch(function(e) { setStatus({ type:"error", msg:"Could not load teams: " + (e.message || "unknown error") }); });
  }

  function syncNow(teamId) {
    var tid = teamId || selTeamId;
    if (!selLgId || !tid) return;
    setStatus({ type:"loading", msg:"Loading Sleeper player database (may take a moment)…" });
    Promise.all([sleeperGetRosters(selLgId), sleeperGetPlayers()])
      .then(function(res) {
        var allRosters = res[0]; var allPlayers = res[1];
        var myRoster = allRosters.find(function(r) { return String(r.roster_id) === String(tid); });
        if (!myRoster) throw new Error("Team not found in league — try re-selecting.");
        setStatus({ type:"loading", msg:"Building your roster…" });
        var starters = {};
        (myRoster.starters || []).forEach(function(id) { starters[id] = true; });
        var entries = (myRoster.players || []).map(function(id, i) {
          var sp = allPlayers[id] || {};
          var name = sp.full_name || ((sp.first_name || "") + " " + (sp.last_name || "")).trim();
          if (!name || name.length < 2) return null;
          var positions = sp.fantasy_positions || (sp.position ? [sp.position] : ["UTIL"]);
          var pos = positions[0] || "UTIL";
          var st = (sp.injury_status === "Out" || sp.injury_status === "IR") ? "IR" : starters[id] ? "Act" : "Res";
          return makePlatformEntry({ name:name, pos:pos, team:sp.team||"", eligible:positions.join(","), age:sp.age, status:st }, mlbDir, "sl-"+id+"-"+i, st);
        }).filter(Boolean);
        var hitters  = entries.filter(function(p){ return p.type==="hitter"; });
        var pitchers = entries.filter(function(p){ return p.type==="pitcher"; });
        onRosterSynced({ hitters:hitters, pitchers:pitchers, all:entries });
        if (onLeagueSaved) onLeagueSaved({ connectedPlatform:"sleeper", sleeperUsername:username, sleeperLeagueId:selLgId, sleeperTeamId:String(tid) });
        if (mlbDir && mlbDir.length > 0) {
          setStatus({ type:"loading", msg:"Computing free agent pool…" });
          var allRosteredNames = [];
          allRosters.forEach(function(r) {
            (r.players||[]).forEach(function(id) {
              var sp = allPlayers[id] || {};
              var n = sp.full_name || ((sp.first_name||"") + " " + (sp.last_name||"")).trim();
              if (n) allRosteredNames.push(n);
            });
          });
          var active = entries.filter(function(p){ return p.status==="Act"; });
          onFasSynced(computeFaPool(allRosteredNames, mlbDir, [], [], active, "h2h_points"));
          setStatus({ type:"success", msg:"✅ Synced from Sleeper — " + entries.length + " roster players + FA pool ready." });
        } else {
          setStatus({ type:"success", msg:"✅ Roster synced (" + entries.length + " players). Load the MLB Directory in FA Analyzer to also get the FA pool." });
        }
        setStep(4);
      })
      .catch(function(e) { setStatus({ type:"error", msg:"Sync failed: " + (e.message||"unknown error") }); });
  }

  return (
    <div className="space-y-4">
      <ConnectSteps steps={["Username","League","Team","Done"]} current={step}/>

      {step === 1 && (
        <div className="space-y-3">
          <div>
            <label className="text-xs font-semibold text-gray-600 block mb-1.5">Your Sleeper Username</label>
            <div className="flex gap-2">
              <input className="flex-1 border rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-emerald-400"
                placeholder="e.g. duncanb18"
                value={username} onChange={function(e){ setUsername(e.target.value); setStatus(null); }}
                onKeyDown={function(e){ if(e.key==="Enter") findUser(); }}/>
              <button onClick={findUser} disabled={!username.trim() || (status&&status.type==="loading")}
                className="px-5 py-2 bg-emerald-600 text-white text-sm font-bold rounded-xl hover:bg-emerald-700 disabled:opacity-50">
                Find →
              </button>
            </div>
            <p className="text-xs text-gray-400 mt-1.5">Find your username at <a href="https://sleeper.app/account" target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:underline">sleeper.app/account ↗</a></p>
          </div>
          <ConnectStatus status={status}/>
        </div>
      )}

      {step === 2 && (
        <div className="space-y-3">
          <button onClick={function(){ setStep(1); setStatus(null); }} className="text-xs text-blue-600 hover:underline">← Back</button>
          <p className="text-xs font-semibold text-gray-600">Select your league</p>
          <div className="space-y-2 max-h-52 overflow-y-auto pr-1">
            {leagues.map(function(lg) {
              return (
                <button key={lg.league_id} onClick={function(){ pickLeague(lg.league_id); }}
                  className="w-full text-left border-2 rounded-xl px-4 py-3 hover:border-emerald-400 hover:bg-emerald-50 transition-colors border-gray-200">
                  <div className="font-semibold text-gray-800 text-sm">{lg.name || "League"}</div>
                  <div className="text-xs text-gray-400">{lg.total_rosters} teams · {lg.season}</div>
                </button>
              );
            })}
          </div>
          <ConnectStatus status={status}/>
        </div>
      )}

      {step === 3 && (
        <div className="space-y-3">
          <button onClick={function(){ setStep(2); setStatus(null); }} className="text-xs text-blue-600 hover:underline">← Back</button>
          <p className="text-xs font-semibold text-gray-600">Which team is yours?</p>
          <div className="space-y-2 max-h-52 overflow-y-auto pr-1">
            {teams.map(function(t) {
              var sel = String(selTeamId) === String(t.rosterId);
              return (
                <button key={t.rosterId}
                  onClick={function(){ setSelTeamId(t.rosterId); syncNow(t.rosterId); }}
                  className={"w-full text-left border-2 rounded-xl px-4 py-3 transition-colors " + (sel ? "border-emerald-500 bg-emerald-50" : "border-gray-200 hover:border-emerald-300 hover:bg-emerald-50")}>
                  <div className={"font-semibold text-sm " + (sel ? "text-emerald-700" : "text-gray-800")}>{t.name}</div>
                </button>
              );
            })}
          </div>
          <ConnectStatus status={status}/>
        </div>
      )}

      {step === 4 && (
        <div className="space-y-3">
          <div className="text-center py-4 bg-emerald-50 rounded-xl border border-emerald-100">
            <div className="text-4xl mb-2">✅</div>
            <p className="font-bold text-emerald-700 text-sm">Sleeper Connected!</p>
            <p className="text-xs text-gray-500 mt-1">Your roster and FA pool are live.</p>
          </div>
          <button onClick={function(){ syncNow(selTeamId); setStatus(null); }}
            className="w-full py-2 border-2 border-emerald-300 text-emerald-700 text-sm font-semibold rounded-xl hover:bg-emerald-50">
            🔄 Re-sync Now
          </button>
          <ConnectStatus status={status}/>
        </div>
      )}
    </div>
  );
}

/* ── ESPN panel ─────────────────────────────────────────────── */
function EspnConnectPanel({ league, mlbDir, onRosterSynced, onFasSynced, onLeagueSaved }) {
  var [leagueId,   setLeagueId]   = useState(league.espnLeagueId || "");
  var [s2,         setS2]         = useState(league.espnS2 || "");
  var [swid,       setSwid]       = useState(league.espnSwid || "");
  var [showPriv,   setShowPriv]   = useState(false);
  var [teams,      setTeams]      = useState([]);
  var [espnData,   setEspnData]   = useState(null);
  var [selTeamId,  setSelTeamId]  = useState(league.espnTeamId || null);
  var [status,     setStatus]     = useState(null);

  function connect() {
    if (!leagueId.trim()) return;
    setStatus({ type:"loading", msg:"Connecting to ESPN Fantasy…" });
    espnFetch(leagueId.trim(), ["mTeam","mRoster"], s2||null, swid||null)
      .then(function(data) {
        setEspnData(data);
        var tms = (data.teams||[]).map(function(t) {
          return { id:t.id, name:((t.location||"") + " " + (t.nickname||"Team "+t.id)).trim(), abbrev:t.abbrev||"" };
        });
        setTeams(tms); setStatus(null);
      })
      .catch(function(e) {
        var isAuth = e.message && (e.message.includes("401")||e.message.includes("403")||e.message.includes("private"));
        setStatus({ type:"error", msg: isAuth
          ? "Private league — expand the private league section below and enter your espn_s2 / SWID cookie values."
          : "Could not connect to ESPN. " + (e.message||"Check your League ID.") });
        if (isAuth) setShowPriv(true);
      });
  }

  function syncRoster() {
    if (!selTeamId || !espnData) return;
    var myTeam = (espnData.teams||[]).find(function(t){ return t.id === selTeamId; });
    if (!myTeam || !myTeam.roster) { setStatus({ type:"error", msg:"Roster not found for that team." }); return; }
    setStatus({ type:"loading", msg:"Building ESPN roster…" });
    var entries = (myTeam.roster.entries||[]).map(function(entry, i) {
      var pe = entry.playerPoolEntry || {};
      var pl = pe.player || {};
      var name = pl.fullName || "Unknown";
      var posId = pl.defaultPositionId || 9;
      var pos = espnPosFromId(posId);
      var type = espnTypeFromId(posId);
      var slot = entry.lineupSlotId;
      var st = slot === 20 ? "IR" : slot === 19 ? "Res" : "Act";
      return makePlatformEntry({ name:name, pos:pos, team:"", type:type, age:null, status:st }, mlbDir, "espn-"+(pl.id||i)+"-"+i, st);
    });
    var hitters  = entries.filter(function(p){ return p.type==="hitter"; });
    var pitchers = entries.filter(function(p){ return p.type==="pitcher"; });
    onRosterSynced({ hitters:hitters, pitchers:pitchers, all:entries });
    if (onLeagueSaved) onLeagueSaved({ connectedPlatform:"espn", espnLeagueId:leagueId, espnTeamId:selTeamId, espnS2:s2, espnSwid:swid });
    if (mlbDir && mlbDir.length > 0) {
      var allRosteredNames = [];
      (espnData.teams||[]).forEach(function(t) {
        ((t.roster&&t.roster.entries)||[]).forEach(function(e) {
          var n = (e.playerPoolEntry&&e.playerPoolEntry.player&&e.playerPoolEntry.player.fullName);
          if (n) allRosteredNames.push(n);
        });
      });
      var active = entries.filter(function(p){ return p.status==="Act"; });
      onFasSynced(computeFaPool(allRosteredNames, mlbDir, [], [], active, "h2h_points"));
      setStatus({ type:"success", msg:"✅ Synced from ESPN — " + entries.length + " roster players + FA pool ready." });
    } else {
      setStatus({ type:"success", msg:"✅ ESPN roster synced (" + entries.length + " players). Load the MLB Directory for the FA pool." });
    }
  }

  return (
    <div className="space-y-4">
      <div>
        <label className="text-xs font-semibold text-gray-600 block mb-1.5">ESPN League ID</label>
        <div className="flex gap-2">
          <input className="flex-1 border rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-red-400 font-mono"
            placeholder="12345678"
            value={leagueId} onChange={function(e){ setLeagueId(e.target.value.trim()); setStatus(null); }}
            onKeyDown={function(e){ if(e.key==="Enter") connect(); }}/>
          <button onClick={connect} disabled={!leagueId.trim() || (status&&status.type==="loading")}
            className="px-5 py-2 bg-red-600 text-white text-sm font-bold rounded-xl hover:bg-red-700 disabled:opacity-50">
            Connect →
          </button>
        </div>
        <p className="text-xs text-gray-400 mt-1.5">Found in your ESPN URL: fantasy.espn.com/baseball/league?leagueId=<strong>XXXXXXXX</strong></p>
      </div>

      <div>
        <button onClick={function(){ setShowPriv(!showPriv); }} className="text-xs text-blue-600 hover:underline flex items-center gap-1">
          <span>{showPriv ? "▼" : "▶"}</span> Private league? Expand for cookie credentials
        </button>

/* ── Roster News Alert strip ── */
function RosterNewsStrip({ roster, news }) {
  var alerts = rosterNewsAlerts(roster, news);
  if (!alerts.length) return null;

  var sig2color = { injury:"bg-red-500", suspend:"bg-red-400", callup:"bg-emerald-500", return:"bg-blue-500", role:"bg-purple-500", hot:"bg-orange-500", transaction:"bg-slate-500", general:"bg-gray-500" };
  var sig2label = { injury:"🚑 Injury", suspend:"🚫 Suspended", callup:"🚀 Called Up", return:"🔄 Return", role:"⬆️ Role Change", hot:"🔥 Hot Streak", transaction:"🔁 Transaction", general:"📰 News" };

  // Find the roster player(s) mentioned in a news item
  function matchedPlayers(n) {
    if (!roster) return [];
    var pn  = (n.playerName || "").toLowerCase();
    var hl  = (n.headline || "").toLowerCase();
    var desc= (n.description || "").toLowerCase();
    var matched = [];
    roster.all.forEach(function(p) {
      var nl   = p.name.toLowerCase();
      var last = nl.split(" ").slice(-1)[0];
      if (
        (pn && nl === pn) ||
        hl.includes(nl) ||
        desc.includes(nl) ||
        (last.length >= 5 && (hl.includes(last) || desc.includes(last)))
      ) {
        matched.push(p);
      }
    });
    // deduplicate by name
    var seen = new Set();
    return matched.filter(function(p) {
      if (seen.has(p.name)) return false;
      seen.add(p.name); return true;
    });
  }

  // Pull the most relevant sentence from the description for a player name
  function relevantSnippet(text, playerName) {
    if (!text || !playerName) return text || "";
    var last = playerName.split(" ").slice(-1)[0].toLowerCase();
    var sentences = text.split(/(?<=[.!?])\s+/);
    // Try to find a sentence that contains the last name
    var hit = sentences.find(function(s) { return s.toLowerCase().includes(last); });
    return hit || sentences[0] || text;
  }

  return (
    <div className="bg-slate-900 rounded-xl p-4 mb-5">
      <div className="flex items-center gap-2 mb-3">
        <span className="text-base">📡</span>
        <h3 className="text-white font-bold text-sm">Live Roster News</h3>
        <span className="text-slate-400 text-xs">{alerts.length} update{alerts.length !== 1 ? "s" : ""} on your players</span>
      </div>
      <div className="space-y-2">
        {alerts.map(function(n, i) {
          var safeLink = safeHref(n.link);
          var hasLink  = !!safeLink;
          var players  = matchedPlayers(n);
          // Use player-scoped classifier so multi-player headlines don't bleed signals
          var sig      = newsSignalTypeForPlayer(n, players.length > 0 ? players[0].name : null);
          var badgeCls = sig2color[sig] || "bg-gray-500";
          var badgeLbl = sig2label[sig] || "📰 News";
          return (
            <div key={i} className="bg-slate-800 rounded-lg px-3 py-3">
              {/* Top row: badge + player chips + source */}
              <div className="flex items-center gap-2 flex-wrap mb-1.5">
                <span className={"text-xs font-bold px-2 py-0.5 rounded-full text-white shrink-0 " + badgeCls}>{badgeLbl}</span>
                {players.map(function(p) {
                  return (
                    <span key={p.name} className="flex items-center gap-1 bg-slate-700 rounded-full pl-1.5 pr-2 py-0.5">
                      <span className={"text-xs font-bold px-1 py-0 rounded-full " + posColor(p.pos)}>{p.pos}</span>
                      <span className="text-xs font-semibold text-white">{p.name}</span>
                    </span>
                  );
                })}
                <span className="text-xs text-slate-500 ml-auto shrink-0">{n.source}</span>
              </div>
              {/* Headline */}
              <div className="min-w-0">
                {hasLink
                  ? <a href={safeLink} target="_blank" rel="noopener noreferrer"
                      className="text-xs font-semibold text-white hover:text-blue-300 transition-colors leading-snug">
                      {players.length > 0
                        ? <HighlightedText text={n.headline} name={players[0].name}/>
                        : n.headline}
                      {" "}<span className="text-slate-500">↗</span>
                    </a>
                  : <p className="text-xs font-semibold text-white leading-snug">
                      {players.length > 0
                        ? <HighlightedText text={n.headline} name={players[0].name}/>
                        : n.headline}
                    </p>}
              </div>
              {/* Relevant description snippet with name highlighted */}
              {n.description && players.length > 0 && (
                <p className="text-xs text-slate-400 mt-1 leading-relaxed">
                  <HighlightedText
                    text={relevantSnippet(n.description, players[0].name)}
                    name={players[0].name}
                  />
                </p>
              )}
              {n.description && players.length === 0 && (
                <p className="text-xs text-slate-400 mt-1 leading-relaxed line-clamp-2">{n.description}</p>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── Differential Card ── */
function DifferentialCard({ diff }) {
  var [open, setOpen] = React.useState(false);
  var ds = dynastyScore(diff.player);
  var tier = ageTier(diff.player.age || 25);
  return (
    <div className={"rounded-xl border-2 overflow-hidden " + diff.riskColor}>
      <div className="px-4 py-3 cursor-pointer select-none" onClick={function() { setOpen(function(o) { return !o; }); }}>

            <div className="min-w-0">

                <span className="text-xs font-bold text-gray-700">{diff.player.name}</span>

                <span className="text-gray-500">DS {ds}</span>
                {diff.player.fpAvg > 0 && <span className="text-gray-500">{diff.player.fpAvg.toFixed(1)} FP/G</span>}
                <span className={"px-1.5 py-0.5 rounded text-xs font-semibold " + (diff.risk === "Low" ? "bg-green-100 text-green-700" : diff.risk === "Medium" ? "bg-amber-100 text-amber-700" : "bg-red-100 text-red-700")}>Risk: {diff.risk}</span>
                <span className={"px-1.5 py-0.5 rounded text-xs font-semibold " + (diff.upside === "Extreme" ? "bg-purple-100 text-purple-700" : "bg-blue-100 text-blue-700")}>Upside: {diff.upside}</span>
              </div>
            </div>
          </div>
          <span className="text-gray-400 text-xs shrink-0 mt-1">{open ? "▲" : "▼"}</span>
        </div>
      </div>
      {open && (

/* ── Short-Term Insights: ALL roster news categorised, not just specific types ── */
function ShortTermInsights({ roster, news }) {
  if (!roster) return null;

  var sig2badge = {
    callup:      { color: "bg-emerald-100 border-emerald-300 text-emerald-800", icon: "🚀", label: "Call-Up"      },
    return:      { color: "bg-blue-100 border-blue-300 text-blue-800",          icon: "🔄", label: "Return"       },
    role:        { color: "bg-purple-100 border-purple-300 text-purple-800",    icon: "⬆️", label: "Role Change"  },
    hot:         { color: "bg-orange-100 border-orange-300 text-orange-800",    icon: "🔥", label: "Hot"          },
    transaction: { color: "bg-slate-100 border-slate-300 text-slate-800",       icon: "🔁", label: "Transaction"  },
    injury:      { color: "bg-red-100 border-red-300 text-red-800",             icon: "🚑", label: "Injury"       },
    suspend:     { color: "bg-red-100 border-red-300 text-red-800",             icon: "🚫", label: "Suspended"    },
    general:     { color: "bg-gray-100 border-gray-300 text-gray-700",          icon: "📰", label: "News"         },
  };

  // Build a lookup of roster player last names (≥5 chars) for headline matching
  var rosterNames = new Set(roster.all.map(function(p) { return p.name.toLowerCase(); }));
  var rosterLasts = roster.all
    .filter(function(p) { return p.name.split(" ").slice(-1)[0].length >= 5; })
    .map(function(p) { return p.name.split(" ").slice(-1)[0].toLowerCase(); });

  function isRosterNews(n) {
    var pn = (n.playerName || "").toLowerCase();
    var hl = (n.headline || "").toLowerCase();
    if (pn && rosterNames.has(pn)) return true;
    for (var i = 0; i < rosterLasts.length; i++) {
      if (hl.includes(rosterLasts[i])) return true;
    }
    return false;
  }

  var seenHeads = new Set();
  var signals = [];
  (news || []).forEach(function(n) {
    if (seenHeads.has(n.headline)) return;
    if (!isRosterNews(n)) return;
    seenHeads.add(n.headline);
    var sig = newsSignalTypeForPlayer(n, n.playerName || null);
    signals.push({ n: n, sig: sig, badge: sig2badge[sig] || sig2badge.general });
  });

  if (!signals.length) return null;

  // Sort: positive signals first, then injuries/general
  var order = { callup:0, return:1, role:2, hot:3, transaction:4, general:5, injury:6, suspend:7 };
  signals.sort(function(a, b) { return (order[a.sig] || 5) - (order[b.sig] || 5); });

  return (
    <div className="mb-5">
      <div className="flex items-center gap-2 mb-2.5">
        <span className="text-base">⚡</span>
        <h3 className="font-bold text-gray-800 text-sm">Short-Term Signals</h3>
        <span className="text-xs text-gray-400">{signals.length} update{signals.length !== 1 ? "s" : ""} on your roster players</span>
      </div>
      <div className="flex gap-2.5 overflow-x-auto pb-1">
        {signals.slice(0, 10).map(function(item, i) {
          var stSafeLink = safeHref(item.n.link);
          return (
            <div key={i} className={"border rounded-xl px-3 py-2.5 shrink-0 max-w-xs " + item.badge.color} style={{minWidth:"200px"}}>
              <div className="flex items-center gap-1.5 mb-1">
                <span>{item.badge.icon}</span>
                <span className="text-xs font-bold">{item.badge.label}</span>
                <span className="text-xs opacity-50">{item.n.source}</span>
              </div>
              {stSafeLink
                ? <a href={stSafeLink} target="_blank" rel="noopener noreferrer"
                    className="text-xs font-semibold leading-snug hover:underline block line-clamp-3">{item.n.headline} ↗</a>
                : <p className="text-xs font-semibold leading-snug line-clamp-3">{item.n.headline}</p>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

const EMPTY_FA = { name:"", team:"", pos:"OF", age:"", isProspect:false,
  fpAvg:"", gp:"", hr:"", sb:"", rbi:"", ip:"", era:"", k:"", sv:"", qs:"" };

/* ── MLB STATS API HELPERS ─────────────────────────────────────
   Uses the free, public MLB Stats API (statsapi.mlb.com).
   sportId 1 = MLB majors, 11 = Triple-A, 12 = Double-A.
   ─────────────────────────────────────────────────────────────*/
const MLB_API = "https://statsapi.mlb.com/api/v1";
const CURRENT_SEASON = new Date().getFullYear();

function mapPos(abbr, gamesStarted, gamesPlayed) {
  if (!abbr) return "OF";
  const a = abbr.toUpperCase();
  if (["LF","CF","RF"].includes(a)) return "OF";
  if (["C","1B","2B","3B","SS","OF"].includes(a)) return a;
  if (a === "SP") return "SP";
  if (a === "RP") return "RP";
  if (a === "P")  return (gamesStarted||0) / Math.max(gamesPlayed||1, 1) >= 0.45 ? "SP" : "RP";
  return "OF";
}

function parseIP(ipStr) {
  const [inn, outs] = String(ipStr||"0").split(".").map(Number);
  return (inn||0) + (outs||0) / 3;
}

function calcHitterFP(st) {
  const singles = (st.hits||0) - (st.doubles||0) - (st.triples||0) - (st.homeRuns||0);
  return singles + (st.doubles||0)*2 + (st.triples||0)*3 + (st.homeRuns||0)*4
    + (st.rbi||0) + (st.runs||0) + (st.baseOnBalls||0)
    + (st.stolenBases||0)*2 + (st.caughtStealing||0)*-1
    + (st.strikeOuts||0)*-0.5 + (st.hitByPitch||0);
}

function calcPitcherFP(st) {
  const ip = parseIP(st.inningsPitched);
  return ip*1.25 + (st.wins||0)*2 + (st.losses||0)*-1 + (st.earnedRuns||0)*-1
    + (st.strikeOuts||0) + (st.saves||0)*6 + (st.holds||0)*2
    + (st.qualityStarts||0)*6 + (st.shutouts||0)*3;
}

async function fetchMLBDirectory() {
  const yr = CURRENT_SEASON;

  // All levels we want to cover — from MLB down to Low-A
  const LEVELS = [
    { id: 1,  label: "MLB",    isMinors: false },
    { id: 11, label: "AAA",    isMinors: true  },
    { id: 12, label: "AA",     isMinors: true  },
    { id: 13, label: "High-A", isMinors: true  },
    { id: 14, label: "Low-A",  isMinors: true  },
  ];

  // Step 1 — roster lists for every level (catches ALL players, even those with 0 games)
  const rosterFetches = LEVELS.map(level =>
    fetch(`${MLB_API}/sports/${level.id}/players?season=${yr}`)
      .then(r => r.ok ? r.json() : { people: [] })
      .catch(() => ({ people: [] }))
      .then(data => ({ ...level, people: data.people || [] }))
  );

  // Step 2 — season stats for MLB + AAA (adds fantasy point calculations)
  const statsUrls = [
    `${MLB_API}/stats?stats=season&season=${yr}&group=hitting&sportId=1&playerPool=ALL&limit=2000`,
    `${MLB_API}/stats?stats=season&season=${yr}&group=pitching&sportId=1&playerPool=ALL&limit=2000`,
    `${MLB_API}/stats?stats=season&season=${yr}&group=hitting&sportId=11&playerPool=ALL&limit=2000`,
    `${MLB_API}/stats?stats=season&season=${yr}&group=pitching&sportId=11&playerPool=ALL&limit=2000`,
  ];
  const statTypes = ["hitter", "pitcher", "hitter", "pitcher"];

  const allResults = await Promise.all([
    Promise.all(rosterFetches),
    ...statsUrls.map(u =>
      fetch(u).then(r => r.ok ? r.json() : null).catch(() => null)
    ),
  ]);

  const rosterData = allResults[0];       // array of { id, label, isMinors, people[] }
  const statsSets  = allResults.slice(1); // 4 stats API responses

  // Build a stats lookup keyed by MLB player ID
  // Stores best available data per player (prefer hitter if both exist)
  const statsMap = {};
  for (let i = 0; i < statsSets.length; i++) {
    const type   = statTypes[i];
    const splits = statsSets[i]?.stats?.[0]?.splits || [];
    for (const s of splits) {
      const pid = s.player?.id;
      if (!pid) continue;
      // Don't overwrite an existing hitter entry with a pitcher one
      if (statsMap[pid] && statsMap[pid].type === "hitter" && type === "pitcher") continue;
      statsMap[pid] = {
        type,
        stat:  s.stat || {},
        gp:    s.stat?.gamesPlayed  || 0,
        gs:    s.stat?.gamesStarted || 0,
        posAbbr: s.position?.abbreviation || "",
        team:  s.team?.abbreviation || "?",
      };
    }
  }

  // Build the full player list from roster data, enriched with stats where available
  const players = [];
  const seen    = new Set();   // de-dupe by MLB player ID

  for (const level of rosterData) {
    for (const p of level.people) {
      const pid = p.id;
      if (!pid || seen.has(pid)) continue;
      seen.add(pid);

      const info     = statsMap[pid];
      const posAbbr  = info?.posAbbr || p.primaryPosition?.abbreviation || "";
      const gp       = info?.gp || 0;
      const gs       = info?.gs || 0;
      const st       = info?.stat || {};

      // Determine player type from position
      const pitcherPos = ["P","SP","RP"];
      const isPitcher  = pitcherPos.includes(posAbbr) ||
                         p.primaryPosition?.type === "Pitcher";
      const type = info ? info.type : (isPitcher ? "pitcher" : "hitter");
      const pos  = type === "hitter"
        ? mapPos(posAbbr, 0, gp)
        : mapPos(posAbbr, gs, gp);

      const age      = p.currentAge || 0;
      const teamAbbr = info?.team || p.currentTeam?.abbreviation || "?";

      const fp    = gp > 0
        ? (type === "hitter" ? calcHitterFP(st) : calcPitcherFP(st))
        : 0;
      const fpAvg = gp > 0 ? Math.round((fp / gp) * 100) / 100 : 0;

      players.push({
        id:        `mlb-${pid}-${type}`,
        mlbId:     pid,
        name:      p.fullName || "Unknown",
        team:      teamAbbr,
        pos, type, age,
        isProspect: level.isMinors || age <= 23,
        isMinors:   level.isMinors,
        levelLabel: level.label,   // "MLB", "AAA", "AA", "High-A", "Low-A"
        gp, fpAvg, fpTotal: fp,
        status: "FA",
        eligible: pos,
        hr:  st.homeRuns    || 0,
        sb:  st.stolenBases || 0,
        rbi: st.rbi         || 0,
        r:   st.runs        || 0,
        bb:  st.baseOnBalls || 0,
        so:  st.strikeOuts  || 0,
        h:   st.hits        || 0,
        ab:  st.atBats      || 0,
        ip:  parseIP(st.inningsPitched),
        era: parseFloat(st.era) || 0,
        k:   st.strikeOuts  || 0,
        w:   st.wins        || 0,
        sv:  st.saves       || 0,
        hld: st.holds       || 0,
        qs:  st.qualityStarts || 0,
      });
    }
  }

  // Sort: players with stats first (by fpAvg), then alphabetically for 0-game players
  return players.sort((a, b) => {
    if (b.fpAvg !== a.fpAvg) return b.fpAvg - a.fpAvg;
    return a.name.localeCompare(b.name);
  });
}
