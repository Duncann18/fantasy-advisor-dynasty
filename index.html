function OnboardingModal({ leagueName, onRosterFile, roster, onFaFile, onComplete, onLeagueNameChange }) {
  const [step,        setStep]        = useState(0);
  const [dragging,    setDragging]    = useState(false);
  const [fileError,   setFileError]   = useState(null);
  const [fileName,    setFileName]    = useState(null);
  const [faDragging,  setFaDragging]  = useState(false);
  const [faFileName,  setFaFileName]  = useState(null);
  const [faUploaded,  setFaUploaded]  = useState(false);
  const fileRef   = useRef();
  const faFileRef = useRef();

  // Advance to step 2 (summary) as soon as roster lands
  const prevRoster = useRef(null);
  React.useEffect(function() {
    if (roster && !prevRoster.current && step === 1) {
      setStep(2);
    }
    prevRoster.current = roster;
  }, [roster, step]);

  function handleDrop(e) {
    e.preventDefault(); setDragging(false);
    var file = e.dataTransfer.files && e.dataTransfer.files[0];
    tryFile(file);
  }

  function tryFile(file) {
    if (!file) return;
    if (!file.name.endsWith(".csv")) {
      setFileError("Please upload a .csv file exported from Fantrax."); return;
    }
    setFileError(null);
    setFileName(file.name);
    onRosterFile(file);
  }

  function tryFaFile(file) {
    if (!file) return;
    if (!file.name.endsWith(".csv")) return;
    setFaFileName(file.name);
    setFaUploaded(true);
    // Read to text immediately — File objects can become stale once React re-renders
    var reader = new FileReader();
    reader.onload = function(ev) {
      if (onFaFile) onFaFile(ev.target.result); // pass CSV text string, not File
    };
    reader.readAsText(file);
  }

  var STEPS = ["Welcome", "Upload Roster", "What's Next", "You're Ready!"];
  var pct   = Math.round((step / (STEPS.length - 1)) * 100);

  /* ── STEP 0: Welcome ── */
  function StepWelcome() {
    var [localName, setLocalName] = React.useState(leagueName || "");
    return (
      <div className="text-center px-2">
        <div className="text-6xl mb-3">⚾</div>
        <h2 className="text-xl font-black text-gray-900 mb-1">Welcome to Fantasy Roster Advisor</h2>
        <p className="text-gray-500 text-sm mb-5 max-w-xs mx-auto">Your personal dynasty advisor. Let's get your league set up — takes about 2 minutes.</p>

        {/* League name input */}
        <div className="text-left mb-5">
          <label className="text-xs font-bold text-gray-600 block mb-1.5">Your League Name</label>
          <input
            type="text"
            value={localName}
            placeholder="e.g. Dynasty Field of Dreams"
            onChange={function(e) {
              setLocalName(e.target.value);
              if (onLeagueNameChange) onLeagueNameChange(e.target.value);
            }}
            className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100"
          />
          <p className="text-xs text-gray-400 mt-1">This will appear in your dashboard header.</p>
        </div>

        <div className="grid grid-cols-2 gap-3 mb-6 text-left">
          {[
            ["🎯","Moves","Smart adds, drops & lineup decisions"],
            ["🔍","FA Analyzer","Rank every free agent for your team"],
            ["⚖️","Trade Analyzer","Dynasty-weighted trade grades"],
            ["📰","Live News","Injury alerts & roster updates"],
          ].map(function(row) {
            return (
              <div key={row[0]} className="bg-slate-50 rounded-xl p-3 border border-slate-200">
                <div className="text-xl mb-1">{row[0]}</div>
                <div className="font-bold text-gray-800 text-xs">{row[1]}</div>
                <div className="text-xs text-gray-400 mt-0.5 leading-snug">{row[2]}</div>
              </div>
            );
          })}
        </div>
        <button
          onClick={function() { setStep(1); }}
          disabled={!localName.trim()}
          className="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-40 text-white font-bold py-3 rounded-xl text-sm transition-colors"
        >
          Get Started →
        </button>
        {!localName.trim() && <p className="text-xs text-gray-400 mt-2">Enter a league name to continue.</p>}
      </div>
    );
  }

  /* ── STEP 1: Upload Roster CSV ── */
  function StepRoster() {
    return (
      <div>
        <h2 className="text-lg font-black text-gray-900 mb-1">Upload Your Fantrax Roster</h2>
        <p className="text-sm text-gray-500 mb-5">This is the core of the app — everything runs from your roster CSV.</p>

        {/* How to export instructions */}
        <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-5">
          <p className="text-xs font-bold text-blue-800 mb-2">How to export from Fantrax:</p>
          <ol className="text-xs text-blue-700 space-y-1.5">
            <li className="flex gap-2"><span className="bg-blue-200 text-blue-900 font-bold rounded-full w-4 h-4 flex items-center justify-center shrink-0 text-xs">1</span>Go to <strong>My Team → Roster</strong></li>
            <li className="flex gap-2"><span className="bg-blue-200 text-blue-900 font-bold rounded-full w-4 h-4 flex items-center justify-center shrink-0 text-xs">2</span>Scroll to the bottom of the page</li>
            <li className="flex gap-2"><span className="bg-blue-200 text-blue-900 font-bold rounded-full w-4 h-4 flex items-center justify-center shrink-0 text-xs">3</span>Click <strong>Export → CSV</strong></li>
            <li className="flex gap-2"><span className="bg-blue-200 text-blue-900 font-bold rounded-full w-4 h-4 flex items-center justify-center shrink-0 text-xs">4</span>Upload the downloaded file below</li>
          </ol>
        </div>

        {/* Drop zone */}
        <div
          className={"border-2 border-dashed rounded-xl p-8 text-center cursor-pointer transition-colors mb-3 " + (dragging ? "border-blue-400 bg-blue-50" : "border-gray-300 hover:border-blue-300 hover:bg-slate-50")}
          onClick={function() { fileRef.current && fileRef.current.click(); }}
          onDragOver={function(e) { e.preventDefault(); setDragging(true); }}
          onDragLeave={function() { setDragging(false); }}
          onDrop={handleDrop}
        >
          <div className="text-3xl mb-2">📁</div>
          <p className="text-sm font-semibold text-gray-700">Drag your CSV here, or click to browse</p>
          <p className="text-xs text-gray-400 mt-1">Fantrax Team Roster export (.csv)</p>
          <input ref={fileRef} type="file" accept=".csv" className="hidden" onChange={function(e) { tryFile(e.target.files && e.target.files[0]); }}/>
        </div>

        {fileName && !roster && (
          <div className="flex items-center gap-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 text-xs text-blue-700 mb-3">
            <span className="animate-pulse">⏳</span> Processing {fileName}…
          </div>
        )}
        {fileError && (
          <div className="bg-red-50 border border-red-200 rounded-lg px-3 py-2 text-xs text-red-700 mb-3">{fileError}</div>
        )}

        <p className="text-xs text-gray-400 text-center">You can re-upload your roster any time using the button in the header.</p>
      </div>
    );
  }

  /* ── STEP 2: What's Next ── */
  function StepWhatsNext() {
    var active  = roster ? roster.all.filter(function(p) { return p.status === "Act"; }).length : 0;
    var reserve = roster ? roster.all.filter(function(p) { return p.status === "Res"; }).length : 0;
    var minors  = roster ? roster.all.filter(function(p) { return p.status === "Min"; }).length : 0;
    return (
      <div>
        {/* Roster success banner */}
        <div className="bg-green-50 border border-green-200 rounded-xl p-4 mb-5 flex items-start gap-3">
          <span className="text-2xl">✅</span>
          <div>
            <p className="font-bold text-green-800 text-sm">Roster loaded — {roster ? roster.all.length : 0} players</p>
            <p className="text-xs text-green-700 mt-0.5">{active} active · {reserve} reserve · {minors} minors</p>
            <p className="text-xs text-green-600 mt-1">News feed is fetching updates for your players now.</p>
          </div>
        </div>

        {/* FA CSV Upload */}
        <div className="mb-5">
          <h2 className="text-base font-black text-gray-900 mb-0.5">Upload Your FA List <span className="text-xs font-normal text-gray-400 ml-1">— optional but recommended</span></h2>
          <p className="text-xs text-gray-500 mb-3">We'll pre-rank every free agent for your team so you know exactly who to target.</p>

          <div className="bg-blue-50 border border-blue-200 rounded-xl px-4 py-2.5 mb-3">
            <p className="text-xs text-blue-800 font-semibold mb-1">How to export from Fantrax:</p>
            <p className="text-xs text-blue-700">Go to <strong>Players → Free Agents</strong>, scroll to the bottom, click <strong>Export → CSV</strong></p>
          </div>

          {faUploaded ? (
            <div className="flex items-center gap-2 bg-green-50 border border-green-200 rounded-xl px-4 py-3">
              <span className="text-xl">✅</span>
              <div>
                <p className="font-bold text-green-800 text-sm">FA list uploaded!</p>
                <p className="text-xs text-green-700">{faFileName} — will be ranked when the app loads</p>
              </div>
            </div>
          ) : (
            <div
              className={"border-2 border-dashed rounded-xl p-6 text-center cursor-pointer transition-colors " + (faDragging ? "border-green-400 bg-green-50" : "border-gray-300 hover:border-green-300 hover:bg-slate-50")}
              onClick={function() { faFileRef.current && faFileRef.current.click(); }}
              onDragOver={function(e) { e.preventDefault(); setFaDragging(true); }}
              onDragLeave={function() { setFaDragging(false); }}
              onDrop={function(e) { e.preventDefault(); setFaDragging(false); tryFaFile(e.dataTransfer.files && e.dataTransfer.files[0]); }}
            >
              <div className="text-2xl mb-1">📋</div>
              <p className="text-sm font-semibold text-gray-700">Drag FA CSV here, or click to browse</p>
              <p className="text-xs text-gray-400 mt-0.5">Fantrax Free Agents export (.csv)</p>
              <input ref={faFileRef} type="file" accept=".csv" className="hidden" onChange={function(e) { tryFaFile(e.target.files && e.target.files[0]); }}/>
            </div>
          )}
        </div>

        {/* Player Directory note */}
        <div className="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 mb-5 flex items-start gap-3">
          <span className="text-lg">🌐</span>
          <div>
            <p className="font-bold text-amber-800 text-sm">Live Player Directory — auto-loading when you finish</p>
            <p className="text-xs text-amber-700 mt-0.5">MLB, AAA, AA, High-A and Low-A players with live stats. Powers FA search and Trade Analyzer. Will start loading automatically when you click Done.</p>
          </div>
        </div>

        <button
          onClick={function() { setStep(3); }}
          className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl text-sm transition-colors"
        >
          Next →
        </button>
        <p className="text-xs text-center text-gray-400 mt-2">FA list is optional — you can upload it any time in the FA Analyzer tab.</p>
      </div>
    );
  }

  /* ── STEP 3: Ready ── */
  function StepReady() {
    return (
      <div className="text-center px-2">
        <div className="text-5xl mb-4">🏆</div>
        <h2 className="text-xl font-black text-gray-900 mb-2">You're all set!</h2>
        <p className="text-gray-500 text-sm mb-6 max-w-xs mx-auto">Your roster is loaded and we're fetching live news. Head to the Moves tab for your first recommendations.</p>
        <div className="space-y-2 mb-8 text-left">
          <div className="flex items-center gap-3 bg-green-50 border border-green-200 rounded-xl px-4 py-3">
            <span className="text-lg">✅</span>
            <div><p className="font-bold text-green-800 text-xs">Roster CSV uploaded</p><p className="text-green-700 text-xs">{roster ? roster.all.length : 0} players loaded</p></div>
          </div>
          <div className="flex items-center gap-3 bg-green-50 border border-green-200 rounded-xl px-4 py-3">
            <span className="text-lg">✅</span>
            <div><p className="font-bold text-green-800 text-xs">Live news feed active</p><p className="text-green-700 text-xs">Checking Rotowire, CBS Sports, Yahoo &amp; MLB.com</p></div>
          </div>
          {faUploaded ? (
            <div className="flex items-center gap-3 bg-green-50 border border-green-200 rounded-xl px-4 py-3">
              <span className="text-lg">✅</span>
              <div><p className="font-bold text-green-800 text-xs">FA list uploaded</p><p className="text-green-700 text-xs">Will be ranked and ready in the FA Analyzer</p></div>
            </div>
          ) : (
            <div className="flex items-center gap-3 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3">
              <span className="text-lg">⏭</span>
              <div><p className="font-bold text-gray-600 text-xs">FA list — skipped</p><p className="text-gray-500 text-xs">Upload anytime in the FA Analyzer tab</p></div>
            </div>
          )}
          <div className="flex items-center gap-3 bg-blue-50 border border-blue-200 rounded-xl px-4 py-3">
            <span className="text-lg">🚀</span>
            <div><p className="font-bold text-blue-800 text-xs">Player Directory — will auto-load</p><p className="text-blue-700 text-xs">MLB + all minor league levels start loading when you click Done</p></div>
          </div>
        </div>
        <button
          onClick={onComplete}
          className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-black py-4 rounded-xl text-base transition-all shadow-lg shadow-blue-500/30"
        >
          Done — Open My Dynasty Advisor →
        </button>
      </div>
    );
  }

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{backgroundColor: "rgba(15,23,42,0.85)", backdropFilter: "blur(4px)"}}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-screen overflow-y-auto">

        {/* Progress bar */}
        <div className="h-1.5 bg-gray-100 rounded-t-2xl overflow-hidden">
          <div className="h-full bg-gradient-to-r from-blue-500 to-indigo-500 transition-all duration-500" style={{width: pct + "%"}}></div>
        </div>

        {/* Step indicator */}
        <div className="flex items-center justify-between px-6 pt-4 pb-2">
          {STEPS.map(function(label, idx) {
            var done    = idx < step;
            var current = idx === step;
            return (
              <div key={idx} className="flex flex-col items-center gap-1">
                <div className={"w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold transition-all " + (done ? "bg-green-500 text-white" : current ? "bg-blue-600 text-white ring-4 ring-blue-100" : "bg-gray-100 text-gray-400")}>
                  {done ? "✓" : idx + 1}
                </div>
                <span className={"text-xs whitespace-nowrap " + (current ? "text-blue-700 font-bold" : done ? "text-green-600" : "text-gray-400")}>{label}</span>
              </div>
            );
          })}
        </div>

        {/* Divider */}
        <div className="h-px bg-gray-100 mx-6 mb-5"></div>

        {/* Step content */}
        <div className="px-6 pb-6">
          {step === 0 && <StepWelcome />}
          {step === 1 && <StepRoster />}
          {step === 2 && <StepWhatsNext />}
          {step === 3 && <StepReady />}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   ROOT APP
   ═══════════════════════════════════════════════════════════════ */
function App({ user }) {
  const [roster,       setRoster]       = useState(null);
  const [tab,          setTab]          = useState("fa");
  const [dragOver,     setDragOver]     = useState(false);
  const [error,        setError]        = useState(null);
  const [rosterFilter, setRosterFilter] = useState("all");
  const [showSettings, setShowSettings] = useState(false);
  const [showConnect,  setShowConnect]  = useState(false);
  const [league,       setLeague]       = useState(DEFAULT_LEAGUE);
  const [filename,     setFilename]     = useState(null);
  const [importDate,   setImportDate]   = useState(null);
  const [news,            setNews]            = useState([]);
  const [newsLoading,     setNewsLoading]     = useState(false);
  const [newsLoaded,      setNewsLoaded]      = useState(false);
  const [newsError,       setNewsError]       = useState(null);
  const [onboardingDone,  setOnboardingDone]  = useState(false);
  const [mlbDir,          setMlbDir]          = useState([]);
  const [dirLoading,      setDirLoading]      = useState(false);
  const [dirLoaded,       setDirLoaded]       = useState(false);
  const [dirError,        setDirError]        = useState(null);
  const [lastUpdated,     setLastUpdated]     = useState(null);
  const [pendingFaText,    setPendingFaText]    = useState(null);
  const [pendingFaPlayers, setPendingFaPlayers] = useState(null); // FA pool from platform sync
  const fileRef = useRef();

  // ── Firestore persistence ──────────────────────────────────────
  // dataLoaded tracks whether we've finished loading the user's saved data.
  // We only save BACK to Firestore after that to avoid an immediate write-back.
  var dataLoaded = React.useRef(false);

  // Load saved data when the user signs in
  React.useEffect(function() {
    if (!user) return;
    dataLoaded.current = false;
    _db.collection("users").doc(user.uid).get().then(function(doc) {
      if (doc.exists) {
        var data = doc.data();
        // Restore league settings + skip onboarding for returning users
        if (data.settings && data.settings.onboarded) {
          // Merge with DEFAULT_LEAGUE so new fields (e.g. scoringFormat) get defaults for old accounts
          setLeague(Object.assign({}, DEFAULT_LEAGUE, data.settings));
          setOnboardingDone(true);
        }
        // Restore roster CSV
        if (data.rosterCsv) {
          try {
            var parsed = parseFantraxCSV(data.rosterCsv);
            if (parsed.all.length > 0) {
              setRoster(parsed);
              setFilename(data.rosterFilename || "saved-roster.csv");
              setImportDate("☁ restored");
            }
          } catch(e) {}
        }
        // Restore FA CSV (will be processed by FaAnalyzerTab)
        if (data.faCsv) { setPendingFaText(data.faCsv); }
      }
      dataLoaded.current = true;
    }).catch(function() { dataLoaded.current = true; });
  }, [user.uid]);

  // Auto-save league settings whenever they change (skips the initial load)
  React.useEffect(function() {
    if (!dataLoaded.current || !user) return;
    _db.collection("users").doc(user.uid).set(
      { settings: Object.assign({}, league, { onboarded: onboardingDone }) },
      { merge: true }
    );
  }, [league, onboardingDone]);

  // Save FA CSV text to Firestore as soon as it is uploaded
  React.useEffect(function() {
    if (!pendingFaText || !user || !dataLoaded.current) return;
    _db.collection("users").doc(user.uid).set({ faCsv: pendingFaText }, { merge: true });
  }, [pendingFaText]);

  function handleSignOut() { _auth.signOut(); }

  const loadDirectory = useCallback(async () => {
    setDirLoading(true); setDirError(null);
    try {
      const players = await fetchMLBDirectory();
      setMlbDir(players);
      setDirLoaded(true);
      setLastUpdated(new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}));
    } catch(e) {
      setDirError("Could not reach MLB Stats API. Check your internet connection and try again.");
    } finally {
      setDirLoading(false);
    }
  }, []);

  const loadNews = useCallback(async (rosterPlayers) => {
    if (!rosterPlayers || rosterPlayers.length === 0) return;
    setNewsLoading(true); setNewsError(null);
    try {
      const items = await fetchPlayerNews(rosterPlayers);
      setNews(items);
      setNewsLoaded(true);
    } catch(e) {
      setNewsError("Could not load news. Check your connection and try again.");
    } finally {
      setNewsLoading(false);
    }
  }, []);

  const handleFile = useCallback((file) => {
    if (!file) return;
    if (!file.name.endsWith(".csv")) { setError("Please upload a Fantrax Team Roster .csv file."); return; }
    const reader = new FileReader();
    reader.onload = e => {
      try {
        var csvText = e.target.result;
        const parsed = parseFantraxCSV(csvText);
        if (parsed.all.length===0) throw new Error(`No players found (${parsed.hitters.length} hitters, ${parsed.pitchers.length} pitchers detected). Make sure you're using a Fantrax Team Roster CSV export — go to My Team → Roster, scroll to the bottom, and click Export → CSV.`);
        setRoster(parsed);
        setFilename(file.name);
        setImportDate(new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}));
        setError(null); setTab("suggestions");
        // Auto-fetch news for the new roster
        setNews([]); setNewsLoaded(false);
        loadNews(parsed.all);
        // Persist to Firestore so it restores on next login
        if (user && dataLoaded.current) {
          _db.collection("users").doc(user.uid).set(
            { rosterCsv: csvText, rosterFilename: file.name },
            { merge: true }
          );
        }
      } catch(err) { setError(err.message); }
    };
    reader.readAsText(file);
  }, [loadNews, user]);

  const onDrop = useCallback((e)=>{e.preventDefault();setDragOver(false);handleFile(e.dataTransfer.files[0]);},[handleFile]);

  const suggestions = useMemo(()=>roster?generateSuggestions(roster.hitters,roster.pitchers,league):[],[roster,league]);

  const counts = useMemo(()=>{
    if (!roster) return {};
    const a=roster.all;
    return { total:a.length, active:a.filter(p=>p.status==="Act").length, reserve:a.filter(p=>p.status==="Res").length, ir:a.filter(p=>p.status==="IR").length, minors:a.filter(p=>p.status==="Min").length,
      critical:suggestions.filter(s=>s.priority==="critical").length, high:suggestions.filter(s=>s.priority==="high").length };
  },[roster,suggestions]);

  /* ── DASHBOARD ── */
  const activeH = roster ? roster.all.filter(p=>p.status==="Act"&&p.type==="hitter") : [];
  const activeP = roster ? roster.all.filter(p=>p.status==="Act"&&p.type==="pitcher") : [];
  const filteredRoster = roster ? (rosterFilter==="all"?roster.all:roster.all.filter(p=>p.status===rosterFilter)) : [];
  const { positionNeeds } = roster ? analyzeNeeds(roster) : { positionNeeds: [] };
  const needCount = positionNeeds.filter(n=>n.severity==="critical").length;

  return (
    <div className="min-h-screen bg-slate-50 text-sm">
      {!onboardingDone && (
        <OnboardingModal
          leagueName={league.name}
          onRosterFile={handleFile}
          roster={roster}
          onFaFile={setPendingFaText}
          onLeagueNameChange={function(name) {
            setLeague(function(l) { return Object.assign({}, l, { name: name }); });
          }}
          onComplete={function() {
            setOnboardingDone(true);
            setTab("suggestions");
            loadDirectory();
            // Save profile + mark onboarded so this user skips onboarding on next login
            if (user) {
              _db.collection("users").doc(user.uid).set({
                profile: {
                  name:  user.displayName || "",
                  email: user.email       || "",
                  photo: user.photoURL    || ""
                },
                settings: Object.assign({}, league, { onboarded: true })
              }, { merge: true });
            }
          }}
        />
      )}
      {showSettings && <SettingsPanel league={league} onChange={setLeague} onClose={()=>setShowSettings(false)}/>}

      {showConnect && (
        <LeagueConnectModal
          league={league}
          mlbDir={mlbDir}
          onClose={function(){ setShowConnect(false); }}
          onRosterSynced={function(rosterObj) {
            setRoster(rosterObj);
            setFilename("synced-from-" + (league.connectedPlatform || "platform"));
            setImportDate("🔄 live sync");
            setNews([]); setNewsLoaded(false);
            loadNews(rosterObj.all);
          }}
          onFasSynced={function(fasArr) {
            setPendingFaPlayers(fasArr);
          }}
          onLeagueSaved={function(platformFields) {
            setLeague(function(prev) { return Object.assign({}, prev, platformFields); });
          }}
        />
      )}

      {/* Header */}
      <div className="bg-gradient-to-r from-slate-900 to-blue-900 text-white px-5 py-4 shadow-lg">
        <div className="max-w-6xl mx-auto flex items-center justify-between flex-wrap gap-3">
          <div className="flex items-center gap-3">
            <span className="text-2xl">⚾</span>
            <div>
              <h1 className="text-base font-black">{league.name}</h1>
              <p className="text-blue-300 text-xs">
                {league.scoring} · {league.platform}
                {" "}<span className="text-blue-400/70">
                  {league.scoringFormat === "h2h_cats" ? "· 📊 H2H Cats" : league.scoringFormat === "roto" ? "· 📊 Roto" : league.scoringFormat === "points" ? "· 🔢 Points" : ""}
                </span>
              </p>
              {filename && <p className="text-slate-400 text-xs mt-0.5">📄 {filename} · {importDate}</p>}
            </div>
          </div>
          <div className="flex items-center gap-2 flex-wrap">
            {(counts.critical>0||counts.high>0) && (
              <span className="bg-red-500/20 border border-red-500/40 text-red-300 text-xs font-semibold px-3 py-1.5 rounded-lg">⚠ {counts.critical} critical · {counts.high} high</span>
            )}
            {news.filter(function(n){return n.severity==="critical";}).length > 0 && (
              <span className="bg-red-500/20 border border-red-500/40 text-red-300 text-xs font-semibold px-3 py-1.5 rounded-lg cursor-pointer" onClick={function(){setTab("news");}}>
                🚑 {news.filter(function(n){return n.severity==="critical";}).length} injury alert{news.filter(function(n){return n.severity==="critical";}).length!==1?"s":""}
              </span>
            )}
            {needCount > 0 && (
              <span className="bg-orange-500/20 border border-orange-500/40 text-orange-300 text-xs font-semibold px-3 py-1.5 rounded-lg cursor-pointer" onClick={()=>setTab("fa")}>🔍 {needCount} position need{needCount!==1?"s":""}</span>
            )}
            <div className="text-right text-xs">
              <div className="text-slate-400">FAAB</div>
              <div className="text-white font-bold">${league.remainingFaab.toLocaleString()}</div>
            </div>
            <button onClick={()=>fileRef.current?.click()} className="bg-white/10 hover:bg-white/20 border border-white/20 text-white text-xs px-3 py-2 rounded-lg">{roster ? "↑ New CSV" : "↑ Import Roster CSV"}</button>
            <button onClick={()=>setShowConnect(true)}
              className={"text-xs px-3 py-2 rounded-lg border font-semibold transition-colors " + (league.connectedPlatform ? "bg-emerald-500 hover:bg-emerald-600 border-emerald-400 text-white" : "bg-white/10 hover:bg-white/20 border-white/20 text-white")}>
              {league.connectedPlatform === "sleeper" ? "😴 Sleeper" : league.connectedPlatform === "espn" ? "🏟 ESPN" : "🔌 Connect"}
            </button>
            <button onClick={()=>setShowSettings(true)} className="bg-white/10 hover:bg-white/20 border border-white/20 text-white text-xs px-3 py-2 rounded-lg">⚙</button>
            <input ref={fileRef} type="file" accept=".csv" className="hidden" onChange={e=>handleFile(e.target.files[0])}/>
            <UserBadge user={user} onSignOut={handleSignOut}/>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div className="bg-white border-b shadow-sm sticky top-0 z-10">
        <div className="max-w-6xl mx-auto px-5 flex overflow-x-auto">
          {[
            ["suggestions", roster ? `🎯 Moves (${suggestions.length})` : "🎯 Moves"],
            ["active",      roster ? `🟢 Active (${counts.active})`    : "🟢 Active"],
            ["roster",      roster ? `👥 Roster (${counts.total})`     : "👥 Roster"],
            ["fa",          "🔍 FA Analyzer"],
            ["trade",       "⚖️ Trade"],
            ["advisor",     "🤖 Advisor"],
            ["news",        news.filter(function(n){return n.severity==="critical";}).length > 0 ? ("📰 News 🚑" + news.filter(function(n){return n.severity==="critical";}).length) : "📰 News"],
          ].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)}
              className={`px-5 py-3 font-medium border-b-2 whitespace-nowrap text-xs transition-colors ${tab===id?"border-blue-600 text-blue-700":"border-transparent text-gray-500 hover:text-gray-700"}`}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {/* CSV Upload Banner (shown when no roster loaded) */}
      {!roster && (
        <div className="bg-blue-50 border-b border-blue-200">
          <div className="max-w-6xl mx-auto px-5 py-3 flex items-center gap-4 flex-wrap">
            <div onDragOver={e=>{e.preventDefault();setDragOver(true)}} onDragLeave={()=>setDragOver(false)} onDrop={onDrop}
              onClick={()=>fileRef.current?.click()}
              className={`flex items-center gap-3 border-2 border-dashed rounded-xl px-5 py-2.5 cursor-pointer transition-all flex-1 min-w-[260px] ${dragOver?"border-blue-500 bg-blue-100":"border-blue-300 hover:border-blue-500 hover:bg-blue-100"}`}>
              <span className="text-2xl">{dragOver?"📂":"📁"}</span>
              <div>
                <p className="text-blue-800 font-semibold text-sm">Drop your Fantrax Team Roster CSV here</p>
                <p className="text-blue-500 text-xs">or click to browse — enables Moves, Active & Roster tabs</p>
              </div>
            </div>
            <div className="text-xs text-blue-600 leading-relaxed hidden sm:block">
              <p>In Fantrax: <strong>My Team → Roster</strong></p>
              <p>Scroll to bottom → <strong>Export → CSV</strong></p>
            </div>
            {error && <div className="bg-red-100 border border-red-300 text-red-700 rounded-lg px-4 py-2 text-xs">⚠ {error}</div>}
          </div>
        </div>
      )}

      <div className="max-w-6xl mx-auto px-5 py-6">

        {tab==="suggestions" && !roster && (
          <div className="flex flex-col items-center justify-center py-24 text-center">
            <div className="text-5xl mb-4">📁</div>
            <h2 className="text-xl font-bold text-gray-700 mb-2">Upload your roster to see move suggestions</h2>
            <p className="text-gray-400 text-sm max-w-sm">Use the bar above to import your Fantrax Team Roster CSV. The 🔍 FA Analyzer tab works right now without any upload.</p>
            <button onClick={()=>setTab("fa")} className="mt-6 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-6 py-2.5 rounded-xl transition-colors">Go to FA Analyzer →</button>
          </div>
        )}

        {tab==="suggestions" && roster && (
          <div>
            {/* ── Summary counters ── */}
            <div className="grid grid-cols-3 gap-4 mb-5">
              {[
                {label:"Critical moves",count:suggestions.filter(s=>s.priority==="critical").length,bar:"bg-red-500"},
                {label:"High priority", count:suggestions.filter(s=>s.priority==="high").length,    bar:"bg-orange-400"},
                {label:"Worth noting",  count:suggestions.filter(s=>["medium","low"].includes(s.priority)).length, bar:"bg-yellow-400"},
              ].map(function({label,count,bar}){ return (
                <div key={label} className="bg-white rounded-xl border shadow-sm p-4 text-center">
                  <div className={`text-3xl font-black ${count>0?"text-gray-800":"text-gray-300"}`}>{count}</div>
                  <div className="text-xs text-gray-500 mt-1">{label}</div>
                  {count>0&&<div className={`mt-2 h-1 rounded-full ${bar}`}/>}
                </div>
              ); })}
            </div>

            {/* ── Live Roster News ── */}
            <RosterNewsStrip roster={roster} news={news}/>

            {/* ── Short-Term Signals ── */}
            <ShortTermInsights roster={roster} news={news}/>

            {/* ── System Suggestions ── */}
            {suggestions.length > 0 && (
              <div className="mb-6">
                <div className="flex items-center gap-2 mb-2.5">
                  <span className="text-base">🎯</span>
                  <h3 className="font-bold text-gray-800 text-sm">Suggested Moves</h3>
                </div>
                <div className="space-y-3">{suggestions.map(function(s){ return <SuggestionCard key={s.id} s={s}/>; })}</div>
              </div>
            )}
            {suggestions.length === 0 && (
              <div className="bg-green-50 border border-green-200 rounded-xl p-8 text-center mb-6">
                <div className="text-4xl mb-2">✅</div>
                <p className="font-semibold text-green-800">Roster looks clean — no obvious swaps this week.</p>
              </div>
            )}

            {/* ── Differentials ── */}
            {(function() {
              var diffs = generateDifferentials(roster, news, mlbDir, league);
              if (!diffs.length) return null;
              return (
                <div className="mb-6">
                  <div className="flex items-start gap-2 mb-3">
                    <span className="text-xl">🎲</span>
                    <div>
                      <h3 className="font-bold text-gray-800 text-sm">Differentials</h3>
                      <p className="text-xs text-gray-400 mt-0.5">High-ceiling plays that could swing your week — but carry real bust risk. Bet on these when you need the upside.</p>
                    </div>
                  </div>
                  <div className="space-y-2.5">
                    {diffs.map(function(d){ return <DifferentialCard key={d.id} diff={d}/>; })}
                  </div>
                </div>
              );
            })()}

            {/* ── Week Limits ── */}
            <div className="bg-slate-800 text-white rounded-xl p-5">
              <h3 className="font-bold text-xs mb-3 uppercase tracking-wide">Week Limits</h3>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-xs text-slate-300">
                <div><span className="text-white font-semibold">Max Starts:</span> {league.maxStarts}/week</div>
                <div><span className="text-white font-semibold">Max Saves:</span> {league.maxSaves}/week</div>
                <div><span className="text-white font-semibold">Lineup Lock:</span> Monday</div>
                <div><span className="text-white font-semibold">FAAB Left:</span> ${league.remainingFaab.toLocaleString()}</div>
              </div>
            </div>
          </div>
        )}

        {tab==="active" && !roster && (
          <div className="flex flex-col items-center justify-center py-24 text-center">
            <div className="text-5xl mb-4">🟢</div>
            <h2 className="text-xl font-bold text-gray-700 mb-2">Upload your roster to see your active lineup</h2>
            <p className="text-gray-400 text-sm max-w-sm">Use the bar above to import your Fantrax Team Roster CSV.</p>
          </div>
        )}

        {tab==="active" && roster && (
          <div>
            <ActiveGroup title="⚡ Hitters"  players={activeH} type="hitter"  accentClass="text-amber-700 bg-amber-50 border-amber-100"/>
            <ActiveGroup title="🔵 Pitchers" players={activeP} type="pitcher" accentClass="text-indigo-700 bg-indigo-50 border-indigo-100"/>
          </div>
        )}

        {tab==="roster" && !roster && (
          <div className="flex flex-col items-center justify-center py-24 text-center">
            <div className="text-5xl mb-4">👥</div>
            <h2 className="text-xl font-bold text-gray-700 mb-2">Upload your roster to view all players</h2>
            <p className="text-gray-400 text-sm max-w-sm">Use the bar above to import your Fantrax Team Roster CSV.</p>
          </div>
        )}

        {tab==="roster" && roster && (
          <div>
            <div className="flex gap-2 mb-4 flex-wrap">
              {[["all",`All (${counts.total})`],["Act",`Active (${counts.active})`],["Res",`Reserve (${counts.reserve})`],["IR",`IR (${counts.ir})`],["Min",`Minors (${counts.minors})`]].map(([key,label])=>(
                <button key={key} onClick={()=>setRosterFilter(key)}
                  className={`px-4 py-1.5 rounded-full text-xs font-medium transition-colors ${rosterFilter===key?"bg-blue-600 text-white":"bg-white border border-gray-200 text-gray-600 hover:bg-gray-50"}`}>
                  {label}
                </button>
              ))}
            </div>
            <RosterTable players={filteredRoster} filter={rosterFilter}/>
          </div>
        )}

        {/* FaAnalyzerTab stays mounted always so pendingFaText processes in background */}
        <div style={{display: tab==="fa" ? "block" : "none"}}>
          <FaAnalyzerTab
            roster={roster}
            league={league}
            onFaabChange={v=>setLeague(l=>({...l,remainingFaab:v}))}
            news={news}
            onGoToNews={function(){ setTab("news"); }}
            mlbDir={mlbDir}
            dirLoading={dirLoading}
            dirLoaded={dirLoaded}
            dirError={dirError}
            lastUpdated={lastUpdated}
            onLoadDirectory={loadDirectory}
            pendingFaText={pendingFaText}
            onClearPendingFa={function(){ setPendingFaText(null); }}
            pendingFaPlayers={pendingFaPlayers}
            onClearPendingFaPlayers={function(){ setPendingFaPlayers(null); }}
          />
        </div>

        {tab==="trade" && (
          <TradeTab
            roster={roster}
            league={league}
            mlbDir={mlbDir}
            dirLoading={dirLoading}
            dirLoaded={dirLoaded}
            dirError={dirError}
            onLoadDirectory={loadDirectory}
          />
        )}

        {tab==="advisor" && (
          <AdvisorTab
            roster={roster}
            league={league}
            mlbDir={mlbDir}
            dirLoaded={dirLoaded}
            dirLoading={dirLoading}
            onLoadDirectory={loadDirectory}
            news={news}
          />
        )}

        {tab==="news" && (
          <NewsTab
            roster={roster}
            news={news}
            newsLoading={newsLoading}
            newsLoaded={newsLoaded}
            newsError={newsError}
            onRefresh={function(){ loadNews(roster ? roster.all : []); }}
          />
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<AppWithAuth/>);
</script>
</body>
</html>
