// (SmartTargetCard replaced by PickCard inside ImportTargetPicker)

function FaResults({ faPlayers, roster, positionNeeds, categoryNeeds, remaining, faFilter, posFilter, setFaFilter, setPosFilter, removeFa }) {
  const active = roster ? roster.all.filter(p => p.status === "Act") : [];

  // Score every player (reuse pre-computed values from bulk import if present)
  const scored = useMemo(() => {
    return faPlayers.map(fa => {
      const fitScore = fa._fitScore    != null ? fa._fitScore    : faFitScore(fa, positionNeeds, categoryNeeds, active).score;
      const ds       = fa._dynastyScore != null ? fa._dynastyScore : dynastyScore(fa);
      const verdict  = faVerdict(fitScore, ds);
      const combined = fitScore * 0.65 + ds * 0.35;
      return { ...fa, _fitScore: fitScore, _dynastyScore: ds, _verdict: verdict.label, _combined: combined };
    }).sort((a, b) => b._combined - a._combined);
  }, [faPlayers, positionNeeds, categoryNeeds, roster]);

  const bulkCount  = faPlayers.filter(p => p.fromImport).length;
  const strongAdds = scored.filter(p => p._verdict === "Strong Add").length;
  const consider   = scored.filter(p => p._verdict === "Consider").length;
  const stash      = scored.filter(p => p._verdict === "Dynasty Stash").length;
  const pass       = scored.filter(p => p._verdict === "Pass").length;

  // ── Smart target groups ───────────────────────────────────────
  // Win Now: active (non-minors) players best suited for immediate impact
  const winNow = scored
    .filter(p => !p.isMinors && p._fitScore >= 25 && (p.gp > 0 || p.fpAvg > 0))
    .slice(0, 4);

  // Dynasty Stash: prospects / minors / age ≤ 24 sorted by dynasty score
  const dynastyTargets = scored
    .filter(p => p.isMinors || p.isProspect || (p.age > 0 && p.age <= 24))
    .sort((a, b) => b._dynastyScore - a._dynastyScore)
    .slice(0, 4);

  // Fill Your Holes: best available player for each critical positional need
  const needFills = positionNeeds
    .filter(n => n.severity === "critical")
    .map(need => ({
      need,
      player: scored
        .filter(p => p.type === need.type && eligibleFor(p, need.pos) && !p.isMinors)
        .sort((a, b) => b._fitScore - a._fitScore)[0],
    }))
    .filter(x => x.player)
    .slice(0, 4);

  const hasSmartTargets = bulkCount > 0 && (winNow.length > 0 || dynastyTargets.length > 0 || needFills.length > 0);

  // Filter tabs
  const displayed = useMemo(() => {
    let list = scored;
    if (faFilter === "targets")  list = list.filter(p => p._verdict !== "Pass");
    if (faFilter === "hitters")  list = list.filter(p => p.type === "hitter");
    if (faFilter === "pitchers") list = list.filter(p => p.type === "pitcher");
    if (posFilter !== "all")     list = list.filter(p => eligibleFor(p, posFilter));
    return list;
  }, [scored, faFilter, posFilter]);

  if (faPlayers.length === 0) return null;

  const POS_OPTIONS = ["all","C","1B","2B","3B","SS","OF","SP","RP"];

  return (
    <div>

      {/* ── Bulk import summary banner ── */}
      {bulkCount > 0 && (
        <div className="bg-slate-800 rounded-xl p-5 text-white mb-4">
          <div className="flex items-center justify-between flex-wrap gap-2 mb-3">
            <h3 className="font-bold text-sm">📊 FA Import — {bulkCount} players analyzed</h3>
            <button onClick={() => setFaPlayers(prev => prev.filter(p => !p.fromImport))}
              className="text-xs text-slate-400 hover:text-red-300 transition-colors">✕ Clear import</button>
          </div>
          <div className="grid grid-cols-4 gap-3 text-center text-xs">
            {[
              { label:"Strong Adds",   count:strongAdds, color:"text-green-400"  },
              { label:"Consider",      count:consider,   color:"text-blue-400"   },
              { label:"Dynasty Stash", count:stash,      color:"text-indigo-400" },
              { label:"Pass",          count:pass,       color:"text-slate-400"  },
            ].map(({ label, count, color }) => (
              <div key={label} className="bg-slate-700 rounded-lg py-2.5">
                <div className={`text-2xl font-black ${color}`}>{count}</div>
                <div className="text-slate-400 mt-0.5">{label}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── Smart Targets ── */}
      {hasSmartTargets && (
        <div className="mb-5">
          <div className="flex items-center gap-2 mb-3">
            <h3 className="font-bold text-gray-800 text-sm">🎯 Suggested Targets for Your Team</h3>
            {!roster && <span className="text-xs text-amber-600 bg-amber-50 border border-amber-200 rounded-lg px-2 py-0.5">⚠ Import your roster CSV for personalized picks</span>}
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-5">

            {/* Win Now */}
            {winNow.length > 0 && (
              <div className="bg-gradient-to-b from-green-50 to-white rounded-xl border border-green-100 shadow-sm p-4">
                <div className="flex items-center gap-2 mb-3 pb-2 border-b border-green-100">
                  <span className="text-lg">🏆</span>
                  <div>
                    <div className="font-black text-sm text-gray-800">Win Now</div>
                    <div className="text-xs text-gray-400">Best immediate pickups</div>
                  </div>
                </div>
                <div className="space-y-3">
                  {winNow.map((fa, i) => (
                    <SmartTargetCard key={fa.id} fa={fa} rank={i+1}
                      reason={
                        i===0 ? "Top overall fit for your roster" :
                        i===1 ? "Strong secondary option" :
                        i===2 ? "Solid depth add" :
                        "Worth a look"
                      }/>
                  ))}
                </div>
              </div>
            )}

            {/* Dynasty Stash */}
            {dynastyTargets.length > 0 && (
              <div className="bg-gradient-to-b from-indigo-50 to-white rounded-xl border border-indigo-100 shadow-sm p-4">
                <div className="flex items-center gap-2 mb-3 pb-2 border-b border-indigo-100">
                  <span className="text-lg">📦</span>
                  <div>
                    <div className="font-black text-sm text-gray-800">Dynasty Stash</div>
                    <div className="text-xs text-gray-400">Prospects &amp; long-term assets</div>
                  </div>
                </div>
                <div className="space-y-3">
                  {dynastyTargets.map((fa, i) => {
                    const tier = ageTier(fa.age || 25);
                    return (
                      <SmartTargetCard key={fa.id} fa={fa} rank={i+1}
                        reason={
                          fa.isMinors ? `${tier.label} — stash while available` :
                          (fa.age||99) <= 22 ? "Elite prospect window — grab now" :
                          (fa.age||99) <= 25 ? "Prime upside years ahead" :
                          "Young piece with dynasty value"
                        }/>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Fill Your Holes */}
            {needFills.length > 0 && (
              <div className="bg-gradient-to-b from-red-50 to-white rounded-xl border border-red-100 shadow-sm p-4">
                <div className="flex items-center gap-2 mb-3 pb-2 border-b border-red-100">
                  <span className="text-lg">🚨</span>
                  <div>
                    <div className="font-black text-sm text-gray-800">Fill Your Holes</div>
                    <div className="text-xs text-gray-400">Addresses critical needs</div>
                  </div>
                </div>
                <div className="space-y-3">
                  {needFills.map(({ need, player }) => (
                    <SmartTargetCard key={player.id} fa={player}
                      reason={`Best available ${need.label} — ${need.note}`}/>
                  ))}
                </div>
                {needFills.length === 0 && (
                  <p className="text-xs text-gray-400 text-center py-4">No critical needs detected. Import your roster CSV to enable this.</p>
                )}
              </div>
            )}

          </div>
        </div>
      )}

      {/* ── Filter controls ── */}
      <div className="bg-white rounded-xl shadow p-4 mb-4">
        <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Full List</div>
        <div className="flex flex-wrap items-center justify-between gap-3">
          <div className="flex gap-2 flex-wrap">
            {[
              ["targets",  `⭐ Top Targets (${scored.filter(p=>p._verdict!=="Pass").length})`],
              ["hitters",  `🏏 Hitters (${scored.filter(p=>p.type==="hitter").length})`],
              ["pitchers", `⚾ Pitchers (${scored.filter(p=>p.type==="pitcher").length})`],
              ["all",      `📋 All (${scored.length})`],
            ].map(([key, label]) => (
              <button key={key} onClick={() => setFaFilter(key)}
                className={`px-4 py-1.5 rounded-full text-xs font-medium transition-colors ${faFilter===key?"bg-blue-600 text-white":"bg-gray-100 text-gray-600 hover:bg-gray-200"}`}>
                {label}
              </button>
            ))}
          </div>
          <div className="flex items-center gap-2">
            <label className="text-xs text-gray-500">Position:</label>
            <select value={posFilter} onChange={e => setPosFilter(e.target.value)}
              className="border rounded-lg px-2 py-1 text-xs focus:outline-none focus:border-blue-400">
              {POS_OPTIONS.map(p => <option key={p} value={p}>{p === "all" ? "All" : p}</option>)}
            </select>
          </div>
        </div>
      </div>

      {/* ── Player cards ── */}
      {displayed.length === 0 ? (
        <div className="bg-white rounded-xl shadow p-10 text-center">
          <div className="text-3xl mb-2">🔍</div>
          <p className="text-gray-500 text-sm">No players match the current filter.</p>
          <button onClick={() => { setFaFilter("all"); setPosFilter("all"); }}
            className="mt-3 text-blue-600 text-xs hover:underline">Clear filters</button>
        </div>
      ) : (
        <div className="space-y-3">
          {displayed.map(fa => (
            <FaCard key={fa.id} fa={fa} roster={roster} posNeeds={positionNeeds}
              catNeeds={categoryNeeds} remainingFaab={remaining} onRemove={removeFa}/>
          ))}
        </div>
      )}
    </div>
  );
}

function FaAnalyzerTab({ roster, league, onFaabChange }) {
  const [faPlayers,  setFaPlayers]  = useState([]);   // players user has selected to evaluate
  const [importPool, setImportPool] = useState([]);   // all players from last FA CSV upload
  const [faabInput,  setFaabInput]  = useState(String(league.remainingFaab));
  const [mlbDir,     setMlbDir]     = useState([]);
  const [dirLoading, setDirLoading] = useState(false);
  const [dirLoaded,  setDirLoaded]  = useState(false);
  const [dirError,   setDirError]   = useState(null);
  const [lastUpdated,setLastUpdated]= useState(null);
  const [faFilter,   setFaFilter]   = useState("targets");
  const [posFilter,  setPosFilter]  = useState("all");
  const fileRef = useRef();

  const remaining = parseInt(faabInput)||0;
  const { positionNeeds, categoryNeeds } = useMemo(()=>roster ? analyzeNeeds(roster) : { positionNeeds:[], categoryNeeds:[] },[roster]);

  const ownedNames = useMemo(()=>
    new Set((roster?.all||[]).map(p=>p.name)),
  [roster]);

  // IDs of players already in the evaluation list (to show "✓ Evaluating" in picker)
  const addedIds = useMemo(() => new Set(faPlayers.map(p => p.id)), [faPlayers]);

  const addFa    = (fa) => setFaPlayers(p => p.some(x => x.id === fa.id) ? p : [fa, ...p]);
  const removeFa = (id) => setFaPlayers(p => p.filter(x => x.id !== id));
  const clearPool = () => setImportPool([]);

  // Load live MLB + AAA player directory from MLB Stats API
  const loadDirectory = async () => {
    setDirLoading(true); setDirError(null);
    try {
      const players = await fetchMLBDirectory();
      setMlbDir(players);
      setDirLoaded(true);
      setLastUpdated(new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}));
    } catch(e) {
      setDirError("Could not reach MLB Stats API. Check your internet connection and try again.");
    } finally {
      setDirLoading(false);
    }
  };

  // Import FA CSV → score all players → populate import pool for selection
  // Auto-detects Fantrax format: "Players → Free Agents" flat export vs "Team Roster" sectioned export
  const handleFaFile = (file) => {
    if (!file?.name.endsWith(".csv")) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const text  = e.target.result;
        const lines = text.split(/\r?\n/).filter(l => l.trim());

        // Detect format: FA export has "FP/G" column in header; roster export has section headers
        const firstLine   = lines[0] || "";
        const isFAExport  = parseCSVLine(firstLine).some(h => h.replace(/"/g,"").trim() === "FP/G");
        const rawPlayers  = isFAExport
          ? parseFantraxFACSV(text)
          : parseFantraxCSV(text).all;

        if (rawPlayers.length === 0) return;

        const active = roster ? roster.all.filter(p => p.status === "Act") : [];
        const ts     = Date.now();

        const pool = rawPlayers.map((p, idx) => {
          const fa = {
            ...p,
            id:         `fa-csv-${p.id || p.name}-${ts}-${idx}`,
            fromImport: true,
          };
          const { score: fitScore } = faFitScore(fa, positionNeeds, categoryNeeds, active);
          const ds       = dynastyScore(fa);
          const verdict  = faVerdict(fitScore, ds);
          const combined = fitScore * 0.65 + ds * 0.35;
          return { ...fa, _fitScore: fitScore, _dynastyScore: ds, _verdict: verdict.label, _combined: combined };
        }).sort((a, b) => b._combined - a._combined);

        setImportPool(pool);
      } catch(_) {}
    };
    reader.readAsText(file);
  };

  const sevColor = (s) => s==="critical"?"bg-red-100 text-red-700 border-red-200":s==="moderate"?"bg-yellow-100 text-yellow-700 border-yellow-200":"bg-blue-100 text-blue-700 border-blue-200";
  const catSevColor = (s) => s==="high"?"bg-red-100 text-red-700":s==="medium"?"bg-yellow-100 text-yellow-700":"bg-gray-100 text-gray-600";

  return (
    <div className="space-y-5">

      {/* ── Live Player Directory ── */}
      <div className={`rounded-xl border-2 p-5 ${dirLoaded?"border-green-200 bg-green-50":"border-dashed border-blue-200 bg-blue-50"}`}>
        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
          <div>
            <h3 className="font-bold text-gray-800 text-sm flex items-center gap-2">
              🌐 Live MLB + AAA Player Directory
              {dirLoaded && <span className="text-xs font-normal text-green-600 bg-green-100 px-2 py-0.5 rounded-full">✓ {mlbDir.length.toLocaleString()} players loaded</span>}
            </h3>
            <p className="text-xs text-gray-500 mt-0.5">
              {dirLoaded
                ? `Last updated ${lastUpdated} — stats reflect current ${CURRENT_SEASON} season. Click Refresh to get today's numbers.`
                : `Pull current season stats from MLB Stats API. Automatically converts to your league's fantasy point system.`}
            </p>
            {dirError && <p className="text-xs text-red-600 mt-1">⚠ {dirError}</p>}
          </div>
          <div className="flex gap-2 shrink-0">
            <button
              onClick={loadDirectory}
              disabled={dirLoading}
              className={`text-sm font-semibold px-5 py-2 rounded-lg transition-colors ${dirLoading?"bg-gray-300 text-gray-500 cursor-not-allowed":dirLoaded?"bg-green-600 hover:bg-green-700 text-white":"bg-blue-600 hover:bg-blue-700 text-white"}`}>
              {dirLoading ? "⏳ Loading…" : dirLoaded ? "🔄 Refresh" : "⬇ Load Players"}
            </button>
          </div>
        </div>
        {dirLoaded && (
          <div className="mt-3 grid grid-cols-3 gap-3 text-center text-xs">
            {[
              ["MLB Hitters", mlbDir.filter(p=>p.type==="hitter"&&!p.isMinors).length, "text-amber-700"],
              ["MLB Pitchers", mlbDir.filter(p=>p.type==="pitcher"&&!p.isMinors).length, "text-blue-700"],
              ["AAA Prospects", mlbDir.filter(p=>p.isMinors).length, "text-purple-700"],
            ].map(([label,count,color])=>(
              <div key={label} className="bg-white rounded-lg py-2 shadow-sm">
                <div className={`text-lg font-black ${color}`}>{count}</div>
                <div className="text-gray-500">{label}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* FAAB Budget */}
      <div className="bg-slate-800 rounded-xl p-5 text-white">
        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
          <div className="flex-1">
            <h3 className="font-bold text-sm mb-1">FAAB Budget Tracker</h3>
            <FaabBar remaining={remaining} total={league.totalFaab}/>
          </div>
          <div className="flex items-center gap-3">
            <div>
              <label className="text-xs text-slate-400 block mb-1">Remaining FAAB ($)</label>
              <input type="number" min="0" className="border border-slate-600 bg-slate-700 text-white rounded-lg px-3 py-1.5 text-sm w-28 focus:outline-none focus:border-blue-400"
                value={faabInput} onChange={e=>{ setFaabInput(e.target.value); onFaabChange(parseInt(e.target.value)||0); }}/>
            </div>
            <div className="text-center">
              <div className="text-xs text-slate-400">% Used</div>
              <div className="text-2xl font-black">{league.totalFaab>0?Math.round((1-remaining/league.totalFaab)*100):0}%</div>
            </div>
          </div>
        </div>
      </div>

      {/* Team Needs */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div className="bg-white rounded-xl shadow p-5">
          <h3 className="font-bold text-gray-800 text-sm mb-3">📍 Position Needs</h3>
          {positionNeeds.length===0
            ? <p className="text-xs text-green-600">✅ All positions are adequately covered.</p>
            : <div className="space-y-2">
                {positionNeeds.map(n=>(
                  <div key={n.pos} className={`flex items-center justify-between rounded-lg px-3 py-2 border text-xs ${sevColor(n.severity)}`}>
                    <div className="flex items-center gap-2">
                      <span className={`font-bold px-1.5 py-0.5 rounded-full ${posColor(n.pos)}`}>{n.pos}</span>
                      <span className="font-semibold">{n.label}</span>
                    </div>
                    <div className="flex items-center gap-2">
                      <span>{n.note}</span>
                      <span className="font-bold uppercase">{n.severity}</span>
                    </div>
                  </div>
                ))}
              </div>
          }
        </div>
        <div className="bg-white rounded-xl shadow p-5">
          <h3 className="font-bold text-gray-800 text-sm mb-3">📊 Category Weaknesses</h3>
          {categoryNeeds.length===0
            ? <p className="text-xs text-green-600">✅ Solid across all categories.</p>
            : <div className="space-y-2">
                {categoryNeeds.map(c=>(
                  <div key={c.cat} className={`flex items-center justify-between rounded-lg px-3 py-2 text-xs font-medium ${catSevColor(c.severity)}`}>
                    <span>{c.icon} {c.cat}</span>
                    <span>{c.rate}</span>
                  </div>
                ))}
              </div>
          }
        </div>
      </div>

      {/* Add FA players */}
      <FaForm onAdd={addFa} mlbDir={mlbDir} ownedNames={ownedNames}/>

      {/* ── Lineup vs FA Comparison ── */}
      <LineupVsFACompare
        roster={roster}
        mlbDir={mlbDir}
        positionNeeds={positionNeeds}
        categoryNeeds={categoryNeeds}
        remaining={remaining}
      />

      {/* ── Import FA CSV ── */}
      <div className="bg-white rounded-xl shadow p-5">
        <div className="flex items-center justify-between mb-2">
          <div>
            <h3 className="font-bold text-gray-800 text-sm">Import FA List from Fantrax</h3>
            <p className="text-xs text-gray-400 mt-0.5">Upload your free agent CSV and we'll rank every player for your team — then you pick who to evaluate.</p>
          </div>
          <button onClick={()=>fileRef.current?.click()}
            className="shrink-0 bg-slate-700 hover:bg-slate-900 text-white text-xs font-semibold px-4 py-2 rounded-lg transition-colors flex items-center gap-1.5">
            📁 Upload FA CSV
          </button>
          <input ref={fileRef} type="file" accept=".csv" className="hidden" onChange={e=>handleFaFile(e.target.files[0])}/>
        </div>
        <p className="text-xs text-gray-400">In Fantrax: <strong>Players → Free Agents</strong> → scroll to bottom → <strong>Export → CSV</strong>.</p>
      </div>

      {/* ── Target Picker (shown after FA CSV import) ── */}
      {importPool.length > 0 && (
        <ImportTargetPicker
          pool={importPool}
          roster={roster}
          positionNeeds={positionNeeds}
          categoryNeeds={categoryNeeds}
          remaining={remaining}
          addedIds={addedIds}
          onAdd={addFa}
          onClear={clearPool}
        />
      )}

      {/* ── Evaluation List (manually added + selected from picker) ── */}
      {faPlayers.length > 0 && (
        <div>
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-bold text-gray-800 text-sm">📋 Evaluation List ({faPlayers.length} players)</h3>
            <button onClick={() => setFaPlayers([])} className="text-xs text-gray-400 hover:text-red-400 transition-colors">✕ Clear all</button>
          </div>
          <FaResults
            faPlayers={faPlayers}
            roster={roster}
            positionNeeds={positionNeeds}
            categoryNeeds={categoryNeeds}
            remaining={remaining}
            faFilter={faFilter}
            posFilter={posFilter}
            setFaFilter={setFaFilter}
            setPosFilter={setPosFilter}
            removeFa={removeFa}
          />
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   LINEUP VS FA COMPARISON
   ═══════════════════════════════════════════════════════════════ */

function LineupVsFACompare({ roster, mlbDir, positionNeeds, categoryNeeds, remaining }) {
  const [rosterPlayer, setRosterPlayer] = useState(null);
  const [faPlayer,     setFaPlayer]     = useState(null);
  const [faQuery,      setFaQuery]      = useState("");
  const [faOpen,       setFaOpen]       = useState(false);

  /* ── helpers ─────────────────────────────────────────────── */
  function dynastyWindow(age) {
    if (!age) return "";
    if (age <= 23) return "10+ yr window";
    if (age <= 26) return "7–8 yr window";
    if (age <= 29) return "4–5 yr window";
    if (age <= 32) return "1–2 yr window";
    return "End of window";
  }

  /* ── search FA in mlbDir ─────────────────────────────────── */
  const faResults = useMemo(() => {
    if (!faQuery || faQuery.length < 2) return [];
    const q = faQuery.toLowerCase();
    return mlbDir.filter(p => p.name.toLowerCase().includes(q)).slice(0, 8);
  }, [faQuery, mlbDir]);

  /* ── roster player list ──────────────────────────────────── */
  const active   = (roster?.all || []).filter(p => p.status === "Act");
  const reserve  = (roster?.all || []).filter(p => p.status === "Res");

  /* ── scoring ─────────────────────────────────────────────── */
  function prodScore(p) {
    if (!p) return 0;
    if (p.type === "pitcher") {
      let s = 50;
      if (p.era > 0) s += Math.max(-25, Math.min(25, (4.00 - p.era) * 8));
      if (p.fpAvg > 0) s += Math.min(25, p.fpAvg * 1.5);
      return Math.max(0, Math.min(100, s));
    }
    let s = 50;
    if (p.fpAvg > 0) s += Math.min(25, p.fpAvg * 2);
    if (p.hr  > 0)   s += Math.min(10, p.hr  / 3);
    if (p.sb  > 0)   s += Math.min(10, p.sb  / 2);
    return Math.max(0, Math.min(100, s));
  }

  function dsFor(p) { return p ? dynastyScore(p) : 0; }

  const rprod = prodScore(rosterPlayer);
  const fprod = prodScore(faPlayer);
  const rds   = dsFor(rosterPlayer);
  const fds   = dsFor(faPlayer);

  const prodAdv = fprod - rprod;   // positive = FA is better
  const dsAdv   = fds   - rds;

  // For a direct swap: production weighted slightly more (55%) than dynasty (45%)
  const overall = prodAdv * 0.55 + dsAdv * 0.45;

  function verdict() {
    if (!rosterPlayer || !faPlayer) return null;
    if (overall >= 20) return { label: "Clear Upgrade 🔥",        color: "bg-green-100 text-green-800 border-green-300",  desc: "Make this move — significant improvement." };
    if (overall >=  8) return { label: "Slight Upgrade ✅",        color: "bg-emerald-50 text-emerald-700 border-emerald-200", desc: "Lean toward adding the FA. Modest gain." };
    if (overall >= -8) return { label: "Too Close to Call ⚖️",    color: "bg-amber-50 text-amber-700 border-amber-200",  desc: "Nearly identical value. Consider position fit & FAAB." };
    if (overall >= -20) return { label: "Keep Your Player 🛡️",    color: "bg-orange-50 text-orange-700 border-orange-200", desc: "Your current player has the edge. Hold." };
    return              { label: "Definitely Keep ❌",             color: "bg-red-50 text-red-700 border-red-200",        desc: "Don't make this move." };
  }

  const v = verdict();

  /* Position fit warning */
  function posWarn() {
    if (!rosterPlayer || !faPlayer) return null;
    const rPos = rosterPlayer.pos;
    const faEligible = (faPlayer.eligible || faPlayer.pos || "").split(",").map(s => s.trim());
    if (!faEligible.includes(rPos) && rPos) {
      return `⚠️ ${faPlayer.name} isn't eligible at ${rPos}. Check your roster flexibility before making this move.`;
    }
    return null;
  }

  /* ── Stat Row ────────────────────────────────────────────── */
  function StatRow({ label, rVal, fVal, higherBetter = true }) {
    const rN = parseFloat(rVal) || 0;
    const fN = parseFloat(fVal) || 0;
    const rWins = higherBetter ? rN > fN : rN < fN;
    const fWins = higherBetter ? fN > rN : fN < rN;
    return (
      <div className="grid grid-cols-3 text-xs py-1 border-b border-gray-100 last:border-0">
        <span className={`text-right pr-3 font-semibold ${rWins ? "text-green-600" : "text-gray-500"}`}>{rVal ?? "—"}</span>
        <span className="text-center text-gray-400 font-medium">{label}</span>
        <span className={`text-left pl-3 font-semibold ${fWins ? "text-green-600" : "text-gray-500"}`}>{fVal ?? "—"}</span>
      </div>
    );
  }

  /* ── Player Card ─────────────────────────────────────────── */
  function CompareCard({ player, side }) {
    if (!player) return (
      <div className={`flex-1 rounded-xl border-2 border-dashed flex items-center justify-center h-48 ${side === "roster" ? "border-slate-200" : "border-blue-200"}`}>
        <span className="text-gray-300 text-sm">{side === "roster" ? "Select from lineup →" : "← Search free agent"}</span>
      </div>
    );
    const ds = dynastyScore(player);
    const dStars = ds >= 75 ? "★★★★★" : ds >= 60 ? "★★★★" : ds >= 45 ? "★★★" : ds >= 30 ? "★★" : "★";
    const win = dynastyWindow(player.age);
    return (
      <div className={`flex-1 rounded-xl border p-4 ${side === "roster" ? "border-slate-300 bg-slate-50" : "border-blue-300 bg-blue-50"}`}>
        <div className="flex items-start justify-between mb-2">
          <div>
            <div className="flex items-center gap-2 mb-0.5">
              <span className={`text-xs font-bold px-1.5 py-0.5 rounded ${side === "roster" ? "bg-slate-200 text-slate-700" : "bg-blue-200 text-blue-800"}`}>{player.pos}</span>
              <span className="text-xs text-gray-400">{player.team}</span>
            </div>
            <div className="font-bold text-gray-800 text-sm leading-tight">{player.name}</div>
            {player.age > 0 && <div className="text-xs text-gray-400">Age {player.age} · {win}</div>}
          </div>
          <div className="text-right">
            <div className="text-yellow-500 text-xs tracking-tight">{dStars}</div>
            <div className="text-xs text-gray-400">DS {ds}</div>
          </div>
        </div>
        <div className="mt-3 space-y-0.5">
          {player.type !== "pitcher" ? (
            <>
              <StatRow label="FP/G" rVal={side==="roster"?player.fpAvg?.toFixed(1):undefined} fVal={side==="fa"?player.fpAvg?.toFixed(1):undefined} />
              {player.hr  > 0 && <StatRow label="HR"  rVal={side==="roster"?player.hr:undefined}  fVal={side==="fa"?player.hr:undefined}  />}
              {player.sb  > 0 && <StatRow label="SB"  rVal={side==="roster"?player.sb:undefined}  fVal={side==="fa"?player.sb:undefined}  />}
              {player.rbi > 0 && <StatRow label="RBI" rVal={side==="roster"?player.rbi:undefined} fVal={side==="fa"?player.rbi:undefined} />}
            </>
          ) : (
            <>
              <StatRow label="FP/G" rVal={side==="roster"?player.fpAvg?.toFixed(1):undefined} fVal={side==="fa"?player.fpAvg?.toFixed(1):undefined} />
              {player.era > 0 && <StatRow label="ERA" rVal={side==="roster"?(player.era?.toFixed(2)):undefined} fVal={side==="fa"?(player.era?.toFixed(2)):undefined} higherBetter={false}/>}
              {player.sv  > 0 && <StatRow label="SV"  rVal={side==="roster"?player.sv:undefined}  fVal={side==="fa"?player.sv:undefined}  />}
              {player.k   > 0 && <StatRow label="K"   rVal={side==="roster"?player.k:undefined}   fVal={side==="fa"?player.k:undefined}   />}
            </>
          )}
        </div>
      </div>
    );
  }

  /* ── Comparison Table (middle) ───────────────────────────── */
  function CompareTable() {
    if (!rosterPlayer || !faPlayer) return null;
    const rp = rosterPlayer, fp = faPlayer;
    const isHitter = rp.type !== "pitcher" || fp.type !== "pitcher";
    return (
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-4 w-full max-w-md mx-auto">
        <div className="grid grid-cols-3 text-xs font-bold text-gray-500 mb-2">
          <span className="text-right pr-3 truncate">{rp.name.split(" ").slice(-1)[0]}</span>
          <span className="text-center">Stat</span>
          <span className="text-left pl-3 truncate">{fp.name.split(" ").slice(-1)[0]}</span>
        </div>
        <StatRow label="FP/G"  rVal={rp.fpAvg?.toFixed(1)}  fVal={fp.fpAvg?.toFixed(1)} />
        <StatRow label="Dynasty" rVal={dsFor(rp)} fVal={dsFor(fp)} />
        <StatRow label="Age"   rVal={rp.age||"?"} fVal={fp.age||"?"} higherBetter={false}/>
        {isHitter ? (
          <>
            {(rp.hr||fp.hr)   > 0 && <StatRow label="HR"  rVal={rp.hr}  fVal={fp.hr}  />}
            {(rp.sb||fp.sb)   > 0 && <StatRow label="SB"  rVal={rp.sb}  fVal={fp.sb}  />}
            {(rp.rbi||fp.rbi) > 0 && <StatRow label="RBI" rVal={rp.rbi} fVal={fp.rbi} />}
            {(rp.r||fp.r)     > 0 && <StatRow label="R"   rVal={rp.r}   fVal={fp.r}   />}
          </>
        ) : (
          <>
            {(rp.era||fp.era) > 0 && <StatRow label="ERA" rVal={rp.era?.toFixed(2)} fVal={fp.era?.toFixed(2)} higherBetter={false}/>}
            {(rp.k||fp.k)     > 0 && <StatRow label="K"   rVal={rp.k}   fVal={fp.k}   />}
            {(rp.sv||fp.sv)   > 0 && <StatRow label="SV"  rVal={rp.sv}  fVal={fp.sv}  />}
            {(rp.w||fp.w)     > 0 && <StatRow label="W"   rVal={rp.w}   fVal={fp.w}   />}
          </>
        )}
      </div>
    );
  }

  /* ── render ─────────────────────────────────────────────── */
  return (
    <div className="bg-white rounded-xl shadow p-5 space-y-4">
      <div>
        <h3 className="font-bold text-gray-800 text-sm">⚔️ Lineup vs Free Agent</h3>
        <p className="text-xs text-gray-400 mt-0.5">Pick someone from your active lineup and a free agent — we'll tell you if the swap is worth it.</p>
      </div>

      {/* Selectors row */}
      <div className="flex flex-col sm:flex-row gap-3">
        {/* Roster picker */}
        <div className="flex-1">
          <label className="block text-xs font-medium text-gray-500 mb-1">Your Lineup Player</label>
          <select
            className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-slate-400"
            value={rosterPlayer?.id || ""}
            onChange={e => {
              const id = e.target.value;
              const all = roster?.all || [];
              setRosterPlayer(all.find(p => p.id === id) || null);
            }}
          >
            <option value="">— Select a player —</option>
            {active.length > 0 && (
              <optgroup label="Active">
                {active.map(p => <option key={p.id} value={p.id}>{p.name} ({p.pos})</option>)}
              </optgroup>
            )}
            {reserve.length > 0 && (
              <optgroup label="Reserve / IL">
                {reserve.map(p => <option key={p.id} value={p.id}>{p.name} ({p.pos})</option>)}
              </optgroup>
            )}
          </select>
        </div>

        <div className="flex items-end justify-center pb-2">
          <span className="text-gray-300 font-bold text-xl">vs</span>
        </div>

        {/* FA search */}
        <div className="flex-1 relative">
          <label className="block text-xs font-medium text-gray-500 mb-1">Free Agent</label>
          <input
            type="text"
            placeholder={mlbDir.length === 0 ? "Load player directory first ↑" : "Search free agents…"}
            disabled={mlbDir.length === 0}
            value={faQuery}
            onChange={e => { setFaQuery(e.target.value); setFaOpen(true); setFaPlayer(null); }}
            onFocus={() => setFaOpen(true)}
            onBlur={() => setTimeout(() => setFaOpen(false), 150)}
            className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 disabled:bg-gray-50 disabled:text-gray-400"
          />
          {faOpen && faResults.length > 0 && (
            <div className="absolute z-20 left-0 right-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-lg max-h-48 overflow-y-auto">
              {faResults.map(p => (
                <button
                  key={p.id}
                  onMouseDown={() => { setFaPlayer(p); setFaQuery(p.name); setFaOpen(false); }}
                  className="w-full text-left px-3 py-2 text-sm hover:bg-blue-50 flex items-center gap-2"
                >
                  <span className="text-xs bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded font-bold">{p.pos}</span>
                  <span className="font-medium text-gray-800">{p.name}</span>
                  <span className="text-xs text-gray-400 ml-auto">{p.team}</span>
                </button>
              ))}
            </div>
          )}
          {faPlayer && (
            <button onClick={() => { setFaPlayer(null); setFaQuery(""); }} className="absolute right-2 top-7 text-gray-300 hover:text-gray-500 text-lg leading-none">×</button>
          )}
        </div>
      </div>

      {/* Side-by-side cards */}
      {(rosterPlayer || faPlayer) && (
        <div className="flex flex-col sm:flex-row gap-3">
          <CompareCard player={rosterPlayer} side="roster" />
          <CompareCard player={faPlayer}     side="fa"     />
        </div>
      )}

      {/* Comparison table */}
      <CompareTable />

      {/* Verdict */}
      {v && (
        <div className={`rounded-xl border px-5 py-4 ${v.color}`}>
          <div className="font-bold text-base mb-1">{v.label}</div>
          <div className="text-xs opacity-80">{v.desc}</div>
          {posWarn() && <div className="mt-2 text-xs font-medium opacity-90">{posWarn()}</div>}
          <div className="mt-2 flex gap-4 text-xs opacity-70">
            <span>Production edge: {prodAdv >= 0 ? "+" : ""}{prodAdv.toFixed(0)} pts ({prodAdv >= 0 ? "FA" : "Current"})</span>
            <span>Dynasty edge: {dsAdv >= 0 ? "+" : ""}{dsAdv.toFixed(0)} pts ({dsAdv >= 0 ? "FA" : "Current"})</span>
          </div>
        </div>
      )}

      {!rosterPlayer && !faPlayer && (
        <div className="text-center text-xs text-gray-300 py-4">
          Select both players above to see the comparison
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   TRADE ANALYSIS
   ═══════════════════════════════════════════════════════════════ */

/* ── Player search used inside each trade side ─────────────────*/
function TradeSearch({ dir, excludedNames, onAdd, placeholder }) {
  const [query, setQuery] = useState("");
  const [open,  setOpen]  = useState(false);

  const results = useMemo(() => {
    if (!dir?.length || query.length < 2) return [];
    const q = query.toLowerCase();
    return dir
      .filter(p => p.name.toLowerCase().includes(q) && !(excludedNames||new Set()).has(p.name))
      .slice(0, 14);
  }, [query, dir, excludedNames]);

  const pick = (p) => {
    onAdd({
      id: `trade-${Date.now()}-${p.mlbId||p.id}`,
      name: p.name, team: p.team, pos: p.pos,
      eligible: p.eligible || p.pos, type: p.type,
      age: p.age || 0, isProspect: !!p.isProspect, isMinors: !!p.isMinors,
      fpAvg: p.fpAvg || 0, fpTotal: p.fpTotal || 0, gp: p.gp || 0,
      hr: p.hr||0, sb: p.sb||0, rbi: p.rbi||0,
      ip: p.ip||0, era: p.era||0, k: p.k||0, sv: p.sv||0, qs: p.qs||0,
    });
    setQuery(""); setOpen(false);
  };

  return (
    <div className="relative">
      <input
        className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400 bg-white"
        placeholder={placeholder || "Search player name…"}
        value={query}
        onChange={e => { setQuery(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        onBlur={() => setTimeout(() => setOpen(false), 200)}
      />
      {open && results.length > 0 && (
        <div className="absolute z-50 left-0 right-0 bg-white border border-gray-200 rounded-xl shadow-xl mt-1 max-h-72 overflow-y-auto">
          {results.map(p => (
            <button
              key={p.id}
              type="button"
              onMouseDown={() => pick(p)}
              className="w-full text-left px-4 py-2.5 hover:bg-gray-50 border-b border-gray-100 last:border-0 flex items-center gap-3">
              <span className={`text-xs font-bold px-1.5 py-0.5 rounded-full shrink-0 ${posColor(p.pos)}`}>{p.pos}</span>
              <div className="min-w-0 flex-1">
                <span className="font-semibold text-sm text-gray-900">{p.name}</span>
                <span className="text-xs text-gray-400 ml-2">{p.team} · Age {p.age||"?"}</span>
                {p.isMinors && <span className="ml-1.5 text-xs bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded-full font-semibold">AAA</span>}
              </div>
              <span className="text-xs text-gray-400 shrink-0">{(p.fpAvg||0).toFixed(1)} pts/gm</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── Compact player chip inside trade builder ──────────────────*/
function TradePlayerCard({ player, onRemove }) {
  const ds   = dynastyScore(player);
  const tier = ageTier(player.age || 25);

  function dynWindow(age) {
    if (!age) return "Age unknown";
    if (age <= 22) return "10+ yr window";
    if (age <= 25) return "7–8 yr window";
    if (age <= 27) return "4–5 yr window";
    if (age <= 30) return "2–3 yr window";
    return "Win-now only";
  }

  return (
    <div className="flex items-start justify-between gap-2 bg-white border border-gray-100 rounded-xl p-3.5 shadow-sm">
      <div className="flex items-start gap-2.5 flex-1 min-w-0">
        <span className={`text-xs font-bold px-1.5 py-0.5 rounded-full shrink-0 mt-0.5 ${posColor(player.pos)}`}>{player.pos}</span>
        <div className="min-w-0">
          <div className="font-bold text-gray-900 text-sm truncate">{player.name}</div>
          <div className="text-xs text-gray-400">{player.team} · Age {player.age||"?"}</div>
          <div className="flex items-center gap-2 mt-1 flex-wrap">
            <div className="flex items-center gap-1"><Stars n={tier.stars}/></div>
            <span className={`text-xs font-semibold ${tier.color}`}>{tier.label}</span>
            <span className="text-gray-300">·</span>
            <span className="text-xs text-gray-400 italic">{dynWindow(player.age)}</span>
          </div>
          <div className="text-xs text-gray-500 mt-1">
            <span className="font-semibold text-gray-700">{(player.fpAvg||0).toFixed(1)}</span> pts/gm
            <span className="mx-1.5 text-gray-200">·</span>
            Dynasty <span className="font-semibold text-gray-700">{ds}</span>/100
            {player.isMinors && <span className="ml-2 bg-purple-100 text-purple-700 text-xs px-1.5 py-0.5 rounded-full font-semibold">AAA</span>}
            {!player.isMinors && player.isProspect && <span className="ml-2 bg-emerald-100 text-emerald-700 text-xs px-1.5 py-0.5 rounded-full font-semibold">Prospect</span>}
          </div>
        </div>
      </div>
      <button onClick={onRemove} className="text-gray-300 hover:text-red-400 transition-colors text-lg leading-none shrink-0 mt-0.5">✕</button>
    </div>
  );
}

/* ── Trade Analysis Panel ──────────────────────────────────────*/
function TradeAnalysisPanel({ givePlayers, recvPlayers, roster, positionNeeds, categoryNeeds }) {
  // ── Per-player scores ──
  const giveScores = givePlayers.map(p => ({ ...p, ds: dynastyScore(p) }));
  const recvScores = recvPlayers.map(p => ({ ...p, ds: dynastyScore(p) }));

  const totalGiveDs   = giveScores.reduce((s, p) => s + p.ds, 0);
  const totalRecvDs   = recvScores.reduce((s, p) => s + p.ds, 0);
  const totalGiveProd = givePlayers.reduce((s, p) => s + (p.fpAvg || 0), 0);
  const totalRecvProd = recvPlayers.reduce((s, p) => s + (p.fpAvg || 0), 0);

  // ── Category delta (hitters: HR/SB/RBI; pitchers: K/SV/QS) ──
  const catDelta = {
    hr:  recvPlayers.reduce((s,p)=>s+(p.hr||0),0)  - givePlayers.reduce((s,p)=>s+(p.hr||0),0),
    sb:  recvPlayers.reduce((s,p)=>s+(p.sb||0),0)  - givePlayers.reduce((s,p)=>s+(p.sb||0),0),
    rbi: recvPlayers.reduce((s,p)=>s+(p.rbi||0),0) - givePlayers.reduce((s,p)=>s+(p.rbi||0),0),
    k:   recvPlayers.reduce((s,p)=>s+(p.k||0),0)   - givePlayers.reduce((s,p)=>s+(p.k||0),0),
    sv:  recvPlayers.reduce((s,p)=>s+(p.sv||0),0)  - givePlayers.reduce((s,p)=>s+(p.sv||0),0),
    qs:  recvPlayers.reduce((s,p)=>s+(p.qs||0),0)  - givePlayers.reduce((s,p)=>s+(p.qs||0),0),
  };

  // ── Position impact (needs fixed vs needs vacated) ──
  const needsFilled   = positionNeeds.filter(n =>
    recvPlayers.some(p => p.type === n.type && eligibleFor(p, n.pos)) &&
    !givePlayers.some(p => p.type === n.type && eligibleFor(p, n.pos))
  ).length;
  const needsVacated  = positionNeeds.filter(n =>
    givePlayers.some(p => p.type === n.type && eligibleFor(p, n.pos)) &&
    !recvPlayers.some(p => p.type === n.type && eligibleFor(p, n.pos))
  ).length;

  // ── Overall verdict (dynasty-weighted for dynasty league) ──
  const dsTotal    = Math.max(totalGiveDs + totalRecvDs, 1);
  const dynastyAdv = ((totalRecvDs   - totalGiveDs)   / dsTotal) * 100;
  const prodTotal  = Math.max(totalGiveProd + totalRecvProd, 0.01);
  const prodAdv    = ((totalRecvProd - totalGiveProd)  / prodTotal) * 100;
  const posAdv     = (needsFilled - needsVacated) * 15;
  const overallAdv = dynastyAdv * 0.45 + prodAdv * 0.40 + posAdv * 0.15;

  const verdict =
    overallAdv >= 22  ? { label:"You Win",              emoji:"🏆", color:"bg-green-600",  text:"text-green-700",  border:"border-green-200 bg-green-50"  } :
    overallAdv >= 8   ? { label:"Slight Edge Your Way", emoji:"✅", color:"bg-blue-500",   text:"text-blue-700",   border:"border-blue-200 bg-blue-50"    } :
    overallAdv >= -8  ? { label:"Fair Trade",           emoji:"⚖️", color:"bg-slate-500",  text:"text-slate-700",  border:"border-slate-200 bg-slate-50"  } :
    overallAdv >= -22 ? { label:"Slight Disadvantage",  emoji:"⚠️", color:"bg-orange-500", text:"text-orange-700", border:"border-orange-200 bg-orange-50" } :
                        { label:"You Lose",              emoji:"❌", color:"bg-red-600",    text:"text-red-700",    border:"border-red-200 bg-red-50"      };

  // ── Helpers ──
  const ScoreBar = ({ value, max, color }) => {
    const pct = max > 0 ? Math.min(100, (value / max) * 100) : 0;
    return (
      <div className="flex items-center gap-2">
        <div className="flex-1 h-3 bg-gray-100 rounded-full overflow-hidden">
          <div className={`h-full rounded-full ${color}`} style={{width:`${pct}%`}}/>
        </div>
        <span className="text-sm font-black w-8 text-right">{Math.round(value)}</span>
      </div>
    );
  };

  const DeltaChip = ({ label, val, icon }) => {
    if (val === 0) return null;
    const pos = val > 0;
    return (
      <div className={`flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full ${pos?"bg-green-100 text-green-700":"bg-red-100 text-red-700"}`}>
        <span>{icon}</span>
        <span>{label}</span>
        <span>{pos?"+":""}{val}</span>
      </div>
    );
  };

  const maxDs   = Math.max(totalGiveDs, totalRecvDs, 1);
  const maxProd = Math.max(totalGiveProd, totalRecvProd, 0.1);

  const hasCatData = givePlayers.some(p => p.hr||p.sb||p.k||p.sv) ||
                     recvPlayers.some(p => p.hr||p.sb||p.k||p.sv);

  return (
    <div className="space-y-4">

      {/* ── Verdict Banner ── */}
      <div className={`rounded-2xl border-2 p-6 ${verdict.border}`}>
        <div className="flex items-center gap-4 flex-wrap">
          <div className={`w-14 h-14 rounded-2xl ${verdict.color} flex items-center justify-center text-2xl shadow-sm shrink-0`}>
            {verdict.emoji}
          </div>
          <div className="flex-1 min-w-0">
            <div className={`text-2xl font-black ${verdict.text}`}>{verdict.label}</div>
            <div className="text-sm text-gray-500 mt-0.5">
              {overallAdv > 0
                ? `You gain ${prodAdv > 0 ? "production" : "dynasty value"}${dynastyAdv > 0 && prodAdv > 0 ? " and dynasty value" : ""}${needsFilled > 0 ? " and fill a positional need" : ""}.`
                : overallAdv < 0
                ? `You give up ${-prodAdv > 0 ? "production" : "dynasty value"}${-dynastyAdv > 0 && -prodAdv > 0 ? " and dynasty value" : ""}${needsVacated > 0 ? " and vacate a positional need" : ""}.`
                : "The value exchanged is roughly balanced across production and dynasty."}
              {!roster && <span className="ml-2 text-amber-600 text-xs font-medium">⚠ Import roster CSV for positional context.</span>}
            </div>
          </div>
          <div className="text-right shrink-0">
            <div className="text-xs text-gray-400 uppercase tracking-wide">Trade Score</div>
            <div className={`text-3xl font-black ${verdict.text}`}>
              {overallAdv > 0 ? "+" : ""}{Math.round(overallAdv)}
            </div>
          </div>
        </div>
      </div>

      {/* ── Three analysis columns ── */}
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">

        {/* Dynasty Value */}
        <div className="bg-white rounded-xl shadow p-5">
          <div className="flex items-center gap-2 mb-4">
            <span className="text-base">👑</span>
            <div>
              <div className="font-black text-sm text-gray-800">Dynasty Value</div>
              <div className="text-xs text-gray-400">Age tiers · 45% of score</div>
            </div>
          </div>
          <div className="space-y-3">
            <div>
              <div className="flex justify-between text-xs mb-1">
                <span className="text-gray-500 font-medium">You Give</span>
                <span className={`font-bold ${totalGiveDs > totalRecvDs ? "text-green-600" : "text-gray-600"}`}>{totalGiveDs}</span>
              </div>
              <ScoreBar value={totalGiveDs} max={maxDs} color={totalGiveDs >= totalRecvDs ? "bg-green-500" : "bg-gray-300"}/>
            </div>
            <div>
              <div className="flex justify-between text-xs mb-1">
                <span className="text-gray-500 font-medium">You Receive</span>
                <span className={`font-bold ${totalRecvDs > totalGiveDs ? "text-green-600" : "text-gray-600"}`}>{totalRecvDs}</span>
              </div>
              <ScoreBar value={totalRecvDs} max={maxDs} color={totalRecvDs >= totalGiveDs ? "bg-emerald-500" : "bg-gray-300"}/>
            </div>
          </div>
          <div className={`mt-4 text-xs font-semibold text-center px-3 py-1.5 rounded-lg ${dynastyAdv > 5 ? "bg-green-100 text-green-700" : dynastyAdv < -5 ? "bg-red-100 text-red-700" : "bg-gray-100 text-gray-600"}`}>
            {dynastyAdv > 5 ? `You gain ${Math.round(dynastyAdv)} dynasty pts` : dynastyAdv < -5 ? `You give ${Math.abs(Math.round(dynastyAdv))} dynasty pts` : "Dynasty value roughly even"}
          </div>

          {/* Per-player breakdown */}
          <div className="mt-4 space-y-1.5">
            {[...giveScores.map(p=>({...p,side:"give"})), ...recvScores.map(p=>({...p,side:"recv"}))].map(p => {
              const tier = ageTier(p.age||25);
              return (
                <div key={p.id} className="flex items-center gap-2 text-xs">
                  <span className={`w-2 h-2 rounded-full shrink-0 ${p.side==="recv"?"bg-emerald-400":"bg-gray-300"}`}/>
                  <span className="text-gray-600 flex-1 truncate">{p.name}</span>
                  <Stars n={tier.stars}/>
                  <span className={`font-bold w-6 text-right ${p.side==="recv"?"text-emerald-600":"text-gray-500"}`}>{p.ds}</span>
                </div>
              );
            })}
          </div>
        </div>

        {/* Production */}
        <div className="bg-white rounded-xl shadow p-5">
          <div className="flex items-center gap-2 mb-4">
            <span className="text-base">📈</span>
            <div>
              <div className="font-black text-sm text-gray-800">Production</div>
              <div className="text-xs text-gray-400">Fantasy pts/gm · 40% of score</div>
            </div>
          </div>
          <div className="space-y-3">
            <div>
              <div className="flex justify-between text-xs mb-1">
                <span className="text-gray-500 font-medium">You Give</span>
                <span className={`font-bold ${totalGiveProd > totalRecvProd ? "text-green-600" : "text-gray-600"}`}>{totalGiveProd.toFixed(1)}/gm</span>
              </div>
              <ScoreBar value={totalGiveProd} max={maxProd} color={totalGiveProd >= totalRecvProd ? "bg-green-500" : "bg-gray-300"}/>
            </div>
            <div>
              <div className="flex justify-between text-xs mb-1">
                <span className="text-gray-500 font-medium">You Receive</span>
                <span className={`font-bold ${totalRecvProd > totalGiveProd ? "text-green-600" : "text-gray-600"}`}>{totalRecvProd.toFixed(1)}/gm</span>
              </div>
              <ScoreBar value={totalRecvProd} max={maxProd} color={totalRecvProd >= totalGiveProd ? "bg-blue-500" : "bg-gray-300"}/>
            </div>
          </div>
          <div className={`mt-4 text-xs font-semibold text-center px-3 py-1.5 rounded-lg ${prodAdv > 5 ? "bg-green-100 text-green-700" : prodAdv < -5 ? "bg-red-100 text-red-700" : "bg-gray-100 text-gray-600"}`}>
            {prodAdv > 5 ? `+${(totalRecvProd-totalGiveProd).toFixed(1)} pts/gm net gain` : prodAdv < -5 ? `${(totalRecvProd-totalGiveProd).toFixed(1)} pts/gm net loss` : "Production roughly even"}
          </div>

          {/* Per-player production */}
          <div className="mt-4 space-y-1.5">
            {[...givePlayers.map(p=>({...p,side:"give"})), ...recvPlayers.map(p=>({...p,side:"recv"}))].sort((a,b)=>(b.fpAvg||0)-(a.fpAvg||0)).map(p => (
              <div key={p.id} className="flex items-center gap-2 text-xs">
                <span className={`w-2 h-2 rounded-full shrink-0 ${p.side==="recv"?"bg-blue-400":"bg-gray-300"}`}/>
                <span className="text-gray-600 flex-1 truncate">{p.name}</span>
                <span className={`font-bold ${p.side==="recv"?"text-blue-600":"text-gray-500"}`}>{(p.fpAvg||0).toFixed(1)}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Position & Category Impact */}
        <div className="bg-white rounded-xl shadow p-5">
          <div className="flex items-center gap-2 mb-4">
            <span className="text-base">🎯</span>
            <div>
              <div className="font-black text-sm text-gray-800">Roster Impact</div>
              <div className="text-xs text-gray-400">Positions · categories · 15% of score</div>
            </div>
          </div>

          {/* Position impact */}
          <div className="mb-4">
            <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Position Impact</div>
            {!roster ? (
              <p className="text-xs text-gray-400 italic">Import your roster CSV to see positional impact.</p>
            ) : positionNeeds.length === 0 ? (
              <p className="text-xs text-green-600">✅ No critical positional needs on your roster.</p>
            ) : (
              <div className="space-y-1.5">
                {positionNeeds.map(n => {
                  const filled   = recvPlayers.some(p => p.type===n.type && eligibleFor(p,n.pos));
                  const vacated  = givePlayers.some(p => p.type===n.type && eligibleFor(p,n.pos));
                  const neutral  = !filled && !vacated;
                  return (
                    <div key={n.pos} className={`flex items-center gap-2 text-xs rounded-lg px-2.5 py-1.5 ${filled&&!vacated?"bg-green-100 text-green-700":vacated&&!filled?"bg-red-100 text-red-700":"bg-gray-50 text-gray-500"}`}>
                      <span className={`font-bold px-1.5 py-0.5 rounded-full ${posColor(n.pos)}`}>{n.pos}</span>
                      <span className="font-medium flex-1">{n.label}</span>
                      <span className="font-bold">{filled&&!vacated?"✓ Filled":vacated&&!filled?"✗ Vacated":"—"}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Category impact */}
          <div>
            <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Category Changes</div>
            {!hasCatData ? (
              <p className="text-xs text-gray-400 italic">Add players via live MLB directory to see stat-level category impact.</p>
            ) : (
              <div className="flex flex-wrap gap-2">
                <DeltaChip label="HR"  val={catDelta.hr}  icon="💥"/>
                <DeltaChip label="SB"  val={catDelta.sb}  icon="⚡"/>
                <DeltaChip label="RBI" val={catDelta.rbi} icon="🏠"/>
                <DeltaChip label="K"   val={catDelta.k}   icon="🔥"/>
                <DeltaChip label="SV"  val={catDelta.sv}  icon="🔒"/>
                <DeltaChip label="QS"  val={catDelta.qs}  icon="🎯"/>
                {Object.values(catDelta).every(v => v === 0) && (
                  <p className="text-xs text-gray-400 italic">No stat changes detected.</p>
                )}
              </div>
            )}
          </div>
        </div>

      </div>
    </div>
  );
}

/* ── Trade Tab ─────────────────────────────────────────────────*/
function TradeTab({ roster, league }) {
  const [givePlayers, setGivePlayers] = useState([]);
  const [recvPlayers, setRecvPlayers] = useState([]);
  const [mlbDir,      setMlbDir]      = useState([]);
  const [dirLoading,  setDirLoading]  = useState(false);
  const [dirLoaded,   setDirLoaded]   = useState(false);
  const [dirError,    setDirError]    = useState(null);

  const { positionNeeds, categoryNeeds } = useMemo(() =>
    roster ? analyzeNeeds(roster) : { positionNeeds:[], categoryNeeds:[] },
  [roster]);

  const giveNames = useMemo(() => new Set(givePlayers.map(p => p.name)), [givePlayers]);
  const recvNames = useMemo(() => new Set(recvPlayers.map(p => p.name)), [recvPlayers]);
  // Exclude players already on either side from searches
  const allTradeNames = useMemo(() => new Set([...giveNames, ...recvNames]), [giveNames, recvNames]);

  const addGive   = (p) => setGivePlayers(prev => prev.some(x=>x.name===p.name) ? prev : [p,...prev]);
  const addRecv   = (p) => setRecvPlayers(prev => prev.some(x=>x.name===p.name) ? prev : [p,...prev]);
  const removeGive = (id) => setGivePlayers(p => p.filter(x=>x.id!==id));
  const removeRecv = (id) => setRecvPlayers(p => p.filter(x=>x.id!==id));

  const loadDirectory = async () => {
    setDirLoading(true); setDirError(null);
    try {
      const players = await fetchMLBDirectory();
      setMlbDir(players);
      setDirLoaded(true);
    } catch(e) {
      setDirError("Could not reach MLB Stats API. Check your connection and try again.");
    } finally {
      setDirLoading(false);
    }
  };

  // Also allow adding from current roster
  const rosterDir = useMemo(() => {
    if (!roster) return [];
    return roster.all.map(p => ({
      ...p,
      id: `roster-${p.id}`,
      mlbId: p.id,
      eligible: p.eligible || p.pos,
    }));
  }, [roster]);

  const fullDir = useMemo(() => {
    const combined = [...mlbDir, ...rosterDir.filter(r => !mlbDir.some(m => m.name === r.name))];
    return combined;
  }, [mlbDir, rosterDir]);

  const canAnalyze = givePlayers.length > 0 && recvPlayers.length > 0;

  // Totals for side-by-side summary
  const giveTotal = givePlayers.reduce((s,p) => s+(p.fpAvg||0), 0);
  const recvTotal = recvPlayers.reduce((s,p) => s+(p.fpAvg||0), 0);
  const giveDsTotal = givePlayers.reduce((s,p) => s+dynastyScore(p), 0);
  const recvDsTotal = recvPlayers.reduce((s,p) => s+dynastyScore(p), 0);

  return (
    <div className="space-y-5">

      {/* Directory loader */}
      {!dirLoaded && (
        <div className="bg-blue-50 border-2 border-dashed border-blue-200 rounded-xl p-5 flex items-center justify-between gap-4 flex-wrap">
          <div>
            <h3 className="font-bold text-gray-800 text-sm">🌐 Load Player Directory for Trade Search</h3>
            <p className="text-xs text-gray-500 mt-0.5">
              Pulls live MLB + AAA stats so you can search any player by name on either side of the trade.
              {roster && " Your current roster players are already available without loading."}
            </p>
            {dirError && <p className="text-xs text-red-600 mt-1">⚠ {dirError}</p>}
          </div>
          <div className="flex gap-3 flex-wrap">
            <button onClick={loadDirectory} disabled={dirLoading}
              className={`text-sm font-semibold px-5 py-2 rounded-lg transition-colors shrink-0 ${dirLoading?"bg-gray-300 text-gray-500 cursor-not-allowed":"bg-blue-600 hover:bg-blue-700 text-white"}`}>
              {dirLoading ? "⏳ Loading…" : "⬇ Load Players"}
            </button>
            {roster && !dirLoaded && (
              <p className="text-xs text-green-700 bg-green-50 border border-green-200 rounded-lg px-3 py-2 self-center">
                ✓ Your {roster.all.length} roster players are searchable now
              </p>
            )}
          </div>
        </div>
      )}
      {dirLoaded && (
        <div className="bg-green-50 border border-green-200 rounded-xl px-4 py-2.5 flex items-center justify-between">
          <p className="text-xs text-green-700 font-semibold">✓ Directory loaded — {mlbDir.length.toLocaleString()} MLB + AAA players searchable</p>
          <button onClick={loadDirectory} disabled={dirLoading} className="text-xs text-green-600 hover:underline">{dirLoading?"Refreshing…":"Refresh"}</button>
        </div>
      )}

      {/* ── Trade Builder ── */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-5">

        {/* YOU GIVE */}
        <div className="bg-slate-50 rounded-2xl border-2 border-slate-200 p-5">
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-2">
              <span className="text-lg">📤</span>
              <div>
                <h3 className="font-black text-sm text-slate-800">You Give</h3>
                <p className="text-xs text-slate-400">{givePlayers.length} player{givePlayers.length!==1?"s":""}</p>
              </div>
            </div>
            {givePlayers.length > 0 && (
              <div className="text-right text-xs">
                <div className="text-slate-400">Total</div>
                <div className="font-black text-slate-700">{giveTotal.toFixed(1)} pts/gm</div>
                <div className="text-slate-400">Dyn: {giveDsTotal}</div>
              </div>
            )}
          </div>
          <div className="mb-3">
            <TradeSearch
              dir={fullDir}
              excludedNames={allTradeNames}
              onAdd={addGive}
              placeholder={fullDir.length ? "Search player to trade away…" : "Load directory above to search…"}/>
          </div>
          {givePlayers.length === 0 ? (
            <div className="text-center py-8 border-2 border-dashed border-slate-200 rounded-xl">
              <p className="text-xs text-slate-400">Search and add players you're trading away</p>
            </div>
          ) : (
            <div className="space-y-2.5">
              {givePlayers.map(p => <TradePlayerCard key={p.id} player={p} onRemove={()=>removeGive(p.id)}/>)}
            </div>
          )}
        </div>

        {/* YOU RECEIVE */}
        <div className="bg-blue-50 rounded-2xl border-2 border-blue-200 p-5">
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-2">
              <span className="text-lg">📥</span>
              <div>
                <h3 className="font-black text-sm text-blue-800">You Receive</h3>
                <p className="text-xs text-blue-400">{recvPlayers.length} player{recvPlayers.length!==1?"s":""}</p>
              </div>
            </div>
            {recvPlayers.length > 0 && (
              <div className="text-right text-xs">
                <div className="text-blue-400">Total</div>
                <div className="font-black text-blue-700">{recvTotal.toFixed(1)} pts/gm</div>
                <div className="text-blue-400">Dyn: {recvDsTotal}</div>
              </div>
            )}
          </div>
          <div className="mb-3">
            <TradeSearch
              dir={fullDir}
              excludedNames={allTradeNames}
              onAdd={addRecv}
              placeholder={fullDir.length ? "Search player to receive…" : "Load directory above to search…"}/>
          </div>
          {recvPlayers.length === 0 ? (
            <div className="text-center py-8 border-2 border-dashed border-blue-200 rounded-xl">
              <p className="text-xs text-blue-400">Search and add players you're receiving</p>
            </div>
          ) : (
            <div className="space-y-2.5">
              {recvPlayers.map(p => <TradePlayerCard key={p.id} player={p} onRemove={()=>removeRecv(p.id)}/>)}
            </div>
          )}
        </div>

      </div>

      {/* Reset */}
      {(givePlayers.length > 0 || recvPlayers.length > 0) && (
        <div className="flex justify-end">
          <button onClick={() => { setGivePlayers([]); setRecvPlayers([]); }}
            className="text-xs text-gray-400 hover:text-red-400 transition-colors">
            ✕ Reset trade
          </button>
        </div>
      )}

      {/* ── Analysis ── */}
      {canAnalyze ? (
        <div>
          <div className="flex items-center gap-2 mb-3">
            <h3 className="font-bold text-gray-800 text-sm">⚖️ Trade Analysis</h3>
            <span className="text-xs text-gray-400">Dynasty weights: Dynasty 45% · Production 40% · Position 15%</span>
          </div>
          <TradeAnalysisPanel
            givePlayers={givePlayers}
            recvPlayers={recvPlayers}
            roster={roster}
            positionNeeds={positionNeeds}
            categoryNeeds={categoryNeeds}
          />
        </div>
      ) : (
        givePlayers.length > 0 || recvPlayers.length > 0 ? (
          <div className="bg-white rounded-xl shadow p-8 text-center border-2 border-dashed border-gray-200">
            <div className="text-3xl mb-2">⚖️</div>
            <p className="text-gray-500 text-sm font-semibold">Add players to both sides to see the analysis</p>
            <p className="text-gray-400 text-xs mt-1">You need at least one player on each side</p>
          </div>
        ) : null
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   ROOT APP
   ═══════════════════════════════════════════════════════════════ */
function App() {
  const [roster,       setRoster]       = useState(null);
  const [tab,          setTab]          = useState("fa");
  const [dragOver,     setDragOver]     = useState(false);
  const [error,        setError]        = useState(null);
  const [rosterFilter, setRosterFilter] = useState("all");
  const [showSettings, setShowSettings] = useState(false);
  const [league,       setLeague]       = useState(DEFAULT_LEAGUE);
  const [filename,     setFilename]     = useState(null);
  const [importDate,   setImportDate]   = useState(null);
  const fileRef = useRef();

  const handleFile = useCallback((file) => {
    if (!file) return;
    if (!file.name.endsWith(".csv")) { setError("Please upload a Fantrax Team Roster .csv file."); return; }
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const parsed = parseFantraxCSV(e.target.result);
        if (parsed.all.length===0) throw new Error(`No players found (${parsed.hitters.length} hitters, ${parsed.pitchers.length} pitchers detected). Make sure you're using a Fantrax Team Roster CSV export — go to My Team → Roster, scroll to the bottom, and click Export → CSV.`);
        setRoster(parsed);
        setFilename(file.name);
        setImportDate(new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}));
        setError(null); setTab("suggestions");
      } catch(err) { setError(err.message); }
    };
    reader.readAsText(file);
  }, []);

  const onDrop = useCallback((e)=>{e.preventDefault();setDragOver(false);handleFile(e.dataTransfer.files[0]);},[handleFile]);

  const suggestions = useMemo(()=>roster?generateSuggestions(roster.hitters,roster.pitchers):[],[roster]);

  const counts = useMemo(()=>{
    if (!roster) return {};
    const a=roster.all;
    return { total:a.length, active:a.filter(p=>p.status==="Act").length, reserve:a.filter(p=>p.status==="Res").length, ir:a.filter(p=>p.status==="IR").length, minors:a.filter(p=>p.status==="Min").length,
      critical:suggestions.filter(s=>s.priority==="critical").length, high:suggestions.filter(s=>s.priority==="high").length };
  },[roster,suggestions]);

  /* ── DASHBOARD ── */
  const activeH = roster ? roster.all.filter(p=>p.status==="Act"&&p.type==="hitter") : [];
  const activeP = roster ? roster.all.filter(p=>p.status==="Act"&&p.type==="pitcher") : [];
  const filteredRoster = roster ? (rosterFilter==="all"?roster.all:roster.all.filter(p=>p.status===rosterFilter)) : [];
  const { positionNeeds } = roster ? analyzeNeeds(roster) : { positionNeeds: [] };
  const needCount = positionNeeds.filter(n=>n.severity==="critical").length;

  return (
    <div className="min-h-screen bg-slate-50 text-sm">
      {showSettings && <SettingsPanel league={league} onChange={setLeague} onClose={()=>setShowSettings(false)}/>}

      {/* Header */}
      <div className="bg-gradient-to-r from-slate-900 to-blue-900 text-white px-5 py-4 shadow-lg">
        <div className="max-w-6xl mx-auto flex items-center justify-between flex-wrap gap-3">
          <div className="flex items-center gap-3">
            <span className="text-2xl">⚾</span>
            <div>
              <h1 className="text-base font-black">{league.name}</h1>
              <p className="text-blue-300 text-xs">{league.scoring} · {league.platform}</p>
              {filename && <p className="text-slate-400 text-xs mt-0.5">📄 {filename} · {importDate}</p>}
            </div>
          </div>
          <div className="flex items-center gap-2 flex-wrap">
            {(counts.critical>0||counts.high>0) && (
              <span className="bg-red-500/20 border border-red-500/40 text-red-300 text-xs font-semibold px-3 py-1.5 rounded-lg">⚠ {counts.critical} critical · {counts.high} high</span>
            )}
            {needCount > 0 && (
              <span className="bg-orange-500/20 border border-orange-500/40 text-orange-300 text-xs font-semibold px-3 py-1.5 rounded-lg cursor-pointer" onClick={()=>setTab("fa")}>🔍 {needCount} position need{needCount!==1?"s":""}</span>
            )}
            <div className="text-right text-xs">
              <div className="text-slate-400">FAAB</div>
              <div className="text-white font-bold">${league.remainingFaab.toLocaleString()}</div>
            </div>
            <button onClick={()=>fileRef.current?.click()} className="bg-white/10 hover:bg-white/20 border border-white/20 text-white text-xs px-3 py-2 rounded-lg">{roster ? "↑ New CSV" : "↑ Import Roster CSV"}</button>
            <button onClick={()=>setShowSettings(true)} className="bg-white/10 hover:bg-white/20 border border-white/20 text-white text-xs px-3 py-2 rounded-lg">⚙</button>
            <input ref={fileRef} type="file" accept=".csv" className="hidden" onChange={e=>handleFile(e.target.files[0])}/>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div className="bg-white border-b shadow-sm sticky top-0 z-10">
        <div className="max-w-6xl mx-auto px-5 flex overflow-x-auto">
          {[
            ["suggestions", roster ? `🎯 Moves (${suggestions.length})` : "🎯 Moves"],
            ["active",      roster ? `🟢 Active (${counts.active})`    : "🟢 Active"],
            ["roster",      roster ? `👥 Roster (${counts.total})`     : "👥 Roster"],
            ["fa",          "🔍 FA Analyzer"],
            ["trade",       "⚖️ Trade"],
          ].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)}
              className={`px-5 py-3 font-medium border-b-2 whitespace-nowrap text-xs transition-colors ${tab===id?"border-blue-600 text-blue-700":"border-transparent text-gray-500 hover:text-gray-700"}`}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {/* CSV Upload Banner (shown when no roster loaded) */}
      {!roster && (
        <div className="bg-blue-50 border-b border-blue-200">
          <div className="max-w-6xl mx-auto px-5 py-3 flex items-center gap-4 flex-wrap">
            <div onDragOver={e=>{e.preventDefault();setDragOver(true)}} onDragLeave={()=>setDragOver(false)} onDrop={onDrop}
              onClick={()=>fileRef.current?.click()}
              className={`flex items-center gap-3 border-2 border-dashed rounded-xl px-5 py-2.5 cursor-pointer transition-all flex-1 min-w-[260px] ${dragOver?"border-blue-500 bg-blue-100":"border-blue-300 hover:border-blue-500 hover:bg-blue-100"}`}>
              <span className="text-2xl">{dragOver?"📂":"📁"}</span>
              <div>
                <p className="text-blue-800 font-semibold text-sm">Drop your Fantrax Team Roster CSV here</p>
                <p className="text-blue-500 text-xs">or click to browse — enables Moves, Active & Roster tabs</p>
              </div>
            </div>
            <div className="text-xs text-blue-600 leading-relaxed hidden sm:block">
              <p>In Fantrax: <strong>My Team → Roster</strong></p>
              <p>Scroll to bottom → <strong>Export → CSV</strong></p>
            </div>
            {error && <div className="bg-red-100 border border-red-300 text-red-700 rounded-lg px-4 py-2 text-xs">⚠ {error}</div>}
          </div>
        </div>
      )}

      <div className="max-w-6xl mx-auto px-5 py-6">

        {tab==="suggestions" && !roster && (
          <div className="flex flex-col items-center justify-center py-24 text-center">
            <div className="text-5xl mb-4">📁</div>
            <h2 className="text-xl font-bold text-gray-700 mb-2">Upload your roster to see move suggestions</h2>
            <p className="text-gray-400 text-sm max-w-sm">Use the bar above to import your Fantrax Team Roster CSV. The 🔍 FA Analyzer tab works right now without any upload.</p>
            <button onClick={()=>setTab("fa")} className="mt-6 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-6 py-2.5 rounded-xl transition-colors">Go to FA Analyzer →</button>
          </div>
        )}

        {tab==="suggestions" && roster && (
          <div>
            <div className="grid grid-cols-3 gap-4 mb-6">
              {[
                {label:"Critical moves",count:suggestions.filter(s=>s.priority==="critical").length,bar:"bg-red-500"},
                {label:"High priority", count:suggestions.filter(s=>s.priority==="high").length,    bar:"bg-orange-400"},
                {label:"Worth noting",  count:suggestions.filter(s=>["medium","low"].includes(s.priority)).length, bar:"bg-yellow-400"},
              ].map(({label,count,bar})=>(
                <div key={label} className="bg-white rounded-xl border shadow-sm p-4 text-center">
                  <div className={`text-3xl font-black ${count>0?"text-gray-800":"text-gray-300"}`}>{count}</div>
                  <div className="text-xs text-gray-500 mt-1">{label}</div>
                  {count>0&&<div className={`mt-2 h-1 rounded-full ${bar}`}/>}
                </div>
              ))}
            </div>
            {suggestions.length===0
              ? <div className="bg-green-50 border border-green-200 rounded-xl p-10 text-center"><div className="text-4xl mb-2">✅</div><p className="font-semibold text-green-800">Roster looks clean — no obvious moves this week.</p></div>
              : <div className="space-y-3">{suggestions.map(s=><SuggestionCard key={s.id} s={s}/>)}</div>
            }
            <div className="mt-6 bg-slate-800 text-white rounded-xl p-5">
              <h3 className="font-bold text-xs mb-3 uppercase tracking-wide">Week Limits</h3>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-xs text-slate-300">
                <div><span className="text-white font-semibold">Max Starts:</span> {league.maxStarts}/week</div>
                <div><span className="text-white font-semibold">Max Saves:</span> {league.maxSaves}/week</div>
                <div><span className="text-white font-semibold">Lineup Lock:</span> Monday</div>
                <div><span className="text-white font-semibold">FAAB Left:</span> ${league.remainingFaab.toLocaleString()}</div>
              </div>
            </div>
          </div>
        )}

        {tab==="active" && !roster && (
          <div className="flex flex-col items-center justify-center py-24 text-center">
            <div className="text-5xl mb-4">🟢</div>
            <h2 className="text-xl font-bold text-gray-700 mb-2">Upload your roster to see your active lineup</h2>
            <p className="text-gray-400 text-sm max-w-sm">Use the bar above to import your Fantrax Team Roster CSV.</p>
          </div>
        )}

        {tab==="active" && roster && (
          <div>
            <ActiveGroup title="⚡ Hitters"  players={activeH} type="hitter"  accentClass="text-amber-700 bg-amber-50 border-amber-100"/>
            <ActiveGroup title="🔵 Pitchers" players={activeP} type="pitcher" accentClass="text-indigo-700 bg-indigo-50 border-indigo-100"/>
          </div>
        )}

        {tab==="roster" && !roster && (
          <div className="flex flex-col items-center justify-center py-24 text-center">
            <div className="text-5xl mb-4">👥</div>
            <h2 className="text-xl font-bold text-gray-700 mb-2">Upload your roster to view all players</h2>
            <p className="text-gray-400 text-sm max-w-sm">Use the bar above to import your Fantrax Team Roster CSV.</p>
          </div>
        )}

        {tab==="roster" && roster && (
          <div>
            <div className="flex gap-2 mb-4 flex-wrap">
              {[["all",`All (${counts.total})`],["Act",`Active (${counts.active})`],["Res",`Reserve (${counts.reserve})`],["IR",`IR (${counts.ir})`],["Min",`Minors (${counts.minors})`]].map(([key,label])=>(
                <button key={key} onClick={()=>setRosterFilter(key)}
                  className={`px-4 py-1.5 rounded-full text-xs font-medium transition-colors ${rosterFilter===key?"bg-blue-600 text-white":"bg-white border border-gray-200 text-gray-600 hover:bg-gray-50"}`}>
                  {label}
                </button>
              ))}
            </div>
            <RosterTable players={filteredRoster} filter={rosterFilter}/>
          </div>
        )}

        {tab==="fa" && (
          <FaAnalyzerTab
            roster={roster}
            league={league}
            onFaabChange={v=>setLeague(l=>({...l,remainingFaab:v}))}
          />
        )}

        {tab==="trade" && (
          <TradeTab
            roster={roster}
            league={league}
          />
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
