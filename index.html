};

function getTxMeta(code) {
  return TX_META[code] || { label: code || "Update", emoji: "📋", severity: "info", color: "bg-gray-50 border-gray-200", text: "text-gray-700" };
}

function getTxAction(typeCode, playerPos) {
  if (typeCode === "IL")  return "Find a " + (playerPos || "position") + " replacement in FA";
  if (typeCode === "RH")  return "Activate from IL to your active roster";
  if (typeCode === "DFA") return "Player may be available as FA soon — check waivers";
  if (typeCode === "RL")  return "Prospect called up — consider stash or add";
  if (typeCode === "TR")  return "Team change — verify fantasy eligibility & role";
  return null;
}

function fmtNewsDate(d) {
  if (!d) return "";
  try {
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  } catch(e) { return ""; }
}

// RSS-to-JSON proxy (free, no key needed, handles CORS for any RSS feed)
var RSS2JSON = "https://api.rss2json.com/v1/api.json?rss_url=";

// Fantasy-relevant RSS feeds — each filtered to your roster players
var RSS_SOURCES = [
  { name: "Rotowire",        url: "https://www.rotowire.com/baseball/rss-player-news.php",  fantasy: true  },
  { name: "MLB.com",         url: "https://www.mlb.com/feeds/news/rss.xml",                 fantasy: false },
  { name: "CBS Sports",      url: "https://www.cbssports.com/rss/headlines/mlb/",           fantasy: false },
  { name: "Yahoo Sports",    url: "https://sports.yahoo.com/mlb/rss.xml",                  fantasy: false },
  { name: "Bleacher Report", url: "https://bleacherreport.com/mlb.rss",                    fantasy: false },
  { name: "NBC Sports",      url: "https://mlb.nbcsports.com/feed/",                       fantasy: false },
  { name: "FanGraphs",       url: "https://blogs.fangraphs.com/feed/",                     fantasy: true  },
];

// Verified MLB reporters & insiders on X — fetched via Nitter RSS proxy
// Only blue-check / verified accounts with real MLB news authority
var X_ACCOUNTS = [
  { handle: "Ken_Rosenthal",  label: "Ken Rosenthal"  },  // The Athletic
  { handle: "JonHeyman",      label: "Jon Heyman"      },  // NY Post / MLB insider
  { handle: "JeffPassan",     label: "Jeff Passan"     },  // ESPN MLB
  { handle: "BNightengale",   label: "Bob Nightengale" },  // USA Today
  { handle: "Feinsand",       label: "Mark Feinsand"   },  // MLB.com
  { handle: "BaseballAmerica",label: "Baseball America" }, // Prospects
  { handle: "MLBRumors",      label: "MLB Trade Rumors" }, // Aggregator
];
// Nitter is an open-source X frontend that exposes public RSS for verified accounts.
// Routed through rss2json for CORS. Falls back silently if the instance is unreachable.
var NITTER_BASE = "https://nitter.privacydev.net/";

var INJURY_REGEX = /injur|injured|il |i\.l\.|disabled list|strain|sprain|surgery|rehab|day-to-day|d-t-d|dtd|hamstring|oblique|concussion|fracture|soreness|inflammation|elbow|shoulder|wrist|back pain|placed on/i;
var RETURN_REGEX  = /reinstated|activated|returns from|cleared|off the il|off il/i;
var CALL_UP_REGEX = /recalled|called up|promoted|selected/i;

async function fetchPlayerNews(rosterPlayers) {
  var now   = new Date();
  var start = new Date(now.getTime() - 21 * 24 * 60 * 60 * 1000);

  function pad(n) { return String(n).padStart(2, "0"); }
  function isoDate(d) { return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate()); }

  // Build name→player lookup (lowercase keys)
  var rosterMap = {};
  for (var i = 0; i < rosterPlayers.length; i++) {
    rosterMap[rosterPlayers[i].name.toLowerCase()] = rosterPlayers[i];
  }
  var rNames = Object.keys(rosterMap);

  var newsItems = [];
  var seenKeys  = {};

  function addItem(item) {
    if (!item || !item.playerName) return;
    var key = item.playerName + "|" + item.source + "|" + item.headline.slice(0, 40);
    if (seenKeys[key]) return;
    seenKeys[key] = true;
    newsItems.push(item);
  }

  function findPlayer(text) {
    var t = text.toLowerCase();
    for (var r = 0; r < rNames.length; r++) {
      if (t.indexOf(rNames[r]) >= 0) return rosterMap[rNames[r]];
    }
    return null;
  }

  function classifyText(text) {
    if (INJURY_REGEX.test(text))  return { typeCode: "IL",   severity: "critical" };
    if (RETURN_REGEX.test(text))  return { typeCode: "RH",   severity: "positive" };
    if (CALL_UP_REGEX.test(text)) return { typeCode: "RL",   severity: "info"     };
    return                               { typeCode: "news", severity: "info"     };
  }

  // Player-scoped classifier: extract sentences mentioning the player before classifying,
  // so a multi-player headline (e.g. "Lindor exits; Vientos hits tiebreaker") doesn't bleed
  // Lindor's injury tag onto Vientos's card.
  function classifyTextForPlayer(text, playerName) {
    if (!playerName) return classifyText(text);
    var nl   = playerName.toLowerCase();
    var last = nl.split(" ").slice(-1)[0];
    var sentences = text.split(/[.!?]+/).filter(function(s) { return s.trim().length > 0; });
    var playerSentences = sentences.filter(function(s) {
      var sl = s.toLowerCase();
      return sl.indexOf(nl) >= 0 || (last.length >= 5 && sl.indexOf(last) >= 0);
    });
    if (playerSentences.length > 0) {
      return classifyText(playerSentences.join(". "));
    }
    return classifyText(text);
  }

  // ── 1. MLB Official Transactions (authoritative) ──────────────
  try {
    var txUrl  = MLB_API + "/transactions?startDate=" + isoDate(start) + "&endDate=" + isoDate(now) + "&sportId=1&limit=500";
    var txResp = await fetch(txUrl);
    if (txResp.ok) {
      var txList = (await txResp.json()).transactions || [];
      for (var t = 0; t < txList.length; t++) {
        var tx    = txList[t];
        var pName = tx.player && tx.player.fullName ? tx.player.fullName : null;
        if (!pName) continue;
        var rp = rosterMap[pName.toLowerCase()];
        if (!rp) continue;
        var typeCode = tx.typeCode || tx.typeCd || "?";
        var txDate   = tx.effectiveDate ? new Date(tx.effectiveDate) : (tx.date ? new Date(tx.date) : now);
        var meta     = getTxMeta(typeCode);
        addItem({
          id: "tx-" + (tx.id || Math.random()),
          date: txDate, playerName: pName, playerPos: rp.pos || "",
          typeCode: typeCode, source: "MLB Official",
          headline: meta.label + ": " + pName,
          detail:   tx.description || tx.notes || meta.label + " transaction",
          severity: meta.severity,
          action:   getTxAction(typeCode, rp.pos),
        });
      }
    }
  } catch(e) {}

  // ── 2. ESPN Direct API ────────────────────────────────────────
  try {
    var espnResp = await fetch("https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/news?limit=100");
    if (espnResp.ok) {
      var articles = (await espnResp.json()).articles || [];
      for (var a = 0; a < articles.length; a++) {
        var art  = articles[a];
        var hl   = art.headline || "";
        var desc = art.description || "";
        var rp2  = findPlayer(hl + " " + desc);
        if (!rp2) continue;
        var pubDate = art.published ? new Date(art.published) : now;
        if (now - pubDate > 21 * 24 * 60 * 60 * 1000) continue;
        var cls = classifyTextForPlayer(hl + " " + desc, rp2.name);
        var espnLink = (art.links && art.links.web && art.links.web.href) ? art.links.web.href : (art.url || null);
        addItem({
          id: "espn-" + (art.dataSourceIdentifier || Math.random()),
          date: pubDate, playerName: rp2.name, playerPos: rp2.pos || "",
          typeCode: cls.typeCode, source: "ESPN",
          headline: hl, detail: desc, link: espnLink,
          severity: cls.severity,
          action: cls.typeCode !== "news" ? getTxAction(cls.typeCode, rp2.pos) : null,
        });
      }
    }
  } catch(e) {}

  // ── 3. RSS Sources via rss2json ───────────────────────────────
  var rssPromises = RSS_SOURCES.map(function(src) {
    return fetch(RSS2JSON + encodeURIComponent(src.url) + "&count=100")
      .then(function(r) { return r.ok ? r.json() : { items: [] }; })
      .catch(function()  { return { items: [] }; })
      .then(function(data) { return { src: src, items: data.items || [] }; });
  });

  var rssResults = await Promise.all(rssPromises);

  for (var ri = 0; ri < rssResults.length; ri++) {
    var src   = rssResults[ri].src;
    var items = rssResults[ri].items;
    for (var ii = 0; ii < items.length; ii++) {
      var item    = items[ii];
      var title   = item.title || "";
      var content = item.description || item.content || "";
      var rp3     = findPlayer(title + " " + content);
      if (!rp3) continue;

      var itemDate = item.pubDate ? new Date(item.pubDate) : now;
      if (isNaN(itemDate.getTime())) itemDate = now;
      if (now - itemDate > 21 * 24 * 60 * 60 * 1000) continue;

      // Strip HTML tags from content for display
      var cleanContent = content.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim().slice(0, 300);
      var cls2 = classifyTextForPlayer(title + " " + content, rp3.name);

      addItem({
        id: src.name.toLowerCase() + "-" + (item.guid || item.link || Math.random()),
        date: itemDate, playerName: rp3.name, playerPos: rp3.pos || "",
        typeCode: cls2.typeCode, source: src.name,
        headline: title.replace(/<[^>]+>/g, "").trim(),
        detail:   cleanContent,
        link:     item.link || null,
        severity: cls2.severity,
        action:   cls2.typeCode !== "news" ? getTxAction(cls2.typeCode, rp3.pos) : null,
      });
    }
  }

  // ── 4. X (Twitter) — verified MLB reporters via Nitter RSS ──────
  var xPromises = X_ACCOUNTS.map(function(acct) {
    var nitterUrl = NITTER_BASE + acct.handle + "/rss";
    return fetch(RSS2JSON + encodeURIComponent(nitterUrl) + "&count=50")
      .then(function(r) { return r.ok ? r.json() : { items: [] }; })
      .catch(function()  { return { items: [] }; })
      .then(function(data) { return { acct: acct, items: data.items || [] }; });
  });

  var xResults = await Promise.all(xPromises);

  for (var xi = 0; xi < xResults.length; xi++) {
    var xAcct  = xResults[xi].acct;
    var xItems = xResults[xi].items;
    for (var xii = 0; xii < xItems.length; xii++) {
      var xItem    = xItems[xii];
      var xTitle   = (xItem.title || "").replace(/<[^>]+>/g, "").trim();
      var xContent = (xItem.description || xItem.content || "").replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim();
      var xRp      = findPlayer(xTitle + " " + xContent);
      if (!xRp) continue;
      var xDate = xItem.pubDate ? new Date(xItem.pubDate) : now;
      if (isNaN(xDate.getTime())) xDate = now;
      if (now - xDate > 21 * 24 * 60 * 60 * 1000) continue;
      var xCls = classifyTextForPlayer(xTitle + " " + xContent, xRp.name);
      var xLink = xItem.link ? xItem.link.replace(NITTER_BASE, "https://x.com/") : null;
      addItem({
        id: "x-" + xAcct.handle + "-" + (xItem.guid || xItem.link || Math.random()),
        date: xDate, playerName: xRp.name, playerPos: xRp.pos || "",
        typeCode: xCls.typeCode, source: "𝕏 " + xAcct.label,
        headline: xTitle.slice(0, 200),
        detail:   xContent.slice(0, 300),
        link:     xLink,
        severity: xCls.severity,
        action:   xCls.typeCode !== "news" ? getTxAction(xCls.typeCode, xRp.pos) : null,
      });
    }
  }

  // Sort: critical first, then by date descending
  newsItems.sort(function(a, b) {
    var order = { critical: 0, warning: 1, positive: 2, info: 3 };
    var sa = order[a.severity] !== undefined ? order[a.severity] : 9;
    var sb = order[b.severity] !== undefined ? order[b.severity] : 9;
    if (sa !== sb) return sa - sb;
    return b.date - a.date;
  });

  return newsItems;
}

function sourceColor(source) {
  if (source === "Rotowire")        return "bg-emerald-100 text-emerald-800";
  if (source === "ESPN")            return "bg-red-100 text-red-700";
  if (source === "MLB Official")    return "bg-blue-100 text-blue-800";
  if (source === "CBS Sports")      return "bg-yellow-100 text-yellow-800";
  if (source === "Yahoo Sports")    return "bg-purple-100 text-purple-800";
  if (source === "Bleacher Report") return "bg-orange-100 text-orange-800";
  if (source === "NBC Sports")      return "bg-sky-100 text-sky-800";
  if (source === "FanGraphs")       return "bg-teal-100 text-teal-800";
  if (source.indexOf("𝕏") >= 0) return "bg-gray-900 text-white";
  return "bg-gray-100 text-gray-700";
}

/* ── Highlight player name inside a text string ────────────────*/
function HighlightedText({ text, name }) {
  if (!text || !name) return <span>{text}</span>;
  var escapedName = name.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  var parts = text.split(new RegExp("(" + escapedName + ")", "gi"));
  return (
    <span>
      {parts.map(function(part, i) {
        var isMatch = part.toLowerCase() === name.toLowerCase();
        return isMatch
          ? <mark key={i} className="bg-yellow-200 text-yellow-900 font-bold rounded px-0.5 not-italic">{part}</mark>
          : <span key={i}>{part}</span>;
      })}
    </span>
  );
}

/* ── News Card (top-level, Babel-safe) ─────────────────────────*/
function NewsCard({ item }) {
  var meta = getTxMeta(item.typeCode);
  var dateStr = fmtNewsDate(item.date);
  var cardSafeLink = safeHref(item.link);
  return (
    <div className={"rounded-xl border p-4 " + meta.color}>
      <div className="flex items-start gap-2.5">
        <span className="text-lg shrink-0 mt-0.5">{meta.emoji}</span>
        <div className="min-w-0 flex-1">
          <div className="flex items-center gap-2 flex-wrap mb-1">
            <span className={"text-xs font-bold px-1.5 py-0.5 rounded-full " + posColor(item.playerPos || "OF")}>{item.playerPos || "—"}</span>
            <span className={"font-bold text-sm " + meta.text}>{item.playerName}</span>
            <span className={"text-xs px-2 py-0.5 rounded-full font-semibold border " + meta.color + " " + meta.text}>{meta.label}</span>
            <span className={"text-xs px-2 py-0.5 rounded-full font-semibold " + sourceColor(item.source)}>{item.source}</span>
            <span className="text-xs text-gray-400 ml-auto">{dateStr}</span>
          </div>

          {/* Headline — clickable if link exists */}
          {cardSafeLink ? (
            <a
              href={cardSafeLink}
              target="_blank"
              rel="noopener noreferrer"
              className={"text-xs font-semibold leading-snug hover:underline flex items-start gap-1 group " + meta.text}
            >
              <span className="flex-1"><HighlightedText text={item.headline} name={item.playerName}/></span>
              <span className="text-gray-400 group-hover:text-blue-500 shrink-0 mt-0.5" title="Open article">↗</span>
            </a>
          ) : (
            <p className="text-xs font-semibold text-gray-700 leading-snug">
              <HighlightedText text={item.headline} name={item.playerName}/>
            </p>
          )}

          {/* Description with player name highlighted */}
          {item.detail && item.detail !== item.headline && (
            <p className="text-xs text-gray-500 mt-1 leading-snug">
              <HighlightedText text={item.detail} name={item.playerName}/>
            </p>
          )}

          {item.action && (
            <p className={"text-xs font-semibold mt-2 " + meta.text}>→ {item.action}</p>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── Full News Tab ─────────────────────────────────────────────*/
function NewsTab({ roster, news, newsLoading, newsLoaded, newsError, onRefresh }) {
  const [filter, setFilter] = useState("all");

  var filtered = news;
  if (filter === "injuries") {
    filtered = news.filter(function(n) { return n.severity === "critical" || n.typeCode === "IL" || n.typeCode === "SB"; });
  } else if (filter === "transactions") {
    filtered = news.filter(function(n) { return n.typeCode !== "news" && n.source === "MLB Official"; });
  }

  var criticalCount = news.filter(function(n) { return n.severity === "critical"; }).length;

  if (!roster) {
    return (
      <div className="flex flex-col items-center justify-center py-24 text-center">
        <div className="text-5xl mb-4">📰</div>
        <h3 className="font-bold text-gray-700 text-lg mb-2">No roster loaded</h3>
        <p className="text-gray-400 text-sm max-w-xs">Upload your Fantrax roster CSV first — then we'll pull live news and injury updates for all your players.</p>
      </div>
    );
  }

  return (
    <div className="space-y-5">
      {/* Header card */}
      <div className="bg-white rounded-xl shadow p-5">
        <div className="flex items-center justify-between flex-wrap gap-3">
          <div>
            <h3 className="font-bold text-gray-800">Player News Feed</h3>
            <p className="text-xs text-gray-400 mt-0.5">Live updates from ESPN, 𝕏 insiders, Rotowire, MLB Official, CBS Sports, Yahoo Sports, Bleacher Report, NBC Sports & FanGraphs — filtered to your {roster.all.length} roster players.</p>
          </div>
          <div className="flex items-center gap-3">
            {criticalCount > 0 && (
              <span className="bg-red-100 text-red-700 text-xs font-bold px-3 py-1.5 rounded-full border border-red-200">
                🚑 {criticalCount} injury alert{criticalCount !== 1 ? "s" : ""}
              </span>
            )}
            <button
              onClick={onRefresh}
              disabled={newsLoading}
              className={"text-sm font-semibold px-4 py-2 rounded-lg transition-colors " + (newsLoading ? "bg-gray-200 text-gray-400 cursor-not-allowed" : "bg-blue-600 hover:bg-blue-700 text-white")}
            >
              {newsLoading ? "Loading..." : newsLoaded ? "Refresh" : "Load News"}
            </button>
          </div>
        </div>
        {newsError && <p className="text-xs text-red-500 mt-2">{newsError}</p>}
      </div>

      {/* Filter pills */}
      {newsLoaded && news.length > 0 && (
        <div className="flex gap-2 flex-wrap">
          {[["all","All"],["injuries","Injuries"],["transactions","Transactions"]].map(function(pair) {
            return (
              <button
                key={pair[0]}
                onClick={function() { setFilter(pair[0]); }}
                className={"text-xs font-semibold px-3 py-1.5 rounded-full border transition-colors " + (filter === pair[0] ? "bg-blue-600 text-white border-blue-600" : "bg-white text-gray-600 border-gray-200 hover:border-gray-400")}
              >
                {pair[1]}
              </button>
            );
          })}
        </div>
      )}

      {/* News items */}
      {!newsLoaded && !newsLoading && (
        <div className="bg-white rounded-xl shadow p-8 text-center">
          <div className="text-4xl mb-3">📡</div>
          <p className="text-gray-500 text-sm font-medium">Click "Load News" to fetch live updates for your roster</p>
          <p className="text-gray-400 text-xs mt-1">Pulls from ESPN, 𝕏 insiders (Rosenthal, Heyman, Passan & more), MLB Official, Rotowire & 6 other sources</p>
        </div>
      )}

      {newsLoading && (
        <div className="bg-white rounded-xl shadow p-8 text-center">
          <div className="text-gray-400 text-sm animate-pulse">Checking ESPN, 𝕏 verified reporters, Rotowire, CBS Sports & more for your {roster.all.length} players...</div>
        </div>
      )}

      {newsLoaded && filtered.length === 0 && (
        <div className="bg-white rounded-xl shadow p-8 text-center">
          <div className="text-3xl mb-2">✅</div>
          <p className="text-gray-500 text-sm font-medium">No {filter !== "all" ? filter + " " : ""}news in the last 21 days</p>
          <p className="text-gray-400 text-xs mt-1">All quiet — check back after the next game day.</p>
        </div>
      )}

      {newsLoaded && filtered.length > 0 && (
        <div className="space-y-3">
          {filtered.map(function(item) {
            return <NewsCard key={item.id} item={item} />;
          })}
        </div>
      )}
    </div>
  );
}

/* ── PLAYER SEARCH DROPDOWN ────────────────────────────────────*/
function PlayerSearch({ dir, ownedNames, onSelect, onEvaluate }) {
  const [query,  setQuery]  = useState("");
  const [open,   setOpen]   = useState(false);

  const results = useMemo(() => {
    if (!dir?.length || query.length < 2) return [];
    const q = query.toLowerCase();
    return dir
      .filter(p => p.name.toLowerCase().includes(q) && !(ownedNames||new Set()).has(p.name))
      .slice(0, 18);
  }, [query, dir, ownedNames]);

  const handleEvaluate = (p) => {
    onEvaluate({
      id: `fa-${Date.now()}-${p.mlbId}`,
      name: p.name, team: p.team, pos: p.pos,
      eligible: p.pos, type: p.type,
      age: p.age, isProspect: !!p.isProspect,
      status: "FA", gp: p.gp,
      fpAvg: p.fpAvg, fpTotal: p.fpTotal,
      hr: p.hr||0, sb: p.sb||0, rbi: p.rbi||0,
      r: p.r||0, bb: p.bb||0, so: p.so||0, h: p.h||0, ab: p.ab||0,
      ip: p.ip||0, era: p.era||0, k: p.k||0, sv: p.sv||0, hld: p.hld||0, qs: p.qs||0,
    });
    setQuery(""); setOpen(false);
  };

  return (
    <div className="relative">
      <input
        className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400"
        placeholder={dir?.length ? "Search player name — click ＋ Evaluate to analyze instantly…" : "Load player directory first ↑"}
        value={query}
        onChange={e => { setQuery(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        onBlur={() => setTimeout(() => setOpen(false), 200)}
      />
      {open && results.length > 0 && (
        <div className="absolute z-50 left-0 right-0 bg-white border border-gray-200 rounded-xl shadow-xl mt-1 max-h-80 overflow-y-auto">
          {results.map(p => (
            <div key={p.id} className="flex items-center border-b border-gray-100 last:border-0 hover:bg-gray-50 transition-colors">
              {/* Player info — click to fill form */}
              <button
                type="button"
                onMouseDown={() => { onSelect(p); setQuery(p.name); setOpen(false); }}
                className="flex-1 text-left px-4 py-2.5 flex items-center gap-3 min-w-0">
                <div className="min-w-0 flex-1">
                  <span className="font-semibold text-sm text-gray-900">{p.name}</span>
                  <span className="text-xs text-gray-400 ml-2">{p.team} · {p.pos}</span>
                  {p.isMinors && <span className="ml-1.5 text-xs bg-purple-100 text-purple-700 font-semibold px-1.5 py-0.5 rounded-full">AAA</span>}
                  {!p.isMinors && p.isProspect && <span className="ml-1.5 text-xs bg-emerald-100 text-emerald-700 font-semibold px-1.5 py-0.5 rounded-full">Prospect</span>}
                  <div className="text-xs text-gray-400 mt-0.5">
                    {p.type==="hitter"
                      ? `${p.fpAvg.toFixed(2)} pts/gm · ${p.gp} GP · ${p.hr} HR · ${p.sb} SB · ${p.rbi} RBI`
                      : `${p.fpAvg.toFixed(2)} pts/gm · ${p.gp} GP · ${p.ip?.toFixed ? p.ip.toFixed(1) : p.ip} IP · ${p.k} K · ${p.sv} SV`}
                  </div>
                </div>
              </button>
              {/* One-click evaluate button */}
              <button
                type="button"
                onMouseDown={() => handleEvaluate(p)}
                className="shrink-0 mr-3 bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold px-3 py-1.5 rounded-lg transition-colors whitespace-nowrap">
                + Evaluate
              </button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── FA ENTRY FORM ─────────────────────────────────────────────*/
function FaForm({ onAdd, mlbDir, ownedNames }) {
  const [f, setF] = useState({...EMPTY_FA});
  const [err, setErr] = useState(null);
  const set = (k,v) => setF(p=>({...p,[k]:v}));
  const isPitcher = ["SP","RP"].includes(f.pos);

  // Auto-fill form from a selected MLB directory player
  const selectPlayer = (p) => {
    setF({
      name: p.name, team: p.team !== "?" ? p.team : "", pos: p.pos,
      age:  p.age > 0 ? String(p.age) : "",
      gp:   String(p.gp  || ""),
      fpAvg:String(p.fpAvg != null ? p.fpAvg.toFixed(2) : ""),
      isProspect: !!p.isProspect,
      hr:  String(p.hr  || 0),
      sb:  String(p.sb  || 0),
      rbi: String(p.rbi || 0),
      ip:  String(p.ip  ? p.ip.toFixed(1) : ""),
      era: String(p.era || ""),
      k:   String(p.k   || 0),
      sv:  String(p.sv  || 0),
      qs:  String(p.qs  || 0),
    });
    setErr(null);
  };

  const handleAdd = () => {
    if (!f.name.trim()) { setErr("Player name is required."); return; }
    if (!f.age || isNaN(parseInt(f.age))) { setErr("Age couldn't be loaded automatically for this player — please type it in the Age field above."); return; }
    const fp = parseFloat(f.fpAvg)||0;
    onAdd({
      id: `fa-${Date.now()}`, name:f.name.trim(), team:f.team.trim()||"?", pos:f.pos,
      eligible: f.pos, type: isPitcher?"pitcher":"hitter",
      age: parseInt(f.age)||25, isProspect:f.isProspect, status:"FA",
      fpAvg:fp, fpTotal:fp*(parseInt(f.gp)||0), gp:parseInt(f.gp)||0,
      hr:parseInt(f.hr)||0, sb:parseInt(f.sb)||0, rbi:parseInt(f.rbi)||0,
      ip:parseFloat(f.ip)||0, era:parseFloat(f.era)||0,
      k:parseInt(f.k)||0, sv:parseInt(f.sv)||0, qs:parseInt(f.qs)||0,
    });
    setF({...EMPTY_FA}); setErr(null);
  };

  return (
    <div className="bg-white rounded-xl shadow p-5">
      <h3 className="font-bold text-gray-800 mb-1">Add Free Agent / Waiver Target</h3>
      <p className="text-xs text-gray-400 mb-4">
        {mlbDir?.length
          ? `🟢 Live directory loaded — ${mlbDir.length.toLocaleString()} players (MLB · AAA · AA · High-A · Low-A). Search below or fill manually.`
          : "Load the live directory above to auto-fill stats, or enter manually."}
      </p>

      {err && <div className="bg-red-50 border border-red-200 text-red-700 text-xs rounded-lg px-3 py-2 mb-3">{err}</div>}

      {/* Player search (replaces plain name input when directory loaded) */}
      <div className="mb-3">
        <label className="text-xs text-gray-500 block mb-1">Player Name *</label>
        {mlbDir?.length
          ? <PlayerSearch dir={mlbDir} ownedNames={ownedNames} onSelect={selectPlayer} onEvaluate={onAdd}/>
          : <input className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" placeholder="e.g. Jackson Holliday" value={f.name} onChange={e=>set("name",e.target.value)}/>
        }
        {/* After auto-fill, show the selected name as read-only badge */}
        {mlbDir?.length && f.name && (
          <div className="flex items-center gap-2 mt-1.5">
            <span className="text-xs text-gray-700 font-medium bg-gray-100 px-2 py-1 rounded-lg">{f.name} {f.team && `· ${f.team}`} {f.pos && `· ${f.pos}`}</span>
            <button onClick={()=>setF({...EMPTY_FA})} className="text-xs text-gray-400 hover:text-red-500">✕ clear</button>
          </div>
        )}
      </div>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
        {!mlbDir?.length && (
          <>
            <div><label className="text-xs text-gray-500 block mb-1">Team</label>
              <input className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" placeholder="BAL" value={f.team} onChange={e=>set("team",e.target.value)}/></div>
            <div><label className="text-xs text-gray-500 block mb-1">Position</label>
              <select className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" value={f.pos} onChange={e=>set("pos",e.target.value)}>
                {["C","1B","2B","3B","SS","OF","SP","RP"].map(p=><option key={p}>{p}</option>)}
              </select></div>

        {mlbDir?.length && (
          <div><label className="text-xs text-gray-500 block mb-1">Position (override)</label>
            <select className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" value={f.pos} onChange={e=>set("pos",e.target.value)}>
              {["C","1B","2B","3B","SS","OF","SP","RP"].map(p=><option key={p}>{p}</option>)}
            </select></div>
        )}
        <div><label className={`text-xs block mb-1 ${mlbDir?.length && !f.age && f.name ? "text-orange-500 font-semibold" : "text-gray-500"}`}>

        </label>
          <input type="number" min="18" max="45" className={`w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400 ${mlbDir?.length && !f.age && f.name ? "border-orange-300 bg-orange-50" : ""}`} placeholder="Enter age" value={f.age} onChange={e=>set("age",e.target.value)}/></div>
        <div><label className="text-xs text-gray-500 block mb-1">GP {mlbDir?.length && "(auto-filled)"}</label>

      {/* Hitter stats */}
      {!isPitcher && (
        <div className="grid grid-cols-3 md:grid-cols-6 gap-3 mb-4">
          {[["hr","HR"],["sb","SB"],["rbi","RBI"]].map(([k,l])=>(
            <div key={k}><label className="text-xs text-gray-500 block mb-1">{l}{mlbDir?.length?" (auto)":""}</label>
              <input type="number" min="0" className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" placeholder="0" value={f[k]} onChange={e=>set(k,e.target.value)}/></div>
          ))}
        </div>
      )}

      {/* Pitcher stats */}
      {isPitcher && (
        <div className="grid grid-cols-3 md:grid-cols-5 gap-3 mb-4">
          {[["ip","IP"],["era","ERA"],["k","K"],["sv","SV"],["qs","QS"]].map(([k,l])=>(
            <div key={k}><label className="text-xs text-gray-500 block mb-1">{l}{mlbDir?.length?" (auto)":""}</label>
              <input type="number" min="0" step={k==="era"||k==="ip"?"0.1":"1"} className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" placeholder="0" value={f[k]} onChange={e=>set(k,e.target.value)}/></div>
          ))}
        </div>
      )}

      <button onClick={handleAdd} className="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-6 py-2 rounded-lg transition-colors">
        + Evaluate Player
      </button>
    </div>
  );
}

function FaCard({ fa, roster, posNeeds, catNeeds, remainingFaab, onRemove, scoringFormat }) {
  const [open, setOpen] = useState(true);

  const { score: fitScore, breakdown } = faFitScore(fa, posNeeds, catNeeds, active, scoringFormat);
  const ds      = dynastyScore(fa);
  const verdict = faVerdict(fitScore, ds);
  const bid     = suggestedBid(fitScore, ds, remainingFaab);
  const tier    = ageTier(fa.age||25);

  const scoreBar = (score) => {
    const color = score>=70?"bg-green-500":score>=45?"bg-blue-500":score>=25?"bg-yellow-400":"bg-gray-300";
    return <div className="flex items-center gap-2"><div className="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden"><div className={`h-full rounded-full ${color}`} style={{width:`${score}%`}}/></div><span className="text-xs font-bold w-6">{score}</span></div>;

          <button onClick={e=>{e.stopPropagation();onRemove(fa.id);}} className="text-gray-300 hover:text-red-400 text-sm px-2">✕</button>

            <div className="space-y-3">
              {!roster && <div className="text-xs text-amber-600 bg-amber-50 border border-amber-200 rounded-lg px-3 py-1.5">⚠ Import your roster CSV for a personalized fit score</div>}
              <div>
                <div className="flex justify-between text-xs mb-1"><span className="text-gray-500 font-medium">Team Fit Score</span><span className="font-bold text-gray-700">{fitScore}/100</span></div>

/* ═══════════════════════════════════════════════════════════════
   RECOMMENDED MOVES CARD
   Auto-generates the best DROP → ADD pairs with FAAB bids.
   ═══════════════════════════════════════════════════════════════ */
function DropsAndClaimsCard({ importPool, roster, positionNeeds, categoryNeeds, remaining, scoringFormat }) {
  var moves = useMemo(function() {
    return recommendMoves(importPool, roster, positionNeeds, categoryNeeds, remaining, scoringFormat);
  }, [importPool, roster, positionNeeds, categoryNeeds, remaining, scoringFormat]);

  if (!moves || moves.length === 0) return null;

  return (
    <div className="bg-white rounded-xl shadow border border-emerald-100 overflow-hidden">
      <div className="px-5 py-4" style={{background:"linear-gradient(to right, #059669, #16a34a)"}}>
        <h3 className="font-bold text-white text-sm flex items-center gap-2">
          🎯 Recommended Moves
          <span className="text-xs font-normal px-2 py-0.5 rounded-full" style={{background:"rgba(255,255,255,0.2)"}}>{moves.length} move{moves.length !== 1 ? "s" : ""}</span>
        </h3>
        <p className="text-xs mt-0.5" style={{color:"#a7f3d0"}}>Best waiver claims ranked for your roster — with suggested drops and FAAB bids</p>
      </div>

      <div className="divide-y divide-gray-50">
        {moves.map(function(move, i) {
          var dsFA   = dynastyScore(move.fa);
          var dsDrop = dynastyScore(move.drop);
          var prodUp = move.fa.fpAvg > move.drop.fpAvg;
          var dynUp  = dsFA > dsDrop + 5;
          var bmkMap = move.drop.type === "hitter" ? BENCHMARKS.hitter : BENCHMARKS.pitcher;
          var bmk    = bmkMap[move.drop.pos] || (move.drop.type === "hitter" ? 2.5 : 8.0);
          var dropWeak = move.drop.fpAvg < bmk * 0.65;
          var dropOnIR = move.drop.status === "IR";
          var verdictColor = move.verdict === "Strong Add" ? "bg-green-100 text-green-700" : "bg-blue-100 text-blue-700";
          var budgetPct = remaining > 0 ? Math.round(move.bid / remaining * 100) : 0;

          return (
            <div key={i} className="px-5 py-4">
              <div className="flex items-start gap-4 flex-wrap">

                {/* Drop + Add rows */}
                <div className="flex-1 min-w-[200px]">
                  {/* Priority badge */}
                  {i === 0 && <div className="mb-2"><span className="text-xs font-bold text-emerald-700 bg-emerald-50 border border-emerald-200 px-2 py-0.5 rounded-full">⭐ Top Move</span></div>}

                  {/* DROP */}
                  <div className="flex items-center gap-2 flex-wrap mb-1.5">
                    <span className="text-xs font-bold uppercase tracking-wide text-red-500 bg-red-50 border border-red-100 px-2 py-0.5 rounded">DROP</span>
                    <span className="font-semibold text-gray-800 text-sm">{move.drop.name}</span>
                    <span className={"text-xs px-1.5 py-0.5 rounded-full font-bold " + posColor(move.drop.pos)}>{move.drop.pos}</span>
                    <span className="text-xs text-gray-400">{move.drop.team}</span>
                    {dropOnIR  && <span className="text-xs text-red-500 font-semibold">· on IL</span>}
                    {dropWeak && !dropOnIR && <span className="text-xs text-amber-600">· underperforming ({move.drop.fpAvg.toFixed(1)} FP/gm)</span>}
                  </div>

                  <div className="text-gray-300 text-xs ml-1 mb-1.5 leading-none">↓</div>

                  {/* ADD */}
                  <div className="flex items-center gap-2 flex-wrap mb-2.5">
                    <span className="text-xs font-bold uppercase tracking-wide text-emerald-600 bg-emerald-50 border border-emerald-100 px-2 py-0.5 rounded">ADD</span>
                    <span className="font-semibold text-gray-800 text-sm">{move.fa.name}</span>
                    <span className={"text-xs px-1.5 py-0.5 rounded-full font-bold " + posColor(move.fa.pos)}>{move.fa.pos}</span>
                    <span className="text-xs text-gray-400">{move.fa.team} · Age {move.fa.age}</span>
                    <span className={"text-xs font-semibold px-2 py-0.5 rounded-full " + verdictColor}>{move.verdict}</span>
                  </div>

                  {/* Reason chips */}
                  <div className="flex flex-wrap gap-1.5">
                    {prodUp && (
                      <span className="text-xs bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded-full border border-emerald-100">
                        ⬆ +{(move.fa.fpAvg - move.drop.fpAvg).toFixed(1)} FP/gm
                      </span>
                    )}
                    {dynUp && (
                      <span className="text-xs bg-purple-50 text-purple-700 px-2 py-0.5 rounded-full border border-purple-100">🏆 Better dynasty value</span>
                    )}
                    {move.fa.isProspect && (
                      <span className="text-xs bg-blue-50 text-blue-700 px-2 py-0.5 rounded-full border border-blue-100">📦 Dynasty stash</span>
                    )}
                    {move.fa.sv > 0 && (
                      <span className="text-xs bg-yellow-50 text-yellow-700 px-2 py-0.5 rounded-full border border-yellow-100">🔒 Saves</span>
                    )}
                    {move.fa.type === "hitter" && move.fa.hr > 3 && (
                      <span className="text-xs bg-amber-50 text-amber-700 px-2 py-0.5 rounded-full border border-amber-100">💪 HR power</span>
                    )}
                    {move.fa.type === "hitter" && move.fa.sb > 3 && (
                      <span className="text-xs bg-teal-50 text-teal-700 px-2 py-0.5 rounded-full border border-teal-100">🏃 SB upside</span>
                    )}
                    {positionNeeds.some(function(n) { return n.type === move.fa.type && eligibleFor(move.fa, n.pos); }) && (
                      <span className="text-xs bg-orange-50 text-orange-700 px-2 py-0.5 rounded-full border border-orange-100">📍 Fills position need</span>
                    )}
                  </div>
                </div>

                {/* FAAB bid tile */}
                <div className="text-center shrink-0 bg-slate-50 rounded-xl px-4 py-3 border border-slate-100 min-w-[88px]">
                  <div className="text-xs text-gray-400 mb-0.5">Bid</div>
                  <div className="text-2xl font-black text-slate-800">${move.bid}</div>
                  <div className="text-xs text-gray-400">{budgetPct > 0 ? budgetPct + "% budget" : "—"}</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   DROP ANALYZER
   User picks a player they're considering dropping.
   Shows top 5 FA replacements scored on short-term + long-term.
   ═══════════════════════════════════════════════════════════════ */
function DropAnalyzer({ roster, importPool, positionNeeds, categoryNeeds, remaining, scoringFormat }) {
  var [selectedId, setSelectedId]   = useState(null);
  var [view,       setView]         = useState("overall"); // "overall" | "short" | "long"

  if (!roster || !importPool || importPool.length === 0) return null;

  var rosterAll     = roster.all;
  var selectedPlayer = selectedId ? rosterAll.find(function(p) { return p.id === selectedId; }) : null;

  var replacements = useMemo(function() {
    if (!selectedPlayer) return [];
    return findReplacementsForDrop(selectedPlayer, importPool, positionNeeds, categoryNeeds, rosterAll, remaining, scoringFormat);
  }, [selectedPlayer, importPool, positionNeeds, categoryNeeds, rosterAll, remaining, scoringFormat]);

  var sortedReps = useMemo(function() {
    if (!replacements.length) return [];
    return replacements.slice().sort(function(a, b) {
      if (view === "short")   return b._shortTerm - a._shortTerm;
      if (view === "long")    return b._longTerm - a._longTerm;
      return b._combined - a._combined;
    });
  }, [replacements, view]);

  var hitters  = rosterAll.filter(function(p) { return p.type === "hitter"; }).sort(function(a,b) { return a.name.localeCompare(b.name); });
  var pitchers = rosterAll.filter(function(p) { return p.type === "pitcher"; }).sort(function(a,b) { return a.name.localeCompare(b.name); });

  return (
    <div className="bg-white rounded-xl shadow border border-indigo-100 overflow-hidden">
      <div className="px-5 py-4" style={{background:"linear-gradient(to right, #4f46e5, #7c3aed)"}}>
        <h3 className="font-bold text-white text-sm">🔍 Drop Analyzer</h3>
        <p className="text-xs mt-0.5" style={{color:"#c7d2fe"}}>Pick a player you're thinking of dropping — see the best FA replacements ranked by short &amp; long-term value</p>
      </div>

      <div className="p-5">
        {/* Selector */}
        <div className="mb-4">
          <label className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-1.5 block">Who are you considering dropping?</label>
          <select
            value={selectedId || ""}
            onChange={function(e) { setSelectedId(e.target.value || null); }}
            className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-400 bg-white text-gray-800">
            <option value="">— Select a roster player —</option>
            <optgroup label="Hitters">
              {hitters.map(function(p) {
                var bmk = BENCHMARKS.hitter[p.pos] || 2.5;
                var flag = p.fpAvg < bmk * 0.55 ? " ⚠" : "";
                return (
                  <option key={p.id} value={p.id}>
                    {p.name} ({p.pos}, {p.team}) · {p.fpAvg.toFixed(1)} FP/gm{flag}
                  </option>
                );
              })}
            </optgroup>
            <optgroup label="Pitchers">
              {pitchers.map(function(p) {
                var bmk = BENCHMARKS.pitcher[p.pos] || 8.0;
                var flag = p.fpAvg < bmk * 0.55 ? " ⚠" : "";
                return (
                  <option key={p.id} value={p.id}>
                    {p.name} ({p.pos}, {p.team}) · {p.fpAvg.toFixed(1)} FP/gm{flag}
                  </option>
                );
              })}
            </optgroup>
          </select>
        </div>

        {/* No results */}
        {selectedPlayer && sortedReps.length === 0 && (
          <p className="text-xs text-gray-400 text-center py-6">No matching free agents found in your imported pool for this player type.</p>
        )}

        {/* Results */}
        {selectedPlayer && sortedReps.length > 0 && (
          <div>
            {/* Dropped player summary */}
            <div className="bg-red-50 border border-red-100 rounded-xl px-4 py-3 mb-4 flex items-center gap-3 flex-wrap">
              <span className="text-xs font-bold uppercase text-red-500">Dropping</span>
              <span className="font-semibold text-gray-800">{selectedPlayer.name}</span>
              <span className={"text-xs px-1.5 py-0.5 rounded-full font-bold " + posColor(selectedPlayer.pos)}>{selectedPlayer.pos}</span>
              <span className="text-xs text-gray-500">{selectedPlayer.team} · {selectedPlayer.fpAvg.toFixed(1)} FP/gm · Dyn {dynastyScore(selectedPlayer)}</span>
            </div>

            {/* Sort toggle */}
            <div className="flex items-center gap-2 mb-3">
              <span className="text-xs text-gray-400 font-medium">Sort by:</span>
              {[["overall","Overall"],["short","Short-term"],["long","Long-term"]].map(function(tab) {
                return (
                  <button key={tab[0]} onClick={function() { setView(tab[0]); }}
                    className={"text-xs px-3 py-1 rounded-full font-semibold transition-colors " +
                      (view === tab[0] ? "bg-indigo-600 text-white" : "bg-gray-100 text-gray-500 hover:bg-gray-200")}>
                    {tab[1]}
                  </button>
                );
              })}
            </div>

            {/* FA replacement cards */}
            <div className="space-y-2">
              {sortedReps.map(function(fa, i) {
                var isTop = i === 0;
                var verdictColor = fa._verdict === "Strong Add" ? "bg-green-100 text-green-700"
                  : fa._verdict === "Consider"   ? "bg-blue-100 text-blue-700"
                  : "bg-gray-100 text-gray-600";
                var tier = ageTier(fa.age || 25);
                var shortBar = Math.round(fa._shortTerm);
                var longBar  = Math.round(fa._longTerm);
                var shortColor = shortBar >= 65 ? "bg-emerald-500" : shortBar >= 40 ? "bg-amber-400" : "bg-gray-300";
                var longColor  = longBar  >= 65 ? "bg-violet-500"  : longBar  >= 40 ? "bg-indigo-400" : "bg-gray-300";

                return (
                  <div key={fa.id || i} className={"rounded-xl border px-4 py-3 " + (isTop ? "border-indigo-200 bg-indigo-50" : "border-gray-100 bg-gray-50")}>
                    <div className="flex items-start gap-3">
                      <div className="flex-1 min-w-0">
                        {/* Header */}
                        <div className="flex items-center gap-2 flex-wrap mb-2">
                          {isTop && <span className="text-xs font-bold text-indigo-600 bg-white px-2 py-0.5 rounded-full border border-indigo-200">#1 Pick</span>}
                          <span className="font-semibold text-gray-800">{fa.name}</span>
                          <span className={"text-xs px-1.5 py-0.5 rounded-full font-bold " + posColor(fa.pos)}>{fa.pos}</span>
                          <span className="text-xs text-gray-400">{fa.team} · Age {fa.age}</span>
                          <span className={"text-xs font-semibold px-2 py-0.5 rounded-full " + verdictColor}>{fa._verdict}</span>
                        </div>

                        {/* Score bars */}
                        <div className="space-y-1.5 mb-2">
                          <div className="flex items-center gap-2">
                            <span className="text-xs text-gray-400 w-20 shrink-0">Short-term</span>
                            <div className="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden">
                              <div className={"h-full rounded-full " + shortColor} style={{width: shortBar + "%"}}/>
                            </div>
                            <span className="text-xs font-bold text-gray-700 w-6 text-right">{shortBar}</span>
                          </div>
                          <div className="flex items-center gap-2">
                            <span className="text-xs text-gray-400 w-20 shrink-0">Long-term</span>
                            <div className="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden">
                              <div className={"h-full rounded-full " + longColor} style={{width: longBar + "%"}}/>
                            </div>
                            <span className="text-xs font-bold text-gray-700 w-6 text-right">{longBar}</span>
                          </div>
                        </div>

                        {/* Detail chips */}
                        <div className="flex flex-wrap gap-1.5 text-xs">
                          <span className="bg-white border border-gray-200 text-gray-600 px-2 py-0.5 rounded-full">{fa.fpAvg.toFixed(1)} FP/gm</span>
                          <span className={"px-2 py-0.5 rounded-full border " + tier.color.replace("text-","text-")}>{tier.label}</span>
                          {fa.isProspect && <span className="bg-blue-50 text-blue-600 border border-blue-100 px-2 py-0.5 rounded-full">📦 Prospect</span>}
                          {fa.sv > 0     && <span className="bg-yellow-50 text-yellow-600 border border-yellow-100 px-2 py-0.5 rounded-full">🔒 Saves</span>}
                          {fa.type === "hitter" && fa.hr > 3 && <span className="bg-amber-50 text-amber-600 border border-amber-100 px-2 py-0.5 rounded-full">💪 HR</span>}
                          {fa.type === "hitter" && fa.sb > 3 && <span className="bg-teal-50 text-teal-600 border border-teal-100 px-2 py-0.5 rounded-full">🏃 SB</span>}
                          {fa.type === "pitcher" && fa.qs > 0 && <span className="bg-sky-50 text-sky-600 border border-sky-100 px-2 py-0.5 rounded-full">🎯 QS</span>}
                        </div>
                      </div>

                      {/* Bid tile */}
                      <div className="text-center shrink-0 bg-white rounded-xl px-3 py-2.5 border border-gray-100 min-w-[72px]">
                        <div className="text-xs text-gray-400 mb-0.5">Bid</div>
                        <div className="text-xl font-black text-slate-800">${fa._repBid}</div>
                        <div className="text-xs text-gray-400">{remaining > 0 ? Math.round(fa._repBid / remaining * 100) + "%" : "—"}</div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── FA TARGET PICKER (shown after CSV import) ─────────────────
   Shows curated picks from the import pool with selectable cards.
   User clicks "+ Evaluate" to add players to the full analysis.
   ─────────────────────────────────────────────────────────────*/
function ImportTargetPicker({ pool, roster, positionNeeds, categoryNeeds, remaining, addedIds, onAdd, onClear, onCompare }) {
  const [showBrowse, setShowBrowse] = useState(false);
  const [typeFilter, setTypeFilter] = useState("all");
  const [posFilter,  setPosFilter]  = useState("all");
  const [search,     setSearch]     = useState("");

  // Dynasty longevity label for a player
  // Smart groupings from the pool
  const winNow = pool
    .filter(p => !p.isMinors && p._fitScore >= 20 && (p.gp > 0 || p.fpAvg > 0))
    .slice(0, 4);

  const dynastyTargets = pool
    .filter(p => p.isMinors || p.isProspect || (p.age > 0 && p.age <= 24))
    .sort((a, b) => b._dynastyScore - a._dynastyScore)
    .slice(0, 4);

  const needFills = positionNeeds
    .filter(n => n.severity === "critical")
    .map(need => ({
      need,
      player: pool
        .filter(p => p.type === need.type && eligibleFor(p, need.pos) && !p.isMinors)
        .sort((a, b) => b._fitScore - a._fitScore)[0],
    }))
    .filter(x => x.player)
    .slice(0, 3);

  // Browse-all filtered list
  const browseList = useMemo(() => {
    let list = pool;
    if (typeFilter === "hitters")  list = list.filter(p => p.type === "hitter");
    if (typeFilter === "pitchers") list = list.filter(p => p.type === "pitcher");
    if (posFilter !== "all")       list = list.filter(p => eligibleFor(p, posFilter));
    if (search.length >= 2)        list = list.filter(p => p.name.toLowerCase().includes(search.toLowerCase()));
    return list.slice(0, 35);
  }, [pool, typeFilter, posFilter, search]);

  // Compact selectable player card
  function PickCard({ fa, reason }) {
    const isAdded  = addedIds.has(fa.id);
    const verdict  = faVerdict(fa._fitScore, fa._dynastyScore);
    const tier     = ageTier(fa.age || 25);
    const statsLine = fa.type === "hitter"
      ? [fa.fpAvg.toFixed(1)+" pts/gm", fa.gp+" GP",
         fa.hr  ? fa.hr+" HR"  : "",
         fa.sb  ? fa.sb+" SB"  : "",
         fa.rbi ? fa.rbi+" RBI": ""].filter(Boolean).join(" · ")
      : [fa.fpAvg.toFixed(1)+" pts/gm", fa.gp+" GP",
         fa.ip  ? (typeof fa.ip === "number" ? fa.ip.toFixed(1) : fa.ip)+" IP" : "",
         fa.k   ? fa.k+" K"   : "",
         fa.sv  ? fa.sv+" SV" : "",
         fa.qs  ? fa.qs+" QS" : ""].filter(Boolean).join(" · ");

    return (
      <div className={`rounded-xl border p-3.5 transition-all ${isAdded ? "border-green-300 bg-green-50" : "border-gray-100 bg-white shadow-sm hover:shadow-md"}`}>
        {/* Name row */}
        <div className="flex items-start justify-between gap-2 mb-2">
          <div className="min-w-0 flex-1">
            <div className="flex items-center gap-1.5 flex-wrap mb-0.5">
              <span className={`text-xs font-bold px-1.5 py-0.5 rounded-full shrink-0 ${posColor(fa.pos)}`}>{fa.pos}</span>
              <span className="font-bold text-gray-900 text-sm">{fa.name}</span>
              <span className="text-gray-400 text-xs">{fa.team}</span>
              {fa.isMinors && <span className="text-xs bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded-full font-semibold">AAA</span>}
              {!fa.isMinors && fa.isProspect && <span className="text-xs bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded-full font-semibold">Prospect</span>}
            </div>
            <div className="flex items-center gap-2 text-xs flex-wrap">
              <span className="text-gray-400">Age {fa.age || "?"}</span>
              <span className={`font-semibold ${tier.color}`}>{tier.label}</span>
              <span className="text-gray-300">·</span>
              <span className="text-gray-400 italic">{dynastyWindow(fa.age)}</span>
            </div>
          </div>
          <div className="flex flex-col gap-1 shrink-0">
            <button
              type="button"
              onClick={() => !isAdded && onAdd(fa)}
              className={`text-xs font-bold px-3 py-1.5 rounded-lg transition-colors whitespace-nowrap ${
                isAdded
                  ? "bg-green-100 text-green-700 cursor-default"
                  : "bg-blue-600 hover:bg-blue-700 text-white"
              }`}>
              {isAdded ? "✓ Added" : "+ Add"}
            </button>
            {onCompare && (
              <button
                type="button"
                onClick={function() { onCompare(fa); }}
                className="text-xs font-medium px-3 py-1.5 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-700 transition-colors whitespace-nowrap">
                🔍 Compare
              </button>
            )}
          </div>
        </div>
        {/* Scores row */}
        <div className="flex items-center gap-3 mb-1.5 flex-wrap">
          <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${verdict.color}`}>{verdict.emoji} {verdict.label}</span>
          <div className="flex items-center gap-1.5">
            <span className="text-xs text-gray-400">Fit</span>
            <div className="w-14 h-1.5 bg-gray-200 rounded-full overflow-hidden">
              <div className={`h-full rounded-full ${fa._fitScore>=70?"bg-green-500":fa._fitScore>=45?"bg-blue-500":fa._fitScore>=25?"bg-yellow-400":"bg-gray-300"}`} style={{width:`${fa._fitScore}%`}}/>
            </div>
            <span className="text-xs font-bold text-gray-700">{fa._fitScore}</span>
          </div>
          <div className="flex items-center gap-1.5">
            <span className="text-xs text-gray-400">Dynasty</span>
            <div className="w-14 h-1.5 bg-gray-200 rounded-full overflow-hidden">
              <div className={`h-full rounded-full ${fa._dynastyScore>=70?"bg-emerald-500":fa._dynastyScore>=45?"bg-indigo-400":"bg-gray-400"}`} style={{width:`${fa._dynastyScore}%`}}/>
            </div>
            <DynScoreTooltip player={fa} score={fa._dynastyScore} />
          </div>
          <Stars n={tier.stars}/>
        </div>
        {/* Stats + reason */}
        <div className="text-xs text-gray-400">{statsLine}</div>
        {reason && <div className="text-xs text-blue-600 font-medium mt-1.5 italic">{reason}</div>}
      </div>
    );
  }

  const strongAdds = pool.filter(p => p._verdict === "Strong Add").length;
  const consider   = pool.filter(p => p._verdict === "Consider").length;
  const stash      = pool.filter(p => p._verdict === "Dynasty Stash").length;
  const passCount  = pool.filter(p => p._verdict === "Pass").length;

  return (
    <div className="rounded-xl overflow-hidden shadow-lg border border-slate-200">

      {/* ── Header banner ── */}
      <div className="bg-gradient-to-r from-slate-900 to-blue-900 text-white px-5 py-5">
        <div className="flex items-start justify-between gap-3 mb-4">
          <div>
            <h3 className="font-black text-base">🎯 {pool.length} Free Agents Analyzed</h3>
            <p className="text-slate-300 text-xs mt-0.5">
              Ranked by fit with <strong className="text-white">your current roster</strong>, league rules, and dynasty longevity.
              Click <span className="bg-blue-600 text-white px-1.5 py-0.5 rounded text-xs font-semibold">+ Evaluate</span> on any player for a full breakdown.
            </p>
            {!roster && (
              <p className="text-amber-300 text-xs mt-1.5">⚠ Import your team roster CSV for personalized fit scores and positional need fills.</p>
            )}
          </div>
          <button onClick={onClear} className="text-xs text-slate-400 hover:text-red-300 transition-colors shrink-0 mt-1">✕ Clear</button>
        </div>
        <div className="grid grid-cols-4 gap-3 text-center text-xs">
          {[
            { label:"Strong Adds",   count:strongAdds, color:"text-green-400",  bg:"bg-green-900/40"  },
            { label:"Consider",      count:consider,   color:"text-blue-300",   bg:"bg-blue-900/40"   },
            { label:"Dynasty Stash", count:stash,      color:"text-indigo-300", bg:"bg-indigo-900/40" },
            { label:"Pass",          count:passCount,  color:"text-slate-500",  bg:"bg-slate-800/40"  },
          ].map(({ label, count, color, bg }) => (
            <div key={label} className={`${bg} rounded-xl py-2.5 border border-white/5`}>
              <div className={`text-2xl font-black ${color}`}>{count}</div>
              <div className="text-slate-400 text-xs mt-0.5">{label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ── Smart pick columns ── */}
      <div className="p-5 bg-slate-50">
        <div className="grid grid-cols-1 md:grid-cols-3 gap-5 mb-5">

          {/* WIN NOW */}
          <div>
            <div className="flex items-center gap-2 mb-3">
              <div className="w-8 h-8 rounded-xl bg-green-100 flex items-center justify-center text-base shrink-0">🏆</div>
              <div>
                <div className="font-black text-sm text-gray-800">Win Now</div>
                <div className="text-xs text-gray-400">Best immediate adds for this season</div>
              </div>
            </div>
            {winNow.length > 0 ? (
              <div className="space-y-2.5">
                {winNow.map((fa, i) => (
                  <PickCard key={fa.id} fa={fa} reason={
                    i===0 ? "Best overall fit for your current roster" :
                    i===1 ? "Strong secondary option" :
                    i===2 ? "Solid depth pickup" :
                    "Worth considering"
                  }/>
                ))}
              </div>
            ) : (
              <div className="text-xs text-gray-400 text-center py-6 border-2 border-dashed border-gray-200 rounded-xl">No active win-now options found.</div>
            )}
          </div>

          {/* DYNASTY STASH */}
          <div>
            <div className="flex items-center gap-2 mb-3">
              <div className="w-8 h-8 rounded-xl bg-indigo-100 flex items-center justify-center text-base shrink-0">📦</div>
              <div>
                <div className="font-black text-sm text-gray-800">Dynasty Stash</div>
                <div className="text-xs text-gray-400">Prospects &amp; long-term assets</div>
              </div>
            </div>
            {dynastyTargets.length > 0 ? (
              <div className="space-y-2.5">
                {dynastyTargets.map((fa) => {
                  const tier = ageTier(fa.age || 25);
                  return (
                    <PickCard key={fa.id} fa={fa} reason={
                      fa.isMinors          ? `${tier.label} — stash in minors while available` :
                      (fa.age||99) <= 22   ? "Elite prospect window — grab immediately" :
                      (fa.age||99) <= 25   ? "Prime upside years ahead — dynasty core" :
                      "Young asset, strong dynasty upside"
                    }/>
                  );
                })}
              </div>
            ) : (
              <div className="text-xs text-gray-400 text-center py-6 border-2 border-dashed border-gray-200 rounded-xl">No dynasty prospects in this pool.</div>
            )}
          </div>

          {/* FILL YOUR HOLES */}
          <div>
            <div className="flex items-center gap-2 mb-3">
              <div className="w-8 h-8 rounded-xl bg-red-100 flex items-center justify-center text-base shrink-0">🚨</div>
              <div>
                <div className="font-black text-sm text-gray-800">Fill Your Holes</div>
                <div className="text-xs text-gray-400">Addresses your critical needs</div>
              </div>
            </div>
            {needFills.length > 0 ? (
              <div className="space-y-2.5">
                {needFills.map(({ need, player }) => (
                  <PickCard key={player.id} fa={player}
                    reason={`Best available ${need.label} (${need.note})`}/>
                ))}
              </div>
            ) : (
              <div className="text-center py-6 border-2 border-dashed border-gray-200 rounded-xl">
                {roster
                  ? <p className="text-xs text-green-600 font-semibold">✅ No critical positional needs detected.</p>
                  : <p className="text-xs text-gray-400">Import your roster CSV<br/>to see need-specific picks.</p>
                }
              </div>
            )}
          </div>

        </div>

        {/* ── Browse All ── */}
        <div className="border-t border-gray-200 pt-4">
          <button
            type="button"
            onClick={() => setShowBrowse(v => !v)}
            className="flex items-center gap-2 text-sm font-semibold text-gray-600 hover:text-blue-600 transition-colors w-full mb-1">
            <span>{showBrowse ? "▲" : "▼"}</span>
            Browse All {pool.length} Free Agents
          </button>
          <p className="text-xs text-gray-400 mb-3">Search or filter the full list — every player is already ranked for your team.</p>

          {showBrowse && (
            <div>
              <div className="flex flex-wrap gap-2.5 mb-3">
                <input
                  className="flex-1 min-w-40 border rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:border-blue-400"
                  placeholder="Search by name…"
                  value={search}
                  onChange={e => setSearch(e.target.value)}/>
                <div className="flex gap-2">
                  {[["all","All"],["hitters","Hitters"],["pitchers","Pitchers"]].map(([k,l])=>(
                    <button key={k} type="button" onClick={() => setTypeFilter(k)}
                      className={`px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${typeFilter===k?"bg-blue-600 text-white":"bg-white border border-gray-200 text-gray-600 hover:bg-gray-50"}`}>
                      {l}
                    </button>
                  ))}
                </div>
                <select value={posFilter} onChange={e => setPosFilter(e.target.value)}
                  className="border rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:border-blue-400 bg-white">
                  {["all","C","1B","2B","3B","SS","OF","SP","RP"].map(p=>(
                    <option key={p} value={p}>{p==="all"?"All Positions":p}</option>
                  ))}
                </select>
              </div>
              <div className="space-y-2 max-h-[32rem] overflow-y-auto pr-1">
                {browseList.map(fa => <PickCard key={fa.id} fa={fa}/>)}
                {browseList.length === 0 && <p className="text-xs text-gray-400 text-center py-6">No players match.</p>}
                {browseList.length === 35 && (
                  <p className="text-xs text-gray-400 text-center py-2">Showing top 35 — use search to narrow down.</p>
                )}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── FA RESULTS — full evaluation list ─────────────────────────
   Shows detailed FaCard analysis for every player the user has
   clicked "+ Evaluate" on (from picker or from manual entry).
   ─────────────────────────────────────────────────────────────*/
/* ── SmartTargetCard — compact card used in Win Now / Dynasty Stash / Fill Your Holes ── */
function SmartTargetCard({ fa, rank, reason, onCompare }) {
  var tier    = ageTier(fa.age || 25);
  var verdict = faVerdict(fa._fitScore || 0, fa._dynastyScore || 0);
  return (
    <div className="rounded-lg border border-gray-100 bg-white shadow-sm hover:shadow-md transition-shadow p-3">
      {/* Name row */}
      <div className="flex items-start justify-between gap-2 mb-1.5">
        <div className="min-w-0 flex-1">
          <div className="flex items-center gap-1.5 flex-wrap mb-0.5">
            {rank && <span className="text-xs text-gray-300 font-bold">#{rank}</span>}
            <span className={"text-xs font-bold px-1.5 py-0.5 rounded-full shrink-0 " + posColor(fa.pos)}>{fa.pos}</span>
            <span className="font-bold text-gray-900 text-sm leading-tight">{fa.name}</span>
            <span className="text-gray-400 text-xs">{fa.team}</span>
            {fa.isMinors && <span className="text-xs bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded-full font-semibold">AAA</span>}
            {!fa.isMinors && fa.isProspect && <span className="text-xs bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded-full font-semibold">Prospect</span>}
          </div>
          <div className="flex items-center gap-2 text-xs">
            <span className="text-gray-400">Age {fa.age || "?"}</span>
            <span className={"font-semibold " + tier.color}>{tier.label}</span>
          </div>
        </div>
        <button
          type="button"
          onClick={function() { if (onCompare) onCompare(fa); }}
          className="shrink-0 text-xs font-bold px-2.5 py-1.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white transition-colors whitespace-nowrap">
          + Evaluate
        </button>
      </div>
      {/* Scores */}
      <div className="flex items-center gap-2 flex-wrap mb-1">
        <span className={"text-xs font-bold px-1.5 py-0.5 rounded-full " + verdict.color}>{verdict.emoji} {verdict.label}</span>
        <div className="flex items-center gap-1">
          <span className="text-xs text-gray-400">Fit</span>
          <div className="w-10 h-1.5 bg-gray-200 rounded-full overflow-hidden">
            <div className={"h-full rounded-full " + (fa._fitScore>=70?"bg-green-500":fa._fitScore>=45?"bg-blue-500":fa._fitScore>=25?"bg-yellow-400":"bg-gray-300")} style={{width:(fa._fitScore||0)+"%"}}/>
          </div>
          <span className="text-xs font-bold text-gray-700">{fa._fitScore || 0}</span>
        </div>
        <div className="flex items-center gap-1">
          <span className="text-xs text-gray-400">Dyn</span>
          <div className="w-10 h-1.5 bg-gray-200 rounded-full overflow-hidden">
            <div className={"h-full rounded-full " + (fa._dynastyScore>=70?"bg-emerald-500":fa._dynastyScore>=45?"bg-indigo-400":"bg-gray-400")} style={{width:(fa._dynastyScore||0)+"%"}}/>
          </div>
          <DynScoreTooltip player={fa} score={fa._dynastyScore || 0} />
        </div>
      </div>
      {reason && <div className="text-xs text-blue-600 italic">{reason}</div>}
    </div>
  );
}

/* ── FaVsRosterModal — full overlay comparison view ── */
function FaVsRosterModal({ faPlayer, roster, onClose }) {
  var [rosterPlayer, setRosterPlayer] = React.useState(null);
  var all     = (roster && roster.all) ? roster.all : [];
  var active  = all.filter(function(p) { return p.status === "Act"; });
  var reserve = all.filter(function(p) { return p.status === "Res"; });

  function prodScore(p) {
    if (!p) return 0;
    if (p.type === "pitcher") {
      var s = 50;
      if (p.era > 0) s += Math.max(-25, Math.min(25, (4.00 - p.era) * 8));
      if (p.fpAvg > 0) s += Math.min(25, p.fpAvg * 1.5);
      return Math.max(0, Math.min(100, s));
    }
    var s2 = 50;
    if (p.fpAvg > 0) s2 += Math.min(25, p.fpAvg * 2);
    if (p.hr > 0)    s2 += Math.min(10, p.hr / 3);
    if (p.sb > 0)    s2 += Math.min(10, p.sb / 2);
    return Math.max(0, Math.min(100, s2));
  }

  var fprod   = prodScore(faPlayer);
  var rprod   = prodScore(rosterPlayer);
  var fds     = faPlayer     ? dynastyScore(faPlayer)     : 0;
  var rds     = rosterPlayer ? dynastyScore(rosterPlayer) : 0;
  var prodAdv = fprod - rprod;
  var dsAdv   = fds   - rds;
  var overall = prodAdv * 0.55 + dsAdv * 0.45;

  function getVerdict() {
    if (!rosterPlayer) return null;
    if (overall >= 20)  return { label: "Clear Upgrade — Add the FA", emoji: "🔥", color: "bg-green-100 text-green-800 border-green-300",    desc: "The free agent is a significant improvement. Make this move." };
    if (overall >= 8)   return { label: "Slight Upgrade", emoji: "✅", color: "bg-emerald-50 text-emerald-700 border-emerald-200", desc: "Lean toward adding the FA. There's a modest gain — weigh your FAAB budget." };
    if (overall >= -8)  return { label: "Too Close to Call", emoji: "⚖️", color: "bg-amber-50 text-amber-700 border-amber-200",     desc: "Nearly identical value. Factor in positional fit, upcoming schedule, and cost." };
    if (overall >= -20) return { label: "Keep Your Player", emoji: "🛡️", color: "bg-orange-50 text-orange-700 border-orange-200",  desc: "Your current player has the edge. Hold unless you have a specific reason." };
    return               { label: "Don't Make This Move", emoji: "❌", color: "bg-red-50 text-red-700 border-red-200",            desc: "Your roster player is clearly better. Pass on this FA." };
  }

  function getPosWarn() {
    if (!rosterPlayer || !faPlayer) return null;
    var rPos = rosterPlayer.pos;
    var faEligible = (faPlayer.eligible || faPlayer.pos || "").split(",").map(function(s) { return s.trim(); });
    if (rPos && faEligible.indexOf(rPos) < 0) {
      return faPlayer.name + " isn't eligible at " + rPos + ". Check roster flexibility before swapping.";
    }
    return null;
  }

  var v    = getVerdict();
  var warn = getPosWarn();
  var fTier = ageTier(faPlayer.age || 25);
  var rTier = rosterPlayer ? ageTier(rosterPlayer.age || 25) : null;
  var fds2  = dynastyScore(faPlayer);

  function statBlock(p, side) {
    if (!p) return null;
    var isHitter = p.type !== "pitcher";
    var ds = dynastyScore(p);
    var dStars = ds >= 75 ? "★★★★★" : ds >= 60 ? "★★★★" : ds >= 45 ? "★★★" : ds >= 30 ? "★★" : "★";
    var bg = side === "fa" ? "bg-blue-50 border-blue-200" : "bg-slate-50 border-slate-200";
    var hdr = side === "fa" ? "text-blue-700" : "text-slate-700";
    var tier = side === "fa" ? fTier : rTier;
    return (
      <div className={"flex-1 rounded-xl border p-4 " + bg}>
        <div className="flex items-start justify-between mb-2">
          <div>
            <div className="text-xs text-gray-400 font-medium mb-0.5">{side === "fa" ? "FREE AGENT" : "YOUR PLAYER"}</div>
            <div className={"font-black text-base leading-tight " + hdr}>{p.name}</div>
            <div className="flex items-center gap-1.5 mt-0.5 flex-wrap">
              <span className={"text-xs font-bold px-1.5 py-0.5 rounded " + posColor(p.pos)}>{p.pos}</span>
              <span className="text-xs text-gray-400">{p.team}</span>
              {p.age > 0 && <span className="text-xs text-gray-400">Age {p.age}</span>}
              {tier && <span className={"text-xs font-semibold " + tier.color}>{tier.label}</span>}
            </div>
          </div>
          <div className="text-right shrink-0">
            <div className="text-yellow-500 text-sm tracking-tight">{dStars}</div>
            <div className="text-xs text-gray-500 font-bold">DS {ds}</div>
          </div>
        </div>
        <div className="space-y-1 mt-2 text-xs">
          <div className="flex justify-between"><span className="text-gray-400">FP/Game</span><span className="font-bold text-gray-800">{p.fpAvg ? p.fpAvg.toFixed(1) : "0.0"}</span></div>
          <div className="flex justify-between"><span className="text-gray-400">Games</span><span className="font-bold text-gray-800">{p.gp || 0}</span></div>
          {isHitter ? (
            <div>
              {(p.hr  > 0) && <div className="flex justify-between"><span className="text-gray-400">HR</span><span className="font-bold text-gray-800">{p.hr}</span></div>}
              {(p.sb  > 0) && <div className="flex justify-between"><span className="text-gray-400">SB</span><span className="font-bold text-gray-800">{p.sb}</span></div>}
              {(p.rbi > 0) && <div className="flex justify-between"><span className="text-gray-400">RBI</span><span className="font-bold text-gray-800">{p.rbi}</span></div>}
            </div>
          ) : (
            <div>
              {(p.era > 0) && <div className="flex justify-between"><span className="text-gray-400">ERA</span><span className="font-bold text-gray-800">{p.era.toFixed(2)}</span></div>}
              {(p.k   > 0) && <div className="flex justify-between"><span className="text-gray-400">K</span><span className="font-bold text-gray-800">{p.k}</span></div>}
              {(p.sv  > 0) && <div className="flex justify-between"><span className="text-gray-400">SV</span><span className="font-bold text-gray-800">{p.sv}</span></div>}
              {(p.ip  > 0) && <div className="flex justify-between"><span className="text-gray-400">IP</span><span className="font-bold text-gray-800">{typeof p.ip === "number" ? p.ip.toFixed(1) : p.ip}</span></div>}
            </div>
          )}
        </div>
        {p.isMinors && <div className="mt-2 text-xs bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full inline-block font-semibold">AAA — Minors</div>}
        {!p.isMinors && p.isProspect && <div className="mt-2 text-xs bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full inline-block font-semibold">Top Prospect</div>}
      </div>
    );
  }

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:"rgba(0,0,0,0.6)"}}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
        {/* Header */}
        <div className="bg-gradient-to-r from-slate-900 to-blue-900 text-white px-6 py-4 rounded-t-2xl flex items-center justify-between">
          <div>
            <div className="font-black text-lg">🔍 FA vs Roster Comparison</div>
            <div className="text-slate-300 text-xs mt-0.5">Should you add <span className="text-white font-semibold">{faPlayer.name}</span>?</div>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-white text-2xl font-light leading-none transition-colors">×</button>
        </div>

        <div className="p-5 space-y-4">
          {/* Roster player selector */}
          <div>
            <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Compare against — pick one of your players</label>
            <select
              className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-400"
              value={rosterPlayer ? rosterPlayer.id : ""}
              onChange={function(e) {
                var id = e.target.value;
                var found = null;
                for (var i = 0; i < all.length; i++) { if (all[i].id === id) { found = all[i]; break; } }
                setRosterPlayer(found);
              }}>
              <option value="">— Select a roster player to compare —</option>
              {active.length > 0 && (
                <optgroup label="Active Roster">
                  {active.map(function(p) { return <option key={p.id} value={p.id}>{p.name} ({p.pos}) — Age {p.age || "?"}</option>; })}
                </optgroup>
              )}
              {reserve.length > 0 && (
                <optgroup label="Reserve / IL">
                  {reserve.map(function(p) { return <option key={p.id} value={p.id}>{p.name} ({p.pos}) — Age {p.age || "?"}</option>; })}
                </optgroup>
              )}
            </select>
            {all.length === 0 && (
              <p className="text-xs text-amber-600 mt-1">⚠ Import your roster CSV to enable comparisons against your actual players.</p>
            )}
          </div>

          {/* Side-by-side cards */}
          <div className="flex flex-col sm:flex-row gap-3">
            {statBlock(faPlayer, "fa")}
            {rosterPlayer ? statBlock(rosterPlayer, "roster") : (
              <div className="flex-1 rounded-xl border-2 border-dashed border-slate-200 flex items-center justify-center min-h-36">
                <span className="text-gray-300 text-sm text-center px-4">Select a roster player above to see the comparison</span>
              </div>
            )}
          </div>

          {/* Head-to-head stat table */}
          {rosterPlayer && (
            <CompareTable rp={rosterPlayer} fp={faPlayer} />
          )}

          {/* System verdict */}
          {v && (
            <div className={"rounded-xl border px-5 py-4 " + v.color}>
              <div className="font-black text-sm mb-1">{v.emoji} System Verdict: {v.label}</div>
              <div className="text-xs opacity-80 mb-2">{v.desc}</div>
              <div className="flex gap-4 text-xs opacity-70 flex-wrap">
                <span>Production edge: <strong>{prodAdv >= 0 ? "+" : ""}{prodAdv.toFixed(0)}</strong> ({prodAdv >= 0 ? "FA leads" : "Your player leads"})</span>
                <span>Dynasty edge: <strong>{dsAdv >= 0 ? "+" : ""}{dsAdv.toFixed(0)}</strong> ({dsAdv >= 0 ? "FA leads" : "Your player leads"})</span>
              </div>
              {warn && <div className="mt-2 text-xs font-semibold">⚠ {warn}</div>}
            </div>
          )}

          {/* Dynasty context for the FA */}
          <div className="bg-slate-50 rounded-xl p-4 text-xs text-gray-500 space-y-1">
            <div className="font-semibold text-gray-700 mb-1">Dynasty context for {faPlayer.name}</div>
            <div>Dynasty Score: <strong className="text-gray-800">{fds2}/100</strong> — {fds2 >= 70 ? "Elite dynasty asset" : fds2 >= 50 ? "Solid dynasty piece" : fds2 >= 30 ? "Moderate dynasty value" : "Low dynasty value"}</div>
            <div>Age window: <strong className="text-gray-800">{dynastyWindow(faPlayer.age)}</strong></div>
            {faPlayer._fitScore != null && <div>Team fit score: <strong className="text-gray-800">{faPlayer._fitScore}/100</strong></div>}
          </div>

          {/* Close button */}
          <div className="flex justify-end pt-1">
            <button onClick={onClose} className="px-5 py-2 rounded-xl bg-slate-100 hover:bg-slate-200 text-sm font-medium text-slate-700 transition-colors">Close</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function FaResults({ faPlayers, roster, positionNeeds, categoryNeeds, remaining, faFilter, posFilter, setFaFilter, setPosFilter, removeFa, scoringFormat }) {
  const [compareTarget, setCompareTarget] = React.useState(null);
  const active = roster ? roster.all.filter(p => p.status === "Act") : [];

  // Score every player (reuse pre-computed values from bulk import if present)
  const scored = useMemo(() => {
    return faPlayers.map(fa => {
      const fitScore = fa._fitScore    != null ? fa._fitScore    : faFitScore(fa, positionNeeds, categoryNeeds, active, scoringFormat).score;
      const ds       = fa._dynastyScore != null ? fa._dynastyScore : dynastyScore(fa);
      const verdict  = faVerdict(fitScore, ds);
      const combined = fitScore * 0.65 + ds * 0.35;
      return { ...fa, _fitScore: fitScore, _dynastyScore: ds, _verdict: verdict.label, _combined: combined };
    }).sort((a, b) => b._combined - a._combined);
  }, [faPlayers, positionNeeds, categoryNeeds, roster]);

  const bulkCount  = faPlayers.filter(p => p.fromImport).length;
  const strongAdds = scored.filter(p => p._verdict === "Strong Add").length;
  const consider   = scored.filter(p => p._verdict === "Consider").length;
  const stash      = scored.filter(p => p._verdict === "Dynasty Stash").length;
