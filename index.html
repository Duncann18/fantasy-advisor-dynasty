<script type="text/babel">
/* ═══════════════════════════════════════════════════════════════
   FANTASY ROSTER ADVISOR  — Dynasty Edition
   ───────────────────────────────────────────────────────────────
   HOW TO EDIT:
   • Open in any text editor → change values below → refresh browser
   • Or use the in-app ⚙ Settings panel (no code needed)
   ═══════════════════════════════════════════════════════════════ */

const { useState, useMemo, useRef, useCallback } = React;

/* ── LEAGUE CONFIG ─────────────────────────────────────────────
   Change these to match your league settings.
   ─────────────────────────────────────────────────────────────*/
const DEFAULT_LEAGUE = {
  name:          "Dynasty Field of Dreams S4",
  platform:      "Fantrax",
  scoring:       "H2H Points · Median (14 teams)",
  maxStarts:     10,         // max pitching starts per week
  maxSaves:      10,         // max saves per week
  totalFaab:     200,        // $200 season FAAB budget (Fantrax rules)
  remainingFaab: 200,        // ← update this each week as you spend
  activeSlots:   { C:1, "1B":1, "2B":1, "3B":1, SS:1, INF:1, OF:4, UT:2, SP:5, RP:1, P:3 },
  // Roster limits: 21 active / 28 reserve / 15 IR / 29 minors (min 10) / 50 total
  // Season: Mar 25 – Sep 27, 2026 · Playoffs: Period 25 (Sep 21–27)
  // FAAB bids processed: Sun, Mon, Wed at midnight EDT · Min bid $1
  // Trade deadline: Sep 27, 2026 · Lineup locks: Weekly every Monday
};

/* ── PERFORMANCE BENCHMARKS (avg pts/game) ─────────────────────
   Below 55% of these = flagged as underperforming.
   Raise numbers to be stricter; lower to be more lenient.
   ─────────────────────────────────────────────────────────────*/
const BENCHMARKS = {
  hitter:  { C:2.0, "1B":2.5, "2B":2.5, "3B":2.5, SS:2.5, OF:2.5, INF:2.5, UT:2.0 },
  pitcher: { SP:8.0, RP:3.5, P:8.0 },
};

/* ── DYNASTY AGE TIERS ─────────────────────────────────────────
   Used to compute long-term dynasty value for any player.
   ─────────────────────────────────────────────────────────────*/
const DYNASTY_AGE = [
  { max: 22, label: "Elite Prospect",  stars: 5, score: 50, color: "text-emerald-600",  badge: "bg-emerald-100 text-emerald-800" },
  { max: 25, label: "Prime Upside",    stars: 4, score: 38, color: "text-blue-600",     badge: "bg-blue-100 text-blue-800"      },
  { max: 27, label: "Peak Years",      stars: 3, score: 25, color: "text-indigo-600",   badge: "bg-indigo-100 text-indigo-800"  },
  { max: 30, label: "Declining Asset", stars: 2, score: 12, color: "text-yellow-600",   badge: "bg-yellow-100 text-yellow-800"  },
  { max: 99, label: "Rental/Win-Now",  stars: 1, score: 4,  color: "text-red-500",      badge: "bg-red-100 text-red-700"        },
];

const MIN_GP_HITTER  = 5;
const MIN_GP_PITCHER = 2;

/* ═══════════════════════════════════════════════════════════════
   CSV PARSING  (Fantrax "Team Roster" export)
   ═══════════════════════════════════════════════════════════════ */
function parseCSVLine(line) {
  const out = []; let cur = ""; let inQ = false;
  for (const ch of line) {
    if (ch === '"') inQ = !inQ;
    else if (ch === ',' && !inQ) { out.push(cur.trim()); cur = ""; }
    else cur += ch;
  }
  out.push(cur.trim());
  return out;
}
function col(cols, headers, key) {
  const i = headers.indexOf(key);
  return i >= 0 ? (cols[i] || "").replace(/"/g, "").trim() : "";
}

function parseFantraxCSV(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  const hitters = [], pitchers = [];
  let section = null, hHdr = null, pHdr = null;

  for (const line of lines) {
    const cols  = parseCSVLine(line);
    const clean = cols.map(c => c.replace(/"/g, "").trim());

    // Section header — "Hitting" or "Pitching" appears in any cell
    if (clean.some(c => c === "Hitting"))  { section = "hitting";  continue; }
    if (clean.some(c => c === "Pitching")) { section = "pitching"; continue; }

    // Column header row — first non-empty cell is "ID", or row has both "Player" and "Team"
    const firstVal = clean.find(c => c) || "";
    if (firstVal === "ID" || (clean.includes("Player") && clean.includes("Team"))) {
      if (section === "hitting")        hHdr = clean;
      else if (section === "pitching")  pHdr = clean;
      else                              { hHdr = clean; pHdr = clean; }
      continue;
    }

    if (!section || !clean[0]) continue;
    const hdr = section === "hitting" ? hHdr : pHdr;
    if (!hdr) continue;

    // col() — exact match by column name
    const g = k => col(cols, hdr, k);

    const base = {
      id:         clean[0],
      name:       g("Player"),
      team:       g("Team"),
      pos:        g("Pos"),
      eligible:   g("Eligible"),
      status:     g("Status"),
      age:        parseInt(g("Age"))                                    || 0,
      fpTotal:    parseFloat(g("Fantasy Points"))                       || 0,
      fpAvg:      parseFloat(g("Average Fantasy Points per Game"))      || 0,
      gp:         parseInt(g("GP"))                                     || 0,
      isProspect: false,
    };
    if (!base.name) continue;

    if (section === "hitting" && hHdr) {
      hitters.push({ ...base, type:"hitter",
        hr:  parseInt(g("HR"))  || 0,
        sb:  parseInt(g("SB"))  || 0,
        rbi: parseInt(g("RBI")) || 0,
        r:   parseInt(g("R"))   || 0,
        bb:  parseInt(g("BB"))  || 0,
        so:  parseInt(g("SO"))  || 0,
        h:   parseInt(g("H"))   || 0,
        ab:  parseInt(g("AB"))  || 0,
      });
    } else if (section === "pitching" && pHdr) {
      pitchers.push({ ...base, type:"pitcher",
        ip:  parseFloat(g("IP"))  || 0,
        era: parseFloat(g("ERA")) || 0,
        k:   parseInt(g("K"))     || 0,
        w:   parseInt(g("W"))     || 0,
        sv:  parseInt(g("SV"))    || 0,
        hld: parseInt(g("HLD"))   || 0,
        qs:  parseInt(g("QS"))    || 0,
      });
    }
  }

  return { hitters, pitchers, all:[...hitters,...pitchers] };
}

/* ── FANTRAX "Players → Free Agents" CSV parser ───────────────
   Different format from the roster export:
   • Flat list — no Hitting/Pitching section headers
   • Columns: ID, Player, Team, Position, RkOv, Status, Age,
              FPts, FP/G, Ros, +/-
   • Position is comma-separated eligible list ("2B,3B,SS,INF,OF")
   • Status can contain HTML snippets ("W <small>(Sat)</small>")
   • Minor leaguers appear as team = "(N/A)"
   • No per-stat columns (HR, SB, IP, etc.) — defaults 0
   ─────────────────────────────────────────────────────────────*/
function parseFantraxFACSV(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  if (lines.length < 2) return [];

  const headerCols = parseCSVLine(lines[0]).map(h => h.replace(/"/g, "").trim());
  const g = (rowCols, key) => col(rowCols, headerCols, key);

  const HITTER_POS = ["C","1B","2B","3B","SS","OF"];
  const players = [];

  for (let i = 1; i < lines.length; i++) {
    const rowCols = parseCSVLine(lines[i]);
    const name = g(rowCols, "Player");
    if (!name) continue;

    // Strip any inline HTML from Status (e.g. "W <small>(Sat)</small>")
    const rawStatus = g(rowCols, "Status").replace(/<[^>]+>/g, "").trim();

    const posStr  = g(rowCols, "Position") || g(rowCols, "Pos") || "";
    const posList = posStr.split(",").map(s => s.trim()).filter(Boolean);

    const isPitcher = posList.some(p => ["SP","RP","P"].includes(p));
    const primaryPos = isPitcher
      ? (posList.find(p => p === "SP") || posList.find(p => p === "RP") || "SP")
      : (HITTER_POS.find(hp => posList.includes(hp)) || posList[0] || "OF");

    const age      = parseInt(g(rowCols, "Age"))   || 0;
    const fpTotal  = parseFloat(g(rowCols, "FPts")) || 0;
    const fpAvg    = parseFloat(g(rowCols, "FP/G")) || 0;
    const gp       = (fpAvg > 0 && fpTotal > 0) ? Math.max(1, Math.round(fpTotal / fpAvg)) : 0;
    const rawId    = (g(rowCols, "ID") || name).replace(/\*/g, "").trim();
    const team     = g(rowCols, "Team") || "?";

    // Minor leaguers: Fantrax shows team as "(N/A)" for unsigned/MiLB players
    const isMinors   = team === "(N/A)" || rawStatus === "Min";
    const isProspect = isMinors || (age > 0 && age <= 23);

    players.push({
      id:         rawId || name,
      name,
      team:       isMinors ? "MiLB" : team,
      pos:        primaryPos,
      eligible:   posStr,
      status:     "FA",
      age, isProspect, isMinors,
      fpTotal, fpAvg, gp,
      type:       isPitcher ? "pitcher" : "hitter",
      // Detailed stats not in this export — leave at 0
      hr:0, sb:0, rbi:0, r:0, bb:0, so:0, h:0, ab:0,
      ip:0, era:0, k:0, w:0, sv:0, hld:0, qs:0,
    });
  }

  return players;
}

/* ═══════════════════════════════════════════════════════════════
   DYNASTY SCORING
   ═══════════════════════════════════════════════════════════════ */
function ageTier(age) {
  return DYNASTY_AGE.find(t => age <= t.max) || DYNASTY_AGE[DYNASTY_AGE.length-1];
}

function dynastyScore(player) {
  const tier    = ageTier(player.age || 25);
  const agePts  = tier.score;

  const bmkMap  = player.type === "hitter" ? BENCHMARKS.hitter : BENCHMARKS.pitcher;
  const bmk     = bmkMap[player.pos] || (player.type==="hitter" ? 2.5 : 8.0);
  const prodPts = Math.min(35, (player.fpAvg / bmk) * 20);

  const prosPts = player.isProspect ? 15 : 0;
  const savePts = (player.type === "pitcher" && player.sv > 0) ? 5 : 0;

  return Math.min(100, Math.round(agePts + prodPts + prosPts + savePts));
}

function Stars({ n, max = 5 }) {
  return (
    <span className="text-sm">
      {Array.from({length: max}).map((_,i) =>
        <span key={i} className={i < n ? "star-full" : "star-empty"}>★</span>
      )}
    </span>
  );
}

/* ═══════════════════════════════════════════════════════════════
   TEAM NEEDS ANALYSIS
   ═══════════════════════════════════════════════════════════════ */
function eligibleFor(player, slotPos) {
  const elig = player.eligible ? player.eligible.split(",").map(s=>s.trim()) : [player.pos];
  if (slotPos==="INF") return elig.some(e=>["1B","2B","3B","SS","C"].includes(e));
  if (slotPos==="UT")  return player.type==="hitter";
  if (slotPos==="P")   return player.type==="pitcher";
  return elig.includes(slotPos) || player.pos===slotPos;
}
function canFillSlot(candidate, activePlayer) {
  return candidate.type===activePlayer.type && eligibleFor(candidate, activePlayer.pos);
}

function analyzeNeeds(roster) {
  if (!roster) return { positionNeeds: [], categoryNeeds: [] };
  const { all, hitters, pitchers } = roster;
  const active = all.filter(p => p.status === "Act");
  const activeH = active.filter(p => p.type === "hitter");
  const activeP = active.filter(p => p.type === "pitcher");
  const needs = [];

  // Position needs
  const hPositions = ["C","1B","2B","3B","SS","OF"];
  for (const pos of hPositions) {
    const slot = activeH.filter(p => eligibleFor(p, pos));
    const avgAtPos = slot.length > 0 ? slot.reduce((t,p)=>t+p.fpAvg,0)/slot.length : 0;
    const bmk = BENCHMARKS.hitter[pos] || 2.5;
    if (avgAtPos < bmk * 0.7 || slot.length === 0) {
      needs.push({ pos, type:"hitter", label: pos, avgAtPos, bmk,
        severity: avgAtPos < bmk * 0.45 || slot.length===0 ? "critical" : "moderate",
        note: slot.length===0 ? "No eligible player" : `${avgAtPos.toFixed(1)}/gm avg`,
      });
    }
  }

  // Saves need
  const hasSaves = activeP.some(p => p.pos==="RP" && p.sv > 0);
  if (!hasSaves) needs.push({ pos:"RP", type:"pitcher", label:"Saves (RP)", avgAtPos:0, bmk:BENCHMARKS.pitcher.RP, severity:"critical", note:"No active closer" });

  // SP depth need
  const activeSPs = activeP.filter(p => p.pos==="SP" || p.pos==="P");
  const avgSP = activeSPs.length>0 ? activeSPs.reduce((t,p)=>t+p.fpAvg,0)/activeSPs.length : 0;
  if (avgSP < BENCHMARKS.pitcher.SP * 0.7) {
    needs.push({ pos:"SP", type:"pitcher", label:"Starting Pitching", avgAtPos:avgSP, bmk:BENCHMARKS.pitcher.SP, severity: avgSP < BENCHMARKS.pitcher.SP*0.45 ? "critical":"moderate", note:`${avgSP.toFixed(1)}/gm avg` });
  }

  // Category analysis (from actual stat rates)
  const catNeeds = [];
  const totalGP = activeH.reduce((t,p)=>t+p.gp,0)||1;
  const hrPer = activeH.reduce((t,p)=>t+p.hr,0)/totalGP;
  const sbPer = activeH.reduce((t,p)=>t+p.sb,0)/totalGP;
  const rbiPer= activeH.reduce((t,p)=>t+p.rbi,0)/totalGP;
  const bbPer = activeH.reduce((t,p)=>t+p.bb,0)/totalGP;

  if (hrPer  < 0.25) catNeeds.push({ cat:"HR Power",   rate:`${hrPer.toFixed(2)}/gm`,  severity:"high",   icon:"💥" });
  if (sbPer  < 0.15) catNeeds.push({ cat:"Speed/SB",   rate:`${sbPer.toFixed(2)}/gm`,  severity:"medium", icon:"⚡" });
  if (rbiPer < 0.50) catNeeds.push({ cat:"RBI",        rate:`${rbiPer.toFixed(2)}/gm`, severity:"medium", icon:"🏠" });
  if (bbPer  < 0.25) catNeeds.push({ cat:"BB / OBP",   rate:`${bbPer.toFixed(2)}/gm`,  severity:"low",    icon:"👁" });

  const ipTotal   = activeP.reduce((t,p)=>t+p.ip,0)||1;
  const kPer9     = (activeP.reduce((t,p)=>t+p.k,0)/ipTotal)*9;
  const totalSV   = activeP.reduce((t,p)=>t+p.sv,0);
  const totalQS   = activeP.reduce((t,p)=>t+p.qs,0);
  const totalStart= activeP.filter(p=>p.pos==="SP").reduce((t,p)=>t+p.gp,0)||1;

  if (kPer9    < 7.5) catNeeds.push({ cat:"Strikeouts", rate:`${kPer9.toFixed(1)} K/9`,      severity:"medium", icon:"🔥" });
  if (totalSV  < 2)   catNeeds.push({ cat:"Saves",      rate:`${totalSV} total`,              severity:"high",   icon:"🔒" });
  if (totalQS/totalStart < 0.35) catNeeds.push({ cat:"Quality Starts", rate:`${totalQS} QS`,  severity:"medium", icon:"🎯" });

  return { positionNeeds: needs, categoryNeeds: catNeeds };
}

/* ═══════════════════════════════════════════════════════════════
   FA FIT SCORING
   ═══════════════════════════════════════════════════════════════ */
function faFitScore(fa, posNeeds, catNeeds, active) {
  let score = 0;
  const breakdown = [];

  // 1. Position need fit (max 40)
  const filledNeeds = posNeeds.filter(n => n.type === fa.type && eligibleFor(fa, n.pos));
  if (filledNeeds.length > 0) {
    const topNeed = filledNeeds.sort((a,b) => a.avgAtPos - b.avgAtPos)[0];
    const pts = topNeed.severity === "critical" ? 40 : 22;
    score += pts;
    breakdown.push({ label:`Fills ${topNeed.label} need`, pts, positive:true });
  } else {
    breakdown.push({ label:"No position need filled", pts:0, positive:false });
  }

  // 2. Production vs active roster (max 20)
  const peers = active.filter(ap => ap.type===fa.type && canFillSlot(fa, ap)).sort((a,b)=>a.fpAvg-b.fpAvg);
  const worst = peers[0];
  if (worst && fa.fpAvg > worst.fpAvg) {
    const gain = Math.min(20, Math.round((fa.fpAvg - worst.fpAvg) * 3));
    score += gain;
    breakdown.push({ label:`Upgrades ${worst.name} (${worst.fpAvg.toFixed(1)} → ${fa.fpAvg.toFixed(1)})`, pts:gain, positive:true });
  } else if (worst) {
    breakdown.push({ label:`Worse than ${worst.name} (${worst.fpAvg.toFixed(1)}/gm active)`, pts:0, positive:false });
  }

  // 3. Dynasty age value (max 25)
  const tier = ageTier(fa.age || 25);
  const agePts = Math.round((tier.score / 50) * 25);
  score += agePts;
  breakdown.push({ label:`Age ${fa.age || "?"}: ${tier.label}`, pts: agePts, positive: agePts >= 12 });

  // 4. Prospect bonus (max 15)
  if (fa.isProspect) {
    score += 15;
    breakdown.push({ label:"Prospect — long-term dynasty asset", pts:15, positive:true });
  }

  // 5. Category need bonus (max 10)
  let catMatch = false;
  if (fa.type === "hitter") {
    if (fa.hr > 0 && catNeeds.some(c=>c.cat==="HR Power"))  { score += 5; catMatch = true; }
    if (fa.sb > 0 && catNeeds.some(c=>c.cat==="Speed/SB"))  { score += 5; catMatch = true; }
  } else {
    if (fa.sv > 0 && catNeeds.some(c=>c.cat==="Saves"))     { score += 10; catMatch = true; }
    if (fa.qs > 0 && catNeeds.some(c=>c.cat==="Quality Starts")) { score += 5; catMatch = true; }
    if (fa.k  > 0 && catNeeds.some(c=>c.cat==="Strikeouts")) { score += 3; catMatch = true; }
  }
  if (catMatch) breakdown.push({ label:"Fills a category weakness", pts:5, positive:true });

  return { score: Math.min(100, Math.round(score)), breakdown };
}

function faVerdict(fitScore, dynastyScore) {
  const combined = fitScore * 0.65 + dynastyScore * 0.35;
  if (combined >= 68) return { label:"Strong Add",        color:"bg-green-600 text-white",   emoji:"✅" };
  if (combined >= 48) return { label:"Consider",          color:"bg-blue-600 text-white",    emoji:"🔵" };
  if (combined >= 30) return { label:"Dynasty Stash",     color:"bg-indigo-500 text-white",  emoji:"📦" };
  return                     { label:"Pass",              color:"bg-gray-400 text-white",    emoji:"❌" };
}

function suggestedBid(fitScore, dynastyVal, remainingFaab) {
  let pct;
  if (fitScore >= 75)      pct = 0.22;
  else if (fitScore >= 55) pct = 0.13;
  else if (fitScore >= 35) pct = 0.06;
  else                     pct = 0.02;
  // Dynasty upside multiplier
  if (dynastyVal >= 80)      pct *= 1.4;
  else if (dynastyVal >= 60) pct *= 1.2;
  return Math.max(1, Math.round(remainingFaab * pct));
}

/* ═══════════════════════════════════════════════════════════════
   SUGGESTION ENGINE (roster)
   ═══════════════════════════════════════════════════════════════ */
function generateSuggestions(hitters, pitchers) {
  const all = [...hitters,...pitchers];
  const active=all.filter(p=>p.status==="Act"), reserve=all.filter(p=>p.status==="Res"), ir=all.filter(p=>p.status==="IR");
  const sugs = [];
  const order = { critical:0, high:1, medium:2, low:3 };

  for (const ap of active) {
    if (ap.gp===0) continue;
    const bmkMap=ap.type==="hitter"?BENCHMARKS.hitter:BENCHMARKS.pitcher;
    const bmk=bmkMap[ap.pos]||(ap.type==="hitter"?2.5:8.0);
    const minGP=ap.type==="hitter"?MIN_GP_HITTER:MIN_GP_PITCHER;
    if (ap.fpAvg < bmk*0.55 && ap.gp>=minGP) {
      const upgrades=reserve.filter(r=>r.type===ap.type&&r.gp>=(ap.type==="hitter"?3:2)&&r.fpAvg>ap.fpAvg&&canFillSlot(r,ap)).sort((a,b)=>b.fpAvg-a.fpAvg);
      const priority=ap.fpAvg<bmk*0.33?"critical":"high";
      if (upgrades.length>0) {
        sugs.push({ id:`swap-${ap.id}`, priority, category:"swap", headline:`Bench ${ap.name} → Activate ${upgrades[0].name}`, rationale:`${ap.name} averaging ${ap.fpAvg.toFixed(2)}/gm (${ap.gp} GP) — far below the ${bmk} benchmark. ${upgrades[0].name} is sitting on your bench averaging ${upgrades[0].fpAvg.toFixed(2)}/gm.`, bench:ap, activate:upgrades[0] });
      } else {
        sugs.push({ id:`flag-${ap.id}`, priority:"medium", category:"waiver", headline:`${ap.name} underperforming — check waiver wire`, rationale:`${ap.name} averaging ${ap.fpAvg.toFixed(2)}/gm (${ap.gp} GP) with no bench upgrade available. Use the FA Analyzer tab to find a replacement.`, bench:ap, activate:null });
      }
    }
  }
  for (const rp of reserve) {
    if (rp.gp<3||rp.fpAvg===0) continue;
    const already=sugs.some(s=>s.activate?.id===rp.id);
    if (already) continue;
    const peers=active.filter(ap=>canFillSlot(rp,ap)&&ap.gp>=3);
    const worst=peers.sort((a,b)=>a.fpAvg-b.fpAvg)[0];
    if (worst && rp.fpAvg>worst.fpAvg*1.5) {
      sugs.push({ id:`upgrade-${rp.id}`, priority:"medium", category:"swap", headline:`${rp.name} outperforming ${worst.name} — swap them`, rationale:`${rp.name} (bench ${rp.fpAvg.toFixed(2)}/gm) > ${worst.name} (active ${worst.fpAvg.toFixed(2)}/gm). Both fit the ${worst.pos} slot.`, bench:worst, activate:rp });
    }
  }
  for (const ap of active) {
    if (ap.gp===0) sugs.push({ id:`nogp-${ap.id}`, priority:"medium", category:"monitor", headline:`${ap.name} active but has 0 GP — verify status`, rationale:`${ap.name} (${ap.team}, ${ap.pos}) is on your active roster but hasn't logged a game yet. Confirm they're in their team's lineup before Monday's lock.`, bench:null, activate:ap });
  }
  if (!active.some(p=>p.type==="pitcher"&&p.pos==="RP")) {
    sugs.push({ id:"no-saves", priority:"high", category:"waiver", headline:"No active closer — use FA Analyzer to find one", rationale:"Saves are worth +6 pts each. Check the FA Analyzer tab to evaluate available closers.", bench:null, activate:null });
  }
  for (const p of ir) sugs.push({ id:`ir-${p.id}`, priority:"low", category:"monitor", headline:`Plan ahead: ${p.name} is on IL/IR`, rationale:`${p.name} (${p.team}, ${p.pos}) on injured reserve. When their MLB team activates them, clear a spot in advance.`, bench:null, activate:p });
  for (const rp of reserve) {
    if (rp.gp===0&&rp.fpTotal===0&&rp.type==="pitcher") sugs.push({ id:`zerores-${rp.id}`, priority:"low", category:"monitor", headline:`${rp.name} (reserve) has 0 IP — confirm active`, rationale:`${rp.name} (${rp.team}) hasn't pitched yet. Verify their MLB roster status.`, bench:null, activate:rp });
  }
  return sugs.sort((a,b)=>order[a.priority]-order[b.priority]);
}

   FA ANALYZER TAB
   ═══════════════════════════════════════════════════════════════ */
const EMPTY_FA = { name:"", team:"", pos:"OF", age:"", isProspect:false,
  fpAvg:"", gp:"", hr:"", sb:"", rbi:"", ip:"", era:"", k:"", sv:"", qs:"" };

/* ── MLB STATS API HELPERS ─────────────────────────────────────
   Uses the free, public MLB Stats API (statsapi.mlb.com).
   sportId 1 = MLB majors, 11 = Triple-A, 12 = Double-A.
   ─────────────────────────────────────────────────────────────*/
const MLB_API = "https://statsapi.mlb.com/api/v1";
const CURRENT_SEASON = new Date().getFullYear();

function mapPos(abbr, gamesStarted, gamesPlayed) {
  if (!abbr) return "OF";
  const a = abbr.toUpperCase();
  if (["LF","CF","RF"].includes(a)) return "OF";
  if (["C","1B","2B","3B","SS","OF"].includes(a)) return a;
  if (a === "SP") return "SP";
  if (a === "RP") return "RP";
  if (a === "P")  return (gamesStarted||0) / Math.max(gamesPlayed||1, 1) >= 0.45 ? "SP" : "RP";
  return "OF";
}

function parseIP(ipStr) {
  const [inn, outs] = String(ipStr||"0").split(".").map(Number);
  return (inn||0) + (outs||0) / 3;
}

function calcHitterFP(st) {
  const singles = (st.hits||0) - (st.doubles||0) - (st.triples||0) - (st.homeRuns||0);
  return singles + (st.doubles||0)*2 + (st.triples||0)*3 + (st.homeRuns||0)*4
    + (st.rbi||0) + (st.runs||0) + (st.baseOnBalls||0)
    + (st.stolenBases||0)*2 + (st.caughtStealing||0)*-1
    + (st.strikeOuts||0)*-0.5 + (st.hitByPitch||0);
}

function calcPitcherFP(st) {
  const ip = parseIP(st.inningsPitched);
  return ip*1.25 + (st.wins||0)*2 + (st.losses||0)*-1 + (st.earnedRuns||0)*-1
    + (st.strikeOuts||0) + (st.saves||0)*6 + (st.holds||0)*2
    + (st.qualityStarts||0)*6 + (st.shutouts||0)*3;
}

async function fetchMLBDirectory() {
  const yr = CURRENT_SEASON;
  // Fetch MLB + AAA hitting & pitching in parallel
  const urls = [
    `${MLB_API}/stats?stats=season&season=${yr}&group=hitting&sportId=1&playerPool=ALL&limit=2000`,
    `${MLB_API}/stats?stats=season&season=${yr}&group=pitching&sportId=1&playerPool=ALL&limit=2000`,
    `${MLB_API}/stats?stats=season&season=${yr}&group=hitting&sportId=11&playerPool=ALL&limit=2000`,
    `${MLB_API}/stats?stats=season&season=${yr}&group=pitching&sportId=11&playerPool=ALL&limit=2000`,
  ];
  const results = await Promise.all(urls.map(u =>
    fetch(u).then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
  ));
  const [mlbH, mlbP, aaaH, aaaP] = results;
  const players = [];
  const seen    = new Set();

  // Process a batch of splits
  function processSplits(data, type, isMinors) {
    const splits = data?.stats?.[0]?.splits || [];
    for (const s of splits) {
      const pid  = s.player?.id;
      const key  = `${pid}-${type}`;
      if (!pid || seen.has(key)) continue;
      seen.add(key);
      const st   = s.stat || {};
      const gp   = st.gamesPlayed || 1;
      const gs   = st.gamesStarted || 0;
      const posAbbr = s.position?.abbreviation || "";
      const pos  = type === "hitter" ? mapPos(posAbbr, 0, gp) : mapPos(posAbbr, gs, gp);
      const age  = s.player?.currentAge || 0;
      const fp   = type === "hitter" ? calcHitterFP(st) : calcPitcherFP(st);
      const fpAvg = gp > 0 ? Math.round((fp / gp) * 100) / 100 : 0;

      const base = {
        id: `mlb-${pid}-${type}`,
        mlbId: pid,
        name: s.player?.fullName || "Unknown",
        team: s.team?.abbreviation || "?",
        pos, type, age,
        isProspect: isMinors || age <= 23,
        isMinors,
        gp, fpAvg, fpTotal: fp,
        status: "FA",
      };

      if (type === "hitter") {
        players.push({ ...base,
          hr:  st.homeRuns       || 0,
          sb:  st.stolenBases    || 0,
          rbi: st.rbi            || 0,
          r:   st.runs           || 0,
          bb:  st.baseOnBalls    || 0,
          so:  st.strikeOuts     || 0,
          h:   st.hits           || 0,
          ab:  st.atBats         || 0,
        });
      } else {
        const ip = parseIP(st.inningsPitched);
        players.push({ ...base,
          ip,
          era: parseFloat(st.era) || 0,
          k:   st.strikeOuts      || 0,
          w:   st.wins            || 0,
          sv:  st.saves           || 0,
          hld: st.holds           || 0,
          qs:  st.qualityStarts   || 0,
        });
      }
    }
  }

  processSplits(mlbH, "hitter",  false);
  processSplits(mlbP, "pitcher", false);
  processSplits(aaaH, "hitter",  true);
  processSplits(aaaP, "pitcher", true);

  // Batch-fetch ages for players missing currentAge from the stats endpoint
  const missingAge = [...new Set(players.filter(p => !p.age).map(p => p.mlbId))];
  if (missingAge.length > 0) {
    const CHUNK = 250;
    const ageMap = {};
    for (let i = 0; i < missingAge.length; i += CHUNK) {
      try {
        const ids = missingAge.slice(i, i + CHUNK).join(",");
        const resp = await fetch(
          `${MLB_API}/people?personIds=${ids}&fields=people,id,currentAge,birthDate`
        ).then(r => r.json());
        for (const person of (resp.people || [])) {
          if (person.currentAge) {
            ageMap[person.id] = person.currentAge;
          } else if (person.birthDate) {
            const b = new Date(person.birthDate), now = new Date();
            let a = now.getFullYear() - b.getFullYear();
            if (now.getMonth() < b.getMonth() || (now.getMonth() === b.getMonth() && now.getDate() < b.getDate())) a--;
            ageMap[person.id] = a;
          }
        }
      } catch(_) {}
    }
    for (const p of players) {
      if (!p.age && ageMap[p.mlbId]) {
        p.age = ageMap[p.mlbId];
        p.isProspect = p.isMinors || p.age <= 23;
      }
    }
  }

  return players.sort((a, b) => b.fpAvg - a.fpAvg);
}

    const q = query.toLowerCase();

      .filter(p => p.name.toLowerCase().includes(q) && !(ownedNames||new Set()).has(p.name))
      .slice(0, 18);
  }, [query, dir, ownedNames]);

  const handleEvaluate = (p) => {
    onEvaluate({
      id: `fa-${Date.now()}-${p.mlbId}`,
      name: p.name, team: p.team, pos: p.pos,
      eligible: p.pos, type: p.type,
      age: p.age, isProspect: !!p.isProspect,
      status: "FA", gp: p.gp,
      fpAvg: p.fpAvg, fpTotal: p.fpTotal,
      hr: p.hr||0, sb: p.sb||0, rbi: p.rbi||0,
      r: p.r||0, bb: p.bb||0, so: p.so||0, h: p.h||0, ab: p.ab||0,
      ip: p.ip||0, era: p.era||0, k: p.k||0, sv: p.sv||0, hld: p.hld||0, qs: p.qs||0,
    });
    setQuery(""); setOpen(false);
  };

  return (
    <div className="relative">
      <input
        className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400"
        placeholder={dir?.length ? "Search player name — click ＋ Evaluate to analyze instantly…" : "Load player directory first ↑"}
        value={query}
        onChange={e => { setQuery(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        onBlur={() => setTimeout(() => setOpen(false), 200)}
      />
      {open && results.length > 0 && (
        <div className="absolute z-50 left-0 right-0 bg-white border border-gray-200 rounded-xl shadow-xl mt-1 max-h-80 overflow-y-auto">
          {results.map(p => (
            <div key={p.id} className="flex items-center border-b border-gray-100 last:border-0 hover:bg-gray-50 transition-colors">
              {/* Player info — click to fill form */}
              <button
                type="button"
                onMouseDown={() => { onSelect(p); setQuery(p.name); setOpen(false); }}
                className="flex-1 text-left px-4 py-2.5 flex items-center gap-3 min-w-0">
                <div className="min-w-0 flex-1">
                  <span className="font-semibold text-sm text-gray-900">{p.name}</span>
                  <span className="text-xs text-gray-400 ml-2">{p.team} · {p.pos}</span>
                  {p.isMinors && <span className="ml-1.5 text-xs bg-purple-100 text-purple-700 font-semibold px-1.5 py-0.5 rounded-full">AAA</span>}
                  {!p.isMinors && p.isProspect && <span className="ml-1.5 text-xs bg-emerald-100 text-emerald-700 font-semibold px-1.5 py-0.5 rounded-full">Prospect</span>}
                  <div className="text-xs text-gray-400 mt-0.5">
                    {p.type==="hitter"
                      ? `${p.fpAvg.toFixed(2)} pts/gm · ${p.gp} GP · ${p.hr} HR · ${p.sb} SB · ${p.rbi} RBI`
                      : `${p.fpAvg.toFixed(2)} pts/gm · ${p.gp} GP · ${p.ip?.toFixed ? p.ip.toFixed(1) : p.ip} IP · ${p.k} K · ${p.sv} SV`}
                  </div>
                </div>
              </button>
              {/* One-click evaluate button */}
              <button
                type="button"
                onMouseDown={() => handleEvaluate(p)}
                className="shrink-0 mr-3 bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold px-3 py-1.5 rounded-lg transition-colors whitespace-nowrap">
                + Evaluate
              </button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── FA ENTRY FORM ─────────────────────────────────────────────*/
function FaForm({ onAdd, mlbDir, ownedNames }) {
  const [f, setF] = useState({...EMPTY_FA});
  const [err, setErr] = useState(null);
  const set = (k,v) => setF(p=>({...p,[k]:v}));
  const isPitcher = ["SP","RP"].includes(f.pos);

  // Auto-fill form from a selected MLB directory player
  const selectPlayer = (p) => {
    setF({
      name: p.name, team: p.team !== "?" ? p.team : "", pos: p.pos,
      age:  p.age > 0 ? String(p.age) : "",
      gp:   String(p.gp  || ""),
      fpAvg:String(p.fpAvg != null ? p.fpAvg.toFixed(2) : ""),
      isProspect: !!p.isProspect,
      hr:  String(p.hr  || 0),
      sb:  String(p.sb  || 0),
      rbi: String(p.rbi || 0),
      ip:  String(p.ip  ? p.ip.toFixed(1) : ""),
      era: String(p.era || ""),
      k:   String(p.k   || 0),
      sv:  String(p.sv  || 0),
      qs:  String(p.qs  || 0),
    });
    setErr(null);
  };

  const handleAdd = () => {
    if (!f.name.trim()) { setErr("Player name is required."); return; }
    if (!f.age || isNaN(parseInt(f.age))) { setErr("Age couldn't be loaded automatically for this player — please type it in the Age field above."); return; }
    const fp = parseFloat(f.fpAvg)||0;
    onAdd({
      id: `fa-${Date.now()}`, name:f.name.trim(), team:f.team.trim()||"?", pos:f.pos,
      eligible: f.pos, type: isPitcher?"pitcher":"hitter",
      age: parseInt(f.age)||25, isProspect:f.isProspect, status:"FA",
      fpAvg:fp, fpTotal:fp*(parseInt(f.gp)||0), gp:parseInt(f.gp)||0,
      hr:parseInt(f.hr)||0, sb:parseInt(f.sb)||0, rbi:parseInt(f.rbi)||0,
      ip:parseFloat(f.ip)||0, era:parseFloat(f.era)||0,
      k:parseInt(f.k)||0, sv:parseInt(f.sv)||0, qs:parseInt(f.qs)||0,
    });
    setF({...EMPTY_FA}); setErr(null);
  };

  return (
    <div className="bg-white rounded-xl shadow p-5">
      <h3 className="font-bold text-gray-800 mb-1">Add Free Agent / Waiver Target</h3>
      <p className="text-xs text-gray-400 mb-4">
        {mlbDir?.length
          ? `🟢 Live directory loaded — ${mlbDir.length.toLocaleString()} players (MLB + AAA). Search below or fill manually.`
          : "Load the live directory above to auto-fill stats, or enter manually."}
      </p>

      {err && <div className="bg-red-50 border border-red-200 text-red-700 text-xs rounded-lg px-3 py-2 mb-3">{err}</div>}

      {/* Player search (replaces plain name input when directory loaded) */}
      <div className="mb-3">
        <label className="text-xs text-gray-500 block mb-1">Player Name *</label>
        {mlbDir?.length
          ? <PlayerSearch dir={mlbDir} ownedNames={ownedNames} onSelect={selectPlayer} onEvaluate={onAdd}/>
          : <input className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" placeholder="e.g. Jackson Holliday" value={f.name} onChange={e=>set("name",e.target.value)}/>
        }
        {/* After auto-fill, show the selected name as read-only badge */}
        {mlbDir?.length && f.name && (
          <div className="flex items-center gap-2 mt-1.5">
            <span className="text-xs text-gray-700 font-medium bg-gray-100 px-2 py-1 rounded-lg">{f.name} {f.team && `· ${f.team}`} {f.pos && `· ${f.pos}`}</span>
            <button onClick={()=>setF({...EMPTY_FA})} className="text-xs text-gray-400 hover:text-red-500">✕ clear</button>
          </div>
        )}
      </div>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
        {!mlbDir?.length && (
          <>
            <div><label className="text-xs text-gray-500 block mb-1">Team</label>
              <input className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" placeholder="BAL" value={f.team} onChange={e=>set("team",e.target.value)}/></div>
            <div><label className="text-xs text-gray-500 block mb-1">Position</label>
              <select className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" value={f.pos} onChange={e=>set("pos",e.target.value)}>
                {["C","1B","2B","3B","SS","OF","SP","RP"].map(p=><option key={p}>{p}</option>)}
              </select></div>

        )}
        {mlbDir?.length && (
          <div><label className="text-xs text-gray-500 block mb-1">Position (override)</label>
            <select className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" value={f.pos} onChange={e=>set("pos",e.target.value)}>
              {["C","1B","2B","3B","SS","OF","SP","RP"].map(p=><option key={p}>{p}</option>)}
            </select></div>
        )}
        <div><label className={`text-xs block mb-1 ${mlbDir?.length && !f.age && f.name ? "text-orange-500 font-semibold" : "text-gray-500"}`}>
          Age {mlbDir?.length && f.name && !f.age ? "⚠ enter manually" : mlbDir?.length ? "(auto-filled)" : ""}
        </label>
          <input type="number" min="18" max="45" className={`w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400 ${mlbDir?.length && !f.age && f.name ? "border-orange-300 bg-orange-50" : ""}`} placeholder="Enter age" value={f.age} onChange={e=>set("age",e.target.value)}/></div>
        <div><label className="text-xs text-gray-500 block mb-1">GP {mlbDir?.length && "(auto-filled)"}</label>

        <div className="flex items-end pb-1">
          <label className="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" checked={f.isProspect} onChange={e=>set("isProspect",e.target.checked)} className="w-4 h-4 accent-blue-600"/>

          </label>
        </div>
      </div>

      {/* Hitter stats */}
      {!isPitcher && (
        <div className="grid grid-cols-3 md:grid-cols-6 gap-3 mb-4">
          {[["hr","HR"],["sb","SB"],["rbi","RBI"]].map(([k,l])=>(
            <div key={k}><label className="text-xs text-gray-500 block mb-1">{l}{mlbDir?.length?" (auto)":""}</label>
              <input type="number" min="0" className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" placeholder="0" value={f[k]} onChange={e=>set(k,e.target.value)}/></div>
          ))}
        </div>
      )}

      {/* Pitcher stats */}
      {isPitcher && (
        <div className="grid grid-cols-3 md:grid-cols-5 gap-3 mb-4">
          {[["ip","IP"],["era","ERA"],["k","K"],["sv","SV"],["qs","QS"]].map(([k,l])=>(
            <div key={k}><label className="text-xs text-gray-500 block mb-1">{l}{mlbDir?.length?" (auto)":""}</label>
              <input type="number" min="0" step={k==="era"||k==="ip"?"0.1":"1"} className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" placeholder="0" value={f[k]} onChange={e=>set(k,e.target.value)}/></div>
          ))}

      )}

      <button onClick={handleAdd} className="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-6 py-2 rounded-lg transition-colors">
        + Evaluate Player
      </button>
    </div>
  );
}

function FaCard({ fa, roster, posNeeds, catNeeds, remainingFaab, onRemove }) {
  const [open, setOpen] = useState(true);
  const active = roster ? roster.all.filter(p=>p.status==="Act") : [];
  const { score: fitScore, breakdown } = faFitScore(fa, posNeeds, catNeeds, active);
  const ds      = dynastyScore(fa);
  const verdict = faVerdict(fitScore, ds);
  const bid     = suggestedBid(fitScore, ds, remainingFaab);
  const tier    = ageTier(fa.age||25);

  const scoreBar = (score) => {
    const color = score>=70?"bg-green-500":score>=45?"bg-blue-500":score>=25?"bg-yellow-400":"bg-gray-300";
    return <div className="flex items-center gap-2"><div className="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden"><div className={`h-full rounded-full ${color}`} style={{width:`${score}%`}}/></div><span className="text-xs font-bold w-6">{score}</span></div>;
  };

  return (
    <div className="bg-white rounded-xl shadow border border-gray-100 overflow-hidden">
      <div className="flex items-center justify-between px-5 py-4 cursor-pointer" onClick={()=>setOpen(o=>!o)}>
        <div className="flex items-center gap-3 flex-wrap">
          <span className={`font-bold px-1.5 py-0.5 rounded-full text-xs ${posColor(fa.pos)}`}>{fa.pos}</span>
          <div>
            <span className="font-bold text-gray-900">{fa.name}</span>
            <span className="text-gray-400 text-xs ml-2">{fa.team} · Age {fa.age}</span>
            {fa.isProspect && <span className="ml-2 text-xs bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded-full font-semibold">Prospect</span>}
          </div>
          <span className={`text-xs font-bold px-3 py-1 rounded-full ${verdict.color}`}>{verdict.emoji} {verdict.label}</span>
        </div>
        <div className="flex items-center gap-3">
          <button onClick={e=>{e.stopPropagation();onRemove(fa.id);}} className="text-gray-300 hover:text-red-400 text-sm px-2">✕</button>
          <span className="text-gray-400 text-xs">{open?"▲":"▼"}</span>
        </div>
      </div>

      {open && (
        <div className="px-5 pb-5 border-t border-gray-50">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-5 mt-4">

            {/* Scores */}
            <div className="space-y-3">
              {!roster && <div className="text-xs text-amber-600 bg-amber-50 border border-amber-200 rounded-lg px-3 py-1.5">⚠ Import your roster CSV for a personalized fit score</div>}
              <div>
                <div className="flex justify-between text-xs mb-1"><span className="text-gray-500 font-medium">Team Fit Score</span><span className="font-bold text-gray-700">{fitScore}/100</span></div>
                {scoreBar(fitScore)}
              </div>
              <div>
                <div className="flex justify-between text-xs mb-1"><span className="text-gray-500 font-medium">Dynasty Value</span><span className="font-bold text-gray-700">{ds}/100</span></div>
                {scoreBar(ds)}
              </div>
              <div className="bg-slate-50 rounded-lg p-3 text-center mt-2">
                <div className="text-xs text-gray-500 mb-0.5">Suggested FAAB Bid</div>
                <div className="text-2xl font-black text-slate-800">${bid.toLocaleString()}</div>
                <div className="text-xs text-gray-400">of ${remainingFaab.toLocaleString()} remaining</div>
              </div>
            </div>

            {/* Fit breakdown */}
            <div>
              <div className="text-xs font-bold text-gray-600 uppercase tracking-wide mb-2">Fit Analysis</div>
              <div className="space-y-1.5">
                {breakdown.map((b,i)=>(
                  <div key={i} className="flex items-start gap-2 text-xs">
                    <span className={b.positive?"text-green-500":"text-red-400"}>{b.positive?"✓":"✗"}</span>
                    <span className="text-gray-600 flex-1">{b.label}</span>
                    {b.pts>0&&<span className="text-green-600 font-bold">+{b.pts}</span>}
                  </div>
                ))}
              </div>
            </div>

            {/* Player stats */}
            <div>
              <div className="text-xs font-bold text-gray-600 uppercase tracking-wide mb-2">Player Stats</div>
              <div className="space-y-1 text-xs text-gray-600">
                <div className="flex items-center gap-1.5"><Stars n={tier.stars}/><span className={tier.color}>{tier.label}</span></div>
                <div>Avg/gm: <strong className={`${fa.fpAvg>3?"text-green-600":fa.fpAvg>1.5?"text-yellow-600":"text-red-500"}`}>{fa.fpAvg.toFixed(1)}</strong></div>
                <div>Games played: {fa.gp}</div>
                {fa.type==="hitter"&&<>
                  {fa.hr>0&&<div>HR: {fa.hr}</div>}

                  {fa.ip>0&&<div>IP: {fa.ip} · ERA: {fa.era.toFixed(2)}</div>}

            </div>
          </div>
        </div>
      )}
    </div>
  );

/* ── FA TARGET PICKER (shown after CSV import) ─────────────────
   Shows curated picks from the import pool with selectable cards.
   User clicks "+ Evaluate" to add players to the full analysis.
   ─────────────────────────────────────────────────────────────*/
function ImportTargetPicker({ pool, roster, positionNeeds, categoryNeeds, remaining, addedIds, onAdd, onClear }) {
  const [showBrowse, setShowBrowse] = useState(false);
  const [typeFilter, setTypeFilter] = useState("all");
  const [posFilter,  setPosFilter]  = useState("all");
  const [search,     setSearch]     = useState("");

  // Dynasty longevity label for a player
  function dynastyWindow(age) {
    if (!age || age === 0) return "Age unknown";
    if (age <= 22) return "10+ yr dynasty window";
    if (age <= 25) return "7–8 yr dynasty window";
    if (age <= 27) return "4–5 yr peak window";
    if (age <= 30) return "2–3 yr contributor";
    return "Win-now only";
  }

  // Smart groupings from the pool
  const winNow = pool
    .filter(p => !p.isMinors && p._fitScore >= 20 && (p.gp > 0 || p.fpAvg > 0))
    .slice(0, 4);

  const dynastyTargets = pool
    .filter(p => p.isMinors || p.isProspect || (p.age > 0 && p.age <= 24))
    .sort((a, b) => b._dynastyScore - a._dynastyScore)
    .slice(0, 4);

  const needFills = positionNeeds
    .filter(n => n.severity === "critical")
    .map(need => ({
      need,
      player: pool
        .filter(p => p.type === need.type && eligibleFor(p, need.pos) && !p.isMinors)
        .sort((a, b) => b._fitScore - a._fitScore)[0],
    }))
    .filter(x => x.player)
    .slice(0, 3);

  // Browse-all filtered list
  const browseList = useMemo(() => {
    let list = pool;
    if (typeFilter === "hitters")  list = list.filter(p => p.type === "hitter");
    if (typeFilter === "pitchers") list = list.filter(p => p.type === "pitcher");
    if (posFilter !== "all")       list = list.filter(p => eligibleFor(p, posFilter));
    if (search.length >= 2)        list = list.filter(p => p.name.toLowerCase().includes(search.toLowerCase()));
    return list.slice(0, 35);
  }, [pool, typeFilter, posFilter, search]);

  // Compact selectable player card
  function PickCard({ fa, reason }) {
    const isAdded  = addedIds.has(fa.id);
    const verdict  = faVerdict(fa._fitScore, fa._dynastyScore);
    const tier     = ageTier(fa.age || 25);
    const statsLine = fa.type === "hitter"
      ? [fa.fpAvg.toFixed(1)+" pts/gm", fa.gp+" GP",
         fa.hr  ? fa.hr+" HR"  : "",
         fa.sb  ? fa.sb+" SB"  : "",
         fa.rbi ? fa.rbi+" RBI": ""].filter(Boolean).join(" · ")
      : [fa.fpAvg.toFixed(1)+" pts/gm", fa.gp+" GP",
         fa.ip  ? (typeof fa.ip === "number" ? fa.ip.toFixed(1) : fa.ip)+" IP" : "",
         fa.k   ? fa.k+" K"   : "",
         fa.sv  ? fa.sv+" SV" : "",
         fa.qs  ? fa.qs+" QS" : ""].filter(Boolean).join(" · ");

    return (
      <div className={`rounded-xl border p-3.5 transition-all ${isAdded ? "border-green-300 bg-green-50" : "border-gray-100 bg-white shadow-sm hover:shadow-md"}`}>
        {/* Name row */}
        <div className="flex items-start justify-between gap-2 mb-2">
          <div className="min-w-0 flex-1">
            <div className="flex items-center gap-1.5 flex-wrap mb-0.5">
              <span className={`text-xs font-bold px-1.5 py-0.5 rounded-full shrink-0 ${posColor(fa.pos)}`}>{fa.pos}</span>
              <span className="font-bold text-gray-900 text-sm">{fa.name}</span>
              <span className="text-gray-400 text-xs">{fa.team}</span>
              {fa.isMinors && <span className="text-xs bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded-full font-semibold">AAA</span>}
              {!fa.isMinors && fa.isProspect && <span className="text-xs bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded-full font-semibold">Prospect</span>}
            </div>
            <div className="flex items-center gap-2 text-xs flex-wrap">
              <span className="text-gray-400">Age {fa.age || "?"}</span>
              <span className={`font-semibold ${tier.color}`}>{tier.label}</span>
              <span className="text-gray-300">·</span>
              <span className="text-gray-400 italic">{dynastyWindow(fa.age)}</span>
            </div>
          </div>
          <button
            type="button"
            onClick={() => !isAdded && onAdd(fa)}
            className={`shrink-0 text-xs font-bold px-3 py-1.5 rounded-lg transition-colors whitespace-nowrap ${
              isAdded
                ? "bg-green-100 text-green-700 cursor-default"
                : "bg-blue-600 hover:bg-blue-700 text-white"
            }`}>
            {isAdded ? "✓ Evaluating" : "+ Evaluate"}
          </button>
        </div>
        {/* Scores row */}
        <div className="flex items-center gap-3 mb-1.5 flex-wrap">
          <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${verdict.color}`}>{verdict.emoji} {verdict.label}</span>
          <div className="flex items-center gap-1.5">
            <span className="text-xs text-gray-400">Fit</span>
            <div className="w-14 h-1.5 bg-gray-200 rounded-full overflow-hidden">
              <div className={`h-full rounded-full ${fa._fitScore>=70?"bg-green-500":fa._fitScore>=45?"bg-blue-500":fa._fitScore>=25?"bg-yellow-400":"bg-gray-300"}`} style={{width:`${fa._fitScore}%`}}/>
            </div>
            <span className="text-xs font-bold text-gray-700">{fa._fitScore}</span>
          </div>
          <div className="flex items-center gap-1.5">
            <span className="text-xs text-gray-400">Dynasty</span>
            <div className="w-14 h-1.5 bg-gray-200 rounded-full overflow-hidden">
              <div className={`h-full rounded-full ${fa._dynastyScore>=70?"bg-emerald-500":fa._dynastyScore>=45?"bg-indigo-400":"bg-gray-400"}`} style={{width:`${fa._dynastyScore}%`}}/>
            </div>
            <span className="text-xs font-bold text-gray-700">{fa._dynastyScore}</span>
          </div>
          <Stars n={tier.stars}/>
        </div>
        {/* Stats + reason */}
        <div className="text-xs text-gray-400">{statsLine}</div>
        {reason && <div className="text-xs text-blue-600 font-medium mt-1.5 italic">{reason}</div>}
      </div>
    );
  }

  const strongAdds = pool.filter(p => p._verdict === "Strong Add").length;

/* ── FA RESULTS — full evaluation list ─────────────────────────
   Shows detailed FaCard analysis for every player the user has
   clicked "+ Evaluate" on (from picker or from manual entry).
