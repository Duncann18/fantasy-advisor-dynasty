  const pass       = scored.filter(p => p._verdict === "Pass").length;

  // ── Smart target groups ───────────────────────────────────────
  // Win Now: active (non-minors) players best suited for immediate impact
  const winNow = scored
    .filter(p => !p.isMinors && p._fitScore >= 25 && (p.gp > 0 || p.fpAvg > 0))
    .slice(0, 4);

  // Dynasty Stash: prospects / minors / age ≤ 24 sorted by dynasty score
  const dynastyTargets = scored
    .filter(p => p.isMinors || p.isProspect || (p.age > 0 && p.age <= 24))
    .sort((a, b) => b._dynastyScore - a._dynastyScore)
    .slice(0, 4);

  // Fill Your Holes: best available player for each critical positional need
  const needFills = positionNeeds
    .filter(n => n.severity === "critical")
    .map(need => ({
      need,
      player: scored
        .filter(p => p.type === need.type && eligibleFor(p, need.pos) && !p.isMinors)
        .sort((a, b) => b._fitScore - a._fitScore)[0],
    }))
    .filter(x => x.player)
    .slice(0, 4);

  const hasSmartTargets = bulkCount > 0 && (winNow.length > 0 || dynastyTargets.length > 0 || needFills.length > 0);

  // Filter tabs
  const displayed = useMemo(() => {
    let list = scored;
    if (faFilter === "targets")  list = list.filter(p => p._verdict !== "Pass");
    if (faFilter === "hitters")  list = list.filter(p => p.type === "hitter");
    if (faFilter === "pitchers") list = list.filter(p => p.type === "pitcher");
    if (posFilter !== "all")     list = list.filter(p => eligibleFor(p, posFilter));
    return list;
  }, [scored, faFilter, posFilter]);

  if (faPlayers.length === 0) return null;

  const POS_OPTIONS = ["all","C","1B","2B","3B","SS","OF","SP","RP"];

  return (
    <div>
      {compareTarget && (
        <FaVsRosterModal
          faPlayer={compareTarget}
          roster={roster}
          onClose={function() { setCompareTarget(null); }}
        />
      )}

      {/* ── Bulk import summary banner ── */}
      {bulkCount > 0 && (
        <div className="bg-slate-800 rounded-xl p-5 text-white mb-4">
          <div className="flex items-center justify-between flex-wrap gap-2 mb-3">
            <h3 className="font-bold text-sm">📊 FA Import — {bulkCount} players analyzed</h3>
            <button onClick={() => setFaPlayers(prev => prev.filter(p => !p.fromImport))}
              className="text-xs text-slate-400 hover:text-red-300 transition-colors">✕ Clear import</button>
          </div>
          <div className="grid grid-cols-4 gap-3 text-center text-xs">
            {[
              { label:"Strong Adds",   count:strongAdds, color:"text-green-400"  },
              { label:"Consider",      count:consider,   color:"text-blue-400"   },
              { label:"Dynasty Stash", count:stash,      color:"text-indigo-400" },
              { label:"Pass",          count:pass,       color:"text-slate-400"  },
            ].map(({ label, count, color }) => (
              <div key={label} className="bg-slate-700 rounded-lg py-2.5">
                <div className={`text-2xl font-black ${color}`}>{count}</div>
                <div className="text-slate-400 mt-0.5">{label}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── Smart Targets ── */}
      {hasSmartTargets && (
        <div className="mb-5">
          <div className="flex items-center gap-2 mb-3 flex-wrap">
            <h3 className="font-bold text-gray-800 text-sm">🎯 Suggested Targets for Your Team</h3>
            {!roster && <span className="text-xs text-amber-600 bg-amber-50 border border-amber-200 rounded-lg px-2 py-0.5">⚠ Import your roster CSV for personalized picks</span>}
            {(function() {
              var fmt = league.scoringFormat || "h2h_points";
              var fmtInfo = SCORING_FORMATS.find(function(f){ return f.id === fmt; });
              var catL = isCatFormat(fmt);
              return (
                <span className={"text-xs px-2.5 py-1 rounded-full font-semibold " + (catL ? "bg-purple-100 text-purple-700" : "bg-blue-100 text-blue-700")}>
                  {catL ? "📊 Category weights boosted" : "🔢 Points-optimized"} · {fmtInfo ? fmtInfo.label : fmt}
                </span>
              );
            })()}
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-5">

            {/* Win Now */}
            {winNow.length > 0 && (
              <div className="bg-gradient-to-b from-green-50 to-white rounded-xl border border-green-100 shadow-sm p-4">
                <div className="flex items-center gap-2 mb-3 pb-2 border-b border-green-100">
                  <span className="text-lg">🏆</span>
                  <div>
                    <div className="font-black text-sm text-gray-800">Win Now</div>
                    <div className="text-xs text-gray-400">Best immediate pickups</div>
                  </div>
                </div>
                <div className="space-y-3">
                  {winNow.map((fa, i) => (
                    <SmartTargetCard key={fa.id} fa={fa} rank={i+1}
                      onCompare={function(p) { setCompareTarget(p); }}
                      reason={
                        i===0 ? "Top overall fit for your roster" :
                        i===1 ? "Strong secondary option" :
                        i===2 ? "Solid depth add" :
                        "Worth a look"
                      }/>
                  ))}
                </div>
              </div>
            )}

            {/* Dynasty Stash */}
            {dynastyTargets.length > 0 && (
              <div className="bg-gradient-to-b from-indigo-50 to-white rounded-xl border border-indigo-100 shadow-sm p-4">
                <div className="flex items-center gap-2 mb-3 pb-2 border-b border-indigo-100">
                  <span className="text-lg">📦</span>
                  <div>
                    <div className="font-black text-sm text-gray-800">Dynasty Stash</div>
                    <div className="text-xs text-gray-400">Prospects &amp; long-term assets</div>
                  </div>
                </div>
                <div className="space-y-3">
                  {dynastyTargets.map((fa, i) => {
                    const tier = ageTier(fa.age || 25);
                    return (
                      <SmartTargetCard key={fa.id} fa={fa} rank={i+1}
                        onCompare={function(p) { setCompareTarget(p); }}
                        reason={
                          fa.isMinors ? `${tier.label} — stash while available` :
                          (fa.age||99) <= 22 ? "Elite prospect window — grab now" :
                          (fa.age||99) <= 25 ? "Prime upside years ahead" :
                          "Young piece with dynasty value"
                        }/>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Fill Your Holes */}
            {needFills.length > 0 && (
              <div className="bg-gradient-to-b from-red-50 to-white rounded-xl border border-red-100 shadow-sm p-4">
                <div className="flex items-center gap-2 mb-3 pb-2 border-b border-red-100">
                  <span className="text-lg">🚨</span>
                  <div>
                    <div className="font-black text-sm text-gray-800">Fill Your Holes</div>
                    <div className="text-xs text-gray-400">Addresses critical needs</div>
                  </div>
                </div>
                <div className="space-y-3">
                  {needFills.map(({ need, player }) => (
                    <SmartTargetCard key={player.id} fa={player}
                      onCompare={function(p) { setCompareTarget(p); }}
                      reason={`Best available ${need.label} — ${need.note}`}/>
                  ))}
                </div>
                {needFills.length === 0 && (
                  <p className="text-xs text-gray-400 text-center py-4">No critical needs detected. Import your roster CSV to enable this.</p>
                )}
              </div>
            )}

          </div>
        </div>
      )}

      {/* ── Filter controls ── */}
      <div className="bg-white rounded-xl shadow p-4 mb-4">
        <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Full List</div>
        <div className="flex flex-wrap items-center justify-between gap-3">
          <div className="flex gap-2 flex-wrap">
            {[
              ["targets",  `⭐ Top Targets (${scored.filter(p=>p._verdict!=="Pass").length})`],
              ["hitters",  `🏏 Hitters (${scored.filter(p=>p.type==="hitter").length})`],
              ["pitchers", `⚾ Pitchers (${scored.filter(p=>p.type==="pitcher").length})`],
              ["all",      `📋 All (${scored.length})`],
            ].map(([key, label]) => (
              <button key={key} onClick={() => setFaFilter(key)}
                className={`px-4 py-1.5 rounded-full text-xs font-medium transition-colors ${faFilter===key?"bg-blue-600 text-white":"bg-gray-100 text-gray-600 hover:bg-gray-200"}`}>
                {label}
              </button>
            ))}
          </div>
          <div className="flex items-center gap-2">
            <label className="text-xs text-gray-500">Position:</label>
            <select value={posFilter} onChange={e => setPosFilter(e.target.value)}
              className="border rounded-lg px-2 py-1 text-xs focus:outline-none focus:border-blue-400">
              {POS_OPTIONS.map(p => <option key={p} value={p}>{p === "all" ? "All" : p}</option>)}
            </select>
          </div>
        </div>
      </div>

      {/* ── Player cards ── */}
      {displayed.length === 0 ? (
        <div className="bg-white rounded-xl shadow p-10 text-center">
          <div className="text-3xl mb-2">🔍</div>
          <p className="text-gray-500 text-sm">No players match the current filter.</p>
          <button onClick={() => { setFaFilter("all"); setPosFilter("all"); }}
            className="mt-3 text-blue-600 text-xs hover:underline">Clear filters</button>
        </div>
      ) : (
        <div className="space-y-3">
          {displayed.map(fa => (
            <FaCard key={fa.id} fa={fa} roster={roster} posNeeds={positionNeeds}
              catNeeds={categoryNeeds} remainingFaab={remaining} onRemove={removeFa}
              scoringFormat={scoringFormat}/>
          ))}
        </div>
      )}
    </div>
  );
}

function FaAnalyzerTab({ roster, league, onFaabChange, news, onGoToNews,
    mlbDir, dirLoading, dirLoaded, dirError, lastUpdated, onLoadDirectory,
    pendingFaText, onClearPendingFa,
    pendingFaPlayers, onClearPendingFaPlayers }) {
  const [faPlayers,     setFaPlayers]     = useState([]);   // players user has selected to evaluate
  const [importPool,    setImportPool]    = useState([]);   // all players from last FA CSV upload
  const [faabInput,     setFaabInput]     = useState(String(league.remainingFaab));
  const [faFilter,      setFaFilter]      = useState("targets");
  const [posFilter,     setPosFilter]     = useState("all");
  const [compareTarget, setCompareTarget] = useState(null); // player being compared vs roster
  const [faImportedAt,  setFaImportedAt]  = useState(null); // timestamp of last FA CSV import
  const [faDragOver,    setFaDragOver]    = useState(false);
  const fileRef = useRef();

  const remaining = parseInt(faabInput)||0;
  const { positionNeeds, categoryNeeds } = useMemo(()=>roster ? analyzeNeeds(roster) : { positionNeeds:[], categoryNeeds:[] },[roster]);

  const ownedNames = useMemo(()=>
    new Set((roster ? roster.all : []).map(p=>p.name)),
  [roster]);

  // IDs of players already in the evaluation list (to show "✓ Evaluating" in picker)
  const addedIds = useMemo(() => new Set(faPlayers.map(p => p.id)), [faPlayers]);

  const addFa    = (fa) => setFaPlayers(p => p.some(x => x.id === fa.id) ? p : [fa, ...p]);
  const removeFa = (id) => setFaPlayers(p => p.filter(x => x.id !== id));
  const clearPool = () => setImportPool([]);

  // Core: process CSV text string into import pool
  const processCsvText = (text) => {
    try {
      const lines = text.split(/\r?\n/).filter(function(l){ return l.trim(); });
      const firstLine  = lines[0] || "";
      const isFAExport = parseCSVLine(firstLine).some(function(h){ return h.replace(/"/g,"").trim() === "FP/G"; });
      const rawPlayers = isFAExport ? parseFantraxFACSV(text) : parseFantraxCSV(text).all;
      if (rawPlayers.length === 0) return;
      const active = roster ? roster.all.filter(function(p){ return p.status === "Act"; }) : [];
      const ts     = Date.now();
      const pool = rawPlayers.map(function(p, idx) {
        var fa = Object.assign({}, p, { id: "fa-csv-" + (p.id || p.name) + "-" + ts + "-" + idx, fromImport: true });
        var fitResult = faFitScore(fa, positionNeeds, categoryNeeds, active, league.scoringFormat);
        var ds        = dynastyScore(fa);
        var verdict   = faVerdict(fitResult.score, ds);
        var combined  = fitResult.score * 0.65 + ds * 0.35;
        return Object.assign({}, fa, { _fitScore: fitResult.score, _dynastyScore: ds, _verdict: verdict.label, _combined: combined });
      }).sort(function(a, b){ return b._combined - a._combined; });
      setImportPool(pool);
      setFaImportedAt(Date.now());
    } catch(e) {}
  };

  // Inline tab upload: File → text → processCsvText
  const processFaFile = (file) => {
    if (!file || !file.name.endsWith(".csv")) return;
    const reader = new FileReader();
    reader.onload = function(ev) { processCsvText(ev.target.result); };
    reader.readAsText(file);
  };

  // Handle FA CSV uploaded directly in FA tab
  const handleFaFile = (file) => { processFaFile(file); };

  // Process FA CSV text that was pre-read during onboarding (already a string — no FileReader needed)
  React.useEffect(function() {
    if (pendingFaText) {
      processCsvText(pendingFaText);
      if (onClearPendingFa) onClearPendingFa();
    }
  }, [pendingFaText]);

  // Accept a pre-scored FA pool from a platform sync (Sleeper, ESPN) — bypasses CSV parsing entirely
  React.useEffect(function() {
    if (pendingFaPlayers && pendingFaPlayers.length > 0) {
      setImportPool(pendingFaPlayers);
      setFaImportedAt(Date.now());
      if (onClearPendingFaPlayers) onClearPendingFaPlayers();
    }
  }, [pendingFaPlayers]);

  const sevColor = (s) => s==="critical"?"bg-red-100 text-red-700 border-red-200":s==="moderate"?"bg-yellow-100 text-yellow-700 border-yellow-200":"bg-blue-100 text-blue-700 border-blue-200";
  const catSevColor = (s) => s==="high"?"bg-red-100 text-red-700":s==="medium"?"bg-yellow-100 text-yellow-700":"bg-gray-100 text-gray-600";

  // News-based alerts: critical injuries on active roster
  var newsAlerts = useMemo(function() {
    if (!news || news.length === 0) return [];
    return news.filter(function(n) {
      return n.severity === "critical" && (n.typeCode === "IL" || n.typeCode === "SB");
    }).slice(0, 5);
  }, [news]);

  return (
    <div className="space-y-5">

      {/* ── News Alerts Banner ── */}
      {newsAlerts.length > 0 && (
        <div className="bg-red-50 border-2 border-red-200 rounded-xl p-4 space-y-2">
          <div className="flex items-center justify-between">
            <h3 className="font-bold text-red-800 text-sm">🚑 Injury Alerts — Action Required</h3>
            {onGoToNews && (
              <button onClick={onGoToNews} className="text-xs text-red-600 hover:underline font-semibold">View all news →</button>
            )}
          </div>
          {newsAlerts.map(function(alert) {
            return (
              <div key={alert.id} className="flex items-start gap-2 bg-white rounded-lg px-3 py-2 border border-red-100">
                <span className="text-sm">🚑</span>
                <div className="flex-1 min-w-0">
                  <span className={"text-xs font-bold mr-1.5 " + posColor(alert.playerPos)}>{alert.playerPos}</span>
                  <span className="text-xs font-bold text-red-800">{alert.playerName}</span>
                  <span className="text-xs text-gray-500 ml-1.5">{alert.detail || "Placed on IL"}</span>
                </div>
                <span className="text-xs text-red-600 font-semibold shrink-0">Need replacement</span>
              </div>
            );
          })}
        </div>
      )}

      {/* ── Live Player Directory ── */}
      <div className={`rounded-xl border-2 p-5 ${dirLoaded?"border-green-200 bg-green-50":"border-dashed border-blue-200 bg-blue-50"}`}>
        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
          <div>
            <h3 className="font-bold text-gray-800 text-sm flex items-center gap-2">
              🌐 Live MLB + AAA Player Directory
              {dirLoaded && <span className="text-xs font-normal text-green-600 bg-green-100 px-2 py-0.5 rounded-full">✓ {mlbDir.length.toLocaleString()} players loaded</span>}
            </h3>
            <p className="text-xs text-gray-500 mt-0.5">
              {dirLoaded
                ? `Last updated ${lastUpdated} — stats reflect current ${CURRENT_SEASON} season. Click Refresh to get today's numbers.`
                : `Pull current season stats from MLB Stats API. Automatically converts to your league's fantasy point system.`}
            </p>
            {dirError && <p className="text-xs text-red-600 mt-1">⚠ {dirError}</p>}
          </div>
          <div className="flex gap-2 shrink-0">
            <button
              onClick={onLoadDirectory}
              disabled={dirLoading}
              className={`text-sm font-semibold px-5 py-2 rounded-lg transition-colors ${dirLoading?"bg-gray-300 text-gray-500 cursor-not-allowed":dirLoaded?"bg-green-600 hover:bg-green-700 text-white":"bg-blue-600 hover:bg-blue-700 text-white"}`}>
              {dirLoading ? "⏳ Loading…" : dirLoaded ? "🔄 Refresh" : "⬇ Load Players"}
            </button>
          </div>
        </div>
        {dirLoaded && (
          <div className="mt-3 grid grid-cols-3 gap-3 text-center text-xs">
            {[
              ["MLB Hitters", mlbDir.filter(p=>p.type==="hitter"&&!p.isMinors).length, "text-amber-700"],
              ["MLB Pitchers", mlbDir.filter(p=>p.type==="pitcher"&&!p.isMinors).length, "text-blue-700"],
              ["AAA Prospects", mlbDir.filter(p=>p.isMinors).length, "text-purple-700"],
            ].map(([label,count,color])=>(
              <div key={label} className="bg-white rounded-lg py-2 shadow-sm">
                <div className={`text-lg font-black ${color}`}>{count}</div>
                <div className="text-gray-500">{label}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* FAAB Budget */}
      <div className="bg-slate-800 rounded-xl p-5 text-white">
        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
          <div className="flex-1">
            <h3 className="font-bold text-sm mb-1">FAAB Budget Tracker</h3>
            <FaabBar remaining={remaining} total={league.totalFaab}/>
          </div>
          <div className="flex items-center gap-3">
            <div>
              <label className="text-xs text-slate-400 block mb-1">Remaining FAAB ($)</label>
              <input type="number" min="0" className="border border-slate-600 bg-slate-700 text-white rounded-lg px-3 py-1.5 text-sm w-28 focus:outline-none focus:border-blue-400"
                value={faabInput} onChange={e=>{ setFaabInput(e.target.value); onFaabChange(parseInt(e.target.value)||0); }}/>
            </div>
            <div className="text-center">
              <div className="text-xs text-slate-400">% Used</div>
              <div className="text-2xl font-black">{league.totalFaab>0?Math.round((1-remaining/league.totalFaab)*100):0}%</div>
            </div>
          </div>
        </div>
      </div>

      {/* Team Needs */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div className="bg-white rounded-xl shadow p-5">
          <h3 className="font-bold text-gray-800 text-sm mb-3">📍 Position Needs</h3>
          {positionNeeds.length===0
            ? <p className="text-xs text-green-600">✅ All positions are adequately covered.</p>
            : <div className="space-y-2">
                {positionNeeds.map(n=>(
                  <div key={n.pos} className={`flex items-center justify-between rounded-lg px-3 py-2 border text-xs ${sevColor(n.severity)}`}>
                    <div className="flex items-center gap-2">
                      <span className={`font-bold px-1.5 py-0.5 rounded-full ${posColor(n.pos)}`}>{n.pos}</span>
                      <span className="font-semibold">{n.label}</span>
                    </div>
                    <div className="flex items-center gap-2">
                      <span>{n.note}</span>
                      <span className="font-bold uppercase">{n.severity}</span>
                    </div>
                  </div>
                ))}
              </div>
          }
        </div>
        <div className="bg-white rounded-xl shadow p-5">
          <h3 className="font-bold text-gray-800 text-sm mb-3">📊 Category Weaknesses</h3>
          {categoryNeeds.length===0
            ? <p className="text-xs text-green-600">✅ Solid across all categories.</p>
            : <div className="space-y-2">
                {categoryNeeds.map(c=>(
                  <div key={c.cat} className={`flex items-center justify-between rounded-lg px-3 py-2 text-xs font-medium ${catSevColor(c.severity)}`}>
                    <span>{c.icon} {c.cat}</span>
                    <span>{c.rate}</span>
                  </div>
                ))}
              </div>
          }
        </div>
      </div>

      {/* ── Lineup vs FA Comparison ── */}
      <LineupVsFACompare
        roster={roster}
        mlbDir={mlbDir}
        positionNeeds={positionNeeds}
        categoryNeeds={categoryNeeds}
        remaining={remaining}
      />

      {/* ── Import FA List from Fantrax ── */}
      {(function() {
        var leagueId = league.fantraxLeagueId || "";
        var fantraxFaUrl = leagueId
          ? "https://www.fantrax.com/newui/fantasy/league/" + leagueId + "/players;statusOrTeamFilter=FA"
          : "https://www.fantrax.com";

        // Staleness helper
        var faAgeLabel = null;
        var faIsStale  = false;
        if (faImportedAt) {
          var minsAgo = Math.floor((Date.now() - faImportedAt) / 60000);
          if (minsAgo < 60)       { faAgeLabel = minsAgo + "m ago";                    faIsStale = false; }
          else if (minsAgo < 1440){ faAgeLabel = Math.floor(minsAgo/60) + "h ago";    faIsStale = minsAgo > 360; }
          else                    { faAgeLabel = Math.floor(minsAgo/1440) + "d ago";   faIsStale = true; }
        }

        return (
          <div className="rounded-xl border-2 border-blue-100 bg-gradient-to-b from-blue-50 to-white shadow-sm overflow-hidden">
            {/* Header */}
            <div className="px-5 pt-5 pb-3 flex items-start justify-between gap-3 flex-wrap">
              <div>
                <h3 className="font-bold text-gray-800 text-sm flex items-center gap-2">
                  📋 Fantrax FA List
                  {faAgeLabel && (
                    <span className={"text-xs font-semibold px-2 py-0.5 rounded-full " + (faIsStale ? "bg-amber-100 text-amber-700" : "bg-green-100 text-green-700")}>
                      {faIsStale ? "⚠ " : "✓ "}{faAgeLabel}
                    </span>
                  )}
                </h3>
                <p className="text-xs text-gray-400 mt-0.5">
                  {importPool.length > 0
                    ? importPool.length + " free agents ranked for your roster" + (faIsStale ? " — consider refreshing" : "")
                    : "Import your Fantrax FA list to see ranked pickups for your team"}
                </p>
              </div>
              {importPool.length > 0 && (
                <button onClick={clearPool} className="text-xs text-gray-400 hover:text-red-400 transition-colors shrink-0">✕ Clear list</button>
              )}
            </div>

            {/* Step-by-step guide */}
            <div className="px-5 pb-4">
              <div className="flex items-stretch gap-2 flex-wrap sm:flex-nowrap">

                {/* Step 1 */}
                <a href={fantraxFaUrl} target="_blank" rel="noopener noreferrer"
                  className={"flex-1 min-w-[140px] rounded-xl border-2 px-4 py-3 text-center transition-all cursor-pointer " + (leagueId ? "border-blue-400 bg-blue-600 hover:bg-blue-700 text-white" : "border-gray-200 bg-gray-50 text-gray-500")}>
                  <div className="text-lg mb-0.5">1️⃣</div>
                  <div className="text-xs font-bold">Open Fantrax</div>
                  <div className={"text-xs mt-0.5 " + (leagueId ? "text-blue-100" : "text-gray-400")}>
                    {leagueId ? "↗ Go to FA page" : "Add League ID in ⚙ Settings"}
                  </div>
                </a>

                <div className="hidden sm:flex items-center text-gray-300 text-lg">→</div>

                {/* Step 2 */}
                <div className="flex-1 min-w-[140px] rounded-xl border-2 border-gray-200 bg-gray-50 px-4 py-3 text-center">
                  <div className="text-lg mb-0.5">2️⃣</div>
                  <div className="text-xs font-bold text-gray-700">Export CSV</div>
                  <div className="text-xs text-gray-400 mt-0.5">Scroll down → Export → CSV</div>
                </div>

                <div className="hidden sm:flex items-center text-gray-300 text-lg">→</div>

                {/* Step 3 — drop zone */}
                <div
                  onDragOver={function(e){ e.preventDefault(); setFaDragOver(true); }}
                  onDragLeave={function(){ setFaDragOver(false); }}
                  onDrop={function(e){ e.preventDefault(); setFaDragOver(false); handleFaFile(e.dataTransfer.files[0]); }}
                  onClick={function(){ fileRef.current && fileRef.current.click(); }}
                  className={"flex-1 min-w-[140px] rounded-xl border-2 border-dashed px-4 py-3 text-center cursor-pointer transition-all " + (faDragOver ? "border-blue-500 bg-blue-50" : "border-blue-300 hover:border-blue-400 hover:bg-blue-50 bg-white")}>
                  <div className="text-lg mb-0.5">{faDragOver ? "📂" : "3️⃣"}</div>
                  <div className="text-xs font-bold text-blue-700">{faDragOver ? "Drop it!" : "Drop CSV here"}</div>
                  <div className="text-xs text-blue-400 mt-0.5">or click to browse</div>
                </div>

              </div>
              <input ref={fileRef} type="file" accept=".csv" className="hidden" onChange={function(e){ handleFaFile(e.target.files[0]); }}/>
            </div>

            {/* Stale warning banner */}
            {faIsStale && importPool.length > 0 && (
              <div className="px-5 pb-4">
                <div className="bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 flex items-center justify-between gap-3">
                  <span className="text-xs text-amber-700">⚠ Your FA list is over 6 hours old — waiver claims may have changed.</span>
                  <a href={fantraxFaUrl} target="_blank" rel="noopener noreferrer"
                    className="text-xs font-semibold text-amber-700 hover:text-amber-900 shrink-0">Refresh ↗</a>
                </div>
              </div>
            )}
          </div>
        );
      })()}

      {/* ── Target Picker (shown after FA CSV import) ── */}
      {importPool.length > 0 && (
        <ImportTargetPicker
          pool={importPool}
          roster={roster}
          positionNeeds={positionNeeds}
          categoryNeeds={categoryNeeds}
          remaining={remaining}
          addedIds={addedIds}
          onAdd={addFa}
          onClear={clearPool}
          onCompare={function(p) { setCompareTarget(p); }}
        />
      )}

      {/* ── Recommended Moves (auto drop+claim pairs) ── */}
      {importPool.length > 0 && roster && (
        <DropsAndClaimsCard
          importPool={importPool}
          roster={roster}
          positionNeeds={positionNeeds}
          categoryNeeds={categoryNeeds}
          remaining={remaining}
          scoringFormat={league.scoringFormat}
        />
      )}

      {/* ── Drop Analyzer (user picks a player, gets best FA targets) ── */}
      {importPool.length > 0 && roster && (
        <DropAnalyzer
          roster={roster}
          importPool={importPool}
          positionNeeds={positionNeeds}
          categoryNeeds={categoryNeeds}
          remaining={remaining}
          scoringFormat={league.scoringFormat}
        />
      )}

      {/* ── Evaluation List (manually added + selected from picker) ── */}
      {faPlayers.length > 0 && (
        <div>
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-bold text-gray-800 text-sm">📋 Evaluation List ({faPlayers.length} players)</h3>
            <button onClick={() => setFaPlayers([])} className="text-xs text-gray-400 hover:text-red-400 transition-colors">✕ Clear all</button>
          </div>
          <FaResults
            faPlayers={faPlayers}
            roster={roster}
            positionNeeds={positionNeeds}
            categoryNeeds={categoryNeeds}
            remaining={remaining}
            faFilter={faFilter}
            posFilter={posFilter}
            setFaFilter={setFaFilter}
            setPosFilter={setPosFilter}
            removeFa={removeFa}
            scoringFormat={league.scoringFormat}
          />
        </div>
      )}

      {/* ── FA vs Roster comparison modal (opened from picker or smart targets) ── */}
      {compareTarget && (
        <FaVsRosterModal
          faPlayer={compareTarget}
          roster={roster}
          onClose={function() { setCompareTarget(null); }}
        />
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   LINEUP VS FA COMPARISON  — sub-components (top-level for Babel)
   ═══════════════════════════════════════════════════════════════ */

function CompareStatRow({ label, rVal, fVal, higherBetter }) {
  var hb = higherBetter === undefined ? true : higherBetter;
  var rN = parseFloat(rVal) || 0;
  var fN = parseFloat(fVal) || 0;
  var rWins = hb ? rN > fN : rN < fN;
  var fWins = hb ? fN > rN : fN < rN;
  var rDisplay = (rVal === null || rVal === undefined) ? "—" : rVal;
  var fDisplay = (fVal === null || fVal === undefined) ? "—" : fVal;
  return (
    <div className="grid grid-cols-3 text-xs py-1 border-b border-gray-100 last:border-0">
      <span className={"text-right pr-3 font-semibold " + (rWins ? "text-green-600" : "text-gray-500")}>{rDisplay}</span>
      <span className="text-center text-gray-400 font-medium">{label}</span>
      <span className={"text-left pl-3 font-semibold " + (fWins ? "text-green-600" : "text-gray-500")}>{fDisplay}</span>
    </div>
  );
}

function comparePlayerWindow(age) {
  if (!age) return "";
  if (age <= 23) return "10+ yr window";
  if (age <= 26) return "7-8 yr window";
  if (age <= 29) return "4-5 yr window";
  if (age <= 32) return "1-2 yr window";
  return "End of window";
}

function CompareCard({ player, side }) {
  if (!player) {
    return (
      <div className={"flex-1 rounded-xl border-2 border-dashed flex items-center justify-center h-48 " + (side === "roster" ? "border-slate-200" : "border-blue-200")}>
        <span className="text-gray-300 text-sm">{side === "roster" ? "Select from lineup" : "Search free agent"}</span>
      </div>
    );
  }
  var ds = dynastyScore(player);
  var dStars = ds >= 75 ? "★★★★★" : ds >= 60 ? "★★★★" : ds >= 45 ? "★★★" : ds >= 30 ? "★★" : "★";
  var win = comparePlayerWindow(player.age);
  var cardBg = side === "roster" ? "border-slate-300 bg-slate-50" : "border-blue-300 bg-blue-50";
  var posBg  = side === "roster" ? "bg-slate-200 text-slate-700" : "bg-blue-200 text-blue-800";
  var fpStr  = player.fpAvg ? player.fpAvg.toFixed(1) : "0.0";
  return (
    <div className={"flex-1 rounded-xl border p-4 " + cardBg}>
      <div className="flex items-start justify-between mb-2">
        <div>
          <div className="flex items-center gap-2 mb-0.5">
            <span className={"text-xs font-bold px-1.5 py-0.5 rounded " + posBg}>{player.pos}</span>
            <span className="text-xs text-gray-400">{player.team}</span>
          </div>
          <div className="font-bold text-gray-800 text-sm leading-tight">{player.name}</div>
          {player.age > 0 && <div className="text-xs text-gray-400">Age {player.age} · {win}</div>}
        </div>
        <div className="text-right">
          <div className="text-yellow-500 text-xs tracking-tight">{dStars}</div>
          <div className="text-xs text-gray-400">DS {ds}</div>
        </div>
      </div>
      <div className="mt-3 space-y-0.5">
        {player.type !== "pitcher" ? (
          <div>
            <CompareStatRow label="FP/G" rVal={side==="roster" ? fpStr : null} fVal={side==="fa" ? fpStr : null} />
            {player.hr  > 0 && <CompareStatRow label="HR"  rVal={side==="roster" ? player.hr  : null} fVal={side==="fa" ? player.hr  : null} />}
            {player.sb  > 0 && <CompareStatRow label="SB"  rVal={side==="roster" ? player.sb  : null} fVal={side==="fa" ? player.sb  : null} />}
            {player.rbi > 0 && <CompareStatRow label="RBI" rVal={side==="roster" ? player.rbi : null} fVal={side==="fa" ? player.rbi : null} />}
          </div>
        ) : (
          <div>
            <CompareStatRow label="FP/G" rVal={side==="roster" ? fpStr : null} fVal={side==="fa" ? fpStr : null} />
            {player.era > 0 && <CompareStatRow label="ERA" rVal={side==="roster" ? player.era.toFixed(2) : null} fVal={side==="fa" ? player.era.toFixed(2) : null} higherBetter={false}/>}
            {player.sv  > 0 && <CompareStatRow label="SV"  rVal={side==="roster" ? player.sv  : null} fVal={side==="fa" ? player.sv  : null} />}
            {player.k   > 0 && <CompareStatRow label="K"   rVal={side==="roster" ? player.k   : null} fVal={side==="fa" ? player.k   : null} />}
          </div>
        )}
      </div>
    </div>
  );
}

function CompareTable({ rp, fp }) {
  if (!rp || !fp) return null;
  var isHitter = rp.type !== "pitcher" || fp.type !== "pitcher";
  var rpDs = dynastyScore(rp);
  var fpDs = dynastyScore(fp);
  var rpLast = rp.name.split(" ").slice(-1)[0];
  var fpLast = fp.name.split(" ").slice(-1)[0];
  return (
    <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-4 w-full max-w-md mx-auto">
      <div className="grid grid-cols-3 text-xs font-bold text-gray-500 mb-2">
        <span className="text-right pr-3 truncate">{rpLast}</span>
        <span className="text-center">Stat</span>
        <span className="text-left pl-3 truncate">{fpLast}</span>
      </div>
      <CompareStatRow label="FP/G"    rVal={rp.fpAvg ? rp.fpAvg.toFixed(1) : "0.0"} fVal={fp.fpAvg ? fp.fpAvg.toFixed(1) : "0.0"} />
      <CompareStatRow label="Dynasty" rVal={rpDs} fVal={fpDs} />
      <CompareStatRow label="Age"     rVal={rp.age || "?"} fVal={fp.age || "?"} higherBetter={false} />
      {isHitter ? (
        <div>
          {((rp.hr||0)+(fp.hr||0))   > 0 && <CompareStatRow label="HR"  rVal={rp.hr||0}  fVal={fp.hr||0}  />}
          {((rp.sb||0)+(fp.sb||0))   > 0 && <CompareStatRow label="SB"  rVal={rp.sb||0}  fVal={fp.sb||0}  />}
          {((rp.rbi||0)+(fp.rbi||0)) > 0 && <CompareStatRow label="RBI" rVal={rp.rbi||0} fVal={fp.rbi||0} />}
          {((rp.r||0)+(fp.r||0))     > 0 && <CompareStatRow label="R"   rVal={rp.r||0}   fVal={fp.r||0}   />}
        </div>
      ) : (
        <div>
          {((rp.era||0)+(fp.era||0)) > 0 && <CompareStatRow label="ERA" rVal={rp.era ? rp.era.toFixed(2) : "0.00"} fVal={fp.era ? fp.era.toFixed(2) : "0.00"} higherBetter={false}/>}
          {((rp.k||0)+(fp.k||0))     > 0 && <CompareStatRow label="K"   rVal={rp.k||0}   fVal={fp.k||0}   />}
          {((rp.sv||0)+(fp.sv||0))   > 0 && <CompareStatRow label="SV"  rVal={rp.sv||0}  fVal={fp.sv||0}  />}
          {((rp.w||0)+(fp.w||0))     > 0 && <CompareStatRow label="W"   rVal={rp.w||0}   fVal={fp.w||0}   />}
        </div>
      )}
    </div>
  );
}

function LineupVsFACompare({ roster, mlbDir, positionNeeds, categoryNeeds, remaining }) {
  const [rosterPlayer, setRosterPlayer] = useState(null);
  const [faPlayer,     setFaPlayer]     = useState(null);
  const [faQuery,      setFaQuery]      = useState("");
  const [faOpen,       setFaOpen]       = useState(false);

  const faResults = useMemo(() => {
    if (!faQuery || faQuery.length < 2) return [];
    const q = faQuery.toLowerCase();
    return mlbDir.filter(function(p) { return p.name.toLowerCase().indexOf(q) >= 0; }).slice(0, 8);
  }, [faQuery, mlbDir]);

  const active  = (roster && roster.all ? roster.all : []).filter(function(p) { return p.status === "Act"; });
  const reserve = (roster && roster.all ? roster.all : []).filter(function(p) { return p.status === "Res"; });

  function prodScore(p) {
    if (!p) return 0;
    if (p.type === "pitcher") {
      var s = 50;
      if (p.era > 0) s += Math.max(-25, Math.min(25, (4.00 - p.era) * 8));
      if (p.fpAvg > 0) s += Math.min(25, p.fpAvg * 1.5);
      return Math.max(0, Math.min(100, s));
    }
    var s2 = 50;
    if (p.fpAvg > 0) s2 += Math.min(25, p.fpAvg * 2);
    if (p.hr > 0)    s2 += Math.min(10, p.hr / 3);
    if (p.sb > 0)    s2 += Math.min(10, p.sb / 2);
    return Math.max(0, Math.min(100, s2));
  }

  var rprod   = prodScore(rosterPlayer);
  var fprod   = prodScore(faPlayer);
  var rds     = rosterPlayer ? dynastyScore(rosterPlayer) : 0;
  var fds     = faPlayer     ? dynastyScore(faPlayer)     : 0;
  var prodAdv = fprod - rprod;
  var dsAdv   = fds   - rds;
  var overall = prodAdv * 0.55 + dsAdv * 0.45;

  function getVerdict() {
    if (!rosterPlayer || !faPlayer) return null;
    if (overall >= 20)  return { label: "Clear Upgrade", emoji: "🔥", color: "bg-green-100 text-green-800 border-green-300",    desc: "Make this move — significant improvement." };
    if (overall >= 8)   return { label: "Slight Upgrade", emoji: "✅", color: "bg-emerald-50 text-emerald-700 border-emerald-200", desc: "Lean toward adding the FA. Modest gain." };
    if (overall >= -8)  return { label: "Too Close to Call", emoji: "⚖️", color: "bg-amber-50 text-amber-700 border-amber-200",     desc: "Nearly identical value. Consider position fit and FAAB." };
    if (overall >= -20) return { label: "Keep Your Player", emoji: "🛡️", color: "bg-orange-50 text-orange-700 border-orange-200",  desc: "Your current player has the edge. Hold." };
    return               { label: "Definitely Keep", emoji: "❌", color: "bg-red-50 text-red-700 border-red-200",              desc: "Don't make this move." };
  }

  function getPosWarn() {
    if (!rosterPlayer || !faPlayer) return null;
    var rPos = rosterPlayer.pos;
    var faEligible = (faPlayer.eligible || faPlayer.pos || "").split(",").map(function(s) { return s.trim(); });
    if (rPos && faEligible.indexOf(rPos) < 0) {
      return faPlayer.name + " isn't eligible at " + rPos + ". Check your roster flexibility before making this move.";
    }
    return null;
  }

  var v    = getVerdict();
  var warn = getPosWarn();

  return (
    <div className="bg-white rounded-xl shadow p-5 space-y-4">
      <div>
        <h3 className="font-bold text-gray-800 text-sm">Lineup vs Free Agent</h3>
        <p className="text-xs text-gray-400 mt-0.5">Pick someone from your active lineup and a free agent — we'll tell you if the swap is worth it.</p>
      </div>

      <div className="flex flex-col sm:flex-row gap-3">
        <div className="flex-1">
          <label className="block text-xs font-medium text-gray-500 mb-1">Your Lineup Player</label>
          <select
            className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-slate-400"
            value={rosterPlayer ? rosterPlayer.id : ""}
            onChange={function(e) {
              var id = e.target.value;
              var all = roster && roster.all ? roster.all : [];
              var found = null;
              for (var i = 0; i < all.length; i++) { if (all[i].id === id) { found = all[i]; break; } }
              setRosterPlayer(found);
            }}
          >
            <option value="">— Select a player —</option>
            {active.length > 0 && (
              <optgroup label="Active">
                {active.map(function(p) { return <option key={p.id} value={p.id}>{p.name} ({p.pos})</option>; })}
              </optgroup>
            )}
            {reserve.length > 0 && (
              <optgroup label="Reserve / IL">
                {reserve.map(function(p) { return <option key={p.id} value={p.id}>{p.name} ({p.pos})</option>; })}
              </optgroup>
            )}
          </select>
        </div>

        <div className="flex items-end justify-center pb-2">
          <span className="text-gray-300 font-bold text-xl">vs</span>
        </div>

        <div className="flex-1 relative">
          <label className="block text-xs font-medium text-gray-500 mb-1">Free Agent</label>
          <input
            type="text"
            placeholder={mlbDir.length === 0 ? "Load player directory first" : "Search free agents..."}
            disabled={mlbDir.length === 0}
            value={faQuery}
            onChange={function(e) { setFaQuery(e.target.value); setFaOpen(true); setFaPlayer(null); }}
            onFocus={function() { setFaOpen(true); }}
            onBlur={function() { setTimeout(function() { setFaOpen(false); }, 150); }}
            className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 disabled:bg-gray-50 disabled:text-gray-400"
          />
          {faOpen && faResults.length > 0 && (
            <div className="absolute z-20 left-0 right-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-lg max-h-48 overflow-y-auto">
              {faResults.map(function(p) {
                return (
                  <button
                    key={p.id}
                    onMouseDown={function() { setFaPlayer(p); setFaQuery(p.name); setFaOpen(false); }}
                    className="w-full text-left px-3 py-2 text-sm hover:bg-blue-50 flex items-center gap-2"
                  >
                    <span className="text-xs bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded font-bold">{p.pos}</span>
                    <span className="font-medium text-gray-800">{p.name}</span>
                    <span className="text-xs text-gray-400 ml-auto">{p.team}</span>
                  </button>
                );
              })}
            </div>
          )}
          {faPlayer && (
            <button onClick={function() { setFaPlayer(null); setFaQuery(""); }} className="absolute right-2 top-7 text-gray-300 hover:text-gray-500 text-lg leading-none">x</button>
          )}
        </div>
      </div>

      {(rosterPlayer || faPlayer) && (
        <div className="flex flex-col sm:flex-row gap-3">
          <CompareCard player={rosterPlayer} side="roster" />
          <CompareCard player={faPlayer}     side="fa" />
        </div>
      )}

      <CompareTable rp={rosterPlayer} fp={faPlayer} />

      {v && (
        <div className={"rounded-xl border px-5 py-4 " + v.color}>
          <div className="font-bold text-base mb-1">{v.label} {v.emoji}</div>
          <div className="text-xs opacity-80">{v.desc}</div>
          {warn && <div className="mt-2 text-xs font-medium opacity-90">Warning: {warn}</div>}
          <div className="mt-2 flex gap-4 text-xs opacity-70">
            <span>Production edge: {prodAdv >= 0 ? "+" : ""}{prodAdv.toFixed(0)} ({prodAdv >= 0 ? "FA" : "Current"})</span>
            <span>Dynasty edge: {dsAdv >= 0 ? "+" : ""}{dsAdv.toFixed(0)} ({dsAdv >= 0 ? "FA" : "Current"})</span>
          </div>
        </div>
      )}

      {!rosterPlayer && !faPlayer && (
        <div className="text-center text-xs text-gray-300 py-4">
          Select both players above to see the comparison
        </div>
      )}
    </div>
  );
}

/* ── Player search used inside each trade side ─────────────────*/
function TradeSearch({ dir, excludedNames, onAdd, placeholder }) {
  const [query, setQuery] = useState("");
  const [open,  setOpen]  = useState(false);

  const results = useMemo(() => {
    if (!dir?.length || query.length < 2) return [];
    const q = query.toLowerCase();
    return dir
      .filter(p => p.name.toLowerCase().includes(q) && !(excludedNames||new Set()).has(p.name))
      .slice(0, 14);
  }, [query, dir, excludedNames]);

  const pick = (p) => {
    onAdd({
      id: `trade-${Date.now()}-${p.mlbId||p.id}`,
      name: p.name, team: p.team, pos: p.pos,
      eligible: p.eligible || p.pos, type: p.type,
      age: p.age || 0, isProspect: !!p.isProspect, isMinors: !!p.isMinors,
      fpAvg: p.fpAvg || 0, fpTotal: p.fpTotal || 0, gp: p.gp || 0,
      hr: p.hr||0, sb: p.sb||0, rbi: p.rbi||0,
      ip: p.ip||0, era: p.era||0, k: p.k||0, sv: p.sv||0, qs: p.qs||0,
    });
    setQuery(""); setOpen(false);
  };

  return (
    <div className="relative">
      <input
        className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400 bg-white"
        placeholder={placeholder || "Search player name…"}
        value={query}
        onChange={e => { setQuery(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        onBlur={() => setTimeout(() => setOpen(false), 200)}
      />
      {open && results.length > 0 && (
        <div className="absolute z-50 left-0 right-0 bg-white border border-gray-200 rounded-xl shadow-xl mt-1 max-h-72 overflow-y-auto">
          {results.map(p => (
            <button
              key={p.id}
              type="button"
              onMouseDown={() => pick(p)}
              className="w-full text-left px-4 py-2.5 hover:bg-gray-50 border-b border-gray-100 last:border-0 flex items-center gap-3">
              <span className={`text-xs font-bold px-1.5 py-0.5 rounded-full shrink-0 ${posColor(p.pos)}`}>{p.pos}</span>
              <div className="min-w-0 flex-1">
                <span className="font-semibold text-sm text-gray-900">{p.name}</span>
                <span className="text-xs text-gray-400 ml-2">{p.team} · Age {p.age||"?"}</span>
                {p.isMinors && (
                  <span className="ml-1.5 text-xs bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded-full font-semibold">
                    {p.levelLabel || "MiLB"}
                  </span>
                )}
              </div>
              <span className="text-xs text-gray-400 shrink-0">{p.fpAvg > 0 ? `${p.fpAvg.toFixed(1)} pts/gm` : "No stats yet"}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── Trade Analysis Panel ──────────────────────────────────────*/
function TradeAnalysisPanel({ givePlayers, recvPlayers, roster, positionNeeds, categoryNeeds, league }) {
  var scoringFormat = (league && league.scoringFormat) || "h2h_points";
  var catLeague = isCatFormat(scoringFormat);
  // ── Per-player scores ──
  const giveScores = givePlayers.map(p => ({ ...p, ds: dynastyScore(p) }));
  const recvScores = recvPlayers.map(p => ({ ...p, ds: dynastyScore(p) }));

  const totalGiveDs   = giveScores.reduce((s, p) => s + p.ds, 0);
  const totalRecvDs   = recvScores.reduce((s, p) => s + p.ds, 0);
  const totalGiveProd = givePlayers.reduce((s, p) => s + (p.fpAvg || 0), 0);
  const totalRecvProd = recvPlayers.reduce((s, p) => s + (p.fpAvg || 0), 0);

  // ── Category delta (hitters: HR/SB/RBI; pitchers: K/SV/QS) ──
  const catDelta = {
    hr:  recvPlayers.reduce((s,p)=>s+(p.hr||0),0)  - givePlayers.reduce((s,p)=>s+(p.hr||0),0),
    sb:  recvPlayers.reduce((s,p)=>s+(p.sb||0),0)  - givePlayers.reduce((s,p)=>s+(p.sb||0),0),
    rbi: recvPlayers.reduce((s,p)=>s+(p.rbi||0),0) - givePlayers.reduce((s,p)=>s+(p.rbi||0),0),
    k:   recvPlayers.reduce((s,p)=>s+(p.k||0),0)   - givePlayers.reduce((s,p)=>s+(p.k||0),0),
    sv:  recvPlayers.reduce((s,p)=>s+(p.sv||0),0)  - givePlayers.reduce((s,p)=>s+(p.sv||0),0),
    qs:  recvPlayers.reduce((s,p)=>s+(p.qs||0),0)  - givePlayers.reduce((s,p)=>s+(p.qs||0),0),
  };

  // ── Position impact (needs fixed vs needs vacated) ──
  const needsFilled   = positionNeeds.filter(n =>
    recvPlayers.some(p => p.type === n.type && eligibleFor(p, n.pos)) &&
    !givePlayers.some(p => p.type === n.type && eligibleFor(p, n.pos))
  ).length;
  const needsVacated  = positionNeeds.filter(n =>
    givePlayers.some(p => p.type === n.type && eligibleFor(p, n.pos)) &&
    !recvPlayers.some(p => p.type === n.type && eligibleFor(p, n.pos))
  ).length;

  // ── Category advantage score (for h2h_cats / roto leagues) ──
  const catNeedsFilled  = categoryNeeds.filter(cn => {
    if (cn.cat === "HR Power")       return recvPlayers.some(p => p.hr > 0)  && !givePlayers.some(p => p.hr > 0);
    if (cn.cat === "Speed/SB")       return recvPlayers.some(p => p.sb > 0)  && !givePlayers.some(p => p.sb > 0);
    if (cn.cat === "Saves")          return recvPlayers.some(p => p.sv > 0)  && !givePlayers.some(p => p.sv > 0);
    if (cn.cat === "Strikeouts")     return recvPlayers.some(p => p.k > 0)   && !givePlayers.some(p => p.k > 0);
    if (cn.cat === "Quality Starts") return recvPlayers.some(p => p.qs > 0)  && !givePlayers.some(p => p.qs > 0);
    return false;
  }).length;
  const catNeedsVacated = categoryNeeds.filter(cn => {
    if (cn.cat === "HR Power")       return givePlayers.some(p => p.hr > 0)  && !recvPlayers.some(p => p.hr > 0);
    if (cn.cat === "Speed/SB")       return givePlayers.some(p => p.sb > 0)  && !recvPlayers.some(p => p.sb > 0);
    if (cn.cat === "Saves")          return givePlayers.some(p => p.sv > 0)  && !recvPlayers.some(p => p.sv > 0);
    if (cn.cat === "Strikeouts")     return givePlayers.some(p => p.k > 0)   && !recvPlayers.some(p => p.k > 0);
    if (cn.cat === "Quality Starts") return givePlayers.some(p => p.qs > 0)  && !recvPlayers.some(p => p.qs > 0);
    return false;
  }).length;
  const catAdv = (catNeedsFilled - catNeedsVacated) * 20;

  // ── Overall verdict — weights shift based on scoring format ──
  // Points leagues: production is king (50%), dynasty important (40%), position minor (10%)
  // Category leagues: dynasty + categories balanced (35%/30%), production matters less (25%), position (10%)
  const dsTotal    = Math.max(totalGiveDs + totalRecvDs, 1);
  const dynastyAdv = ((totalRecvDs   - totalGiveDs)   / dsTotal) * 100;
  const prodTotal  = Math.max(totalGiveProd + totalRecvProd, 0.01);
  const prodAdv    = ((totalRecvProd - totalGiveProd)  / prodTotal) * 100;
  const posAdv     = (needsFilled - needsVacated) * 15;
  const overallAdv = catLeague
    ? dynastyAdv * 0.35 + prodAdv * 0.25 + catAdv * 0.30 + posAdv * 0.10
    : dynastyAdv * 0.40 + prodAdv * 0.50 + posAdv * 0.10;

  const verdict =
    overallAdv >= 22  ? { label:"You Win",              emoji:"🏆", color:"bg-green-600",  text:"text-green-700",  border:"border-green-200 bg-green-50"  } :
    overallAdv >= 8   ? { label:"Slight Edge Your Way", emoji:"✅", color:"bg-blue-500",   text:"text-blue-700",   border:"border-blue-200 bg-blue-50"    } :
    overallAdv >= -8  ? { label:"Fair Trade",           emoji:"⚖️", color:"bg-slate-500",  text:"text-slate-700",  border:"border-slate-200 bg-slate-50"  } :
    overallAdv >= -22 ? { label:"Slight Disadvantage",  emoji:"⚠️", color:"bg-orange-500", text:"text-orange-700", border:"border-orange-200 bg-orange-50" } :
                        { label:"You Lose",              emoji:"❌", color:"bg-red-600",    text:"text-red-700",    border:"border-red-200 bg-red-50"      };

  // ── Helpers ──
  const ScoreBar = ({ value, max, color }) => {
    const pct = max > 0 ? Math.min(100, (value / max) * 100) : 0;
    return (
      <div className="flex items-center gap-2">
        <div className="flex-1 h-3 bg-gray-100 rounded-full overflow-hidden">
          <div className={`h-full rounded-full ${color}`} style={{width:`${pct}%`}}/>
        </div>
        <span className="text-sm font-black w-8 text-right">{Math.round(value)}</span>
      </div>
    );
  };

  const DeltaChip = ({ label, val, icon }) => {
    if (val === 0) return null;
    const pos = val > 0;
    return (
      <div className={`flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full ${pos?"bg-green-100 text-green-700":"bg-red-100 text-red-700"}`}>
        <span>{icon}</span>
        <span>{label}</span>
        <span>{pos?"+":""}{val}</span>
      </div>
    );
  };

  const maxDs   = Math.max(totalGiveDs, totalRecvDs, 1);
  const maxProd = Math.max(totalGiveProd, totalRecvProd, 0.1);

  const hasCatData = givePlayers.some(p => p.hr||p.sb||p.k||p.sv) ||
                     recvPlayers.some(p => p.hr||p.sb||p.k||p.sv);

  return (
    <div className="space-y-4">

      {/* ── Verdict Banner ── */}
      <div className={`rounded-2xl border-2 p-6 ${verdict.border}`}>
        <div className="flex items-center gap-4 flex-wrap">
          <div className={`w-14 h-14 rounded-2xl ${verdict.color} flex items-center justify-center text-2xl shadow-sm shrink-0`}>
            {verdict.emoji}
          </div>
          <div className="flex-1 min-w-0">
            <div className={`text-2xl font-black ${verdict.text}`}>{verdict.label}</div>
            <div className="text-sm text-gray-500 mt-0.5">
              {overallAdv > 0
                ? `You gain ${prodAdv > 0 ? "production" : "dynasty value"}${dynastyAdv > 0 && prodAdv > 0 ? " and dynasty value" : ""}${needsFilled > 0 ? " and fill a positional need" : ""}.`
                : overallAdv < 0
                ? `You give up ${-prodAdv > 0 ? "production" : "dynasty value"}${-dynastyAdv > 0 && -prodAdv > 0 ? " and dynasty value" : ""}${needsVacated > 0 ? " and vacate a positional need" : ""}.`
                : "The value exchanged is roughly balanced across production and dynasty."}
              {!roster && <span className="ml-2 text-amber-600 text-xs font-medium">⚠ Import roster CSV for positional context.</span>}
            </div>
          </div>
          <div className="text-right shrink-0">
            <div className="text-xs text-gray-400 uppercase tracking-wide">Trade Score</div>
            <div className={`text-3xl font-black ${verdict.text}`}>
              {overallAdv > 0 ? "+" : ""}{Math.round(overallAdv)}
            </div>
          </div>
        </div>
      </div>

      {/* ── Three analysis columns ── */}
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">

        {/* Dynasty Value */}
        <div className="bg-white rounded-xl shadow p-5">
          <div className="flex items-center gap-2 mb-4">
            <span className="text-base">👑</span>
            <div>
              <div className="font-black text-sm text-gray-800">Dynasty Value</div>
              <div className="text-xs text-gray-400">Age tiers · 45% of score</div>
            </div>
          </div>
          <div className="space-y-3">
            <div>

/* ── Query helpers ── */
function advisorFindPlayers(query, mlbDir, roster) {
  var lq = query.toLowerCase();
  var seen = new Set();
  var results = [];
  var pool = [];
  if (mlbDir && mlbDir.length) pool = pool.concat(mlbDir);
  if (roster && roster.all) pool = pool.concat(roster.all);
  pool.forEach(function(p) {
    if (seen.has(p.name)) return;
    var nl = p.name.toLowerCase();
    var parts = nl.split(" ");
    var last = parts[parts.length - 1];
    if (lq.includes(nl) || (last.length >= 5 && lq.includes(last))) {
      seen.add(p.name); results.push(p);
    }
  });
  return results.slice(0, 4);
}

function advisorStatLine(p) {
  if (!p) return "No data";
  if (p.type === "pitcher") {
    return [
      p.fpAvg ? p.fpAvg.toFixed(1)+" FP/G" : null,
      p.gp > 0 ? p.gp+" G" : null,
      p.ip ? (typeof p.ip==="number" ? p.ip.toFixed(1) : p.ip)+" IP" : null,
      p.era > 0 ? "ERA "+p.era.toFixed(2) : null,
      p.k > 0 ? p.k+" K" : null,
      p.sv > 0 ? p.sv+" SV" : null,
      p.qs > 0 ? p.qs+" QS" : null,
      p.w > 0 ? p.w+" W" : null,
    ].filter(Boolean).join(" · ");
  }
  return [
    p.fpAvg ? p.fpAvg.toFixed(1)+" FP/G" : null,
    p.gp > 0 ? p.gp+" G" : null,
    p.hr > 0 ? p.hr+" HR" : null,
    p.rbi > 0 ? p.rbi+" RBI" : null,
    p.sb > 0 ? p.sb+" SB" : null,
    p.r > 0 ? p.r+" R" : null,
    p.avg ? "."+String(Math.round(p.avg*1000)).padStart(3,"0")+" AVG" : null,
  ].filter(Boolean).join(" · ");
}

function processAdvisorQuery(rawQ, roster, mlbDir, news, league) {
  var q = rawQ.toLowerCase().trim();
  var players = advisorFindPlayers(q, mlbDir, roster);

  var isStartSit  = (q.includes("start") || q.includes("sit") || q.includes("bench")) &&
                    (q.includes(" or ") || q.includes(" vs ") || players.length >= 2);
  var isPlayerQ   = q.includes("tell me") || q.includes("info on") || q.includes("stats on") ||
                    q.includes("how is") || q.includes("how's") || q.includes("who is") ||
                    q.includes("look up") || q.includes("search for") || q.includes("show me");
  var isDrop      = q.includes("drop") || q.includes("cut ") || q.includes("release") || q.includes("waive");
  var isPickup    = (q.includes("add") || q.includes("pick up") || q.includes("pickup") ||
                     q.includes("stream") || q.includes("waiver wire") || q.includes("available")) &&
                    (q.includes("who") || q.includes("best") || q.includes("should"));
  var isLineup    = q.includes("lineup") || q.includes("who should i start") || q.includes("my starters");
  var isRoster    = q.includes("weakness") || q.includes("my roster") || q.includes("my team") ||
                    q.includes("roster analysis") || q.includes("where am i weak") || q.includes("needs");
  var isInjury    = q.includes("injur") || q.includes("hurt") || q.includes(" il ") || q.includes("day-to-day") || q.includes("disabled list");
  var isHelp      = q === "" || q === "hi" || q === "hello" || q.includes("what can you") || q.includes("help");
  var isDynasty   = q.includes("dynasty") || q.includes("prospect") || q.includes("long term") || q.includes("future");
  var isTrade     = q.includes("trade") || q.includes("should i trade");

  if (isHelp) return { type:"help" };

  if (isStartSit && players.length >= 2) {
    var p1 = players[0], p2 = players[1];
    var fp1 = p1.fpAvg||0, fp2 = p2.fpAvg||0;
    var ds1 = dynastyScore(p1), ds2 = dynastyScore(p2);
    var rec, reason;
    if (fp1 > fp2 * 1.12) {
      rec = p1; reason = p1.name+" averages "+fp1.toFixed(1)+" FP/G vs "+fp2.toFixed(1)+" — clear start.";
    } else if (fp2 > fp1 * 1.12) {
      rec = p2; reason = p2.name+" averages "+fp2.toFixed(1)+" FP/G vs "+fp1.toFixed(1)+" — clear start.";
    } else if (ds1 > ds2 + 12) {
      rec = p1; reason = "Fantasy production is similar, but "+p1.name+" has better dynasty upside (DS "+ds1+" vs "+ds2+"). Lean "+p1.name+".";
    } else if (ds2 > ds1 + 12) {
      rec = p2; reason = "Fantasy production is similar, but "+p2.name+" has better dynasty upside (DS "+ds2+" vs "+ds1+"). Lean "+p2.name+".";
    } else {
      rec = fp1 >= fp2 ? p1 : p2;
      reason = "Too close to call on pure numbers. "+rec.name+" gets a slight edge ("+Math.max(fp1,fp2).toFixed(1)+" FP/G). Check matchups and park factors.";
    }
    return { type:"startSit", p1:p1, p2:p2, rec:rec, reason:reason };
  }

  if ((isStartSit || q.includes("should i play") || q.includes("should i start")) && players.length === 1) {
    var sp = players[0];
    var sds = dynastyScore(sp);
    var sfp = sp.fpAvg||0;
    var sv = sfp >= 8 ? "Start" : sfp >= 5 ? "Spot start / matchup-dependent" : sfp >= 2.5 ? "Deep leagues / streaming only" : "Bench — explore alternatives";
    return { type:"startAdvice", player:sp, verdict:sv, ds:sds };
  }

  if (isDynasty && players.length >= 1) {
    return { type:"dynastyAdvice", players:players };
  }

  if (isTrade && players.length >= 2) {
    var tp1 = players[0], tp2 = players[1];
    var tds1 = dynastyScore(tp1), tds2 = dynastyScore(tp2);
    var tfp1 = tp1.fpAvg||0, tfp2 = tp2.fpAvg||0;
    var tScore1 = tfp1 * 0.55 + tds1 * 0.45;
    var tScore2 = tfp2 * 0.55 + tds2 * 0.45;
    var tRec = tScore1 >= tScore2 ? "Keep "+tp1.name : "Consider trading "+tp1.name+" for "+tp2.name;
    return { type:"tradeAdvice", p1:tp1, p2:tp2, rec:tRec, s1:Math.round(tScore1), s2:Math.round(tScore2) };
  }

  if (players.length > 0 && (isPlayerQ || (!isDrop && !isPickup && !isLineup && !isRoster && !isInjury))) {
    return players.length === 1
      ? { type:"playerDetail", player:players[0] }
      : { type:"playerList", players:players, title:"Here's what I found:" };
  }

  if (isDrop && roster) {
    var active = roster.all.filter(function(p){ return p.status==="Act"; });
    var scored = active.map(function(p){
      return { p:p, score: dynastyScore(p)*0.4 + (p.fpAvg||0)*4 };
    }).sort(function(a,b){ return a.score-b.score; });
    return { type:"dropAdvice", players:scored.slice(0,4).map(function(x){ return x.p; }) };
  }

  if (isPickup) {
    if (!mlbDir || !mlbDir.length) return { type:"text", text:"Player directory isn't loaded yet — go to the FA Analyzer tab and click 'Load Players', then ask me again." };
    var owned = roster ? new Set(roster.all.map(function(p){ return p.name; })) : new Set();
    var posNeeds2 = roster ? analyzeNeeds(roster).positionNeeds : [];
    var rAct2 = roster ? roster.all.filter(function(p){ return p.status==="Act"; }) : [];
    var topFa = mlbDir
      .filter(function(p){ return !p.isMinors && !owned.has(p.name) && p.fpAvg > 0; })
      .map(function(p){
        var ds3 = dynastyScore(p);
        var fit3 = faFitScore(p, posNeeds2, [], rAct2, league ? league.scoringFormat : "h2h_points").score;
        return Object.assign({},p,{ _dynastyScore:ds3, _fitScore:fit3, _combined:fit3*0.6+ds3*0.4 });
      })
      .sort(function(a,b){ return b._combined - a._combined; })
      .slice(0,5);
    return { type:"pickupAdvice", players:topFa };
  }

  if (isLineup && roster) {
    var act = roster.all.filter(function(p){ return p.status==="Act"; });
    var topH = act.filter(function(p){ return p.type==="hitter"; }).sort(function(a,b){ return (b.fpAvg||0)-(a.fpAvg||0); }).slice(0,6);
    var topP = act.filter(function(p){ return p.type==="pitcher"; }).sort(function(a,b){ return (b.fpAvg||0)-(a.fpAvg||0); }).slice(0,5);
    return { type:"lineupAdvice", hitters:topH, pitchers:topP };
  }

  if (isRoster && roster) {
    var rNeeds = analyzeNeeds(roster).positionNeeds;
    var topActv = roster.all.filter(function(p){ return p.status==="Act"; })
      .sort(function(a,b){ return (b.fpAvg||0)-(a.fpAvg||0); }).slice(0,4);
    return { type:"rosterAnalysis", needs:rNeeds, strengths:topActv };
  }

  if (isInjury) {
    var injN = (news||[]).filter(function(n){
      var hl=(n.headline||"").toLowerCase();
      return hl.includes("injur")||hl.includes(" il ")||hl.includes("day-to-day")||hl.includes("placed on");
    });
    if (players.length > 0) {
      var pName2 = players[0].name.toLowerCase();
      var pLast2 = pName2.split(" ").slice(-1)[0];
      var pNews2 = injN.filter(function(n){ return (n.headline||"").toLowerCase().includes(pLast2); });
      if (pNews2.length > 0) return { type:"injuryInfo", player:players[0], news:pNews2.slice(0,3) };
      return { type:"text", text:"No recent injury news for "+players[0].name+". They appear healthy based on the latest news feed." };
    }
    return { type:"injuryInfo", player:null, news:injN.slice(0,5) };
  }

  if (players.length > 0) return { type:"playerList", players:players, title:"Here's what I found:" };

  return { type:"noMatch", query:rawQ };
}

        <div className={"rounded-xl border px-4 py-3 text-sm font-bold "+svColor}>{r.verdict}</div>

  /* ── pickupAdvice ── */
  if (r.type === "pickupAdvice") return (

        <div className="space-y-1.5">{r.pitchers.map(function(p){ return <AdvisorPlayerChip key={p.id||p.name} player={p}/>; })}</div>

        <li>"Where is my roster weak?"</li>
      </ul>
    </div>
  );

  return <p className="text-sm text-gray-500">...</p>;

function AdvisorTab({ roster, mlbDir, dirLoaded, dirLoading, onLoadDirectory, news, league }) {
  var [messages, setMessages] = React.useState([
    { role:"bot", response:{ type:"help" } }
  ]);
  var [input, setInput] = React.useState("");
  var [thinking, setThinking] = React.useState(false);
  var bottomRef = React.useRef(null);
  var inputRef  = React.useRef(null);

  React.useEffect(function() {
    if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior:"smooth" });
  }, [messages]);

  function sendQuery(text) {
    var q = (text || input).trim();
    if (!q) return;
    setInput("");
    setMessages(function(prev) { return prev.concat([{ role:"user", text:q }]); });
    setThinking(true);
    // Small delay to simulate "thinking"
    setTimeout(function() {
      var response = processAdvisorQuery(q, roster, mlbDir, news, league);
      setMessages(function(prev) { return prev.concat([{ role:"bot", response:response }]); });
      setThinking(false);
    }, 420);
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendQuery(); }
  }

  return (
    <div className="flex flex-col" style={{height:"78vh"}}>
      {/* Header */}
      <div className="bg-gradient-to-r from-slate-900 to-blue-900 text-white px-5 py-3 rounded-t-2xl flex items-center justify-between">

              className="text-xs bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-semibold px-3 py-1.5 rounded-lg transition-colors">
              {dirLoading ? "⏳ Loading..." : "🌐 Load Players"}

          )}
          {dirLoaded && <span className="text-xs text-emerald-400 font-medium">✓ {mlbDir.length.toLocaleString()} players loaded</span>}

      </div>

      {/* Quick actions */}
      <div className="bg-slate-50 border-b border-slate-200 px-4 py-2 flex gap-2 flex-wrap">
        {ADVISOR_QUICK.map(function(chip) {
          return (
            <button key={chip.q} onClick={function(){ sendQuery(chip.q); }}
              className="text-xs bg-white border border-slate-200 hover:bg-blue-50 hover:border-blue-300 text-slate-600 font-medium px-3 py-1.5 rounded-full transition-colors shadow-sm">
              {chip.label}
            </button>

          <span className="text-xs text-amber-600 bg-amber-50 border border-amber-200 rounded-full px-3 py-1.5">

      {/* Messages */}
      <div className="flex-1 overflow-y-auto px-4 py-4 space-y-4 bg-white">
        {messages.map(function(msg, i) {
          if (msg.role === "user") return (
            <div key={i} className="flex justify-end">
              <div className="bg-blue-600 text-white text-sm rounded-2xl rounded-tr-sm px-4 py-2.5 max-w-xs shadow-sm">
                {msg.text}
              </div>
            </div>
          );
          return (
            <div key={i} className="flex justify-start gap-2.5">
              <div className="w-8 h-8 bg-slate-800 rounded-full flex items-center justify-center text-base shrink-0 mt-0.5">🤖</div>
              <div className="bg-slate-50 border border-slate-200 rounded-2xl rounded-tl-sm px-4 py-3 max-w-2xl w-full shadow-sm">
                <AdvisorBotMessage msg={msg}/>
              </div>
            </div>
          );
        })}
        {thinking && (
          <div className="flex justify-start gap-2.5">
            <div className="w-8 h-8 bg-slate-800 rounded-full flex items-center justify-center text-base shrink-0">🤖</div>
            <div className="bg-slate-50 border border-slate-200 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm">
              <div className="flex gap-1.5 items-center h-5">
                <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{animationDelay:"0ms"}}/>
                <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{animationDelay:"150ms"}}/>
                <div className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{animationDelay:"300ms"}}/>
              </div>
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      {/* Input */}
      <div className="bg-white border-t border-slate-200 px-4 py-3 rounded-b-2xl flex gap-2">
        <input
          ref={inputRef}
          type="text"
          value={input}
          onChange={function(e){ setInput(e.target.value); }}
          onKeyDown={handleKey}
          placeholder="Ask about any player, lineup decision, pickup, or dynasty value..."
          className="flex-1 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 bg-slate-50"

        <button
          onClick={function(){ sendQuery(); }}
          disabled={!input.trim() || thinking}
          className="bg-blue-600 hover:bg-blue-700 disabled:opacity-40 text-white font-bold px-4 py-2.5 rounded-xl transition-colors text-sm">
          Send
        </button>
      </div>
    </div>
  );

/* ═══════════════════════════════════════════════════════════════
